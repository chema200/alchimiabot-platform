// ── Daily Report Tab ──
function DailyReportTab() {
  const { t } = useI18n();
  const [reports, setReports] = useState({});  // date -> report
  const [selected, setSelected] = useState(null);  // selected date
  const [loading, setLoading] = useState(false);
  const [days, setDays] = useState([]);  // list of available dates
  const [page, setPage] = useState(0);  // pagination
  const PAGE_SIZE = 15;

  // Generate list of last 90 days. 2026-04-27: AUTO-LOAD the visible page so
  // the table shows real data on first paint. Empty days render as
  // "no activity" inline (handled in the row template) so they're visually
  // distinct from "not loaded yet". Auto-load only the current page's 15 days
  // to keep the request volume bounded; pagination triggers next batch.
  useEffect(() => {
    const d = [];
    for (let i = 0; i < 90; i++) {
      const date = new Date(Date.now() - i * 86400000);
      d.push(date.toISOString().split("T")[0]);
    }
    setDays(d);
    setSelected(d[0]);
  }, []);

  const loadDayQuiet = (dateStr) => {
    fetch(API + "/api/daily-report/" + dateStr).then(r => r.json()).then(d => {
      setReports(prev => ({...prev, [dateStr]: d}));
    }).catch(() => {});
  };

  // Auto-load current page in parallel — fires on tab mount AND on page change.
  useEffect(() => {
    if (days.length === 0) return;
    const visible = days.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
    visible.forEach(d => {
      if (!reports[d]) loadDayQuiet(d);
    });
    // intentionally not depending on `reports` to avoid re-triggering on every load completion
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [days, page]);

  const loadDay = (dateStr) => {
    if (reports[dateStr]) { setSelected(dateStr); return; }
    setLoading(true);
    setSelected(dateStr);
    fetch(API + "/api/daily-report/" + dateStr).then(r => r.json()).then(d => {
      setReports(prev => ({...prev, [dateStr]: d}));
      setLoading(false);
    }).catch(() => setLoading(false));
  };

  const report = selected ? reports[selected] : null;

  const check = (ok) => ok ? "✓" : "✗";
  const checkColor = (ok) => ok ? "#22c55e" : "#ef4444";
  const scoreColor = (s) => s >= 7 ? "#22c55e" : s >= 4 ? "#eab308" : "#ef4444";

  return (<>
    <div className="page-title">{t("daily.title")} <Tip text={t("daily.tip")} /><div className="page-sub">{t("daily.subtitle")}</div></div>
    {/* Days table */}
    <div className="card" style={{marginBottom:16}}>
      <table>
        <thead><tr>
          <th>{t("daily.col.date")}</th><th>{t("daily.col.day")}</th><th style={{textAlign:"right"}}>{t("daily.col.score")}</th>
          <th style={{textAlign:"right"}}>{t("daily.col.trades")}</th><th style={{textAlign:"right"}}>{t("daily.col.net_pnl")}</th>
          <th style={{textAlign:"right"}}>{t("daily.col.wr")}</th><th style={{textAlign:"right"}}>{t("daily.col.pf")}</th>
          <th style={{textAlign:"right"}}>{t("daily.col.issues")}</th><th></th>
        </tr></thead>
        <tbody>
          {days.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE).map(d => {
            const r = reports[d];
            const isSelected = selected === d;
            const g = r?.general || {};
            const p = r?.pnl || {};
            const s = r?.scores || {};
            const noActivity = r && (g.trades || 0) === 0;
            const issueCount = r ? Object.values(r).reduce((sum, sec) => sum + (sec?.issues?.length || 0), 0) : 0;
            return (
              <tr key={d} onClick={() => loadDay(d)} style={{cursor:"pointer", background: isSelected ? "#1a1a3e" : "transparent"}}>
                <td style={{fontWeight: isSelected ? 700 : 400, color: isSelected ? "#3b82f6" : noActivity ? "#666" : "#e0e0e8"}}>{d}</td>
                <td style={{color:"#666"}}>{r ? r.day_of_week?.substring(0,3) : "..."}</td>
                {noActivity ? (
                  <td colSpan={6} style={{textAlign:"center", color:"#666", fontStyle:"italic"}}>{t("daily.no_activity")}</td>
                ) : (<>
                  <td style={{textAlign:"right", color: r ? scoreColor(s.overall || 0) : "#444", fontWeight:600}}>{r ? (s.overall || 0) + "/10" : "-"}</td>
                  <td style={{textAlign:"right"}}>{r ? g.trades || 0 : "-"}</td>
                  <td style={{textAlign:"right", color: r ? (Number(g.net_pnl) >= 0 ? "#22c55e" : "#ef4444") : "#444"}}>{r ? "$" + (g.net_pnl || 0) : "-"}</td>
                  <td style={{textAlign:"right", color: r ? (p.win_rate >= 50 ? "#22c55e" : p.win_rate >= 40 ? "#eab308" : "#ef4444") : "#444"}}>{r ? (p.win_rate || 0) + "%" : "-"}</td>
                  <td style={{textAlign:"right"}}>{r ? (p.profit_factor || 0) : "-"}</td>
                  <td style={{textAlign:"right", color: issueCount > 0 ? "#eab308" : "#22c55e"}}>{r ? issueCount : "-"}</td>
                </>)}
                <td style={{textAlign:"right"}}>{!r && <span style={{color:"#444", fontSize:10}}>…</span>}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {/* Pagination */}
      {days.length > PAGE_SIZE && (
        <div style={{display:"flex", justifyContent:"center", alignItems:"center", gap:12, marginTop:12}}>
          <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0}
            style={{padding:"4px 12px", fontSize:11, borderRadius:6, border:"1px solid #333", background:"#1a1a2e", color: page===0?"#444":"#aaa", cursor: page===0?"not-allowed":"pointer"}}>
            {t("daily.prev")}
          </button>
          <span style={{fontSize:11, color:"#666"}}>{page + 1} / {Math.ceil(days.length / PAGE_SIZE)}</span>
          <button onClick={() => setPage(Math.min(Math.ceil(days.length / PAGE_SIZE) - 1, page + 1))} disabled={page >= Math.ceil(days.length / PAGE_SIZE) - 1}
            style={{padding:"4px 12px", fontSize:11, borderRadius:6, border:"1px solid #333", background:"#1a1a2e", color: page>=Math.ceil(days.length/PAGE_SIZE)-1?"#444":"#aaa", cursor: page>=Math.ceil(days.length/PAGE_SIZE)-1?"not-allowed":"pointer"}}>
            {t("daily.next")}
          </button>
        </div>
      )}
    </div>

    {loading && <div className="loading">{t("daily.generating", {date: selected})}</div>}

    {report && !loading && (report.general?.trades || 0) === 0 && (
      <div className="card" style={{padding:24, textAlign:"center", color:"#888"}}>
        <div style={{fontSize:14, fontWeight:600, color:"#ccc", marginBottom:6}}>{t("daily.no_activity")} — {selected}</div>
        <div style={{fontSize:12}}>{t("daily.no_activity_body")}</div>
      </div>
    )}

    {report && !loading && (report.general?.trades || 0) > 0 && (() => {
      const g = report.general || {};
      const sys = report.system || {};
      const integ = report.integration || {};
      const pnl = report.pnl || {};
      const sig = report.signals || {};
      const feat = report.features || {};
      const stor = report.storage || {};
      const trad = report.trading || {};
      const scores = report.scores || {};
      const allIssues = [];
      for (const [section, data] of Object.entries(report)) {
        if (data && typeof data === "object" && data.issues) {
          for (const issue of data.issues) allIssues.push({section, issue});
        }
      }
      return (<>

    {/* Scores */}
    <div className="grid" style={{gridTemplateColumns:"repeat(4, 1fr)"}}>
      <MC label={t("daily.score_overall")} value={scores.overall + "/10"} color={scores.overall >= 7 ? "green" : scores.overall >= 4 ? "yellow" : "red"} />
      <MC label={t("daily.score_data_quality")} value={scores.data_quality + "/10"} color={scores.data_quality >= 7 ? "green" : "yellow"} />
      <MC label={t("daily.score_trading")} value={scores.trading + "/10"} color={scores.trading >= 6 ? "green" : scores.trading >= 4 ? "yellow" : "red"} />
      <MC label={t("daily.score_system")} value={scores.system + "/10"} color={scores.system >= 8 ? "green" : "yellow"} />
    </div>

    {/* 1. General */}
    <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.general")}</h3>
    <div className="grid">
      <MC label={t("daily.mode")} value={g.mode || "?"} color="purple" />
      <MC label={t("daily.trades")} value={g.trades || 0} />
      <MC label={t("daily.gross_pnl")} value={"$" + (g.total_pnl || 0)} color={Number(g.total_pnl) >= 0 ? "green" : "red"} />
      <MC label={t("daily.fees")} value={"$" + (g.total_fees || 0)} color="yellow" />
      <MC label={t("daily.net_pnl")} value={"$" + (g.net_pnl || 0)} color={Number(g.net_pnl) >= 0 ? "green" : "red"} />
    </div>

    {/* 2. System */}
    <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.system")}</h3>
    <div className="card">
      <div style={{display:"flex", gap:24, flexWrap:"wrap", fontSize:12}}>
        <span style={{color: checkColor(sys.bot_running)}}>{check(sys.bot_running)} {t("daily.sys.bot_running")}</span>
        <span style={{color: checkColor(sys.platform_running)}}>{check(sys.platform_running)} {t("daily.sys.platform_running")}</span>
        <span style={{color: checkColor(sys.ws_stable)}}>{check(sys.ws_stable)} {t("daily.sys.ws_stable")}</span>
        <span style={{color: checkColor(sys.cpu_pct < 80)}}>{check(sys.cpu_pct < 80)} {t("daily.sys.cpu")} {sys.cpu_pct}%</span>
        <span style={{color: checkColor(sys.ram_pct < 85)}}>{check(sys.ram_pct < 85)} {t("daily.sys.ram")} {sys.ram_pct}%</span>
      </div>
    </div>

    {/* 3. Integration */}
    <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.integration")}</h3>
    <div className="grid">
      <MC label={t("daily.int.bot_trades")} value={integ.bot_trades || 0} />
      <MC label={t("daily.int.platform_trades")} value={integ.platform_trades || 0} />
      <MC label={t("daily.int.diff")} value={integ.diff_trades || 0} color={integ.diff_trades === 0 ? "green" : "red"} />
      <MC label={t("daily.int.signals")} value={integ.signals_received || 0} />
      <MC label={t("daily.int.duplicates")} value={integ.duplicates || 0} color={integ.duplicates === 0 ? "green" : "red"} />
    </div>

    {/* 4. PnL */}
    <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.pnl")}</h3>
    <div className="grid">
      <MC label={t("daily.pnl.wins")} value={pnl.wins || 0} color="green" />
      <MC label={t("daily.pnl.losses")} value={pnl.losses || 0} color="red" />
      <MC label={t("daily.pnl.win_rate")} value={(pnl.win_rate || 0) + "%"} color={pnl.win_rate >= 50 ? "green" : pnl.win_rate >= 40 ? "yellow" : "red"} />
      <MC label={t("daily.pnl.pf")} value={pnl.profit_factor || 0} color={pnl.profit_factor >= 1 ? "green" : "red"} />
      <MC label={t("daily.pnl.avg_wl")} value={"$" + (pnl.avg_win || 0) + " / $" + (pnl.avg_loss || 0)} />
      <MC label={t("daily.pnl.fee_killed")} value={pnl.fee_killed || 0} color={pnl.fee_killed === 0 ? "green" : "red"} />
    </div>

    {/* 5. Signals */}
    <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.signals")}</h3>
    <div className="grid">
      <MC label="ENTER" value={sig.enter || 0} color="green" />
      <MC label="SKIP" value={sig.skip || 0} color="yellow" />
      <MC label="BLOCKED" value={sig.blocked || 0} color="red" />
    </div>

    {/* 6-7. Features & Storage */}
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:16}}>
      <div>
        <h3 className="section-title">{t("daily.section.features")}</h3>
        <div className="card">
          <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:4}}>
            <span>{t("daily.feat.snapshots_today", {n: feat.snapshots_today || 0})}</span>
            <span>{t("daily.feat.coins_tracked", {n: feat.coins_with_features || 0})}</span>
          </div>
        </div>
      </div>
      <div>
        <h3 className="section-title">{t("daily.section.storage")}</h3>
        <div className="card">
          <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:4}}>
            <span>{t("daily.stor.disk", {pct: stor.disk_pct, used: stor.disk_used_gb, free: stor.disk_free_gb})}</span>
            <span>{t("daily.stor.parquet_today", {n: stor.parquet_files_today})}</span>
          </div>
        </div>
      </div>
    </div>

    {/* 8. Trading Analysis */}
    <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.trading")}</h3>
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
      <div className="card">
        <div className="label" style={{marginBottom:8}}>{t("daily.trad.best_coins")}</div>
        {(trad.best_coins || []).map((c, i) => (
          <div key={i} style={{fontSize:11, display:"flex", justifyContent:"space-between"}}>
            <span className="purple">{c.coin}</span>
            <span style={{color:"#22c55e"}}>{t("daily.trad.coin_line", {pnl: c.pnl, wr: c.wr, trades: c.trades})}</span>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="label" style={{marginBottom:8}}>{t("daily.trad.worst_coins")}</div>
        {(trad.worst_coins || []).map((c, i) => (
          <div key={i} style={{fontSize:11, display:"flex", justifyContent:"space-between"}}>
            <span className="purple">{c.coin}</span>
            <span style={{color:"#ef4444"}}>{t("daily.trad.coin_line", {pnl: c.pnl, wr: c.wr, trades: c.trades})}</span>
          </div>
        ))}
      </div>
    </div>

    {/* 9. Problems */}
    {allIssues.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.problems")}</h3>
      <div className="card">
        {allIssues.map((p, i) => (
          <div key={i} style={{padding:"3px 0", fontSize:11, color:"#eab308"}}>
            <span style={{color:"#666"}}>[{p.section}]</span> {p.issue}
          </div>
        ))}
      </div>
    </>)}

    {allIssues.length === 0 && (
      <div className="card" style={{marginTop:16, textAlign:"center", color:"#22c55e", padding:20}}>
        {t("daily.no_problems")}
      </div>
    )}

    {/* Exit reasons */}
    {trad.by_exit_reason && trad.by_exit_reason.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>{t("daily.section.exit_reasons")}</h3>
      <div className="card">
        <table><thead><tr><th>{t("daily.col.reason")}</th><th style={{textAlign:"right"}}>{t("daily.col.trades_r")}</th><th style={{textAlign:"right"}}>{t("daily.col.pnl")}</th></tr></thead>
        <tbody>
          {trad.by_exit_reason.map((r, i) => (
            <tr key={i}><td><span className={"tag " + (r.exit_reason === "SL" ? "tag-red" : "tag-green")}>{r.exit_reason}</span></td>
            <td style={{textAlign:"right"}}>{r.trades}</td>
            <td style={{textAlign:"right", color: Number(r.pnl) >= 0 ? "#22c55e" : "#ef4444"}}>${r.pnl}</td></tr>
          ))}
        </tbody></table>
      </div>
    </>)}
      </>);
    })()}
  </>);
}

// ── Research Lab Tab ──
function LabTab() {
  const { t } = useI18n();
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("overview");
  const [cfData, setCfData] = useState(null);
  const [rejData, setRejData] = useState(null);
  const [cfgData, setCfgData] = useState(null);
  const [diagData, setDiagData] = useState(null);
  const [eqData, setEqData] = useState(null);

  const load = () => {
    setLoading(true);
    fetch(API + "/api/quant/full").then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
    fetch(API + "/api/quant/counterfactual").then(r => r.json()).then(d => setCfData(d)).catch(() => {});
    fetch(API + "/api/quant/rejections").then(r => r.json()).then(d => setRejData(d)).catch(() => {});
    fetch(API + "/api/quant/config-analysis").then(r => r.json()).then(d => setCfgData(d)).catch(() => {});
    fetch(API + "/api/quant/diagnostic").then(r => r.json()).then(d => setDiagData(d)).catch(() => {});
    fetch(API + "/api/quant/entry-quality").then(r => r.json()).then(d => setEqData(d)).catch(() => {});
  };
  useEffect(() => { load(); }, []);

  if (loading) return <div className="loading">{t("lab.generating")}</div>;
  if (!data) return <div className="loading"><button onClick={load} className="tab active">{t("lab.load_btn")}</button></div>;

  const m = data.metrics?.global || {};
  const risk = data.metrics?.risk || {};
  const exec = data.metrics?.execution || {};
  const decisions = data.decisions || [];
  const analysis = data.analysis || {};
  const insights = analysis.insights || [];
  const warnings = analysis.warnings || [];
  const recommendations = analysis.recommendations || [];

      {views.map(v => (
        <button key={v} className={"tab " + (view === v ? "active" : "")} onClick={() => setView(v)}>{t("lab.view." + v)}</button>
      ))}
      <ExportBtn data={(() => {
        // Build comprehensive export with ALL research lab data
        const byMode = data?.metrics?.by_mode || {};
        const modesPresent = Object.keys(byMode).filter(k => k !== "unknown");
        const cfgVersions = cfgData?.by_config_version ? Object.keys(cfgData.by_config_version).filter(k => k !== "unknown") : [];
        return {

          config: cfgData || { status: "no_data_yet", message: "No hay suficientes trades con config_snapshot todavia" },
          rejections: rejData || { status: "no_data_yet", message: "No hay senales bloqueadas todavia" },
          counterfactual: cfData || { status: "no_data_yet" },
          experiments: { note: "Run via POST /api/quant/experiment" },
          decisions: (data?.decisions || []),
          meta: {
            generated_at: new Date().toISOString(),
            source: "research_lab",

            config_versions_present: cfgVersions,
            has_unknown_config_rows: cfgVersions.includes("unknown") || Object.keys(cfgData?.by_config_version || {}).includes("unknown"),
            total_trades: data?.metrics?.global?.trades || 0,
            total_signals: rejData?.totals ? Object.values(rejData.totals).reduce((s, t) => s + (t.cnt || 0), 0) : 0,
          },
        };
      })()} filename={"research_lab_full_" + new Date().toISOString().split("T")[0] + ".json"} label={t("lab.export_label")} />
      <button className="tab" onClick={load}>{t("lab.refresh")}</button>
    </div>

    {view === "overview" && (<>

        <table>

    {view === "rejections" && (() => {
      if (!rejData) return <div className="loading">Cargando datos de rechazos...</div>;

      const topReason = byReason.length > 0 ? byReason.sort((a,b) => (b.cnt || 0) - (a.cnt || 0))[0]?.reason || "N/A" : "N/A";

      const preCandidateRejects = byReason.filter(r => r.decision_stage === "PRE_CANDIDATE_REJECT");

      const legacyBlocked = byReason.filter(r => !r.decision_stage || (r.decision_stage !== "PRE_CANDIDATE_REJECT" && r.decision_stage !== "BLOCKED_POST_CANDIDATE"));

          <MC label="Total Entradas" value={totalEntered} color="green" />
          <MC label="% Bloqueados" value={blockedPct + "%"} color={Number(blockedPct) > 50 ? "yellow" : "green"} />

          <MC label="Blocked Post-Candidate" value={byStage.BLOCKED_POST_CANDIDATE?.cnt || 0} color="red" />
          <MC label="Entered" value={byStage.ENTER?.cnt || 0} color="green" />
        </div>

        {/* Pre-Candidate Rejects */}

          <div className="card scroll">
            <table>
              <thead><tr><th>Razon</th><th>Modo</th><th style={{textAlign:"right"}}>Cantidad</th><th style={{textAlign:"right"}}>Avg Score</th><th style={{textAlign:"right"}}>Avg Score Min</th></tr></thead>
              <tbody>
                {preCandidateRejects.map((r, i) => (

                    <td style={{textAlign:"right"}}>{r.avg_score}</td>
                    <td style={{textAlign:"right"}}>{r.avg_score_min || "-"}</td>

              </tbody>
            </table>
          </div>
        </>)}

        {/* Blocked Post-Candidate */}

          <h3 className="section-title" style={{marginTop:16}}>Blocked Post-Candidate (Passed Score, Failed Filter)</h3>

              <thead><tr><th>Razon</th><th>Modo</th><th style={{textAlign:"right"}}>Cantidad</th><th style={{textAlign:"right"}}>Avg Score</th><th style={{textAlign:"right"}}>Avg Score Min</th></tr></thead>
              <tbody>
                {blockedPostCandidate.map((r, i) => (
                  <tr key={i}>

                    <td style={{textAlign:"right"}}>{r.cnt}</td>
                    <td style={{textAlign:"right"}}>{r.avg_score}</td>
                    <td style={{textAlign:"right"}}>{r.avg_score_min || "-"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>)}

        {/* Legacy (no stage) + full table */}

        <div className="card scroll">
          <table>
            <thead><tr><th>Razon</th><th>Stage</th><th>Modo</th><th style={{textAlign:"right"}}>Cantidad</th><th style={{textAlign:"right"}}>Avg Score</th><th style={{textAlign:"right"}}>Avg Score Min</th></tr></thead>

                  <td>{r.mode || "-"}</td>
                  <td style={{textAlign:"right"}}>{r.cnt}</td>
                  <td style={{textAlign:"right"}}>{r.avg_score}</td>
                  <td style={{textAlign:"right"}}>{r.avg_score_min || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Near Misses */}
        {nearMisses.length > 0 && (<>
          <h3 className="section-title" style={{marginTop:16}}>Near Misses (Score within 5 of threshold)</h3>
          <div className="card scroll">
            <table>

          </div>
        </div>

    {view === "counterfactual" && (() => {

          <table>

            <tbody>
              {entries.map(([key, d]) => {
                const th = d.threshold || 0;

        <div style={{marginTop:8, fontSize:10, color:"#555"}}>

        </div>

    {view === "diagnostic" && (() => {
      const rateColor = (r) => r >= 80 ? "#22c55e" : r >= 50 ? "#eab308" : "#ef4444";

                {Object.entries(wp.quality_distribution).map(([k,v]) => <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:11}}><span>{k}</span><span>{v}</span></div>)}
              </div>}
            </div>
          </div>
          <div className="card" style={{padding:14}}>
            <div style={{fontWeight:700, fontSize:13, color:"#ef4444", marginBottom:10}}>{t("lab.losers_label")} ({lp.count || 0})</div>
            <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:6}}>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Score</span><span>{lp.avg_score || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Spread %</span><span>{lp.avg_spread_pct || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Move vs Fee</span><span>{lp.avg_move_vs_fee || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Confirmacion</span><span>{lp.avg_confirmation || 0}</span></div>
              {lp.quality_distribution && <div style={{marginTop:6}}>
                <div style={{fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:4}}>Distribucion calidad</div>
                {Object.entries(lp.quality_distribution).map(([k,v]) => <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:11}}><span>{k}</span><span>{v}</span></div>)}
              </div>}
            </div>
          </div>
        </div>

        {(lf.length > 0 || wf.length > 0) && <>
          <h3 className="section-title" style={{marginTop:14}}>{t("lab.top_factors_title")}</h3>
          <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
            {lf.length > 0 && <div className="card" style={{padding:14}}>
              <div style={{fontWeight:700, fontSize:13, color:"#ef4444", marginBottom:10}}>Top Factores Perdedores</div>
              {lf.map((f, i) => <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>

                <span style={{color:"#ef4444", fontWeight:600}}>{f.count} ({f.pct}%)</span>
              </div>)}
            </div>}
            {wf.length > 0 && <div className="card" style={{padding:14}}>
              <div style={{fontWeight:700, fontSize:13, color:"#22c55e", marginBottom:10}}>Top Factores Ganadores</div>
              {wf.map((f, i) => <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span>{f.factor}</span>
                <span style={{color:"#22c55e", fontWeight:600}}>{f.count} ({f.pct}%)</span>
              </div>)}
            </div>}
          </div>
        </>}
      </>);
    })()}

    {view === "decisions" && (<>
      <h3 className="section-title">Automated Decisions ({decisions.length})</h3>
      {decisions.length === 0 ? <div className="loading">No decisions yet — need more trades</div> :
      <div className="card scroll">
        {decisions.map((d, i) => (
          <div key={i} style={{padding:"10px 0", borderBottom:"1px solid #1a1a2e"}}>
            <div style={{display:"flex", gap:8, alignItems:"center"}}>
              <span className={"tag " + (d.type === "recommendation" ? "tag-blue" : d.type === "warning" ? "tag-yellow" : "tag-green")}>{d.type}</span>
              <span style={{fontWeight:700, fontSize:13}}>{d.title}</span>
              <span className={"pill " + (d.confidence === "high" ? "tag-green" : "tag-yellow")} style={{marginLeft:"auto"}}>{d.confidence}</span>
            </div>
            <div style={{marginTop:6, padding:"8px 12px", background:"#0a0a12", borderRadius:8, fontSize:11}}>
              <div style={{color:"#888"}}><b>Evidence:</b> {d.evidence}</div>
              <div style={{color:"#3b82f6", marginTop:4}}><b>Action:</b> {d.action}</div>
              <div style={{color:"#22c55e", marginTop:4}}><b>Expected impact:</b> {d.expected_impact}</div>
            </div>
          </div>
        ))}
      </div>}
    </>)}
  </>);
}

// ── Validation Tab ──
function ValidationTab() {
  const { t } = useI18n();
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("live_trades");

  const run = () => {
    setLoading(true);
    fetch(API + "/api/quant/validation?mode=" + mode).then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  };

  const verdictColor = (v) => v === "ADOPT" ? "tag-green" : v === "TEST_LIVE" ? "tag-yellow" : v === "REJECT" ? "tag-red" : v === "BLOCKED_BY_DATA_QUALITY" ? "tag-red" : "tag-blue";
  const confColor = (c) => c === "HIGH" ? "#22c55e" : c === "MEDIUM" ? "#eab308" : "#ef4444";
  const flagColor = (f) => f === "NO_EFFECT" || f === "BEST_IS_BASELINE" ? "#f97316" : f === "DATA_QUALITY" ? "#ef4444" : "#eab308";

  if (!data) return (<div style={{textAlign:"center", padding:40}}>
    <div style={{display:"flex", justifyContent:"center", gap:8, marginBottom:12}}>
      <button className={"tab " + (mode === "live_trades" ? "active" : "")} onClick={() => setMode("live_trades")}>{t("validation.live_trades")}</button>
      <button className={"tab " + (mode === "replay_historical" ? "active" : "")} onClick={() => setMode("replay_historical")}>{t("validation.historical_replay")}</button>
    </div>
    <button onClick={run} className="tab active">{loading ? t("validation.running_exp") : t("validation.run_full")}</button>
    <p style={{fontSize:10, color:"#555", marginTop:8}}>{mode === "live_trades" ? t("validation.desc_live") : t("validation.desc_replay")}</p>
  </div>);

  const b = data.baseline_summary || {};

  return (<>
    <div className="page-title">{t("validation.title")} <Tip text={t("validation.tip")} /><div className="page-sub">{t("validation.subtitle")}</div></div>
    {/* Baseline */}
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
      <h3 className="section-title" style={{margin:0}}>{t("validation.baseline_title", {n: data.total_trades_baseline})}</h3>
      <div style={{display:"flex", gap:8}}>
        <button onClick={run} className="tab">{loading ? t("validation.running") : t("validation.rerun")}</button>
        <ExportBtn data={data} filename={"validation_" + new Date().toISOString().split("T")[0] + ".json"} />
      </div>
    </div>
    <div className="grid" style={{gridTemplateColumns:"repeat(6, 1fr)"}}>
      <MC label="Expectancy" value={"$" + (b.expectancy || 0)} color={Number(b.expectancy) >= 0 ? "green" : "red"} />
      <MC label="Win Rate" value={((b.winrate || 0) * 100).toFixed(0) + "%"} color={b.winrate >= 0.5 ? "green" : "red"} />
      <MC label="PF" value={b.profit_factor || 0} color={Number(b.profit_factor) >= 1 ? "green" : "red"} />
      <MC label="Net PnL" value={"$" + (b.net_pnl || 0)} color={Number(b.net_pnl) >= 0 ? "green" : "red"} />
      <MC label="Max DD" value={"$" + (b.max_drawdown || 0)} color="red" />
      <MC label="Fee Killed" value={b.fee_killed_count || 0} color={b.fee_killed_count === 0 ? "green" : "red"} />
    </div>

    {/* Validation Integrity */}
    {data.validation_integrity && data.validation_integrity.status !== "OK" && (
      <div className="card" style={{marginTop:12, borderColor:"#f97316", padding:"10px 14px"}}>
        <div style={{fontSize:12, fontWeight:700, color:"#f97316", marginBottom:4}}>Validation Integrity: {data.validation_integrity.status}</div>
        {(data.validation_integrity.issues || []).map((issue, i) => (
          <div key={i} style={{fontSize:10, color:"#aaa", padding:"2px 0"}}>{issue}</div>
        ))}
      </div>
    )}

    {/* Batches */}
    {(data.batches || []).map((batch, bi) => (
      <div key={bi} className="card" style={{marginTop:16}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
          <div>
            <span style={{fontWeight:700, fontSize:14, color:"#e0e0e8"}}>{batch.batch_name.replace(/_/g, " ").toUpperCase()}</span>
            <span className={"tag " + verdictColor(batch.verdict?.decision)} style={{marginLeft:8}}>{batch.verdict?.decision}</span>
            {batch.verdict?.confidence && (
              <span style={{marginLeft:6, fontSize:10, fontWeight:600, color: confColor(batch.verdict.confidence)}}>[{batch.verdict.confidence}]</span>
            )}
          </div>
          <span style={{fontSize:10, color:"#666"}}>Best: <span className="purple">{batch.best_experiment || "none"}</span></span>
        </div>
        <p style={{fontSize:10, color:"#888", marginBottom:8}}>{batch.hypothesis}</p>

        {/* Status flags */}
        {batch.batch_status_flags?.length > 0 && (
          <div style={{marginBottom:6, display:"flex", gap:4, flexWrap:"wrap"}}>
            {batch.batch_status_flags.map((f, i) => <span key={i} style={{padding:"2px 8px", borderRadius:10, fontSize:9, fontWeight:600, background:"rgba(249,115,22,0.15)", color: flagColor(f)}}>{f}</span>)}
          </div>
        )}

        {/* Data quality blockers */}
        {batch.data_quality_blockers?.length > 0 && (
          <div style={{padding:"6px 10px", background:"rgba(239,68,68,0.1)", borderRadius:6, fontSize:10, marginBottom:8, color:"#ef4444"}}>
            {batch.data_quality_blockers.map((b, i) => <div key={i}>{b}</div>)}
          </div>
        )}

        {/* Verdict */}
        <div style={{padding:"6px 10px", background:"#0a0a12", borderRadius:6, fontSize:11, marginBottom:8}}>
          <span style={{color:"#aaa"}}>{batch.verdict?.reasoning}</span>
          {batch.verdict?.risk_flags?.length > 0 && (
            <span style={{marginLeft:8}}>{batch.verdict.risk_flags.map((f, i) => <span key={i} className="tag tag-yellow" style={{marginLeft:4}}>{f}</span>)}</span>
          )}
        </div>

        {/* Experiments table */}
        <table>
          <thead><tr>
            <th>Experiment</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>WR</th>
            <th style={{textAlign:"right"}}>Expectancy</th><th style={{textAlign:"right"}}>PF</th>
            <th style={{textAlign:"right"}}>Net PnL</th><th style={{textAlign:"right"}}>DD</th>
            <th style={{textAlign:"right"}}>Exp %</th><th style={{textAlign:"right"}}>PF %</th>
          </tr></thead>
          <tbody>
            {batch.experiments?.map((exp, i) => {
              const km = exp.key_metrics || {};
              const vs = exp.vs_baseline || {};
              const isBest = exp.name === batch.best_experiment;
              return (
                <tr key={i} style={{background: isBest ? "#1a1a3e" : "transparent"}}>
                  <td style={{fontWeight: isBest ? 700 : 400}}>{isBest && ">> "}{exp.name}</td>
                  <td style={{textAlign:"right"}}>{exp.trades_accepted}</td>
                  <td style={{textAlign:"right"}}>{((km.winrate || 0) * 100).toFixed(0)}%</td>
                  <td style={{textAlign:"right", color: km.expectancy >= 0 ? "#22c55e" : "#ef4444"}}>{km.expectancy}</td>
                  <td style={{textAlign:"right"}}>{km.profit_factor}</td>
                  <td style={{textAlign:"right", color: km.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{km.net_pnl}</td>
                  <td style={{textAlign:"right"}}>{km.max_drawdown}</td>
                  <td style={{textAlign:"right", color: vs.expectancy_change_pct > 0 ? "#22c55e" : "#ef4444"}}>{vs.expectancy_change_pct > 0 ? "+" : ""}{vs.expectancy_change_pct}%</td>
                  <td style={{textAlign:"right", color: vs.pf_change_pct > 0 ? "#22c55e" : "#ef4444"}}>{vs.pf_change_pct > 0 ? "+" : ""}{vs.pf_change_pct}%</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    ))}

    {/* Combination */}
    {data.combination_suggestion && (
      <div className="card" style={{marginTop:16, borderColor:"#3b82f6"}}>
        <h3 className="section-title" style={{color:"#3b82f6"}}>{t("validation.combined_title")}</h3>
        <pre style={{fontSize:11, color:"#aaa", background:"#0a0a12", padding:12, borderRadius:8}}>{JSON.stringify(data.combination_suggestion.proposed_config, null, 2)}</pre>
        <p style={{fontSize:10, color:"#666", marginTop:4}}>{data.combination_suggestion.note}</p>
      </div>
    )}
  </>);
}

// ── Research Tab (old) ──
function ResearchTab() {
  const { t } = useI18n();
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("daily_summary");
  const [err, setErr] = useState(null);
  const [fetchedAt, setFetchedAt] = useState(null);

  const loadReport = async () => {
    setLoading(true);
    setErr(null);
    try {
      const r = await fetch(API + "/api/reports/full", {credentials: "include"});
      if (!r.ok) throw new Error("HTTP " + r.status + " " + r.statusText);
      const d = await r.json();
      if (!d || typeof d !== "object") throw new Error("Respuesta inválida del servidor");
      setReport(d);
      setFetchedAt(new Date());
    } catch (e) {
      setErr(e.message || String(e));
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { loadReport(); }, []);

  // Each view = (id, friendly label, what it shows). Surfaces meaning instead
  // of `wr_by_coin → "wr by coin"` which the user couldn't parse at a glance.
  const views = [
    {id: "daily_summary", label: "Resumen diario", tip: "PnL gross/fees/net + WR agregados por día (todos los modos, todas las strategies)."},
    {id: "wr_by_coin", label: "WR por coin", tip: "Win-rate y PnL acumulado de cada coin que has operado. Útil para detectar coins crónicamente perdedoras."},
    {id: "wr_by_side", label: "WR por LONG/SHORT", tip: "Asimetría direccional: si LONG va mucho mejor que SHORT (o viceversa) puede ser bias del market o del bot."},
    {id: "wr_by_hour", label: "WR por hora", tip: "Performance por hora del día (UTC). Detecta franjas horarias donde el bot rinde mal."},
    {id: "pnl_by_mode", label: "PnL por modo", tip: "Comparativa SCALP / NORMAL / SWING. Ayuda a decidir si concentrar el budget en un modo."},
    {id: "pnl_by_tag", label: "PnL por entry_tag", tip: "PnL agrupado por la etiqueta que el motor pone a la entrada (trend_5m+macro+strategy:X)."},
    {id: "pnl_by_exit_reason", label: "PnL por motivo salida", tip: "Cuánto cierra cada tipo de exit (ROI/TP/SL/TIMEOUT). Si SL pierde mucho más que TP gana, falla la asimetría."},
    {id: "fee_analysis", label: "Análisis de fees", tip: "Coins donde las fees se están comiendo el gross. fee_killed = trades positivos en gross pero negativos en net."},
    {id: "poison_coins", label: "Coins venenosas", tip: "Top 15 peor avg_pnl. Candidatas a bloquear desde Coin Profile (mín 3 trades)."},
    {id: "rescuable_coins", label: "Coins ganadoras", tip: "Top 15 mejor avg_pnl. Candidatas a más allocation o whitelist (mín 3 trades)."},
    {id: "signal_blocked_vs_entered", label: "Señales: bloqueadas vs entradas", tip: "Cuántas señales evaluó el motor y qué hizo (BLOCKED/ENTER). Compara scores promedio de cada bucket."},
  ];

  const currentView = views.find(v => v.id === view) || views[0];

  if (loading && !report) return <div className="loading">{t("research.generating")}</div>;
  if (err && !report) return (
    <div style={{padding:20}}>
      <div style={{color:"#ef4444", marginBottom:10}}>⚠️ Error cargando reportes: <code>{err}</code></div>
      <div style={{color:"#888", fontSize:11, marginBottom:12}}>
        Si ves "Unauthorized" o 401, tu sesión ha caducado — recarga la página y vuelve a entrar. Si ves "HTTP 500", revisa los logs del platform (<code>logs/v2-platform.log</code>).
      </div>
      <button onClick={loadReport} className="tab">Reintentar</button>
    </div>
  );
  if (!report) return <div className="loading">{t("research.no_data_yet")} <button onClick={loadReport} className="tab">{t("research.load")}</button></div>;

  const data = report[view] || [];
  const cols = data.length > 0 ? Object.keys(data[0]) : [];

  // Row counts per view — surfaces empty datasets BEFORE the user clicks.
  const counts = {};
  for (const v of views) counts[v.id] = (report[v.id] || []).length;

  return (<>
    <div className="page-title">
      {t("research.title")}
      <div className="page-sub">
        {t("research.subtitle")}
        {fetchedAt && <span style={{marginLeft:8, color:"#666", fontSize:10}}>· cargado {fetchedAt.toLocaleTimeString()}</span>}
      </div>
    </div>
    {err && (
      <div style={{background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", color:"#fca5a5", padding:8, borderRadius:4, marginBottom:12, fontSize:11}}>
        ⚠️ Última recarga falló: <code>{err}</code> · mostrando datos previos
      </div>
    )}
    <div style={{display:"flex", gap:4, flexWrap:"wrap", marginBottom:8}}>
      {views.map(v => {
        const n = counts[v.id] || 0;
        const isActive = view === v.id;
        return (
          <button key={v.id} className={"tab " + (isActive ? "active" : "")} onClick={() => setView(v.id)}
            title={v.tip + (n === 0 ? " · (sin datos)" : ` · ${n} filas`)}
            style={{opacity: n === 0 ? 0.55 : 1}}>
            {v.label} <span style={{fontSize:9, color: n === 0 ? "#666" : "#888", marginLeft:4}}>({n})</span>
          </button>
        );
      })}
      <button className="tab" onClick={loadReport} style={{marginLeft:"auto"}} disabled={loading}>
        {loading ? "..." : t("research.refresh")}
      </button>
    </div>
    <div style={{fontSize:11, color:"#888", marginBottom:8, padding:"6px 10px", background:"#0a0a14", borderRadius:4, border:"1px solid #1a1a2e"}}>
      <span style={{color:"#a78bfa", fontWeight:600}}>{currentView.label}:</span> {currentView.tip}
    </div>
    <div className="card scroll">
      <table>
        <thead><tr>{cols.map(c => <th key={c} style={{textAlign: typeof data[0]?.[c] === "number" ? "right" : "left"}}>{c}</th>)}</tr></thead>
        <tbody>
          {data.map((row, i) => (
            <tr key={i}>
              {cols.map(c => {
                const v = row[c];
                const isNum = typeof v === "number";
                const color = c.includes("pnl") || c === "net" || c === "gross" ? (v >= 0 ? "#22c55e" : "#ef4444") : c === "wr" ? (v >= 50 ? "#22c55e" : v >= 40 ? "#eab308" : "#ef4444") : undefined;
                return <td key={c} style={{textAlign: isNum ? "right" : "left", color}}>{isNum ? v.toLocaleString() : String(v ?? "-")}</td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
      {data.length === 0 && (
        <div className="loading" style={{padding:20}}>
          {t("research.no_data_report")}
          <div style={{color:"#666", fontSize:10, marginTop:8}}>
            Esta vista está vacía. Posibles motivos: aún no hay trades del tipo que la query agrega, o la tabla fuente está vacía para tu user_id.
          </div>
        </div>
      )}
    </div>
  </>);
}

// ── Audit Tab ──
function AuditTab() {
  const { t } = useI18n();
  const { data: status } = useFetch("/api/audit/status", 10000);
  const { data: findings } = useFetch("/api/audit/findings", 10000);
  const [fullReport, setFullReport] = useState(null);
  const [loading, setLoading] = useState(false);

  const runAll = () => {
    setLoading(true);
    fetch(API + "/api/audit/run").then(r => r.json()).then(d => { setFullReport(d); setLoading(false); }).catch(() => setLoading(false));
  };

  const scoreColor = (s) => s >= 80 ? "green" : s >= 60 ? "yellow" : "red";
  const sevColor = (s) => s === "critical" ? "tag-red" : s === "error" ? "tag-red" : s === "warning" ? "tag-yellow" : "tag-blue";

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, flexWrap:"wrap"}}>
      <div>
        {t("audit.title")} <Tip text={t("audit.tip")} />
        <div className="page-sub">{t("audit.subtitle")}</div>
      </div>
      <LivePulse intervalSec={10} />
    </div>
    {/* Global Score */}
    <div className="grid">
      <MC label={t("audit.health_score")} value={status?.global_score ?? "..."} color={scoreColor(status?.global_score || 0)} sub="0-100" />
      <MC label={t("audit.active_findings")} value={findings?.length || 0} color={findings?.length > 0 ? "yellow" : "green"} />
      <div className="card">
        <div className="label">{t("audit.run_all")}</div>
        <button onClick={runAll} className="tab active" style={{marginTop:8}}>{loading ? t("audit.running") : t("audit.audit_now")}</button>
      </div>
    </div>

    {/* Per-Check Status */}
    {status?.checks && (<>
      <h3 className="section-title" style={{marginTop:16}}>{t("audit.checks_title")} <Tip text={t("audit.checks_tip")} /></h3>
      <div className="card">
        <table>
          <thead><tr><th>Check</th><th>Status</th><th style={{textAlign:"right"}}>Score</th><th style={{textAlign:"right"}}>Findings</th><th style={{textAlign:"right"}}>Runs</th><th>Interval</th><th>Last Run</th></tr></thead>
          <tbody>
            {Object.entries(status.checks).map(([name, c]) => (
              <tr key={name}>
                <td className="purple">{name}</td>
                <td><span className={"tag " + (c.status === "OK" ? "tag-green" : c.status === "WARNING" ? "tag-yellow" : c.status === "ERROR" ? "tag-red" : "tag-blue")}>{c.status}</span></td>
                <td style={{textAlign:"right", color: scoreColor(c.score) === "green" ? "#22c55e" : scoreColor(c.score) === "yellow" ? "#eab308" : "#ef4444"}}>{c.score}</td>
                <td style={{textAlign:"right"}}>{c.findings}</td>
                <td style={{textAlign:"right"}}>{c.run_count}</td>
                <td style={{color:"#666"}}>{c.interval_sec < 60 ? c.interval_sec + "s" : Math.round(c.interval_sec / 60) + "m"}</td>
                <td style={{fontSize:10, color:"#555"}}>{c.last_run ? new Date(c.last_run).toLocaleTimeString() : "-"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Current Findings */}
    {findings && findings.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>{t("audit.findings_title")}</h3>
      <div className="card scroll">
        <table>
          <thead><tr><th>Severity</th><th>Check</th><th>Code</th><th>Message</th></tr></thead>
          <tbody>
            {findings.map((f, i) => (
              <tr key={i}>
                <td><span className={"tag " + sevColor(f.severity)}>{f.severity}</span></td>
                <td className="purple">{f.check}</td>
                <td style={{fontFamily:"monospace", fontSize:10}}>{f.code}</td>
                <td style={{color:"#bbb"}}>{f.message}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Full Report (after Run All) */}
    {fullReport && (<>
      <h3 className="section-title" style={{marginTop:16}}>{t("audit.full_report")}</h3>
      {Object.entries(fullReport.checks || {}).map(([name, c]) => (
        <div key={name} className="card" style={{marginBottom:8}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
            <span className="purple" style={{fontWeight:600}}>{name}</span>
            <span className={"tag " + (c.status === "OK" ? "tag-green" : c.status === "WARNING" ? "tag-yellow" : "tag-red")}>{c.status} ({c.score})</span>
          </div>
          {c.metrics && (
            <div style={{display:"flex", gap:12, flexWrap:"wrap", marginBottom:8}}>
              {Object.entries(c.metrics).map(([k, v]) => (
                <span key={k} style={{fontSize:10, color:"#666"}}>{k}: <span style={{color:"#aaa"}}>{typeof v === "number" ? v.toLocaleString() : String(v)}</span></span>
              ))}
            </div>
          )}
          {c.findings && c.findings.length > 0 && c.findings.map((f, i) => (
            <div key={i} style={{padding:"2px 0", fontSize:11, color: f.severity === "error" || f.severity === "critical" ? "#ef4444" : f.severity === "warning" ? "#eab308" : "#888"}}>
              [{f.severity}] {f.code}: {f.message}
            </div>
          ))}
        </div>
      ))}
    </>)}
  </>);
}

// ── Trades Tab (Trade Detail & Analysis) ──
function TradesTab() {
  const { t, lang } = useI18n();
  const localeTag = lang === "en" ? "en-US" : "es-ES";
  const [trades, setTrades] = useState(null);
  const [selected, setSelected] = useState(null);
  const [detail, setDetail] = useState(null);
  const [snapStats, setSnapStats] = useState(null);
  const [loading, setLoading] = useState(false);
  const [byStrategy, setByStrategy] = useState(null);
  const [byTemplate, setByTemplate] = useState(null);
  const [allStrategies, setAllStrategies] = useState(null);

  useEffect(() => {
    fetch("/api/trades?limit=100").then(r=>r.json()).then(setTrades).catch(()=>{});
    fetch("/api/trades/snapshots/stats").then(r=>r.json()).then(setSnapStats).catch(()=>{});
    fetch("/api/bot/trades/by-strategy").then(r=>r.json()).then(setByStrategy).catch(()=>{});
    fetch("/api/bot/trades/by-template").then(r=>r.json()).then(setByTemplate).catch(()=>{});
    // Bot strategy catalog (per-user, all modes) — used to compute coverage
    // (X of Y strategies have fired) and surface idle strategies.
    fetch("/api/strategies").then(r=>r.json()).then(d => setAllStrategies(Array.isArray(d) ? d : [])).catch(()=>setAllStrategies([]));
  }, []);

  const loadDetail = (id) => {
    setSelected(id);
    setLoading(true);
    fetch("/api/trades/" + id).then(r=>r.json()).then(d => { setDetail(d); setLoading(false); }).catch(()=>setLoading(false));
  };

  const cleanSnapshots = (days) => {
    if(!confirm(t("trades.confirm_clean_snapshots", {n: days}))) return;
    fetch("/api/trades/snapshots/cleanup?days=" + days, {method:"DELETE"}).then(r=>r.json()).then(d => {
      alert(t("trades.cleaned_snapshots", {n: d.deleted}));
      fetch("/api/trades/snapshots/stats").then(r=>r.json()).then(setSnapStats);
    });
  };

  const VC = {GOOD:"#22c55e", ACCEPTABLE:"#3b82f6", BAD:"#f59e0b", TERRIBLE:"#ef4444"};

  if (detail && selected) {
    const tr = detail.trade || {};
    // verdict data (detail.verdict) removed from UI: the trade_verdicts table
    // hasn't been updated since 2026-04-17 so the section showed stale info.
    // Re-add when/if the verdict generator is wired back up.
    const snaps = detail.snapshots || [];
    const sig = detail.signal || {};
    const v = detail.verdict || {};
    return (<div>
      <button onClick={()=>{setSelected(null);setDetail(null);}} style={{marginBottom:12,padding:"6px 16px",background:"#1e1b4b",border:"1px solid #4c1d95",borderRadius:8,color:"#a78bfa",cursor:"pointer"}}>{t("trades.back_to_list")}</button>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>{tr.coin} {tr.side}</h3>
      <p style={{fontSize:11,color:"#666",marginBottom:8}}>{tr.mode} | {tr.entry_tag} | {new Date(tr.entry_time).toLocaleString(localeTag)}</p>
      {tr.strategy_name && (() => {
        const tpl = (tr.strategy_template || "").toUpperCase();
        const colors = tpl === "RELAX" ? {bg:"#10b98122",fg:"#34d399",bd:"#10b98166"} :
                       tpl === "ABIERTO" ? {bg:"#f9731622",fg:"#fb923c",bd:"#f9731666"} :
                       tpl === "NORMAL" ? {bg:"#eab30822",fg:"#fbbf24",bd:"#eab30866"} :
                       {bg:"#7c3aed22",fg:"#a78bfa",bd:"#7c3aed66"};
        return <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>Strategy:</span>
          <span style={{padding:"2px 10px",borderRadius:6,background:colors.bg,color:colors.fg,border:"1px solid "+colors.bd,fontSize:11,fontWeight:700}}>
            {tr.strategy_name}
          </span>
          {tr.strategy_template && tr.strategy_template !== tr.strategy_name && (
            <span style={{fontSize:10,color:"#666"}}>(template: {tr.strategy_template})</span>
          )}
        </div>;
      })()}

      {/* Entry / Exit */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
        <div style={{background:"#111",borderRadius:8,padding:12,textAlign:"center"}}>
          <div style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>{t("trades.entry")}</div>
          <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace"}}>${Number(tr.entry_price).toFixed(5)}</div>
        </div>
        <div style={{background:"#111",borderRadius:8,padding:12,textAlign:"center"}}>
          <div style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>{t("trades.exit_with_reason", {reason: tr.exit_reason})}</div>
          <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:tr.net_pnl>=0?"#22c55e":"#ef4444"}}>${Number(tr.exit_price).toFixed(5)}</div>
        </div>
        <div style={{background:tr.net_pnl>=0?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)",borderRadius:8,padding:12,textAlign:"center",border:"1px solid "+(tr.net_pnl>=0?"#22c55e33":"#ef444433")}}>
          <div style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>{t("trades.pnl_net")}</div>
          <div style={{fontSize:18,fontWeight:700,fontFamily:"monospace",color:tr.net_pnl>=0?"#22c55e":"#ef4444"}}>${Number(tr.net_pnl).toFixed(4)}</div>
          <div style={{fontSize:10,color:"#666"}}>{t("trades.gross_fee_line", {gross: Number(tr.gross_pnl).toFixed(4), fee: Number(tr.fee).toFixed(4)})}</div>
        </div>
      </div>

      {/* Scores */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
        <MC label={t("trades.score")} value={(tr.signal_score||0).toFixed(1)} />
        <MC label={t("trades.trend")} value={(tr.trend_score||0).toFixed(1)} />
        <MC label={t("trades.micro")} value={(tr.micro_score||0).toFixed(0)} />
        <MC label={t("trades.mfe")} value={(tr.mfe_pct||0).toFixed(3)+"%"} />
        <MC label={t("trades.mae")} value={(tr.mae_pct||0).toFixed(3)+"%"} />
      </div>

      {/* SL Movement from snapshots */}
      {snaps.length > 0 && (<div style={{marginBottom:16}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#a78bfa",marginBottom:8}}>{t("trades.timeline_title", {n: snaps.length})}</h4>
        <div style={{maxHeight:200,overflowY:"auto",background:"#0a0a14",borderRadius:8,padding:8}}>
          <table style={{width:"100%",fontSize:10}}><thead><tr style={{color:"#666"}}>
            <th style={{textAlign:"left"}}>{t("trades.tl_time")}</th><th style={{textAlign:"right"}}>{t("trades.tl_price")}</th><th style={{textAlign:"right"}}>{t("trades.tl_sl")}</th><th style={{textAlign:"right"}}>{t("trades.tl_hwm")}</th><th style={{textAlign:"right"}}>{t("trades.tl_pnl_pct")}</th>
          </tr></thead><tbody>
          {snaps.map((s,i) => (<tr key={i} style={{borderTop:"1px solid #1a1a2e"}}>
            <td style={{color:"#888"}}>{new Date(s.timestamp).toLocaleTimeString(localeTag)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace"}}>{Number(s.mid_price).toFixed(5)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace",color:"#ef4444"}}>{Number(s.sl_price).toFixed(5)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace",color:"#a78bfa"}}>{Number(s.high_water_mark).toFixed(5)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace",color:s.pnl_pct>=0?"#22c55e":"#ef4444"}}>{Number(s.pnl_pct).toFixed(3)}%</td>
          </tr>))}
          </tbody></table>
        </div>
      </div>)}

      {/* Improvements */}
      {v.improvements && (<div style={{marginBottom:16}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:8}}>{t("trades.improvements_title")}</h4>
        {(typeof v.improvements === "string" ? JSON.parse(v.improvements) : v.improvements).map((imp,i) => (
          <div key={i} style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,padding:10,marginBottom:6,fontSize:12,color:"#ddd"}}>{imp}</div>
        ))}
      </div>)}

      {/* Counterfactual */}
      {v.counterfactual && (<div style={{marginBottom:16}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#3b82f6",marginBottom:8}}>{t("trades.counterfactual_title")}</h4>
        {Object.entries(typeof v.counterfactual === "string" ? JSON.parse(v.counterfactual) : v.counterfactual).map(([k,val]) => {
          const obj = typeof val === "object" && val !== null ? val : {};
          const desc = obj.description || k;
          const result = obj.survived != null ? (obj.survived ? t("trades.cf_survived_yes") : t("trades.cf_survived_no"))
                       : obj.would_have_tp != null ? (obj.would_have_tp ? t("trades.cf_tp_yes") : t("trades.cf_tp_no"))
                       : JSON.stringify(val);
          const isGood = obj.survived === true || obj.would_have_tp === true;
          return (
            <div key={k} style={{background:isGood?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(isGood?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)"),borderRadius:8,padding:12,marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700,color:isGood?"#22c55e":"#ef4444",marginBottom:4}}>{result}</div>
              <div style={{fontSize:11,color:"#aaa"}}>{desc}</div>
              {obj.original_sl_pct && <div style={{fontSize:10,color:"#666",marginTop:4}}>{t("trades.cf_sl_line", {orig: obj.original_sl_pct, wider: obj.wider_sl_pct, mae: obj.mae_pct})}</div>}
              {obj.original_tp_pct && <div style={{fontSize:10,color:"#666",marginTop:4}}>{t("trades.cf_tp_line", {orig: obj.original_tp_pct, tighter: obj.tighter_tp_pct, mfe: obj.mfe_pct})}</div>}
            </div>
          );
        })}
      </div>)}
    </div>);
  }

  // Render the Strategy Performance panel (Phase A 2026-04-26): rolls up
  // PnL, win-rate and exit-reason mix per strategy / per template archetype
  // so the user can compare which entry rules are paying off.
  const tplColor = (tpl) => {
    const T = (tpl||"").toUpperCase();
    return T==="RELAX"   ? {fg:"#34d399",bg:"#10b98122",bd:"#10b98166"} :
           T==="ABIERTO" ? {fg:"#fb923c",bg:"#f9731622",bd:"#f9731666"} :
           T==="NORMAL"  ? {fg:"#fbbf24",bg:"#eab30822",bd:"#eab30866"} :
                            {fg:"#a78bfa",bg:"#7c3aed22",bd:"#7c3aed66"};
  };
  const StrategyPanel = () => {
    const hasData = (byStrategy && byStrategy.length > 0) || (byTemplate && byTemplate.length > 0);
    if (!hasData && !(allStrategies && allStrategies.length > 0)) return null;
    // Coverage: which enabled strategies actually fired vs. those still idle.
    // Joined by id (preferred) or by name+mode as a fallback for the legacy
    // rows that pre-date strategy_id attribution.
    const enabled = (allStrategies || []).filter(s => s.enabled);
    const firedIds = new Set((byStrategy || []).map(r => r.strategy_id).filter(x => x != null));
    const firedNames = new Set((byStrategy || []).map(r => (r.strategy_name || "").toLowerCase()));
    const isFired = (s) => firedIds.has(s.id) || firedNames.has((s.name || "").toLowerCase());
    const idle = enabled.filter(s => !isFired(s));
    const totalEnabled = enabled.length;
    const firedCount = totalEnabled - idle.length;
    const coveragePct = totalEnabled > 0 ? Math.round((firedCount / totalEnabled) * 100) : 0;
    return (<div style={{background:"#0a0a14",border:"1px solid #1a1a2e",borderRadius:8,padding:12,marginBottom:16}}>
      <h4 style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:10}}>📊 Strategy Performance</h4>
      {/* Coverage strip — % of enabled strategies that have actually fired. */}
      {totalEnabled > 0 && (
        <div style={{marginBottom:12,padding:10,background:"#0e0e1a",border:"1px solid #1a1a2e",borderRadius:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:10,color:"#888",textTransform:"uppercase",marginBottom:2}}>Coverage</div>
              <div style={{fontSize:13,fontWeight:700,color:coveragePct >= 70 ? "#22c55e" : coveragePct >= 40 ? "#fbbf24" : "#ef4444"}}>
                {firedCount} de {totalEnabled} estrategias activas han disparado · {coveragePct}%
              </div>
              <div style={{fontSize:10,color:"#666",marginTop:2}}>
                Ratio entre estrategias enabled que han generado al menos un trade y el total habilitado en el bot.
              </div>
            </div>
            <div style={{flex:"1 1 200px",minWidth:160,height:8,background:"#1a1a2e",borderRadius:4,overflow:"hidden"}}>
              <div style={{width:coveragePct+"%",height:"100%",background:coveragePct >= 70 ? "#22c55e" : coveragePct >= 40 ? "#fbbf24" : "#ef4444",transition:"width 0.3s"}}></div>
            </div>
          </div>
          {idle.length > 0 && (
            <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #1a1a2e"}}>
              <div style={{fontSize:10,color:"#888",marginBottom:6,textTransform:"uppercase"}}>Estrategias activas sin trades ({idle.length})</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {idle.map((s,i) => {
                  const c = tplColor(s.template);
                  return (<span key={i} title={`mode=${s.mode || "?"} · template=${s.template || "—"} · 0 trades`} style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:c.bg,color:c.fg,border:"1px solid "+c.bd}}>
                    {s.name} <span style={{color:"#666",fontWeight:400,marginLeft:4}}>{s.mode}</span>
                  </span>);
                })}
              </div>
              <div style={{fontSize:10,color:"#666",marginTop:6}}>
                Estas estrategias están habilitadas pero todavía no han producido ningún trade. Pueden estar esperando una señal que cumpla sus condiciones, o ser demasiado restrictivas.
              </div>
            </div>
          )}
        </div>
      )}
      {/* By template (archetype) — stable across rename */}
      {byTemplate && byTemplate.length > 0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"#888",marginBottom:6,textTransform:"uppercase"}}>By template</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:8}}>
            {byTemplate.map((r,i) => {
              const c = tplColor(r.strategy_template);
              return (<div key={i} style={{background:c.bg,border:"1px solid "+c.bd,borderRadius:6,padding:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{color:c.fg,fontSize:11,fontWeight:700}}>{r.strategy_template}</span>
                  <span style={{fontSize:10,color:"#666"}}>{r.trades} trades</span>
                </div>
                <div style={{fontSize:18,fontWeight:700,fontFamily:"monospace",color:Number(r.total_pnl)>=0?"#22c55e":"#ef4444"}}>${Number(r.total_pnl||0).toFixed(2)}</div>
                <div style={{fontSize:10,color:"#888",marginTop:4}}>
                  WR {Math.round(Number(r.win_rate||0)*100)}% · MFE {Number(r.avg_mfe_pct||0).toFixed(2)}% · MAE {Number(r.avg_mae_pct||0).toFixed(2)}%
                </div>
              </div>);
            })}
          </div>
        </div>
      )}
      {/* By strategy name (user-defined) */}
      {byStrategy && byStrategy.length > 0 && (
        <div>
          <div style={{fontSize:10,color:"#888",marginBottom:6,textTransform:"uppercase"}}>By strategy</div>
          <table style={{width:"100%",fontSize:10,borderCollapse:"collapse"}}>
            <thead><tr style={{color:"#666",borderBottom:"1px solid #222"}}>
              <th style={{textAlign:"left",padding:4}}>Strategy</th>
              <th>Template</th>
              <th style={{textAlign:"right"}}>Trades</th>
              <th style={{textAlign:"right"}}>WR</th>
              <th style={{textAlign:"right"}}>Net PnL</th>
              <th style={{textAlign:"right"}}>Avg PnL</th>
              <th style={{textAlign:"right"}}>MFE</th>
              <th style={{textAlign:"right"}}>MAE</th>
              <th title="ROI/TP/SL/TIMEOUT distribution">Exits</th>
            </tr></thead>
            <tbody>
              {byStrategy.map((r,i) => {
                const c = tplColor(r.strategy_template);
                return (<tr key={i} style={{borderBottom:"1px solid #111"}}>
                  <td style={{padding:4,fontWeight:700}}>{r.strategy_name}</td>
                  <td><span style={{padding:"1px 6px",borderRadius:3,background:c.bg,color:c.fg,fontSize:9,fontWeight:700}}>{r.strategy_template}</span></td>
                  <td style={{textAlign:"right",fontFamily:"monospace"}}>{r.trades}</td>
                  <td style={{textAlign:"right",fontFamily:"monospace"}}>{Math.round(Number(r.win_rate||0)*100)}%</td>
                  <td style={{textAlign:"right",fontFamily:"monospace",fontWeight:700,color:Number(r.total_pnl)>=0?"#22c55e":"#ef4444"}}>${Number(r.total_pnl||0).toFixed(2)}</td>
                  <td style={{textAlign:"right",fontFamily:"monospace",color:Number(r.avg_pnl)>=0?"#22c55e":"#ef4444"}}>${Number(r.avg_pnl||0).toFixed(3)}</td>
                  <td style={{textAlign:"right",fontFamily:"monospace",color:"#22c55e"}}>{Number(r.avg_mfe_pct||0).toFixed(2)}%</td>
                  <td style={{textAlign:"right",fontFamily:"monospace",color:"#ef4444"}}>{Number(r.avg_mae_pct||0).toFixed(2)}%</td>
                  <td style={{fontSize:9,color:"#888"}}>ROI:{r.exits_roi||0} TP:{r.exits_tp||0} SL:{r.exits_sl||0} TO:{r.exits_timeout||0}</td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>);
  };

  return (<div>
    {StrategyPanel()}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h3 style={{fontSize:16,fontWeight:700}}>{t("trades.history_title")}</h3>
      {snapStats && (<div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:10,color:"#666"}}>{t("trades.snapshots_meta", {n: snapStats.total||0, size: snapStats.disk_size||"?"})}</span>
        <button onClick={()=>cleanSnapshots(7)} style={{padding:"4px 12px",fontSize:10,background:"#7f1d1d",border:"1px solid #991b1b",borderRadius:6,color:"#fca5a5",cursor:"pointer"}}>{t("trades.clean_plus7")}</button>
        <button onClick={()=>cleanSnapshots(3)} style={{padding:"4px 12px",fontSize:10,background:"#7f1d1d",border:"1px solid #991b1b",borderRadius:6,color:"#fca5a5",cursor:"pointer"}}>{t("trades.clean_plus3")}</button>
      </div>)}
    </div>
    {!trades ? <p style={{color:"#666"}}>{t("common.loading")}</p> : trades.length === 0 ? <p style={{color:"#666"}}>{t("trades.empty")}</p> : (
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
          <thead><tr style={{color:"#666",borderBottom:"1px solid #222"}}>
            <th style={{textAlign:"left",padding:6}}>{t("trades.col.date")}</th>
            <th>{t("trades.col.coin")}</th><th>{t("trades.col.side")}</th><th>{t("trades.col.mode")}</th>
            <th title="Strategy that fired">Strategy</th>
            <th style={{textAlign:"right"}}>{t("trades.col.net")}</th>
            <th style={{textAlign:"right"}}>{t("trades.col.mfe")}</th>
            <th style={{textAlign:"right"}}>{t("trades.col.mae")}</th>
            <th>{t("trades.col.exit")}</th>
            <th>{t("trades.col.quality")}</th>
            <th></th>
          </tr></thead>
          <tbody>
          {trades.map((row,i) => (
            <tr key={i} style={{borderBottom:"1px solid #111",cursor:"pointer"}} onClick={()=>loadDetail(row.id)}>
              <td style={{padding:6,color:"#888",fontSize:10}}>{row.entry_time ? new Date(row.entry_time).toLocaleString(localeTag,{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "?"}</td>
              <td style={{fontWeight:700,color:"#a78bfa"}}>{row.coin}</td>
              <td><span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:row.side==="LONG"?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)",color:row.side==="LONG"?"#22c55e":"#ef4444"}}>{row.side}</span></td>
              <td style={{color:"#888"}}>{row.mode}</td>
              <td>{row.strategy_name ? (() => {
                const tpl=(row.strategy_template||"").toUpperCase();
                const fg = tpl==="RELAX"?"#34d399": tpl==="ABIERTO"?"#fb923c": tpl==="NORMAL"?"#fbbf24":"#a78bfa";
                const bg = tpl==="RELAX"?"#10b98122": tpl==="ABIERTO"?"#f9731622": tpl==="NORMAL"?"#eab30822":"#7c3aed22";
                return <span style={{padding:"2px 6px",borderRadius:4,fontSize:9,fontWeight:700,background:bg,color:fg}}>{row.strategy_name}</span>;
              })() : <span style={{color:"#444"}}>—</span>}</td>
              <td style={{textAlign:"right",fontFamily:"monospace",fontWeight:700,color:row.net_pnl>=0?"#22c55e":"#ef4444"}}>${Number(row.net_pnl||0).toFixed(4)}</td>
              <td style={{textAlign:"right",fontFamily:"monospace",color:"#22c55e"}}>{(row.mfe_pct||0).toFixed(3)}%</td>
              <td style={{textAlign:"right",fontFamily:"monospace",color:"#ef4444"}}>{(row.mae_pct||0).toFixed(3)}%</td>
              <td style={{fontSize:10,color:"#888"}}>{row.exit_reason}</td>

              <td><span style={{color:"#4c1d95",fontSize:10}}>{t("trades.view")}</span></td>
            </tr>
          ))}
          </tbody>
        </table>
      </div>
    )}
  </div>);
}

// ── Bot Live Tab ──
// ── Cambios Tab ──
// Lista de change markers (manuales y automaticos) con su impacto antes/despues calculado.
// Permite ver el efecto real de cada cambio que has hecho en el bot.
function CambiosTab() {
  const { t, lang } = useI18n();
  const [items, setItems] = useState(null);
  const [loading, setLoading] = useState(true);
  const [days, setDays] = useState(30);
  const [filterCat, setFilterCat] = useState("ALL");
  const [recalcId, setRecalcId] = useState(null);

  const load = () => {
    setLoading(true);
    fetch(API + "/api/markers?limit=200&days=" + days)
      .then(r => r.json())
      .then(d => { setItems(Array.isArray(d) ? d : []); setLoading(false); })
      .catch(() => { setItems([]); setLoading(false); });
  };
  useEffect(() => { load(); }, [days]);

  const recalc = async (id) => {
    setRecalcId(id);
    try {
      await fetch(API + "/api/markers/" + id + "/recalculate", { method: "POST" });
      load();
    } finally { setRecalcId(null); }
  };

  if (loading) return <div className="loading">{t("cambios.loading")}</div>;

  const categories = ["ALL", ...Array.from(new Set((items || []).map(m => m.category))).sort()];
  const filtered = (items || []).filter(m => filterCat === "ALL" || m.category === filterCat);

  const statusColor = (s) => {
    if (s === "IMPROVED") return "#22c55e";
    if (s === "WORSENED") return "#ef4444";
    if (s === "NEUTRAL") return "#eab308";
    if (s === "INSUFFICIENT_DATA") return "#888";
    return "#555";
  };
  const catColor = (c) => {
    const m = { MANUAL: "#3b82f6", MODE_CHANGE: "#a855f7", PRESET_EDIT: "#f59e0b",
                PROPOSAL_ACCEPTED: "#22c55e", PROTECTION: "#ef4444", TEST: "#666" };
    return m[c] || "#888";
  };
  const fmtDelta = (v, suffix) => {
    if (v == null) return "-";
    const sign = v > 0 ? "+" : "";
    return sign + v + (suffix || "");
  };
  const localeTag = lang === "en" ? "en-US" : "es-ES";
  const fmtTime = (ts) => {
    if (!ts) return "-";
    try { return new Date(ts).toLocaleString(localeTag, { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" }); }
    catch { return ts; }
  };

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
      <div>
        <span>{t("cambios.title")}</span>
        <div className="page-sub">{t("cambios.subtitle")}</div>
      </div>
      <div style={{display:"flex", gap:8, alignItems:"center"}}>
        <select value={days} onChange={e => setDays(Number(e.target.value))}
                style={{background:"#1a1a1a", color:"#aaa", border:"1px solid #333", borderRadius:6, padding:"6px 10px", fontSize:11}}>
          <option value={7}>{t("cambios.days_7")}</option>
          <option value={30}>{t("cambios.days_30")}</option>
          <option value={90}>{t("cambios.days_90")}</option>
        </select>
        <button className="tab" onClick={load}>{t("cambios.refresh")}</button>
      </div>
    </div>

    {/* Category filter */}
    <div style={{display:"flex", gap:6, marginBottom:12, flexWrap:"wrap"}}>
      {categories.map(c => (
        <button key={c}
                className={"tab " + (filterCat === c ? "active" : "")}
                onClick={() => setFilterCat(c)}>
          {c} {c !== "ALL" && <span style={{opacity:0.6, marginLeft:4}}>({(items || []).filter(m => m.category === c).length})</span>}
        </button>
      ))}
    </div>

    {filtered.length === 0 ? (
      <div className="card" style={{textAlign:"center", padding:30, color:"#666"}}>
        {t("cambios.empty")}
      </div>
    ) : (
      <div className="card scroll">
        <table>
          <thead><tr>
            <th>{t("cambios.col.when")}</th>
            <th>{t("cambios.col.category")}</th>
            <th>{t("cambios.col.label")}</th>
            <th>{t("cambios.col.context")}</th>
            <th style={{textAlign:"center"}}>{t("cambios.col.status")}</th>
            <th style={{textAlign:"right"}}>{t("cambios.col.wr_ba")}</th>
            <th style={{textAlign:"right"}}>{t("cambios.col.exp_ba")}</th>
            <th style={{textAlign:"right"}}>{t("cambios.col.delta_exp")}</th>
            <th style={{textAlign:"right"}}>{t("cambios.col.sl_ba")}</th>
            <th></th>
          </tr></thead>
          <tbody>
            {filtered.map(m => {
              const imp = m.impact_data || {};
              const before = imp.before || {};
              const after = imp.after || {};
              const ctx = [m.coin, m.side, m.mode].filter(Boolean).join(" / ") || "-";
              return (
                <tr key={m.id}>
                  <td style={{fontSize:10, color:"#666", whiteSpace:"nowrap"}}>{fmtTime(m.timestamp)}</td>
                  <td><span className="tag" style={{background: catColor(m.category) + "20", color: catColor(m.category), border: "1px solid " + catColor(m.category) + "40"}}>{m.category}</span></td>
                  <td style={{maxWidth:300, overflow:"hidden", textOverflow:"ellipsis"}} title={m.description || ""}>
                    <div>{m.label}</div>
                    {m.description && <div style={{fontSize:9, color:"#555", marginTop:2}}>{m.description.length > 80 ? m.description.slice(0, 80) + "..." : m.description}</div>}
                  </td>
                  <td style={{fontSize:10, color:"#888"}}>{ctx}</td>
                  <td style={{textAlign:"center"}}>
                    <span className="tag" style={{background: statusColor(m.impact_status) + "20", color: statusColor(m.impact_status), border: "1px solid " + statusColor(m.impact_status) + "40"}}>
                      {m.impact_status || "PENDING"}
                    </span>
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.wr != null ? before.wr + "% / " + after.wr + "%" : "-"}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.expectancy != null ? before.expectancy + " / " + after.expectancy : "-"}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10, fontWeight:600,
                              color: imp.delta_expectancy > 0 ? "#22c55e" : imp.delta_expectancy < 0 ? "#ef4444" : "#888"}}>
                    {fmtDelta(imp.delta_expectancy)}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.sl_rate != null ? before.sl_rate + "% / " + after.sl_rate + "%" : "-"}
                  </td>
                  <td>
                    <button onClick={() => recalc(m.id)}
                            disabled={recalcId === m.id}
                            style={{background:"#1a1a2e", border:"1px solid #2a3f5f", color:"#3b82f6", padding:"3px 8px", borderRadius:4, fontSize:9, cursor:"pointer"}}>
                      {recalcId === m.id ? "..." : t("cambios.recalc")}
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    )}

    <div style={{marginTop:12, fontSize:10, color:"#555", padding:12, background:"#0a0a0a", borderRadius:6}}
         dangerouslySetInnerHTML={{__html: t("cambios.how_it_works")}} />
  </>);
}

              const gross = Number(t_.gross_pnl || 0);
              const exitTime = t_.exit_time ? new Date(t_.exit_time).toLocaleString(localeTag) : "-";
              const holdMin = t_.hold_seconds ? Math.round(t_.hold_seconds / 60) + "m" : "-";

                  <td style={{textAlign:"right", color:"#888"}}>{Number(t_.fee || 0).toFixed(4)}</td>
                  <td style={{textAlign:"right", fontWeight:600, color: net >= 0 ? "#22c55e" : "#ef4444"}}>{net.toFixed(4)}</td>
                  <td style={{textAlign:"right", color:"#666"}}>{holdMin}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>)}
  </>);
}
