        <div className="grid" style={{gridTemplateColumns:"repeat(2, 1fr)"}}>
          <div className="card">
            <div className="label">Bloqueados</div>
            <div style={{fontSize:13, marginTop:6}}>Cantidad: <span className="red" style={{fontWeight:700}}>{totalBlocked}</span></div>
            <div style={{fontSize:11, marginTop:4, color:"#888"}}>Avg Score: <span style={{color:"#ef4444"}}>{totals.BLOCKED?.avg_score || "N/A"}</span></div>
          </div>
          <div className="card">
            <div className="label">Entradas</div>
            <div style={{fontSize:13, marginTop:6}}>Cantidad: <span className="green" style={{fontWeight:700}}>{totalEntered}</span></div>
            <div style={{fontSize:11, marginTop:4, color:"#888"}}>Avg Score: <span style={{color:"#22c55e"}}>{totals.ENTER?.avg_score || "N/A"}</span></div>
          </div>
        </div>
      </>);
    })()}

    {view === "counterfactual" && (() => {
      if (!cfData || Object.keys(cfData).length === 0) return <div className="card" style={{textAlign:"center", padding:30, color:"#555"}}>No hay suficientes senales para analisis contrafactual.</div>;
      const entries = Object.entries(cfData);
      const totalSignals = entries.length > 0 ? (Object.values(cfData)[0]?.total_signals || 0) : 0;
      return (<>
        <h3 className="section-title">Analisis Contrafactual <Tip text="Simulacion de que pasaria con diferentes umbrales de score. Ayuda a decidir el threshold optimo." /></h3>
        <div className="grid" style={{gridTemplateColumns:"repeat(2, 1fr)"}}>
          <MC label="Senales Analizadas" value={totalSignals} color="blue" />
          <MC label="Umbrales Evaluados" value={entries.length} color="purple" />
        </div>

        <h3 className="section-title" style={{marginTop:16}}>Comparacion de Umbrales</h3>
        <div className="card scroll">
          <table>
            <thead><tr><th>Umbral</th><th style={{textAlign:"right"}}>Entrarian</th><th style={{textAlign:"right"}}>Bloqueados</th><th style={{textAlign:"right"}}>% Entrada</th><th style={{textAlign:"right"}}>% Bloqueo</th></tr></thead>
            <tbody>
              {entries.map(([key, d]) => {
                const th = d.threshold || 0;
                const rowColor = th <= 55 ? "rgba(234,179,8,0.08)" : th >= 65 ? "rgba(59,130,246,0.08)" : "transparent";
                const blockPct = d.total_signals > 0 ? ((d.would_block / d.total_signals) * 100).toFixed(1) : "0";
                return (
                  <tr key={key} style={{background: rowColor}}>
                    <td style={{color: th <= 55 ? "#eab308" : th >= 65 ? "#3b82f6" : "#e0e0e8", fontWeight:600}}>{th}</td>
                    <td style={{textAlign:"right"}}>{d.would_enter}</td>
                    <td style={{textAlign:"right"}}>{d.would_block}</td>
                    <td style={{textAlign:"right", color:"#22c55e"}}>{d.enter_pct || 0}%</td>
                    <td style={{textAlign:"right", color:"#ef4444"}}>{blockPct}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:8, fontSize:10, color:"#555"}}>
          <span style={{color:"#eab308"}}>Amarillo</span> = umbrales permisivos | <span style={{color:"#3b82f6"}}>Azul</span> = umbrales restrictivos
        </div>
      </>);
    })()}

    {view === "experiments" && (
      <div className="card" style={{textAlign:"center", padding:40, color:"#555"}}>
        <p style={{fontSize:14}}>Run experiments via API:</p>
        <p style={{fontSize:11, marginTop:8, fontFamily:"monospace"}}>POST /api/quant/experiment</p>
        <p style={{fontSize:10, marginTop:4, color:"#444"}}>{"{"} name, score_min, micro_min, sl_max_pct, tp_min_pct, trailing_distance_pct, partial_close_pct {"}"}</p>
      </div>
    )}

    {view === "diagnostic" && (() => {
      const rateColor = (r) => r >= 80 ? "#22c55e" : r >= 50 ? "#eab308" : "#ef4444";

      if (!diagData) return (
        <div className="card" style={{textAlign:"center", padding:40}}>
          <div style={{fontSize:32, marginBottom:12, opacity:0.3}}>🔬</div>
          <div style={{fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:8}}>Diagnostico de Filtros</div>
          <div style={{fontSize:12, color:"rgba(255,255,255,0.3)", maxWidth:400, margin:"0 auto", lineHeight:1.6}}>
            Evalua todos los filtros del bot para cada senal, independientemente de donde falle. Permite ver el cuello de botella real del sistema.
          </div>
          <div style={{marginTop:16, fontSize:11, color:"rgba(255,255,255,0.2)"}}>Inicia trading para generar datos de diagnostico.</div>
        </div>
      );

      if (diagData.status === "no_data") return (
        <div className="card" style={{textAlign:"center", padding:40}}>
          <div style={{fontSize:32, marginBottom:12, opacity:0.3}}>📡</div>
          <div style={{fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:8}}>Recopilando datos...</div>
          <div style={{fontSize:12, color:"rgba(255,255,255,0.3)"}}>Aun no hay senales con diagnostic_trace. Los datos apareceran automaticamente cuando el bot genere senales.</div>
        </div>
      );

      const pr = diagData.pass_rates || {};
      return (<>
        <h3 className="section-title">Tasa de Filtros <Tip text="Evaluacion completa de todos los filtros para cada senal. Muestra el cuello de botella real." /> ({diagData.total_signals} senales)</h3>
        <div className="card scroll">
          <table>
            <thead><tr>
              <th style={{textAlign:"left"}}>Filtro</th>
              <th style={{textAlign:"right"}}>Pasan</th>
              <th style={{textAlign:"right"}}>Total</th>
              <th style={{textAlign:"right"}}>Tasa</th>
            </tr></thead>
            <tbody>
              {Object.entries(pr).map(([k, v]) => (
                <tr key={k}>
                  <td style={{fontWeight:600}}>{k.replace(/_/g, " ")}</td>
                  <td style={{textAlign:"right"}}>{v.passed}</td>
                  <td style={{textAlign:"right", color:"rgba(255,255,255,0.3)"}}>{v.total}</td>
                  <td style={{textAlign:"right", color: rateColor(v.rate), fontWeight:700}}>{v.rate}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="grid" style={{marginTop:14}}>
          <MC label="Casi Perfectas" value={diagData.near_perfect_blocked_by_score || 0} color="yellow" tip="Senales que pasan TODOS los filtros excepto score. Indica si el score es demasiado restrictivo." />
          <MC label="Score OK pero Filtradas" value={diagData.score_ok_but_filtered || 0} color="red" tip="Senales que pasan score pero caen en filtros posteriores (trend, BTC, RSI, micro)." />
        </div>
        <h3 className="section-title" style={{marginTop:14}}>Ranking de Cuellos de Botella <Tip text="Filtros ordenados del mas restrictivo al menos. El primero es el que bloquea mas senales." /></h3>
        <div className="card scroll">
          {(diagData.bottleneck_ranking || []).map((b, i) => (
            <div key={i} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 10px", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
              <span style={{fontWeight:600, fontSize:12}}>#{i+1} {b.filter.replace(/_/g, " ")}</span>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <div style={{width:120, height:6, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden"}}>
                  <div style={{width: b.pass_rate + "%", height:"100%", background: rateColor(b.pass_rate), borderRadius:3, transition:"width 0.5s"}}></div>
                </div>
                <span style={{fontSize:11, color: rateColor(b.pass_rate), fontWeight:700, minWidth:40, textAlign:"right"}}>{b.pass_rate}%</span>
              </div>
            </div>
          ))}
        </div>
      </>);
    })()}

    {view === "quality" && (() => {
      if (!eqData || (!eqData.by_quality_label && !eqData.by_late_risk)) return (
        <div className="card" style={{textAlign:"center", padding:40}}>
          <div style={{fontSize:32, marginBottom:12, opacity:0.3}}>&#x1F50D;</div>
          <div style={{fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:8}}>Calidad de Entradas</div>
          <div style={{fontSize:12, color:"rgba(255,255,255,0.3)", maxWidth:400, margin:"0 auto", lineHeight:1.6}}>
            Recopilando datos de calidad... Inicia trading para generar diagnosticos de entrada.
          </div>
        </div>
      );

      const ql = eqData.by_quality_label || {};
      const lr = eqData.by_late_risk || {};
      const wp = eqData.winning_profile || {};
      const lp = eqData.losing_profile || {};
      const lf = eqData.losing_factors || [];
      const wf = eqData.winning_factors || [];

      const qualityOrder = ["A_PLUS", "A", "B", "C", "WEAK", "unknown"];
      const riskOrder = ["LOW", "MEDIUM", "HIGH", "unknown"];
      const wrColor = (wr) => wr >= 0.6 ? "#22c55e" : wr >= 0.45 ? "#eab308" : "#ef4444";
      const pnlColor = (v) => v > 0 ? "#22c55e" : v < 0 ? "#ef4444" : "rgba(255,255,255,0.5)";

      return (<>
        <h3 className="section-title">Calidad de Entradas por Grado</h3>
        <div className="grid">
          {qualityOrder.filter(k => ql[k]).map(k => {
            const v = ql[k];
            return <div key={k} className="card" style={{padding:14}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                <span style={{fontWeight:700, fontSize:14, color: k === "A_PLUS" ? "#22c55e" : k === "A" ? "#3b82f6" : k === "B" ? "#eab308" : k === "C" ? "#f97316" : "#ef4444"}}>{k.replace("_", "+")}</span>
                <span style={{fontSize:11, color:"rgba(255,255,255,0.3)"}}>{v.trades} trades</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>WR</span>
                <span style={{fontWeight:700, color: wrColor(v.winrate)}}>{(v.winrate * 100).toFixed(1)}%</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>PnL Total</span>
                <span style={{fontWeight:700, color: pnlColor(v.total_pnl)}}>${v.total_pnl.toFixed(4)}</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, marginTop:4}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>Expectancy</span>
                <span style={{fontWeight:600, color: pnlColor(v.expectancy)}}>${v.expectancy.toFixed(4)}</span>
              </div>
            </div>;
          })}
        </div>

        <h3 className="section-title" style={{marginTop:14}}>Riesgo de Entrada Tardia</h3>
        <div className="grid">
          {riskOrder.filter(k => lr[k]).map(k => {
            const v = lr[k];
            return <div key={k} className="card" style={{padding:14}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                <span style={{fontWeight:700, fontSize:14, color: k === "LOW" ? "#22c55e" : k === "MEDIUM" ? "#eab308" : k === "HIGH" ? "#ef4444" : "rgba(255,255,255,0.5)"}}>{k}</span>
                <span style={{fontSize:11, color:"rgba(255,255,255,0.3)"}}>{v.trades} trades</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>WR</span>
                <span style={{fontWeight:700, color: wrColor(v.winrate)}}>{(v.winrate * 100).toFixed(1)}%</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>PnL Total</span>
                <span style={{fontWeight:700, color: pnlColor(v.total_pnl)}}>${v.total_pnl.toFixed(4)}</span>
              </div>
            </div>;
          })}
        </div>

        <h3 className="section-title" style={{marginTop:14}}>Perfil: Ganadores vs Perdedores</h3>
        <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div className="card" style={{padding:14}}>
            <div style={{fontWeight:700, fontSize:13, color:"#22c55e", marginBottom:10}}>Ganadores ({wp.count || 0})</div>
            <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:6}}>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Score</span><span>{wp.avg_score || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Spread %</span><span>{wp.avg_spread_pct || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Move vs Fee</span><span>{wp.avg_move_vs_fee || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Confirmacion</span><span>{wp.avg_confirmation || 0}</span></div>
              {wp.quality_distribution && <div style={{marginTop:6}}>
                <div style={{fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:4}}>Distribucion calidad</div>
                {Object.entries(wp.quality_distribution).map(([k,v]) => <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:11}}><span>{k}</span><span>{v}</span></div>)}
              </div>}
            </div>
          </div>
          <div className="card" style={{padding:14}}>
            <div style={{fontWeight:700, fontSize:13, color:"#ef4444", marginBottom:10}}>Perdedores ({lp.count || 0})</div>
            <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:6}}>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Score</span><span>{lp.avg_score || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Spread %</span><span>{lp.avg_spread_pct || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Move vs Fee</span><span>{lp.avg_move_vs_fee || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Confirmacion</span><span>{lp.avg_confirmation || 0}</span></div>
              {lp.quality_distribution && <div style={{marginTop:6}}>
                <div style={{fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:4}}>Distribucion calidad</div>
                {Object.entries(lp.quality_distribution).map(([k,v]) => <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:11}}><span>{k}</span><span>{v}</span></div>)}
              </div>}
            </div>
          </div>
        </div>

        {(lf.length > 0 || wf.length > 0) && <>
          <h3 className="section-title" style={{marginTop:14}}>Factores Principales</h3>
          <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
            {lf.length > 0 && <div className="card" style={{padding:14}}>
              <div style={{fontWeight:700, fontSize:13, color:"#ef4444", marginBottom:10}}>Top Factores Perdedores</div>
              {lf.map((f, i) => <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span>{f.factor}</span>
                <span style={{color:"#ef4444", fontWeight:600}}>{f.count} ({f.pct}%)</span>
              </div>)}
            </div>}
            {wf.length > 0 && <div className="card" style={{padding:14}}>
              <div style={{fontWeight:700, fontSize:13, color:"#22c55e", marginBottom:10}}>Top Factores Ganadores</div>
              {wf.map((f, i) => <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span>{f.factor}</span>
                <span style={{color:"#22c55e", fontWeight:600}}>{f.count} ({f.pct}%)</span>
              </div>)}
            </div>}
          </div>
        </>}
      </>);
    })()}

    {view === "decisions" && (<>
      <h3 className="section-title">Automated Decisions ({decisions.length})</h3>
      {decisions.length === 0 ? <div className="loading">No decisions yet — need more trades</div> :
      <div className="card scroll">
        {decisions.map((d, i) => (
          <div key={i} style={{padding:"10px 0", borderBottom:"1px solid #1a1a2e"}}>
            <div style={{display:"flex", gap:8, alignItems:"center"}}>
              <span className={"tag " + (d.type === "recommendation" ? "tag-blue" : d.type === "warning" ? "tag-yellow" : "tag-green")}>{d.type}</span>
              <span style={{fontWeight:700, fontSize:13}}>{d.title}</span>
              <span className={"pill " + (d.confidence === "high" ? "tag-green" : "tag-yellow")} style={{marginLeft:"auto"}}>{d.confidence}</span>
            </div>
            <div style={{marginTop:6, padding:"8px 12px", background:"#0a0a12", borderRadius:8, fontSize:11}}>
              <div style={{color:"#888"}}><b>Evidence:</b> {d.evidence}</div>
              <div style={{color:"#3b82f6", marginTop:4}}><b>Action:</b> {d.action}</div>
              <div style={{color:"#22c55e", marginTop:4}}><b>Expected impact:</b> {d.expected_impact}</div>
            </div>
          </div>
        ))}
      </div>}
    </>)}
  </>);
}

// ── Validation Tab ──
function ValidationTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("live_trades");

  const run = () => {
    setLoading(true);
    fetch(API + "/api/quant/validation?mode=" + mode).then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  };

  const verdictColor = (v) => v === "ADOPT" ? "tag-green" : v === "TEST_LIVE" ? "tag-yellow" : v === "REJECT" ? "tag-red" : v === "BLOCKED_BY_DATA_QUALITY" ? "tag-red" : "tag-blue";
  const confColor = (c) => c === "HIGH" ? "#22c55e" : c === "MEDIUM" ? "#eab308" : "#ef4444";
  const flagColor = (f) => f === "NO_EFFECT" || f === "BEST_IS_BASELINE" ? "#f97316" : f === "DATA_QUALITY" ? "#ef4444" : "#eab308";

  if (!data) return (<div style={{textAlign:"center", padding:40}}>
    <div style={{display:"flex", justifyContent:"center", gap:8, marginBottom:12}}>
      <button className={"tab " + (mode === "live_trades" ? "active" : "")} onClick={() => setMode("live_trades")}>Live Trades</button>
      <button className={"tab " + (mode === "replay_historical" ? "active" : "")} onClick={() => setMode("replay_historical")}>Historical Replay</button>
    </div>
    <button onClick={run} className="tab active">{loading ? "Running experiments..." : "Run Full Validation"}</button>
    <p style={{fontSize:10, color:"#555", marginTop:8}}>{mode === "live_trades" ? "Runs 12 experiments across 3 batches against real trade data" : "Replay mode: requires 7+ days of captured raw data"}</p>
  </div>);

  const b = data.baseline_summary || {};

  return (<>
    <div className="page-title">Validacion <Tip text="Pruebas formales de cambios antes de aplicarlos al bot. Compara variantes contra el baseline actual." /><div className="page-sub">Pruebas formales de cambios antes de aplicar al bot</div></div>
    {/* Baseline */}
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
      <h3 className="section-title" style={{margin:0}}>Baseline ({data.total_trades_baseline} trades)</h3>
      <div style={{display:"flex", gap:8}}>
        <button onClick={run} className="tab">{loading ? "Running..." : "Re-run"}</button>
        <ExportBtn data={data} filename={"validation_" + new Date().toISOString().split("T")[0] + ".json"} />
      </div>
    </div>
    <div className="grid" style={{gridTemplateColumns:"repeat(6, 1fr)"}}>
      <MC label="Expectancy" value={"$" + (b.expectancy || 0)} color={Number(b.expectancy) >= 0 ? "green" : "red"} />
      <MC label="Win Rate" value={((b.winrate || 0) * 100).toFixed(0) + "%"} color={b.winrate >= 0.5 ? "green" : "red"} />
      <MC label="PF" value={b.profit_factor || 0} color={Number(b.profit_factor) >= 1 ? "green" : "red"} />
      <MC label="Net PnL" value={"$" + (b.net_pnl || 0)} color={Number(b.net_pnl) >= 0 ? "green" : "red"} />
      <MC label="Max DD" value={"$" + (b.max_drawdown || 0)} color="red" />
      <MC label="Fee Killed" value={b.fee_killed_count || 0} color={b.fee_killed_count === 0 ? "green" : "red"} />
    </div>

    {/* Validation Integrity */}
    {data.validation_integrity && data.validation_integrity.status !== "OK" && (
      <div className="card" style={{marginTop:12, borderColor:"#f97316", padding:"10px 14px"}}>
        <div style={{fontSize:12, fontWeight:700, color:"#f97316", marginBottom:4}}>Validation Integrity: {data.validation_integrity.status}</div>
        {(data.validation_integrity.issues || []).map((issue, i) => (
          <div key={i} style={{fontSize:10, color:"#aaa", padding:"2px 0"}}>{issue}</div>
        ))}
      </div>
    )}

    {/* Batches */}
    {(data.batches || []).map((batch, bi) => (
      <div key={bi} className="card" style={{marginTop:16}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
          <div>
            <span style={{fontWeight:700, fontSize:14, color:"#e0e0e8"}}>{batch.batch_name.replace(/_/g, " ").toUpperCase()}</span>
            <span className={"tag " + verdictColor(batch.verdict?.decision)} style={{marginLeft:8}}>{batch.verdict?.decision}</span>
            {batch.verdict?.confidence && (
              <span style={{marginLeft:6, fontSize:10, fontWeight:600, color: confColor(batch.verdict.confidence)}}>[{batch.verdict.confidence}]</span>
            )}
          </div>
          <span style={{fontSize:10, color:"#666"}}>Best: <span className="purple">{batch.best_experiment || "none"}</span></span>
        </div>
        <p style={{fontSize:10, color:"#888", marginBottom:8}}>{batch.hypothesis}</p>

        {/* Status flags */}
        {batch.batch_status_flags?.length > 0 && (
          <div style={{marginBottom:6, display:"flex", gap:4, flexWrap:"wrap"}}>
            {batch.batch_status_flags.map((f, i) => <span key={i} style={{padding:"2px 8px", borderRadius:10, fontSize:9, fontWeight:600, background:"rgba(249,115,22,0.15)", color: flagColor(f)}}>{f}</span>)}
          </div>
        )}

        {/* Data quality blockers */}
        {batch.data_quality_blockers?.length > 0 && (
          <div style={{padding:"6px 10px", background:"rgba(239,68,68,0.1)", borderRadius:6, fontSize:10, marginBottom:8, color:"#ef4444"}}>
            {batch.data_quality_blockers.map((b, i) => <div key={i}>{b}</div>)}
          </div>
        )}

        {/* Verdict */}
        <div style={{padding:"6px 10px", background:"#0a0a12", borderRadius:6, fontSize:11, marginBottom:8}}>
          <span style={{color:"#aaa"}}>{batch.verdict?.reasoning}</span>
          {batch.verdict?.risk_flags?.length > 0 && (
            <span style={{marginLeft:8}}>{batch.verdict.risk_flags.map((f, i) => <span key={i} className="tag tag-yellow" style={{marginLeft:4}}>{f}</span>)}</span>
          )}
        </div>

        {/* Experiments table */}
        <table>
          <thead><tr>
            <th>Experiment</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>WR</th>
            <th style={{textAlign:"right"}}>Expectancy</th><th style={{textAlign:"right"}}>PF</th>
            <th style={{textAlign:"right"}}>Net PnL</th><th style={{textAlign:"right"}}>DD</th>
            <th style={{textAlign:"right"}}>Exp %</th><th style={{textAlign:"right"}}>PF %</th>
          </tr></thead>
          <tbody>
            {batch.experiments?.map((exp, i) => {
              const km = exp.key_metrics || {};
              const vs = exp.vs_baseline || {};
              const isBest = exp.name === batch.best_experiment;
              return (
                <tr key={i} style={{background: isBest ? "#1a1a3e" : "transparent"}}>
                  <td style={{fontWeight: isBest ? 700 : 400}}>{isBest && ">> "}{exp.name}</td>
                  <td style={{textAlign:"right"}}>{exp.trades_accepted}</td>
                  <td style={{textAlign:"right"}}>{((km.winrate || 0) * 100).toFixed(0)}%</td>
                  <td style={{textAlign:"right", color: km.expectancy >= 0 ? "#22c55e" : "#ef4444"}}>{km.expectancy}</td>
                  <td style={{textAlign:"right"}}>{km.profit_factor}</td>
                  <td style={{textAlign:"right", color: km.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{km.net_pnl}</td>
                  <td style={{textAlign:"right"}}>{km.max_drawdown}</td>
                  <td style={{textAlign:"right", color: vs.expectancy_change_pct > 0 ? "#22c55e" : "#ef4444"}}>{vs.expectancy_change_pct > 0 ? "+" : ""}{vs.expectancy_change_pct}%</td>
                  <td style={{textAlign:"right", color: vs.pf_change_pct > 0 ? "#22c55e" : "#ef4444"}}>{vs.pf_change_pct > 0 ? "+" : ""}{vs.pf_change_pct}%</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    ))}

    {/* Combination */}
    {data.combination_suggestion && (
      <div className="card" style={{marginTop:16, borderColor:"#3b82f6"}}>
        <h3 className="section-title" style={{color:"#3b82f6"}}>Suggested Combined Config</h3>
        <pre style={{fontSize:11, color:"#aaa", background:"#0a0a12", padding:12, borderRadius:8}}>{JSON.stringify(data.combination_suggestion.proposed_config, null, 2)}</pre>
        <p style={{fontSize:10, color:"#666", marginTop:4}}>{data.combination_suggestion.note}</p>
      </div>
    )}
  </>);
}

// ── Research Tab (old) ──
function ResearchTab() {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("daily_summary");

  const loadReport = () => {
    setLoading(true);
    fetch(API + "/api/reports/full").then(r => r.json()).then(d => { setReport(d); setLoading(false); }).catch(() => setLoading(false));
  };

  useEffect(() => { loadReport(); }, []);

  const views = ["daily_summary", "wr_by_coin", "wr_by_side", "wr_by_hour", "pnl_by_mode", "pnl_by_tag", "pnl_by_exit_reason", "fee_analysis", "poison_coins", "rescuable_coins", "signal_blocked_vs_entered"];

  if (loading) return <div className="loading">Generating reports...</div>;
  if (!report) return <div className="loading">No data yet. <button onClick={loadReport} className="tab">Load</button></div>;

  const data = report[view] || [];
  const cols = data.length > 0 ? Object.keys(data[0]) : [];

  return (<>
    <div className="page-title">Informes<div className="page-sub">Reports operativos: por coin, hora, modo, tags</div></div>
    <div style={{display:"flex", gap:4, flexWrap:"wrap", marginBottom:16}}>
      {views.map(v => (
        <button key={v} className={"tab " + (view === v ? "active" : "")} onClick={() => setView(v)}>{v.replace(/_/g, " ")}</button>
      ))}
      <button className="tab" onClick={loadReport} style={{marginLeft:"auto"}}>Refresh</button>
    </div>
    <div className="card scroll">
      <table>
        <thead><tr>{cols.map(c => <th key={c} style={{textAlign: typeof data[0]?.[c] === "number" ? "right" : "left"}}>{c}</th>)}</tr></thead>
        <tbody>
          {data.map((row, i) => (
            <tr key={i}>
              {cols.map(c => {
                const v = row[c];
                const isNum = typeof v === "number";
                const color = c.includes("pnl") || c === "net" || c === "gross" ? (v >= 0 ? "#22c55e" : "#ef4444") : c === "wr" ? (v >= 50 ? "#22c55e" : v >= 40 ? "#eab308" : "#ef4444") : undefined;
                return <td key={c} style={{textAlign: isNum ? "right" : "left", color}}>{isNum ? v.toLocaleString() : String(v ?? "-")}</td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
      {data.length === 0 && <div className="loading">No data for this report</div>}
    </div>
  </>);
}

// ── Audit Tab ──
function AuditTab() {
  const { data: status } = useFetch("/api/audit/status", 10000);
  const { data: findings } = useFetch("/api/audit/findings", 10000);
  const [fullReport, setFullReport] = useState(null);
  const [loading, setLoading] = useState(false);

  const runAll = () => {
    setLoading(true);
    fetch(API + "/api/audit/run").then(r => r.json()).then(d => { setFullReport(d); setLoading(false); }).catch(() => setLoading(false));
  };

  const scoreColor = (s) => s >= 80 ? "green" : s >= 60 ? "yellow" : "red";
  const sevColor = (s) => s === "critical" ? "tag-red" : s === "error" ? "tag-red" : s === "warning" ? "tag-yellow" : "tag-blue";

  return (<>
    <div className="page-title">Auditoria <Tip text="Sistema de auditorias automaticas que verifica la integridad de datos cada 5-60 minutos." /><div className="page-sub">Calidad de datos, integridad, checks automaticos</div></div>
    {/* Global Score */}
    <div className="grid">
      <MC label="Health Score" value={status?.global_score ?? "..."} color={scoreColor(status?.global_score || 0)} sub="0-100" />
      <MC label="Active Findings" value={findings?.length || 0} color={findings?.length > 0 ? "yellow" : "green"} />
      <div className="card">
        <div className="label">Run All</div>
        <button onClick={runAll} className="tab active" style={{marginTop:8}}>{loading ? "Running..." : "Audit Now"}</button>
      </div>
    </div>

    {/* Per-Check Status */}
    {status?.checks && (<>
      <h3 className="section-title" style={{marginTop:16}}>Checks <Tip text="Cada check se ejecuta en intervalos distintos: integracion (5m), calidad (15m), storage (1h), consistencia (6h)." /></h3>
      <div className="card">
        <table>
          <thead><tr><th>Check</th><th>Status</th><th style={{textAlign:"right"}}>Score</th><th style={{textAlign:"right"}}>Findings</th><th style={{textAlign:"right"}}>Runs</th><th>Interval</th><th>Last Run</th></tr></thead>
          <tbody>
            {Object.entries(status.checks).map(([name, c]) => (
              <tr key={name}>
                <td className="purple">{name}</td>
                <td><span className={"tag " + (c.status === "OK" ? "tag-green" : c.status === "WARNING" ? "tag-yellow" : c.status === "ERROR" ? "tag-red" : "tag-blue")}>{c.status}</span></td>
                <td style={{textAlign:"right", color: scoreColor(c.score) === "green" ? "#22c55e" : scoreColor(c.score) === "yellow" ? "#eab308" : "#ef4444"}}>{c.score}</td>
                <td style={{textAlign:"right"}}>{c.findings}</td>
                <td style={{textAlign:"right"}}>{c.run_count}</td>
                <td style={{color:"#666"}}>{c.interval_sec < 60 ? c.interval_sec + "s" : Math.round(c.interval_sec / 60) + "m"}</td>
                <td style={{fontSize:10, color:"#555"}}>{c.last_run ? new Date(c.last_run).toLocaleTimeString() : "-"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Current Findings */}
    {findings && findings.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>Current Findings</h3>
      <div className="card scroll">
        <table>
          <thead><tr><th>Severity</th><th>Check</th><th>Code</th><th>Message</th></tr></thead>
          <tbody>
            {findings.map((f, i) => (
              <tr key={i}>
                <td><span className={"tag " + sevColor(f.severity)}>{f.severity}</span></td>
                <td className="purple">{f.check}</td>
                <td style={{fontFamily:"monospace", fontSize:10}}>{f.code}</td>
                <td style={{color:"#bbb"}}>{f.message}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Full Report (after Run All) */}
    {fullReport && (<>
      <h3 className="section-title" style={{marginTop:16}}>Full Report</h3>
      {Object.entries(fullReport.checks || {}).map(([name, c]) => (
        <div key={name} className="card" style={{marginBottom:8}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
            <span className="purple" style={{fontWeight:600}}>{name}</span>
            <span className={"tag " + (c.status === "OK" ? "tag-green" : c.status === "WARNING" ? "tag-yellow" : "tag-red")}>{c.status} ({c.score})</span>
          </div>
          {c.metrics && (
            <div style={{display:"flex", gap:12, flexWrap:"wrap", marginBottom:8}}>
              {Object.entries(c.metrics).map(([k, v]) => (
                <span key={k} style={{fontSize:10, color:"#666"}}>{k}: <span style={{color:"#aaa"}}>{typeof v === "number" ? v.toLocaleString() : String(v)}</span></span>
              ))}
            </div>
          )}
          {c.findings && c.findings.length > 0 && c.findings.map((f, i) => (
            <div key={i} style={{padding:"2px 0", fontSize:11, color: f.severity === "error" || f.severity === "critical" ? "#ef4444" : f.severity === "warning" ? "#eab308" : "#888"}}>
              [{f.severity}] {f.code}: {f.message}
            </div>
          ))}
        </div>
      ))}
    </>)}
  </>);
}

// ── Trades Tab (Trade Detail & Analysis) ──
function TradesTab() {
  const [trades, setTrades] = useState(null);
  const [selected, setSelected] = useState(null);
  const [detail, setDetail] = useState(null);
  const [snapStats, setSnapStats] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    fetch("/api/trades?limit=100").then(r=>r.json()).then(setTrades).catch(()=>{});
    fetch("/api/trades/snapshots/stats").then(r=>r.json()).then(setSnapStats).catch(()=>{});
  }, []);

  const loadDetail = (id) => {
    setSelected(id);
    setLoading(true);
    fetch("/api/trades/" + id).then(r=>r.json()).then(d => { setDetail(d); setLoading(false); }).catch(()=>setLoading(false));
  };

  const cleanSnapshots = (days) => {
    if(!confirm("Borrar snapshots de mas de " + days + " dias?")) return;
    fetch("/api/trades/snapshots/cleanup?days=" + days, {method:"DELETE"}).then(r=>r.json()).then(d => {
      alert("Eliminados: " + d.deleted + " snapshots");
      fetch("/api/trades/snapshots/stats").then(r=>r.json()).then(setSnapStats);
    });
  };

  const VC = {GOOD:"#22c55e", ACCEPTABLE:"#3b82f6", BAD:"#f59e0b", TERRIBLE:"#ef4444"};

  if (detail && selected) {
    const t = detail.trade || {};
    const v = detail.verdict || {};
    const snaps = detail.snapshots || [];
    const sig = detail.signal || {};
    return (<div>
      <button onClick={()=>{setSelected(null);setDetail(null);}} style={{marginBottom:12,padding:"6px 16px",background:"#1e1b4b",border:"1px solid #4c1d95",borderRadius:8,color:"#a78bfa",cursor:"pointer"}}>Volver a lista</button>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>{t.coin} {t.side} <span style={{color:VC[v.verdict]||"#888",fontWeight:700}}>{v.verdict||"?"}</span></h3>
      <p style={{fontSize:11,color:"#666",marginBottom:16}}>{t.mode} | {t.entry_tag} | {new Date(t.entry_time).toLocaleString("es-ES")}</p>

      {/* Verdict */}
      <div style={{background:"rgba(30,27,75,0.5)",border:"1px solid "+(VC[v.verdict]||"#333"),borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:VC[v.verdict],marginBottom:6}}>Veredicto: {v.verdict}</div>
        <p style={{fontSize:12,color:"#aaa"}}>{v.verdict_reason}</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:12}}>
          <MC label="Entry Timing" value={v.entry_timing||"?"} />
          <MC label="MFE Captura" value={(v.mfe_capture_pct||0).toFixed(1)+"%"} />
          <MC label="Tiempo en Profit" value={(v.time_in_profit_pct||0).toFixed(0)+"%"} />
          <MC label="Fee Killed" value={v.fee_killed?"SI":"NO"} accent={!v.fee_killed} negative={v.fee_killed} />
        </div>
      </div>

      {/* Entry / Exit */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
        <div style={{background:"#111",borderRadius:8,padding:12,textAlign:"center"}}>
          <div style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>Entry</div>
          <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace"}}>${Number(t.entry_price).toFixed(5)}</div>
        </div>
        <div style={{background:"#111",borderRadius:8,padding:12,textAlign:"center"}}>
          <div style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>Exit ({t.exit_reason})</div>
          <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:t.net_pnl>=0?"#22c55e":"#ef4444"}}>${Number(t.exit_price).toFixed(5)}</div>
        </div>
        <div style={{background:t.net_pnl>=0?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)",borderRadius:8,padding:12,textAlign:"center",border:"1px solid "+(t.net_pnl>=0?"#22c55e33":"#ef444433")}}>
          <div style={{fontSize:9,color:"#666",textTransform:"uppercase"}}>PnL Neto</div>
          <div style={{fontSize:18,fontWeight:700,fontFamily:"monospace",color:t.net_pnl>=0?"#22c55e":"#ef4444"}}>${Number(t.net_pnl).toFixed(4)}</div>
          <div style={{fontSize:10,color:"#666"}}>Bruto: ${Number(t.gross_pnl).toFixed(4)} | Fee: ${Number(t.fee).toFixed(4)}</div>
        </div>
      </div>

      {/* Scores */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
        <MC label="Score" value={(t.signal_score||0).toFixed(1)} />
        <MC label="Trend" value={(t.trend_score||0).toFixed(1)} />
        <MC label="Micro" value={(t.micro_score||0).toFixed(0)} />
        <MC label="MFE" value={(t.mfe_pct||0).toFixed(3)+"%"} />
        <MC label="MAE" value={(t.mae_pct||0).toFixed(3)+"%"} />
      </div>

      {/* SL Movement from snapshots */}
      {snaps.length > 0 && (<div style={{marginBottom:16}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#a78bfa",marginBottom:8}}>Timeline ({snaps.length} snapshots)</h4>
        <div style={{maxHeight:200,overflowY:"auto",background:"#0a0a14",borderRadius:8,padding:8}}>
          <table style={{width:"100%",fontSize:10}}><thead><tr style={{color:"#666"}}>
            <th style={{textAlign:"left"}}>Tiempo</th><th style={{textAlign:"right"}}>Precio</th><th style={{textAlign:"right"}}>SL</th><th style={{textAlign:"right"}}>HWM</th><th style={{textAlign:"right"}}>PnL%</th>
          </tr></thead><tbody>
          {snaps.map((s,i) => (<tr key={i} style={{borderTop:"1px solid #1a1a2e"}}>
            <td style={{color:"#888"}}>{new Date(s.timestamp).toLocaleTimeString("es-ES")}</td>
            <td style={{textAlign:"right",fontFamily:"monospace"}}>{Number(s.mid_price).toFixed(5)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace",color:"#ef4444"}}>{Number(s.sl_price).toFixed(5)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace",color:"#a78bfa"}}>{Number(s.high_water_mark).toFixed(5)}</td>
            <td style={{textAlign:"right",fontFamily:"monospace",color:s.pnl_pct>=0?"#22c55e":"#ef4444"}}>{Number(s.pnl_pct).toFixed(3)}%</td>
          </tr>))}
          </tbody></table>
        </div>
      </div>)}

      {/* Improvements */}
      {v.improvements && (<div style={{marginBottom:16}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:8}}>Que se puede mejorar</h4>
        {(typeof v.improvements === "string" ? JSON.parse(v.improvements) : v.improvements).map((imp,i) => (
          <div key={i} style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,padding:10,marginBottom:6,fontSize:12,color:"#ddd"}}>{imp}</div>
        ))}
      </div>)}

      {/* Counterfactual */}
      {v.counterfactual && (<div style={{marginBottom:16}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#3b82f6",marginBottom:8}}>Que habria pasado si...</h4>
        {Object.entries(typeof v.counterfactual === "string" ? JSON.parse(v.counterfactual) : v.counterfactual).map(([k,val]) => {
          const obj = typeof val === "object" && val !== null ? val : {};
          const desc = obj.description || k;
          const result = obj.survived != null ? (obj.survived ? "SI habria sobrevivido" : "NO habria sobrevivido")
                       : obj.would_have_tp != null ? (obj.would_have_tp ? "SI habria cerrado en profit" : "NO habria llegado al TP")
                       : JSON.stringify(val);
          const isGood = obj.survived === true || obj.would_have_tp === true;
          return (
            <div key={k} style={{background:isGood?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(isGood?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)"),borderRadius:8,padding:12,marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700,color:isGood?"#22c55e":"#ef4444",marginBottom:4}}>{result}</div>
              <div style={{fontSize:11,color:"#aaa"}}>{desc}</div>
              {obj.original_sl_pct && <div style={{fontSize:10,color:"#666",marginTop:4}}>SL original: {obj.original_sl_pct}% → SL ancho: {obj.wider_sl_pct}% | MAE: {obj.mae_pct}%</div>}
              {obj.original_tp_pct && <div style={{fontSize:10,color:"#666",marginTop:4}}>TP original: {obj.original_tp_pct}% → TP corto: {obj.tighter_tp_pct}% | MFE: {obj.mfe_pct}%</div>}
            </div>
          );
        })}
      </div>)}
    </div>);
  }

  return (<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h3 style={{fontSize:16,fontWeight:700}}>Historial de Trades</h3>
      {snapStats && (<div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:10,color:"#666"}}>Snapshots: {snapStats.total||0} ({snapStats.disk_size||"?"})</span>
        <button onClick={()=>cleanSnapshots(7)} style={{padding:"4px 12px",fontSize:10,background:"#7f1d1d",border:"1px solid #991b1b",borderRadius:6,color:"#fca5a5",cursor:"pointer"}}>Limpiar +7d</button>
        <button onClick={()=>cleanSnapshots(3)} style={{padding:"4px 12px",fontSize:10,background:"#7f1d1d",border:"1px solid #991b1b",borderRadius:6,color:"#fca5a5",cursor:"pointer"}}>Limpiar +3d</button>
      </div>)}
    </div>
    {!trades ? <p style={{color:"#666"}}>Cargando...</p> : trades.length === 0 ? <p style={{color:"#666"}}>No hay trades</p> : (
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
          <thead><tr style={{color:"#666",borderBottom:"1px solid #222"}}>
            <th style={{textAlign:"left",padding:6}}>Fecha</th>
            <th>Coin</th><th>Side</th><th>Modo</th>
            <th style={{textAlign:"right"}}>Neto</th>
            <th style={{textAlign:"right"}}>MFE</th>
            <th style={{textAlign:"right"}}>MAE</th>
            <th>Salida</th>
            <th>Veredicto</th>
            <th>Quality</th>
            <th></th>
          </tr></thead>
          <tbody>
          {trades.map((t,i) => (
            <tr key={i} style={{borderBottom:"1px solid #111",cursor:"pointer"}} onClick={()=>loadDetail(t.id)}>
              <td style={{padding:6,color:"#888",fontSize:10}}>{t.entry_time ? new Date(t.entry_time).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "?"}</td>
              <td style={{fontWeight:700,color:"#a78bfa"}}>{t.coin}</td>
              <td><span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:t.side==="LONG"?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)",color:t.side==="LONG"?"#22c55e":"#ef4444"}}>{t.side}</span></td>
              <td style={{color:"#888"}}>{t.mode}</td>
              <td style={{textAlign:"right",fontFamily:"monospace",fontWeight:700,color:t.net_pnl>=0?"#22c55e":"#ef4444"}}>${Number(t.net_pnl||0).toFixed(4)}</td>
              <td style={{textAlign:"right",fontFamily:"monospace",color:"#22c55e"}}>{(t.mfe_pct||0).toFixed(3)}%</td>
              <td style={{textAlign:"right",fontFamily:"monospace",color:"#ef4444"}}>{(t.mae_pct||0).toFixed(3)}%</td>
              <td style={{fontSize:10,color:"#888"}}>{t.exit_reason}</td>
              <td>{t.verdict ? <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:(VC[t.verdict]||"#333")+"22",color:VC[t.verdict]||"#888"}}>{t.verdict}</span> : <span style={{color:"#444"}}>-</span>}</td>
              <td style={{fontSize:10,color:"#888"}}>{t.entry_quality_label||""}</td>
              <td><span style={{color:"#4c1d95",fontSize:10}}>Ver</span></td>
            </tr>
          ))}
          </tbody>
        </table>
      </div>
    )}
  </div>);
}

// ── Cambios Tab ──
// Lista de change markers (manuales y automaticos) con su impacto antes/despues calculado.
// Permite ver el efecto real de cada cambio que has hecho en el bot.
function CambiosTab() {
  const [items, setItems] = useState(null);
  const [loading, setLoading] = useState(true);
  const [days, setDays] = useState(30);
  const [filterCat, setFilterCat] = useState("ALL");
  const [recalcId, setRecalcId] = useState(null);

  const load = () => {
    setLoading(true);
    fetch(API + "/api/markers?limit=200&days=" + days)
      .then(r => r.json())
      .then(d => { setItems(Array.isArray(d) ? d : []); setLoading(false); })
      .catch(() => { setItems([]); setLoading(false); });
  };
  useEffect(() => { load(); }, [days]);

  const recalc = async (id) => {
    setRecalcId(id);
    try {
      await fetch(API + "/api/markers/" + id + "/recalculate", { method: "POST" });
      load();
    } finally { setRecalcId(null); }
  };

  if (loading) return <div className="loading">Cargando markers...</div>;

  const categories = ["ALL", ...Array.from(new Set((items || []).map(m => m.category))).sort()];
  const filtered = (items || []).filter(m => filterCat === "ALL" || m.category === filterCat);

  const statusColor = (s) => {
    if (s === "IMPROVED") return "#22c55e";
    if (s === "WORSENED") return "#ef4444";
    if (s === "NEUTRAL") return "#eab308";
    if (s === "INSUFFICIENT_DATA") return "#888";
    return "#555";
  };
  const catColor = (c) => {
    const m = { MANUAL: "#3b82f6", MODE_CHANGE: "#a855f7", PRESET_EDIT: "#f59e0b",
                PROPOSAL_ACCEPTED: "#22c55e", PROTECTION: "#ef4444", TEST: "#666" };
    return m[c] || "#888";
  };
  const fmtDelta = (v, suffix) => {
    if (v == null) return "-";
    const sign = v > 0 ? "+" : "";
    return sign + v + (suffix || "");
  };
  const fmtTime = (ts) => {
    if (!ts) return "-";
    try { return new Date(ts).toLocaleString("es-ES", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" }); }
    catch { return ts; }
  };

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
      <div>
        <span>Cambios</span>
        <div className="page-sub">Eventos que pueden cambiar el comportamiento del bot, con su impacto antes/despues calculado automaticamente</div>
      </div>
      <div style={{display:"flex", gap:8, alignItems:"center"}}>
        <select value={days} onChange={e => setDays(Number(e.target.value))}
                style={{background:"#1a1a1a", color:"#aaa", border:"1px solid #333", borderRadius:6, padding:"6px 10px", fontSize:11}}>
          <option value={7}>Ultimos 7 dias</option>
          <option value={30}>Ultimos 30 dias</option>
          <option value={90}>Ultimos 90 dias</option>
        </select>
        <button className="tab" onClick={load}>Actualizar</button>
      </div>
    </div>

    {/* Category filter */}
    <div style={{display:"flex", gap:6, marginBottom:12, flexWrap:"wrap"}}>
      {categories.map(c => (
        <button key={c}
                className={"tab " + (filterCat === c ? "active" : "")}
                onClick={() => setFilterCat(c)}>
          {c} {c !== "ALL" && <span style={{opacity:0.6, marginLeft:4}}>({(items || []).filter(m => m.category === c).length})</span>}
        </button>
      ))}
    </div>

    {filtered.length === 0 ? (
      <div className="card" style={{textAlign:"center", padding:30, color:"#666"}}>
        No hay markers en este periodo. Crea uno con el boton "Marcar cambio" del bot, o haz un cambio de modo / acepta una proposal.
      </div>
    ) : (
      <div className="card scroll">
        <table>
          <thead><tr>
            <th>Cuando</th>
            <th>Categoria</th>
            <th>Etiqueta</th>
            <th>Contexto</th>
            <th style={{textAlign:"center"}}>Estado</th>
            <th style={{textAlign:"right"}}>WR antes/despues</th>
            <th style={{textAlign:"right"}}>Expectancy antes/despues</th>
            <th style={{textAlign:"right"}}>Δ exp</th>
            <th style={{textAlign:"right"}}>SL% antes/despues</th>
            <th></th>
          </tr></thead>
          <tbody>
            {filtered.map(m => {
              const imp = m.impact_data || {};
              const before = imp.before || {};
              const after = imp.after || {};
              const ctx = [m.coin, m.side, m.mode].filter(Boolean).join(" / ") || "-";
              return (
                <tr key={m.id}>
                  <td style={{fontSize:10, color:"#666", whiteSpace:"nowrap"}}>{fmtTime(m.timestamp)}</td>
                  <td><span className="tag" style={{background: catColor(m.category) + "20", color: catColor(m.category), border: "1px solid " + catColor(m.category) + "40"}}>{m.category}</span></td>
                  <td style={{maxWidth:300, overflow:"hidden", textOverflow:"ellipsis"}} title={m.description || ""}>
                    <div>{m.label}</div>
                    {m.description && <div style={{fontSize:9, color:"#555", marginTop:2}}>{m.description.length > 80 ? m.description.slice(0, 80) + "..." : m.description}</div>}
                  </td>
                  <td style={{fontSize:10, color:"#888"}}>{ctx}</td>
                  <td style={{textAlign:"center"}}>
                    <span className="tag" style={{background: statusColor(m.impact_status) + "20", color: statusColor(m.impact_status), border: "1px solid " + statusColor(m.impact_status) + "40"}}>
                      {m.impact_status || "PENDING"}
                    </span>
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.wr != null ? before.wr + "% / " + after.wr + "%" : "-"}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.expectancy != null ? before.expectancy + " / " + after.expectancy : "-"}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10, fontWeight:600,
                              color: imp.delta_expectancy > 0 ? "#22c55e" : imp.delta_expectancy < 0 ? "#ef4444" : "#888"}}>
                    {fmtDelta(imp.delta_expectancy)}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.sl_rate != null ? before.sl_rate + "% / " + after.sl_rate + "%" : "-"}
                  </td>
                  <td>
                    <button onClick={() => recalc(m.id)}
                            disabled={recalcId === m.id}
                            style={{background:"#1a1a2e", border:"1px solid #2a3f5f", color:"#3b82f6", padding:"3px 8px", borderRadius:4, fontSize:9, cursor:"pointer"}}>
                      {recalcId === m.id ? "..." : "Recalcular"}
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    )}

    <div style={{marginTop:12, fontSize:10, color:"#555", padding:12, background:"#0a0a0a", borderRadius:6}}>
      <b>Como funciona:</b> cada marker compara las metricas (WR, expectancy, SL rate, profit factor) de los 20 trades antes vs los 20 trades despues del evento.
      Si no hay 10 trades minimos en alguna ventana, hace fallback a las 6 horas antes/despues.
      Si el marker tiene contexto (coin/side/mode) solo cuenta esos trades.
      El estado se calcula con un score ponderado: <b style={{color:"#22c55e"}}>IMPROVED</b> si mejora &gt; 10%, <b style={{color:"#ef4444"}}>WORSENED</b> si empeora &gt; 10%, sino <b style={{color:"#eab308"}}>NEUTRAL</b>.
    </div>
  </>);
}

function BotLiveTab() {
  const { data: stats } = useFetch("/api/bot/trades/stats", 5000);
  const { data: trades } = useFetch("/api/bot/trades", 5000);
  const { data: sigStats } = useFetch("/api/bot/signals/stats", 10000);
  // V25: gate stats — telemetria de filtros que bloquean entradas
  const { data: gateStats } = useFetch("/api/bot/gate-stats", 10000);

  if (!stats) return <div className="loading">Loading bot data...</div>;

  const s = stats;
  const winRate = s.win_rate ? (s.win_rate * 100).toFixed(0) + "%" : "0%";

  return (<>
    <div className="page-title">Bot Live<div className="page-sub">Estado del bot en tiempo real: trades, senales y PnL</div></div>
    <h3 className="section-title">Resumen de Trades <Tip text="Resumen en tiempo real de los trades ejecutados por el bot. Los datos se actualizan automaticamente." /></h3>
    <div className="grid">
      <MC label="Trades" value={s.total_trades || 0} sub={(s.wins || 0) + "W / " + (s.losses || 0) + "L"} />
      <MC label="Win Rate" value={winRate} color={s.win_rate >= 0.5 ? "green" : "red"} />
      <MC label="PnL Bruto" value={"$" + (s.total_gross || 0)} color={Number(s.total_gross) >= 0 ? "green" : "red"} />
      <MC label="PnL Neto" value={"$" + (s.total_net || 0)} color={Number(s.total_net) >= 0 ? "green" : "red"} />
      <MC label="Fees" value={"$" + (s.total_fees || 0)} color="yellow" />
      <MC label="Avg W / L" value={"$" + (s.avg_win || 0) + " / $" + (s.avg_loss || 0)} />
    </div>

    {sigStats && sigStats.actions && (<>
      <h3 className="section-title" style={{marginTop: 16}}>Decisiones de Senales <Tip text="Desglose de senales: ENTER (ejecutadas), SKIP (ignoradas), BLOCKED (rechazadas por filtros)." /></h3>
      <div className="grid">
        {sigStats.actions.map((a, i) => (
          <MC key={i} label={a.action} value={a.total} sub={"avg score: " + (a.avg_score || 0)} color={a.action === "ENTER" ? "green" : a.action === "BLOCKED" ? "red" : "yellow"} />
        ))}
      </div>
    </>)}

    {/* ── Gate Stats (V25) — telemetria de filtros que bloquean entradas ── */}
    {gateStats && gateStats.data && Object.keys(gateStats.data).length > 0 && (() => {
      const g = gateStats.data;
      const rej = g.rejections_total || {};
      const cfg = g.sl_viability_config || {};
      const topCoins = g.sl_viability_top_coins || {};
      const uptime = g.uptime_sec || 0;
      const upMin = Math.round(uptime / 60);
      const recvAt = gateStats.received_at ? new Date(gateStats.received_at).toLocaleTimeString("es-ES") : "?";
      return (
        <>
          <h3 className="section-title" style={{marginTop: 16}}>Gate Stats <Tip text="Contadores de rechazos por cada filtro de entrada del bot. Reemplaza los antiguos rechazos invisibles. Permite ver que filtro esta bloqueando las entradas. Snapshot enviado por el bot cada ~1 min." /> <span style={{fontSize:10,color:"#666",marginLeft:8,fontWeight:400}}>recibido {recvAt} · uptime {upMin}m · modo {g.mode}</span></h3>
          <div className="grid">
            <MC label="SL Viability rejects" value={rej.sl_viability ?? 0} sub={"min ticks " + (cfg.min_ticks_in_sl ?? "?")} color={rej.sl_viability > 100 ? "red" : rej.sl_viability > 0 ? "yellow" : "green"} />
            <MC label="Spread rejects" value={rej.spread ?? 0} sub="spread > 0.05% mid" color={rej.spread > 50 ? "red" : "yellow"} />
            <MC label="Cooldown skips" value={rej.cooldown ?? 0} sub="coin en cooldown" />
            <MC label="Coin blocked" value={rej.coin_blocked ?? 0} sub="loss streak block" />
          </div>
          <div className="card" style={{marginTop:8, padding:12}}>
            <div style={{fontSize:11,color:"#888",marginBottom:6}}>
              <b style={{color:"#aaa"}}>SL Viability filter config:</b>{" "}
              enabled <span className="purple">{String(cfg.enabled)}</span>{" · "}
              minTicks <span className="purple">{cfg.min_ticks_in_sl}</span>{" · "}
              floor <span className="purple">{cfg.sl_viability_floor_pct}%</span>{" · "}
              configSL <span className="purple">{cfg.config_sl_pct}%</span>{" · "}
              atrMin <span className="purple">{cfg.atr_sl_min_pct}%</span>
            </div>
            {Object.keys(topCoins).length > 0 ? (
              <>
                <div style={{fontSize:11,color:"#888",marginBottom:4}}><b style={{color:"#aaa"}}>Top coins bloqueadas por SL Viability:</b></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {Object.entries(topCoins).map(([coin, count]) => (
                    <span key={coin} className="tag" style={{background:"rgba(239,68,68,0.12)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.3)"}}>
                      {coin} <b style={{marginLeft:4}}>{count}</b>
                    </span>
                  ))}
                </div>
              </>
            ) : (
              <div style={{fontSize:11,color:"#666"}}>Sin rechazos por SL Viability en esta ventana.</div>
            )}
          </div>
        </>
      );
    })()}

    {trades && trades.length > 0 && (<>
      <h3 className="section-title" style={{marginTop: 16}}>Trades Recientes <Tip text="Ultimos trades ejecutados con detalle de PnL bruto, fees y neto por operacion." /></h3>
      <div className="card scroll">
        <table>
          <thead><tr>
            <th>Time</th><th>Coin</th><th>Side</th><th>Reason</th><th>Mode</th>
            <th style={{textAlign:"right"}}>Gross</th><th style={{textAlign:"right"}}>Fee</th>
            <th style={{textAlign:"right"}}>Net</th><th style={{textAlign:"right"}}>Hold</th>
          </tr></thead>
          <tbody>
            {trades.map((t, i) => {
              const net = Number(t.net_pnl || 0);
              const gross = Number(t.gross_pnl || 0);
              const exitTime = t.exit_time ? new Date(t.exit_time).toLocaleString() : "-";
              const holdMin = t.hold_seconds ? Math.round(t.hold_seconds / 60) + "m" : "-";
              return (
                <tr key={i}>
                  <td style={{fontSize:10, color:"#555"}}>{exitTime}</td>
                  <td className="purple">{t.coin}</td>
                  <td><span className={"tag " + (t.side === "LONG" ? "tag-green" : "tag-red")}>{t.side}</span></td>
                  <td><span className={"tag " + (t.exit_reason === "SL" ? "tag-red" : t.exit_reason === "TP" ? "tag-green" : "tag-yellow")}>{t.exit_reason}</span></td>
                  <td style={{color:"#666"}}>{t.mode}</td>
                  <td style={{textAlign:"right", color: gross >= 0 ? "#22c55e" : "#ef4444"}}>{gross.toFixed(4)}</td>
                  <td style={{textAlign:"right", color:"#888"}}>{Number(t.fee || 0).toFixed(4)}</td>
                  <td style={{textAlign:"right", fontWeight:600, color: net >= 0 ? "#22c55e" : "#ef4444"}}>{net.toFixed(4)}</td>
                  <td style={{textAlign:"right", color:"#666"}}>{holdMin}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>)}
  </>);
}

        <li>Optimizar con pocos datos (menos de 50 trades) → sobreoptimizacion</li>
        <li>Ignorar las fees → te parece q ganas pero pierdes por costes</li>
        <li>Confiar en 1 dia → un dia no significa nada, necesitas tendencia</li>
        <li>Mezclar cambios → si cambias 3 cosas a la vez, no sabes cual funciono</li>
        <li>No usar Validation → cambiar "porque creo que mejora" sin datos</li>
      </ul>
    </div>
  </>);
}

// ── Auth helpers ──
function getToken() { return localStorage.getItem("platform_token"); }
function setTokenLS(t) { localStorage.setItem("platform_token", t); }
function clearToken() { localStorage.removeItem("platform_token"); }

// Override useFetch to include auth
function useAuthFetch(url, interval = 5000) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(() => {
    const token = getToken();
    fetch(url, { headers: token ? { "Authorization": "Bearer " + token } : {} })
      .then(r => { if (r.status === 401) { clearToken(); window.location.reload(); } return r.json(); })
      .then(setData).catch(e => setError(e.message));
  }, [url]);
  useEffect(() => { fetch_(); const t = setInterval(fetch_, interval); return () => clearInterval(t); }, [fetch_, interval]);
  return { data, error, refetch: fetch_ };
}

// ── Login Page ──
function LoginPage({ onLogin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setLoading(true);
    try {
      const r = await fetch("/api/platform/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass }),
      });
      if (!r.ok) { setErr("Usuario o contrasena incorrectos"); return; }
      const data = await r.json();
      setTokenLS(data.token);
      onLogin(data.username);
    } catch { setErr("Error de conexion"); } finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      <form className="login-box" onSubmit={submit}>
        <div style={{textAlign:"center", marginBottom:20}}>
          <div style={{width:48, height:48, borderRadius:12, background:"linear-gradient(135deg, #3b82f6, #8b5cf6)", display:"inline-flex", alignItems:"center", justifyContent:"center", color:"white", fontWeight:700, fontSize:18}}>AP</div>
        </div>
        <h1>Alchimia Platform</h1>
        <div className="sub">Quantitative Trading Platform</div>
        <input type="text" placeholder="Usuario" value={user} onChange={e => setUser(e.target.value)} autoFocus />
        <input type="password" placeholder="Contrasena" value={pass} onChange={e => setPass(e.target.value)} />
        {err && <div style={{color:"#ef4444", fontSize:12, textAlign:"center", marginBottom:8}}>{err}</div>}
        <button type="submit" disabled={loading || !user || !pass}>{loading ? "Entrando..." : "Entrar"}</button>
      </form>
    </div>
  );
}

// ── Main App ──
function App() {
  const [authed, setAuthed] = useState(!!getToken());
  const [username, setUsername] = useState("");
  const [tab, setTab] = useState("conclusions");
  const [mobileOpen, setMobileOpen] = useState(false);

  const selectTab = (id) => { setTab(id); setMobileOpen(false); };

  // Check token on mount + periodic session check every 60s
  useEffect(() => {
    const checkSession = () => {
      const token = getToken();
      if (!token) { setAuthed(false); return; }
      fetch("/api/platform/me", { headers: { "Authorization": "Bearer " + token } })
        .then(r => {
          if (r.ok) return r.json();
          // Only clear token on 401 (expired), not on 502/503 (server not ready)
          if (r.status === 401) { clearToken(); setAuthed(false); }
          return null;
        })
        .then(d => { if (d) { setAuthed(true); setUsername(d.username); } })
        .catch(() => {}); // Network error — don't clear token
    };
    checkSession();
    const iv = setInterval(checkSession, 60000);
    return () => clearInterval(iv);
  }, []);

  if (!authed) return <LoginPage onLogin={(u) => { setAuthed(true); setUsername(u); }} />;

  const logout = () => { clearToken(); setAuthed(false); };

  const nav = [
    { id: "conclusions", label: "Conclusiones", icon: "◆", gold: true },
    { group: "Operations", color: "#3b82f6", items: [
      { id: "botlive", label: "Bot Live", icon: "▶" },
      { id: "trades", label: "Trades", icon: "📈" },
      { id: "cambios", label: "Cambios", icon: "✎" },
      { id: "daily", label: "Daily Report", icon: "📋" },
      { id: "system", label: "Sistema", icon: "⚙" },
      { id: "capture", label: "Captura", icon: "📡" },
    ]},
    { group: "Research", color: "#a855f7", items: [
      { id: "lab", label: "Research Lab", icon: "🔬" },
      { id: "validation", label: "Validation", icon: "✓" },
      { id: "research", label: "Reports", icon: "📊" },
      { id: "features", label: "Features", icon: "◎" },
      { id: "regimes", label: "Regimenes", icon: "◈" },
    ]},
    { group: "Governance", color: "#22c55e", items: [
      { id: "audit", label: "Audit", icon: "🛡" },
      { id: "contract", label: "Contrato", icon: "📄" },
    ]},
    { id: "help", label: "Ayuda", icon: "?" },
  ];

  return (
    <div className="app">
      {/* Sidebar */}
      {/* Mobile overlay */}
      <div className={"mobile-overlay " + (mobileOpen ? "open" : "")} onClick={() => setMobileOpen(false)} />
      <nav className={"sidebar " + (mobileOpen ? "mobile-open" : "")}>
        <div className="sidebar-header">
          <div className="logo">AP</div>
          <div>
            <h1>Alchimia</h1>
            <div className="sub">Quant Platform</div>
          </div>
        </div>

        {nav.map((item, i) => {
          // Top-level item (Conclusiones, Help)
          if (item.id) {
            return (
              <div key={i} className={"sidebar-item " + (tab === item.id ? (item.gold ? "active-gold" : "active") : "")}
                   onClick={() => selectTab(item.id)}>
                <span style={{width:16, textAlign:"center", fontSize:11}}>{item.icon}</span>
                <span>{item.label}</span>
              </div>
            );
          }
          // Group
          return (
            <div key={i} className="sidebar-group">
              <div className="sidebar-group-label" style={{color: item.color}}>{item.group}</div>
              {item.items.map(sub => (
                <div key={sub.id} className={"sidebar-item " + (tab === sub.id ? "active" : "")}
                     onClick={() => selectTab(sub.id)}>
                  <span style={{width:16, textAlign:"center", fontSize:11, opacity:0.6}}>{sub.icon}</span>
                  <span>{sub.label}</span>
                </div>
              ))}
            </div>
          );
        })}
      </nav>

      {/* Main content */}
      <div className="main-content">
        <div className="topbar" style={{justifyContent:"space-between"}}>
          <button className="mobile-menu-btn" onClick={() => setMobileOpen(!mobileOpen)}>☰</button>
          <div className="topbar-user">
            <span style={{color:"#555"}}>{new Date().toLocaleDateString("es-ES", {weekday:"short", day:"numeric", month:"short"})}</span>
            <div className="avatar">{(username || "U")[0].toUpperCase()}</div>
            <span>{username || "User"}</span>
            <button className="logout-btn" onClick={logout}>Salir</button>
          </div>
        </div>
        <div className="content-area">
        {tab === "conclusions" && <ConclusionsTab />}
        {tab === "botlive" && <BotLiveTab />}
        {tab === "trades" && <TradesTab />}
        {tab === "cambios" && <CambiosTab />}
        {tab === "daily" && <DailyReportTab />}
        {tab === "system" && <SystemTab />}
        {tab === "capture" && <CaptureTab />}
        {tab === "lab" && <LabTab />}
        {tab === "validation" && <ValidationTab />}
        {tab === "research" && <ResearchTab />}
        {tab === "features" && <FeaturesTab />}
        {tab === "regimes" && <RegimesTab />}
        {tab === "audit" && <AuditTab />}
        {tab === "contract" && <ContractTab />}
        {tab === "help" && <HelpTab />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
