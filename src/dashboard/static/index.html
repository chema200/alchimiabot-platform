<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchimia Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* Base */
body {
  background: #09090f;
  color: #e0e0e8;
  font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Layout */
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* Sidebar */
.sidebar {
  width: 220px;
  background: linear-gradient(180deg, #0c0c16 0%, #080810 100%);
  border-right: 1px solid rgba(255,255,255,0.06);
  position: fixed; top: 0; left: 0; bottom: 0;
  overflow-y: auto; z-index: 40;
  backdrop-filter: blur(20px);
}
.sidebar-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 12px; }
.sidebar-header .logo {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: bold; font-size: 12px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(59,130,246,0.3);
}
.sidebar-header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-header .sub { font-size: 10px; color: #555; letter-spacing: 0.5px; }
.sidebar-group { padding: 16px 0 6px 0; }
.sidebar-group-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 0 20px 8px; opacity: 0.5; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 20px;
  font-size: 12px; color: rgba(255,255,255,0.45); cursor: pointer;
  transition: all 0.2s ease; border-left: 2px solid transparent;
  margin: 1px 0;
}
.sidebar-item:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.03); }
.sidebar-item.active {
  color: #3b82f6; background: rgba(59,130,246,0.08);
  border-left-color: #3b82f6; font-weight: 600;
  box-shadow: inset 3px 0 12px -4px rgba(59,130,246,0.3);
}
.sidebar-item.active-gold {
  color: #f59e0b; background: rgba(245,158,11,0.08);
  border-left-color: #f59e0b; font-weight: 700;
  box-shadow: inset 3px 0 12px -4px rgba(245,158,11,0.3);
}

/* Main */
.main-content { margin-left: 220px; flex: 1; }
.topbar {
  height: 52px;
  background: rgba(12,12,20,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 28px; position: sticky; top: 0; z-index: 30;
}
.topbar-user { display: flex; align-items: center; gap: 12px; font-size: 12px; color: rgba(255,255,255,0.5); }
.topbar-user .avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 11px;
  box-shadow: 0 2px 8px rgba(59,130,246,0.3);
}
.topbar-user .logout-btn {
  font-size: 10px; color: rgba(255,255,255,0.4); cursor: pointer;
  padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
  background: transparent; transition: all 0.2s;
}
.topbar-user .logout-btn:hover { color: #ef4444; border-color: rgba(239,68,68,0.3); }
.content-area { padding: 24px 28px; animation: fadeIn 0.3s ease; }

/* Cards — glass morphism */
.card {
  background: rgba(15,15,26,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 18px;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.card:hover { border-color: rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.card .label { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.card .value { font-size: 24px; font-weight: 700; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: -0.5px; }
.card .sub { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 4px; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px; }

/* Colors with glow */
.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #eab308; }
.purple { color: #a855f7; }
.blue { color: #3b82f6; }
.ok { color: #22c55e; }
.warning { color: #eab308; }
.alert { color: #f97316; }
.critical { color: #ef4444; }
.value.green { text-shadow: 0 0 20px rgba(34,197,94,0.25); }
.value.red { text-shadow: 0 0 20px rgba(239,68,68,0.25); }
.value.yellow { text-shadow: 0 0 20px rgba(234,179,8,0.2); }
.value.purple { text-shadow: 0 0 20px rgba(168,85,247,0.2); }
.value.blue { text-shadow: 0 0 20px rgba(59,130,246,0.2); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { text-align: left; padding: 8px 10px; color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.06); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: rgba(59,130,246,0.04); }

/* Tags */
.tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
.tag-green { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.15); }
.tag-red { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.15); }
.tag-purple { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.15); }
.tag-blue { background: rgba(59,130,246,0.12); color: #3b82f6; border: 1px solid rgba(59,130,246,0.15); }
.tag-yellow { background: rgba(234,179,8,0.12); color: #eab308; border: 1px solid rgba(234,179,8,0.15); }

/* Section titles */
.section-title {
  font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase;
  letter-spacing: 1px; font-weight: 600; margin-bottom: 14px;
}

/* Page title */
.page-title {
  font-size: 20px; font-weight: 700; margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  letter-spacing: -0.3px;
}
.page-title .page-sub { font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 400; margin-top: 4px; letter-spacing: 0; }

/* Utils */
.scroll { max-height: 400px; overflow-y: auto; }
.loading { text-align: center; padding: 50px; color: rgba(255,255,255,0.5); font-size: 14px; }
.loading::after { content: ""; display: block; width: 24px; height: 24px; margin: 16px auto 0; border: 2px solid rgba(139,92,246,0.3); border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.pill { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 10px; font-weight: 600; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* Tabs (inside content) */
.tab {
  padding: 7px 16px; border-radius: 8px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.4);
  transition: all 0.2s; display: inline-block;
}
.tab:hover { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.04); }
.tab.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3); color: #3b82f6; }
.tab.active-gold { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #f59e0b; }

/* Login */
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #09090f; }
.login-box {
  width: 380px; padding: 44px;
  background: rgba(15,15,26,0.8); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.login-box h1 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px; letter-spacing: -0.5px; }
.login-box .sub { font-size: 12px; color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 28px; }
.login-box input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  color: #e0e0e8; font-size: 13px; margin-bottom: 14px; outline: none;
  transition: border-color 0.2s;
}
.login-box input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.login-box button {
  width: 100%; padding: 12px; border-radius: 12px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: white; font-weight: 600; font-size: 14px; border: none; cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 4px 16px rgba(59,130,246,0.3);
}
.login-box button:hover { opacity: 0.9; transform: translateY(-1px); }
.login-box button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive */
/* Mobile menu button */
.mobile-menu-btn { display: none; background: none; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: rgba(255,255,255,0.6); padding: 6px 10px; cursor: pointer; font-size: 18px; }
.mobile-menu-btn:hover { border-color: rgba(255,255,255,0.2); color: white; }

@media (max-width: 900px) {
  .sidebar { width: 60px; }
  .sidebar-header h1, .sidebar-header .sub { display: none; }
  .sidebar-item span:last-child { display: none; }
  .sidebar-group-label { font-size: 7px; padding: 0 8px 4px; text-align: center; }
  .sidebar-item { padding: 10px 0; justify-content: center; }
  .sidebar-item span:first-child { margin: 0; }
  .main-content { margin-left: 60px; }
  .content-area { padding: 16px; }
  .topbar { padding: 0 16px; }
  .grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) !important; gap: 10px; }
  .page-title { font-size: 16px; }
  .card .value { font-size: 18px; }
  table { font-size: 10px; }
  th, td { padding: 4px 6px; }
}

@media (max-width: 640px) {
  .sidebar { display: none; }
  .sidebar.mobile-open { display: block; width: 240px; z-index: 100; box-shadow: 4px 0 30px rgba(0,0,0,0.8); }
  .sidebar.mobile-open .sidebar-header h1,
  .sidebar.mobile-open .sidebar-header .sub { display: block; }
  .sidebar.mobile-open .sidebar-item span:last-child { display: inline; }
  .sidebar.mobile-open .sidebar-group-label { font-size: 9px; padding: 0 20px 8px; text-align: left; }
  .sidebar.mobile-open .sidebar-item { padding: 8px 20px; justify-content: flex-start; }
  .mobile-menu-btn { display: block; }
  .main-content { margin-left: 0; }
  .content-area { padding: 12px; }
  .grid { grid-template-columns: 1fr !important; gap: 8px; }
  .page-title { font-size: 15px; margin-bottom: 12px; padding-bottom: 10px; }
  .page-title .page-sub { font-size: 10px; }
  .card { padding: 12px; border-radius: 10px; }
  .card .value { font-size: 16px; }
  .card .label { font-size: 9px; }
  .topbar-user span:not(.avatar):not(.logout-btn) { display: none; }
  .topbar { height: 46px; }
  table { display: block; overflow-x: auto; white-space: nowrap; }
}

/* Mobile overlay */
.mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 99; }
@media (max-width: 640px) { .mobile-overlay.open { display: block; } }

/* Hidden helpers */
.header { display: none; }
.tabs { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = "";  // same origin

// Export JSON helper
function exportJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename || "export.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ExportBtn({ data, filename, label }) {
  if (!data) return null;
  return (
    <button onClick={() => exportJSON(data, filename)} style={{
      padding:"5px 12px", borderRadius:6, fontSize:10, fontWeight:600,
      background:"transparent", border:"1px solid #1a1a2e", color:"#666",
      cursor:"pointer", transition:"all 0.2s",
    }} onMouseOver={e => { e.target.style.borderColor="#3b82f6"; e.target.style.color="#3b82f6"; }}
       onMouseOut={e => { e.target.style.borderColor="#1a1a2e"; e.target.style.color="#666"; }}>
      {label || "Export JSON"}
    </button>
  );
}

function Tip({ text }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{position:"relative", display:"inline-block", marginLeft:6, cursor:"help"}}
          onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
      <span style={{width:16, height:16, borderRadius:"50%", background:"#1a1a2e", border:"1px solid #2a2a4e",
                    display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#666"}}>?</span>
      {show && (
        <div style={{position:"absolute", bottom:"calc(100% + 8px)", left:"50%", transform:"translateX(-50%)",
                     background:"#1a1a2e", border:"1px solid #2a2a4e", borderRadius:8, padding:"8px 12px",
                     fontSize:11, color:"#aaa", zIndex:100, maxWidth:300,
                     boxShadow:"0 4px 20px rgba(0,0,0,0.5)", lineHeight:1.4,
                     whiteSpace:"normal", minWidth:200}}>
          {text}
        </div>
      )}
    </span>
  );
}

// Patch fetch globally to add auth token
const _origFetch = window.fetch;
window.fetch = function(url, opts = {}) {
  const token = localStorage.getItem("platform_token");
  if (token && typeof url === "string" && url.startsWith("/api/") && !url.includes("/platform/login")) {
    opts.headers = { ...(opts.headers || {}), "Authorization": "Bearer " + token };
  }
  return _origFetch(url, opts).then(r => {
    if (r.status === 401 && typeof url === "string" && !url.includes("/platform/")) {
      localStorage.removeItem("platform_token");
      window.location.reload();
    }
    return r;
  });
};

function useFetch(url, interval = 5000) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(() => {
    fetch(API + url).then(r => r.json()).then(setData).catch(e => setError(e.message));
  }, [url]);
  useEffect(() => { fetch_(); const t = setInterval(fetch_, interval); return () => clearInterval(t); }, [fetch_, interval]);
  return { data, error, refetch: fetch_ };
}

function MC({ label, value, sub, color, tip }) {
  return (
    <div className="card">
      <div className="label">{label}{tip && <Tip text={tip} />}</div>
      <div className={"value " + (color || "")}>{value}</div>
      {sub && <div className="sub">{sub}</div>}
    </div>
  );
}

// ── Conclusions Tab ──
function ConclusionsTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [recentMarkers, setRecentMarkers] = useState([]);

  const load = () => {
    setLoading(true);
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 15000);
    fetch(API + "/api/quant/executive-summary", {signal: ctrl.signal}).then(r => r.json()).then(d => { clearTimeout(timeout); setData(d); setLoading(false); }).catch(() => { clearTimeout(timeout); setLoading(false); });
    // Fetch recent markers with impact (separate, non-blocking)
    fetch(API + "/api/markers/recent-impacts?limit=5")
      .then(r => r.json())
      .then(d => setRecentMarkers(Array.isArray(d) ? d : []))
      .catch(() => setRecentMarkers([]));
  };
  useEffect(() => { load(); }, []);

  if (loading) return <div className="loading">Cargando datos...</div>;
  if (!data) return <div style={{textAlign:"center",padding:40}}><p style={{color:"#888",marginBottom:12}}>No se pudo cargar el resumen</p><button onClick={load} style={{padding:"8px 20px",background:"#1e1b4b",border:"1px solid #4c1d95",borderRadius:8,color:"#a78bfa",cursor:"pointer"}}>Reintentar</button></div>;

  const ss = data.system_status || {};
  const live = data.live_evidence || {};
  const replay = data.replay_evidence || {};
  const sp = data.score_parity || {};
  const jc = data.joint_conclusions || {};
  const nba = data.next_best_action || {};
  const works = data.what_works || [];
  const fails = data.what_fails || [];
  const changes = data.what_to_change || [];
  const dnt = data.do_not_touch || [];
  const dqi = data.data_quality_issues || [];
  const recs = data.top_recommendations || [];

  const edgeColor = (e) => e === "POSITIVE" ? "#22c55e" : e === "NEUTRAL" ? "#eab308" : e === "NEGATIVE" ? "#ef4444" : "#888";
  const confColor = (c) => c === "HIGH" ? "#22c55e" : c === "MEDIUM" ? "#eab308" : "#ef4444";
  const dqColor = (d) => d === "GOOD" ? "#22c55e" : d === "DEGRADED" ? "#eab308" : d === "POOR" ? "#ef4444" : "#888";
  const classColor = (c) => {
    const m = { CONFIRMED: "#22c55e", LIKELY: "#3b82f6", CONFLICTING: "#ef4444", INVALID: "#888", WEAK_EVIDENCE: "#eab308", BLOCKED_BY_DATA_QUALITY: "#f97316" };
    return m[c] || "#888";
  };
  const classBg = (c) => {
    const m = { CONFIRMED: "rgba(34,197,94,0.15)", LIKELY: "rgba(59,130,246,0.15)", CONFLICTING: "rgba(239,68,68,0.15)", INVALID: "rgba(136,136,136,0.15)", WEAK_EVIDENCE: "rgba(234,179,8,0.15)", BLOCKED_BY_DATA_QUALITY: "rgba(249,115,22,0.15)" };
    return m[c] || "rgba(136,136,136,0.15)";
  };
  const prioColor = (p) => p === "CRITICAL" ? "#ef4444" : p === "HIGH" ? "#f97316" : p === "MEDIUM" ? "#eab308" : "#22c55e";

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderColor:"#2a2a1e"}}>
      <div>
        <span style={{color:"#f59e0b"}}>Conclusiones</span>
        <div className="page-sub">Resumen ejecutivo del estado del sistema, evidencias y acciones recomendadas</div>
      </div>
      <div style={{display:"flex", gap:8}}>
        <ExportBtn data={data} filename={"conclusiones_" + new Date().toISOString().split("T")[0] + ".json"} />
        <button className="tab" onClick={load}>Actualizar</button>
      </div>
    </div>

    {/* Hero Banner */}
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:16}}>
      <div className="card" style={{borderColor: edgeColor(ss.edge_status), textAlign:"center", padding:20}}>
        <div className="label">Estado del Edge <Tip text="Indica si el sistema tiene ventaja estadistica real. POSITIVE = ganando, NEGATIVE = perdiendo, INCONCLUSIVE = insuficientes datos." /></div>
        <div style={{fontSize:28, fontWeight:800, color: edgeColor(ss.edge_status), marginTop:4}}>{ss.edge_status || "?"}</div>
        <div className="sub" style={{marginTop:4}}>{live.trades || 0} trades analizados</div>
      </div>
      <div className="card" style={{borderColor: confColor(ss.confidence), textAlign:"center", padding:20}}>
        <div className="label">Confianza <Tip text="Nivel de confianza en las conclusiones. Depende del numero de trades, cobertura de scores y datos de replay." /></div>
        <div style={{fontSize:28, fontWeight:800, color: confColor(ss.confidence), marginTop:4}}>{ss.confidence || "?"}</div>
        <div className="sub" style={{marginTop:4}}>Cobertura actual: {((sp.post_diagnostics_coverage||{}).trade_coverage_pct ?? sp.coverage_pct) ?? 0}%</div>
        <div className="sub" style={{marginTop:2, fontSize:10, color:"#666"}}>Global: {sp.coverage_pct || 0}%</div>
      </div>
      <div className="card" style={{borderColor: dqColor(ss.data_quality), textAlign:"center", padding:20}}>
        <div className="label">Calidad de Datos <Tip text="Estado de la calidad de los datos recibidos. GOOD = todo correcto, POOR = faltan scores o hay inconsistencias." /></div>
        <div style={{fontSize:28, fontWeight:800, color: dqColor(ss.data_quality), marginTop:4}}>{ss.data_quality || "?"}</div>
        <div className="sub" style={{marginTop:4}}>Real: {sp.real_status || sp.status || "?"}</div>
      </div>
    </div>

    {/* Joint Conclusion Badge */}
    <div className="card" style={{marginBottom:16, borderColor: classColor(jc.classification), padding:"14px 20px"}}>
      <div style={{display:"flex", alignItems:"center", gap:12}}>
        <span style={{padding:"4px 14px", borderRadius:20, fontWeight:700, fontSize:12, background: classBg(jc.classification), color: classColor(jc.classification)}}>{jc.classification || "?"}</span>
        <span style={{fontSize:12, color:"#bbb"}}>{jc.reasoning}</span>
      </div>
    </div>

    {/* 4 Column Cards: Works / Fails / Change / Don't Touch */}
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:12, marginBottom:16}}>
      <div className="card" style={{borderTop:"3px solid #22c55e"}}>
        <div className="label" style={{color:"#22c55e", marginBottom:8}}>Que Funciona</div>
        {works.length === 0 && <div style={{fontSize:11, color:"#555"}}>No clear winners yet</div>}
        {works.map((w, i) => <div key={i} style={{fontSize:10, color:"#aaa", padding:"3px 0", borderBottom:"1px solid #0f0f1a"}}>{w}</div>)}
      </div>
      <div className="card" style={{borderTop:"3px solid #ef4444"}}>
        <div className="label" style={{color:"#ef4444", marginBottom:8}}>Que Falla</div>
        {fails.length === 0 && <div style={{fontSize:11, color:"#555"}}>Nothing critical failing</div>}
        {fails.map((f, i) => <div key={i} style={{fontSize:10, color:"#aaa", padding:"3px 0", borderBottom:"1px solid #0f0f1a"}}>{f}</div>)}
      </div>
      <div className="card" style={{borderTop:"3px solid #3b82f6"}}>
        <div className="label" style={{color:"#3b82f6", marginBottom:8}}>Que Cambiar</div>
        {changes.length === 0 && <div style={{fontSize:11, color:"#555"}}>No changes recommended</div>}
        {changes.map((c, i) => (
          <div key={i} style={{fontSize:10, padding:"4px 0", borderBottom:"1px solid #0f0f1a"}}>
            <span style={{color: c.priority === "high" ? "#f97316" : c.priority === "medium" ? "#eab308" : "#3b82f6", fontWeight:600}}>[{c.priority}]</span>
            <span style={{color:"#ccc", marginLeft:4}}>{c.title}</span>
            <div style={{color:"#666", fontSize:9, marginTop:2}}>{c.action}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{borderTop:"3px solid #a855f7"}}>
        <div className="label" style={{color:"#a855f7", marginBottom:8}}>No Tocar</div>
        {dnt.length === 0 && <div style={{fontSize:11, color:"#555"}}>Need more data</div>}
        {dnt.map((d, i) => <div key={i} style={{fontSize:10, color:"#aaa", padding:"3px 0", borderBottom:"1px solid #0f0f1a"}}>{d}</div>)}
      </div>
    </div>

    {/* Evidence Split: Live vs Replay */}
    <h3 className="section-title">Evidencia <Tip text="Datos reales del bot (live) y datos historicos (replay) que respaldan las conclusiones." /></h3>
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16}}>
      <div className="card" style={{borderTop:"3px solid #3b82f6"}}>
        <div className="label" style={{color:"#3b82f6", marginBottom:8}}>Live Trades</div>
        {live.status === "NO_DATA" ? <div style={{color:"#555", fontSize:11}}>No live data</div> : (<>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
            <div><span style={{fontSize:9, color:"#666"}}>Trades</span><div style={{fontSize:16, fontWeight:700}}>{live.trades}</div></div>
            <div><span style={{fontSize:9, color:"#666"}}>Win Rate</span><div style={{fontSize:16, fontWeight:700, color: live.winrate >= 50 ? "#22c55e" : "#ef4444"}}>{live.winrate}%</div></div>
            <div><span style={{fontSize:9, color:"#666"}}>Expectancy</span><div style={{fontSize:16, fontWeight:700, color: live.expectancy >= 0 ? "#22c55e" : "#ef4444"}}>${live.expectancy}</div></div>
            <div><span style={{fontSize:9, color:"#666"}}>Profit Factor</span><div style={{fontSize:16, fontWeight:700, color: live.profit_factor >= 1 ? "#22c55e" : "#ef4444"}}>{live.profit_factor}</div></div>
            <div><span style={{fontSize:9, color:"#666"}}>Net PnL</span><div style={{fontSize:16, fontWeight:700, color: live.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>${live.net_pnl}</div></div>
            <div><span style={{fontSize:9, color:"#666"}}>Max DD</span><div style={{fontSize:16, fontWeight:700, color:"#ef4444"}}>${live.max_drawdown}</div></div>
          </div>
          <div style={{display:"flex", gap:12, marginTop:8, fontSize:10, color:"#666"}}>
            <span>W: {live.wins} / L: {live.losses}</span>
            <span>Avg W: ${live.avg_win} / L: ${live.avg_loss}</span>
            <span>Fee killed: {live.fee_killed}</span>
          </div>
        </>)}
      </div>
      <div className="card" style={{borderTop:"3px solid #a855f7"}}>
        <div className="label" style={{color:"#a855f7", marginBottom:8}}>Replay (Historical)</div>
        <div style={{textAlign:"center", padding:20}}>
          <div style={{fontSize:14, color: replay.status === "DATA_AVAILABLE" ? "#a855f7" : "#555", fontWeight:600}}>{replay.status}</div>
          <div style={{fontSize:11, color:"#444", marginTop:6}}>{replay.note}</div>
          {replay.files > 0 && (
            <div style={{fontSize:10, color:"#666", marginTop:6}}>{replay.files} files, {replay.days} days, {replay.coins} coins</div>
          )}
        </div>
      </div>
    </div>

    {/* Score Parity */}
    <h3 className="section-title">Paridad de Scores <Tip text="Verifica que los scores de las senales coinciden entre live y replay. Discrepancias indican problemas de datos." /></h3>
    <div className="card" style={{marginBottom:16, borderColor: sp.status === "OK" ? "#22c55e" : sp.status === "DEGRADED" ? "#eab308" : sp.status === "NO_DATA" ? "#888" : "#ef4444"}}>
      <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:8}}>
        <span className={"tag " + (sp.status === "OK" ? "tag-green" : sp.status === "DEGRADED" ? "tag-yellow" : sp.status === "NO_DATA" ? "tag-blue" : "tag-red")}>{sp.status}</span>
        <span style={{fontSize:12, color:"#aaa"}}>{sp.details}</span>
        <span style={{fontSize:11, color:"#888", marginLeft:"auto"}}>Coverage: {sp.coverage_pct || 0}%</span>
      </div>

      {/* Coverage breakdown: legacy vs post-diagnostics */}
      {(sp.legacy_stats || sp.post_diagnostics_coverage) && (() => {
        const pd = sp.post_diagnostics_coverage || {};
        const ls = sp.legacy_stats || {};
        const pdTradePct = pd.trade_coverage_pct ?? 0;
        const globalPct = sp.coverage_pct ?? 0;
        const realStatus = sp.real_status || sp.status;
        return (
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10, padding:"8px 0", borderBottom:"1px solid #1a1a2e"}}>
            <div>
              <div style={{fontSize:9, color:"#666", marginBottom:2}}>Cobertura global</div>
              <div style={{fontSize:16, fontWeight:700, color:"#eab308"}}>{globalPct}%</div>
              <div style={{fontSize:9, color:"#555"}}>incluye datos legacy</div>
            </div>
            <div>
              <div style={{fontSize:9, color:"#666", marginBottom:2}}>Cobertura actual</div>
              <div style={{fontSize:16, fontWeight:700, color: pdTradePct >= 90 ? "#22c55e" : pdTradePct >= 50 ? "#eab308" : "#ef4444"}}>{pd.trade_count > 0 ? pdTradePct + "%" : "—"}</div>
              <div style={{fontSize:9, color:"#555"}}>desde entry diagnostics</div>
            </div>
            <div>
              <div style={{fontSize:9, color:"#666", marginBottom:2}}>Trades legacy | actuales</div>
              <div style={{fontSize:14, fontWeight:700, color:"#aaa"}}>{ls.legacy_trades ?? "?"} <span style={{color:"#555"}}>|</span> {pd.trade_count ?? "?"}</div>
              <div style={{fontSize:9, color: realStatus === "OK" ? "#22c55e" : realStatus === "DEGRADED" ? "#eab308" : "#ef4444"}}>Real status: {realStatus || "?"}</div>
            </div>
          </div>
        );
      })()}

      {sp.trade_scores && sp.trade_scores.total > 0 && (
        <div style={{display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:8, marginTop:8}}>
          <div><span style={{fontSize:9, color:"#666"}}>Trade Signal</span><div style={{fontSize:13, fontWeight:600, color: sp.trade_scores.signal_score_pct >= 80 ? "#22c55e" : "#eab308"}}>{sp.trade_scores.signal_score_pct}%</div></div>
          <div><span style={{fontSize:9, color:"#666"}}>Trade Trend</span><div style={{fontSize:13, fontWeight:600, color: sp.trade_scores.trend_score_pct >= 80 ? "#22c55e" : "#eab308"}}>{sp.trade_scores.trend_score_pct}%</div></div>
          <div><span style={{fontSize:9, color:"#666"}}>Trade Micro</span><div style={{fontSize:13, fontWeight:600, color: sp.trade_scores.micro_score_pct >= 80 ? "#22c55e" : "#eab308"}}>{sp.trade_scores.micro_score_pct}%</div></div>
          <div><span style={{fontSize:9, color:"#666"}}>All Present</span><div style={{fontSize:13, fontWeight:600, color: sp.trade_scores.all_present_pct >= 80 ? "#22c55e" : "#ef4444"}}>{sp.trade_scores.all_present_pct}%</div></div>
          <div><span style={{fontSize:9, color:"#666"}}>All Zero</span><div style={{fontSize:13, fontWeight:600, color: sp.trade_scores.all_zero_pct <= 5 ? "#22c55e" : "#ef4444"}}>{sp.trade_scores.all_zero_pct}%</div></div>
        </div>
      )}
      {sp.anomalies && sp.anomalies.length > 0 && (
        <div style={{marginTop:8}}>
          {sp.anomalies.map((a, i) => (
            <div key={i} style={{fontSize:10, padding:"2px 0", color: a.severity === "critical" ? "#ef4444" : "#eab308"}}>
              [{a.severity}] {a.code}: {a.message}
            </div>
          ))}
        </div>
      )}
    </div>

    {/* Data Quality Issues */}
    {dqi.length > 0 && (<>
      <h3 className="section-title">Problemas de Calidad <Tip text="Incidencias detectadas en los datos: scores faltantes, inconsistencias o anomalias." /></h3>
      <div className="card" style={{marginBottom:16}}>
        {dqi.map((issue, i) => (
          <div key={i} style={{fontSize:11, padding:"3px 0", color:"#eab308"}}>{issue}</div>
        ))}
      </div>
    </>)}

    {/* Cambios recientes con impacto */}
    {recentMarkers.length > 0 && (<>
      <h3 className="section-title">Cambios Recientes con Impacto <Tip text="Ultimos 5 cambios marcados con su impacto medido (20 trades antes vs 20 despues). Permite ver si tus ajustes recientes han mejorado o empeorado los resultados." /></h3>
      <div className="card scroll" style={{marginBottom:16}}>
        <table>
          <thead><tr>
            <th>Cuando</th>
            <th>Categoria</th>
            <th>Etiqueta</th>
            <th style={{textAlign:"center"}}>Estado</th>
            <th style={{textAlign:"right"}}>Δ WR</th>
            <th style={{textAlign:"right"}}>Δ Expectancy</th>
            <th style={{textAlign:"right"}}>Δ SL%</th>
          </tr></thead>
          <tbody>
            {recentMarkers.map(m => {
              const imp = m.impact_data || {};
              const sColor = m.impact_status === "IMPROVED" ? "#22c55e" : m.impact_status === "WORSENED" ? "#ef4444" : "#eab308";
              const dExp = imp.delta_expectancy;
              const dWr = imp.delta_wr;
              const dSl = imp.delta_sl_rate;
              const fmt = (v, suffix) => v == null ? "-" : (v > 0 ? "+" : "") + v + (suffix || "");
              return (
                <tr key={m.id}>
                  <td style={{fontSize:10, color:"#666"}}>{m.timestamp ? new Date(m.timestamp).toLocaleString("es-ES", {day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"}) : "-"}</td>
                  <td style={{fontSize:10, color:"#888"}}>{m.category}</td>
                  <td style={{fontSize:11, fontWeight:600, maxWidth:280, overflow:"hidden", textOverflow:"ellipsis"}} title={m.label}>{m.label}</td>
                  <td style={{textAlign:"center"}}><span className="tag" style={{background: sColor + "20", color: sColor, border:"1px solid " + sColor + "40"}}>{m.impact_status || "PENDING"}</span></td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10, color: dWr > 0 ? "#22c55e" : dWr < 0 ? "#ef4444" : "#888"}}>{fmt(dWr, "%")}</td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10, fontWeight:600, color: dExp > 0 ? "#22c55e" : dExp < 0 ? "#ef4444" : "#888"}}>{fmt(dExp)}</td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10, color: dSl < 0 ? "#22c55e" : dSl > 0 ? "#ef4444" : "#888"}}>{fmt(dSl, "%")}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Cola de Acciones */}
    {recs.length > 0 && (<>
      <h3 className="section-title">Cola de Acciones ({recs.length})</h3>
      <div className="card scroll" style={{marginBottom:16}}>
        <table>
          <thead><tr><th>Priority</th><th>Type</th><th>Title</th><th>Action</th><th>Evidence</th></tr></thead>
          <tbody>
            {recs.map((r, i) => (
              <tr key={i}>
                <td><span className={"tag " + (r.confidence === "high" ? "tag-green" : r.confidence === "medium" ? "tag-yellow" : "tag-blue")}>{r.confidence}</span></td>
                <td><span className={"tag " + (r.type === "recommendation" ? "tag-blue" : r.type === "warning" ? "tag-yellow" : "tag-green")}>{r.type}</span></td>
                <td style={{fontWeight:600, fontSize:11}}>{r.title}</td>
                <td style={{fontSize:10, color:"#3b82f6"}}>{r.action}</td>
                <td style={{fontSize:10, color:"#888"}}>{r.evidence}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Siguiente Accion Prioritaria */}
    <div className="card" style={{borderColor: prioColor(nba.priority), background:"#0a0a12", padding:20}}>
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:8}}>
        <span style={{fontSize:10, fontWeight:700, color: prioColor(nba.priority), textTransform:"uppercase", letterSpacing:0.5}}>Siguiente Accion Prioritaria</span>
        <span className={"tag " + (nba.priority === "CRITICAL" ? "tag-red" : nba.priority === "HIGH" ? "tag-yellow" : "tag-green")}>{nba.priority}</span>
        {nba.category && <span style={{fontSize:9, color:"#555"}}>[{nba.category}]</span>}
      </div>
      <div style={{fontSize:14, fontWeight:700, color:"#e0e0e8"}}>{nba.action}</div>
      <div style={{fontSize:11, color:"#888", marginTop:4}}>{nba.reasoning}</div>
    </div>
  </>);
}

// ── System Tab ──
function SystemTab() {
  const _title = "Sistema";
  const { data: status } = useFetch("/api/status", 3000);
  const { data: disk } = useFetch("/api/system/disk", 10000);

  if (!status || !disk) return <div className="loading">Loading...</div>;

  const d = disk.disk || {};
  const g = disk.growth || {};
  const dirs = disk.directories || {};
  const sev = d.severity || "ok";

  return (<>
    <div className="page-title">Sistema<div className="page-sub">Salud tecnica, disco, CPU, RAM, estado de conexiones</div></div>
    <div className="grid">
      <MC label="Status" value={status.status?.toUpperCase()} color="green" />
      <MC label="Coins" value={status.features?.coins_tracked || 0} sub="tracking" color="purple" />
      <MC label="Events" value={(status.features?.events_ingested || 0).toLocaleString()} sub="ingested" />
      <MC label="Features" value={status.features?.total_features || 0} sub="computed" color="blue" />
    </div>

    <h3 className="section-title">Uso de Disco <Tip text="Espacio ocupado en el servidor por datos, logs y base de datos. Si supera el 85% se activa una alerta." /></h3>
    <div className="grid">
      <MC label="Total" value={d.total_gb + " GB"} />
      <MC label="Used" value={d.used_gb + " GB"} sub={d.usage_pct + "%"} color={sev} />
      <MC label="Free" value={d.free_gb + " GB"} />
      <MC label="Status" value={sev.toUpperCase()} color={sev} />
    </div>
    <div className="card" style={{marginBottom: 16}}>
      <div className="progress-bar">
        <div className="progress-fill" style={{
          width: d.usage_pct + "%",
          background: sev === "ok" ? "#22c55e" : sev === "warning" ? "#eab308" : "#ef4444"
        }} />
      </div>
      <div style={{display: "flex", justifyContent: "space-between", marginTop: 8}}>
        <span className="sub">Growth 24h: {g.growth_24h_gb} GB</span>
        <span className="sub">Est. {g.estimated_days_remaining} days remaining</span>
      </div>
    </div>

    <h3 className="section-title">Uso por Directorio <Tip text="Desglose del espacio ocupado por cada directorio: raw, features, logs, etc." /></h3>
    <div className="card">
      <table>
        <thead><tr><th>Directory</th><th style={{textAlign:"right"}}>Size</th><th style={{textAlign:"right"}}>Files</th></tr></thead>
        <tbody>
          {Object.entries(dirs).map(([name, info]) => (
            <tr key={name}>
              <td>{name}</td>
              <td style={{textAlign:"right"}}>{info.size_gb} GB</td>
              <td style={{textAlign:"right"}}>{info.file_count >= 0 ? info.file_count : "-"}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </>);
}

// ── Features Tab ──
function FeaturesTab() {
  const { data: features } = useFetch("/api/features", 5000);
  const [selected, setSelected] = useState(null);

  if (!features) return <div className="loading">Loading...</div>;
  const coins = Object.keys(features);

  return (<>
    <div className="page-title">Features<div className="page-sub">48 features en tiempo real por moneda</div></div>
    <div style={{display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 16}}>
      {coins.map(c => (
        <button key={c} className={"tab " + (selected === c ? "active" : "")} onClick={() => setSelected(c)}>{c}</button>
      ))}
    </div>
    {selected && features[selected] ? (
      <div className="card scroll">
        <table>
          <thead><tr><th>Feature</th><th style={{textAlign:"right"}}>Value</th></tr></thead>
          <tbody>
            {Object.entries(features[selected]).filter(([k]) => !["coin","timestamp_ms","version"].includes(k)).map(([k, v]) => (
              <tr key={k}>
                <td>{k}</td>
                <td style={{textAlign:"right", color: Number(v) > 0 ? "#22c55e" : Number(v) < 0 ? "#ef4444" : "#888"}}>{typeof v === "number" ? v.toFixed(6) : String(v)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    ) : <div className="loading">Select a coin</div>}
  </>);
}

// ── Regimes Tab ──
function RegimesTab() {
  const { data } = useFetch("/api/regimes", 5000);

  if (!data) return <div className="loading">Loading...</div>;

  const regimeColor = (r) => {
    if (r?.includes("trending_up")) return "tag-green";
    if (r?.includes("trending_down")) return "tag-red";
    if (r?.includes("high_vol")) return "tag-yellow";
    if (r?.includes("quiet")) return "tag-blue";
    return "tag-purple";
  };

  return (<>
    <div className="page-title">Regimenes de Mercado<div className="page-sub">Clasificacion actual: trending, choppy, high vol, quiet</div></div>
    <div className="card">
      <table>
        <thead><tr><th>Coin</th><th>Regime</th><th style={{textAlign:"right"}}>Confianza</th><th style={{textAlign:"right"}}>Trend</th><th style={{textAlign:"right"}}>Volatility</th></tr></thead>
        <tbody>
          {Object.entries(data).map(([coin, s]) => (
            <tr key={coin}>
              <td className="purple">{coin}</td>
              <td><span className={"tag " + regimeColor(s.regime)}>{s.regime}</span></td>
              <td style={{textAlign:"right"}}>{(s.confidence * 100).toFixed(0)}%</td>
              <td style={{textAlign:"right", color: s.trend_strength > 0 ? "#22c55e" : s.trend_strength < 0 ? "#ef4444" : "#888"}}>{s.trend_strength?.toFixed(4)}</td>
              <td style={{textAlign:"right"}}>{s.volatility_level?.toFixed(4)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </>);
}

// ── Contract Tab ──
function ContractTab() {
  const { data } = useFetch("/api/feature-contract", 30000);

  if (!data) return <div className="loading">Loading...</div>;

  return (<>
    <div className="page-title">Contrato de Features<div className="page-sub">Definicion formal de todas las features del sistema</div></div>
    <div className="grid">
      <MC label="Total Features" value={data.total_features} color="blue" />
      <MC label="Version" value={data.version?.substring(0, 30) + "..."} />
      {Object.entries(data.groups || {}).map(([g, n]) => (
        <MC key={g} label={g} value={n} sub="features" />
      ))}
    </div>

    <div className="card scroll" style={{marginTop: 16}}>
      <table>
        <thead><tr><th>Name</th><th>Group</th><th>Source</th><th style={{textAlign:"right"}}>Window</th><th>Description</th></tr></thead>
        <tbody>
          {(data.features || []).map((f, i) => (
            <tr key={i}>
              <td className="blue">{f.name}</td>
              <td><span className={"tag tag-purple"}>{f.group}</span></td>
              <td>{f.source}</td>
              <td style={{textAlign:"right"}}>{f.window_sec > 0 ? f.window_sec + "s" : "-"}</td>
              <td style={{color: "#666", fontSize: 10}}>{f.description}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </>);
}

// ── Daily Report Tab ──
function DailyReportTab() {
  const [reports, setReports] = useState({});  // date -> report
  const [selected, setSelected] = useState(null);  // selected date
  const [loading, setLoading] = useState(false);
  const [days, setDays] = useState([]);  // list of available dates
  const [page, setPage] = useState(0);  // pagination
  const PAGE_SIZE = 15;
  const AUTO_LOAD_DAYS = 7;  // auto-load last 7 days

  // Generate list of last 90 days, auto-load last 7
  useEffect(() => {
    const d = [];
    for (let i = 0; i < 90; i++) {
      const date = new Date(Date.now() - i * 86400000);
      d.push(date.toISOString().split("T")[0]);
    }
    setDays(d);
    // Auto-load last 7 days
    for (let i = 0; i < AUTO_LOAD_DAYS && i < d.length; i++) {
      loadDayQuiet(d[i]);
    }
    setSelected(d[0]);
  }, []);

  const loadDayQuiet = (dateStr) => {
    fetch(API + "/api/daily-report/" + dateStr).then(r => r.json()).then(d => {
      setReports(prev => ({...prev, [dateStr]: d}));
    }).catch(() => {});
  };

  const loadDay = (dateStr) => {
    if (reports[dateStr]) { setSelected(dateStr); return; }
    setLoading(true);
    setSelected(dateStr);
    fetch(API + "/api/daily-report/" + dateStr).then(r => r.json()).then(d => {
      setReports(prev => ({...prev, [dateStr]: d}));
      setLoading(false);
    }).catch(() => setLoading(false));
  };

  const report = selected ? reports[selected] : null;

  const check = (ok) => ok ? "✓" : "✗";
  const checkColor = (ok) => ok ? "#22c55e" : "#ef4444";
  const scoreColor = (s) => s >= 7 ? "#22c55e" : s >= 4 ? "#eab308" : "#ef4444";

  return (<>
    <div className="page-title">Informe Diario <Tip text="Informe diario automatico. Haz click en un dia para ver el detalle completo. Se genera al cargar." /><div className="page-sub">Resumen automatico por dia con comparativa historica</div></div>
    {/* Days table */}
    <div className="card" style={{marginBottom:16}}>
      <table>
        <thead><tr>
          <th>Date</th><th>Day</th><th style={{textAlign:"right"}}>Score</th>
          <th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>Net PnL</th>
          <th style={{textAlign:"right"}}>WR</th><th style={{textAlign:"right"}}>PF</th>
          <th style={{textAlign:"right"}}>Issues</th><th></th>
        </tr></thead>
        <tbody>
          {days.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE).map(d => {
            const r = reports[d];
            const isSelected = selected === d;
            const g = r?.general || {};
            const p = r?.pnl || {};
            const s = r?.scores || {};
            const issueCount = r ? Object.values(r).reduce((sum, sec) => sum + (sec?.issues?.length || 0), 0) : 0;
            return (
              <tr key={d} onClick={() => loadDay(d)} style={{cursor:"pointer", background: isSelected ? "#1a1a3e" : "transparent"}}>
                <td style={{fontWeight: isSelected ? 700 : 400, color: isSelected ? "#3b82f6" : "#e0e0e8"}}>{d}</td>
                <td style={{color:"#666"}}>{r ? r.day_of_week?.substring(0,3) : "..."}</td>
                <td style={{textAlign:"right", color: r ? scoreColor(s.overall || 0) : "#444", fontWeight:600}}>{r ? (s.overall || 0) + "/10" : "-"}</td>
                <td style={{textAlign:"right"}}>{r ? g.trades || 0 : "-"}</td>
                <td style={{textAlign:"right", color: r ? (Number(g.net_pnl) >= 0 ? "#22c55e" : "#ef4444") : "#444"}}>{r ? "$" + (g.net_pnl || 0) : "-"}</td>
                <td style={{textAlign:"right", color: r ? (p.win_rate >= 50 ? "#22c55e" : p.win_rate >= 40 ? "#eab308" : "#ef4444") : "#444"}}>{r ? (p.win_rate || 0) + "%" : "-"}</td>
                <td style={{textAlign:"right"}}>{r ? (p.profit_factor || 0) : "-"}</td>
                <td style={{textAlign:"right", color: issueCount > 0 ? "#eab308" : "#22c55e"}}>{r ? issueCount : "-"}</td>
                <td style={{textAlign:"right"}}>{!r && <span onClick={(e) => { e.stopPropagation(); loadDay(d); }} style={{color:"#666", fontSize:10, cursor:"pointer"}}>cargar</span>}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {/* Pagination */}
      {days.length > PAGE_SIZE && (
        <div style={{display:"flex", justifyContent:"center", alignItems:"center", gap:12, marginTop:12}}>
          <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0}
            style={{padding:"4px 12px", fontSize:11, borderRadius:6, border:"1px solid #333", background:"#1a1a2e", color: page===0?"#444":"#aaa", cursor: page===0?"not-allowed":"pointer"}}>
            ← Anterior
          </button>
          <span style={{fontSize:11, color:"#666"}}>{page + 1} / {Math.ceil(days.length / PAGE_SIZE)}</span>
          <button onClick={() => setPage(Math.min(Math.ceil(days.length / PAGE_SIZE) - 1, page + 1))} disabled={page >= Math.ceil(days.length / PAGE_SIZE) - 1}
            style={{padding:"4px 12px", fontSize:11, borderRadius:6, border:"1px solid #333", background:"#1a1a2e", color: page>=Math.ceil(days.length/PAGE_SIZE)-1?"#444":"#aaa", cursor: page>=Math.ceil(days.length/PAGE_SIZE)-1?"not-allowed":"pointer"}}>
            Siguiente →
          </button>
        </div>
      )}
    </div>

    {loading && <div className="loading">Generating report for {selected}...</div>}

    {report && !loading && (() => {
      const g = report.general || {};
      const sys = report.system || {};
      const integ = report.integration || {};
      const pnl = report.pnl || {};
      const sig = report.signals || {};
      const feat = report.features || {};
      const stor = report.storage || {};
      const trad = report.trading || {};
      const scores = report.scores || {};
      const allIssues = [];
      for (const [section, data] of Object.entries(report)) {
        if (data && typeof data === "object" && data.issues) {
          for (const issue of data.issues) allIssues.push({section, issue});
        }
      }
      return (<>

    {/* Scores */}
    <div className="grid" style={{gridTemplateColumns:"repeat(4, 1fr)"}}>
      <MC label="Overall" value={scores.overall + "/10"} color={scores.overall >= 7 ? "green" : scores.overall >= 4 ? "yellow" : "red"} />
      <MC label="Calidad de Datos" value={scores.data_quality + "/10"} color={scores.data_quality >= 7 ? "green" : "yellow"} />
      <MC label="Trading" value={scores.trading + "/10"} color={scores.trading >= 6 ? "green" : scores.trading >= 4 ? "yellow" : "red"} />
      <MC label="System" value={scores.system + "/10"} color={scores.system >= 8 ? "green" : "yellow"} />
    </div>

    {/* 1. General */}
    <h3 className="section-title" style={{marginTop:16}}>General</h3>
    <div className="grid">
      <MC label="Mode" value={g.mode || "?"} color="purple" />
      <MC label="Trades" value={g.trades || 0} />
      <MC label="PnL Bruto" value={"$" + (g.total_pnl || 0)} color={Number(g.total_pnl) >= 0 ? "green" : "red"} />
      <MC label="Fees" value={"$" + (g.total_fees || 0)} color="yellow" />
      <MC label="PnL Neto" value={"$" + (g.net_pnl || 0)} color={Number(g.net_pnl) >= 0 ? "green" : "red"} />
    </div>

    {/* 2. System */}
    <h3 className="section-title" style={{marginTop:16}}>System</h3>
    <div className="card">
      <div style={{display:"flex", gap:24, flexWrap:"wrap", fontSize:12}}>
        <span style={{color: checkColor(sys.bot_running)}}>{check(sys.bot_running)} Bot running</span>
        <span style={{color: checkColor(sys.platform_running)}}>{check(sys.platform_running)} Platform running</span>
        <span style={{color: checkColor(sys.ws_stable)}}>{check(sys.ws_stable)} WS stable</span>
        <span style={{color: checkColor(sys.cpu_pct < 80)}}>{check(sys.cpu_pct < 80)} CPU {sys.cpu_pct}%</span>
        <span style={{color: checkColor(sys.ram_pct < 85)}}>{check(sys.ram_pct < 85)} RAM {sys.ram_pct}%</span>
      </div>
    </div>

    {/* 3. Integration */}
    <h3 className="section-title" style={{marginTop:16}}>Integration</h3>
    <div className="grid">
      <MC label="Bot Trades" value={integ.bot_trades || 0} />
      <MC label="Platform Trades" value={integ.platform_trades || 0} />
      <MC label="Diff" value={integ.diff_trades || 0} color={integ.diff_trades === 0 ? "green" : "red"} />
      <MC label="Signals" value={integ.signals_received || 0} />
      <MC label="Duplicates" value={integ.duplicates || 0} color={integ.duplicates === 0 ? "green" : "red"} />
    </div>

    {/* 4. PnL */}
    <h3 className="section-title" style={{marginTop:16}}>PnL & Consistency</h3>
    <div className="grid">
      <MC label="Wins" value={pnl.wins || 0} color="green" />
      <MC label="Losses" value={pnl.losses || 0} color="red" />
      <MC label="Win Rate" value={(pnl.win_rate || 0) + "%"} color={pnl.win_rate >= 50 ? "green" : pnl.win_rate >= 40 ? "yellow" : "red"} />
      <MC label="Profit Factor" value={pnl.profit_factor || 0} color={pnl.profit_factor >= 1 ? "green" : "red"} />
      <MC label="Avg W / L" value={"$" + (pnl.avg_win || 0) + " / $" + (pnl.avg_loss || 0)} />
      <MC label="Fee Killed" value={pnl.fee_killed || 0} color={pnl.fee_killed === 0 ? "green" : "red"} />
    </div>

    {/* 5. Signals */}
    <h3 className="section-title" style={{marginTop:16}}>Signals</h3>
    <div className="grid">
      <MC label="ENTER" value={sig.enter || 0} color="green" />
      <MC label="SKIP" value={sig.skip || 0} color="yellow" />
      <MC label="BLOCKED" value={sig.blocked || 0} color="red" />
    </div>

    {/* 6-7. Features & Storage */}
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:16}}>
      <div>
        <h3 className="section-title">Features</h3>
        <div className="card">
          <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:4}}>
            <span>Snapshots today: {feat.snapshots_today || 0}</span>
            <span>Coins tracked: {feat.coins_with_features || 0}</span>
          </div>
        </div>
      </div>
      <div>
        <h3 className="section-title">Storage</h3>
        <div className="card">
          <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:4}}>
            <span>Disk: {stor.disk_pct}% ({stor.disk_used_gb} GB used / {stor.disk_free_gb} GB free)</span>
            <span>Parquet files today: {stor.parquet_files_today}</span>
          </div>
        </div>
      </div>
    </div>

    {/* 8. Trading Analysis */}
    <h3 className="section-title" style={{marginTop:16}}>Trading Analysis</h3>
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
      <div className="card">
        <div className="label" style={{marginBottom:8}}>Best Coins</div>
        {(trad.best_coins || []).map((c, i) => (
          <div key={i} style={{fontSize:11, display:"flex", justifyContent:"space-between"}}>
            <span className="purple">{c.coin}</span>
            <span style={{color:"#22c55e"}}>${c.pnl} ({c.wr}% WR, {c.trades}t)</span>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="label" style={{marginBottom:8}}>Worst Coins</div>
        {(trad.worst_coins || []).map((c, i) => (
          <div key={i} style={{fontSize:11, display:"flex", justifyContent:"space-between"}}>
            <span className="purple">{c.coin}</span>
            <span style={{color:"#ef4444"}}>${c.pnl} ({c.wr}% WR, {c.trades}t)</span>
          </div>
        ))}
      </div>
    </div>

    {/* 9. Problems */}
    {allIssues.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>Problems Detected</h3>
      <div className="card">
        {allIssues.map((p, i) => (
          <div key={i} style={{padding:"3px 0", fontSize:11, color:"#eab308"}}>
            <span style={{color:"#666"}}>[{p.section}]</span> {p.issue}
          </div>
        ))}
      </div>
    </>)}

    {allIssues.length === 0 && (
      <div className="card" style={{marginTop:16, textAlign:"center", color:"#22c55e", padding:20}}>
        No problems detected today
      </div>
    )}

    {/* Exit reasons */}
    {trad.by_exit_reason && trad.by_exit_reason.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>Exit Reasons</h3>
      <div className="card">
        <table><thead><tr><th>Reason</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>PnL</th></tr></thead>
        <tbody>
          {trad.by_exit_reason.map((r, i) => (
            <tr key={i}><td><span className={"tag " + (r.exit_reason === "SL" ? "tag-red" : "tag-green")}>{r.exit_reason}</span></td>
            <td style={{textAlign:"right"}}>{r.trades}</td>
            <td style={{textAlign:"right", color: Number(r.pnl) >= 0 ? "#22c55e" : "#ef4444"}}>${r.pnl}</td></tr>
          ))}
        </tbody></table>
      </div>
    </>)}
      </>);
    })()}
  </>);
}

// ── Research Lab Tab ──
function LabTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("overview");
  const [cfData, setCfData] = useState(null);
  const [rejData, setRejData] = useState(null);
  const [cfgData, setCfgData] = useState(null);
  const [diagData, setDiagData] = useState(null);
  const [eqData, setEqData] = useState(null);

  const load = () => {
    setLoading(true);
    fetch(API + "/api/quant/full").then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
    fetch(API + "/api/quant/counterfactual").then(r => r.json()).then(d => setCfData(d)).catch(() => {});
    fetch(API + "/api/quant/rejections").then(r => r.json()).then(d => setRejData(d)).catch(() => {});
    fetch(API + "/api/quant/config-analysis").then(r => r.json()).then(d => setCfgData(d)).catch(() => {});
    fetch(API + "/api/quant/diagnostic").then(r => r.json()).then(d => setDiagData(d)).catch(() => {});
    fetch(API + "/api/quant/entry-quality").then(r => r.json()).then(d => setEqData(d)).catch(() => {});
  };
  useEffect(() => { load(); }, []);

  if (loading) return <div className="loading">Generating quant report...</div>;
  if (!data) return <div className="loading"><button onClick={load} className="tab active">Load Research Lab</button></div>;

  const m = data.metrics?.global || {};
  const risk = data.metrics?.risk || {};
  const exec = data.metrics?.execution || {};
  const decisions = data.decisions || [];
  const analysis = data.analysis || {};
  const insights = analysis.insights || [];
  const warnings = analysis.warnings || [];
  const recommendations = analysis.recommendations || [];

  const views = ["overview", "metrics", "analysis", "score", "mode", "config", "rejections", "counterfactual", "diagnostic", "quality", "experiments", "decisions"];

  return (<>
    <div className="page-title">Research Lab <Tip text="Vision general del rendimiento con KPIs principales y decisiones automaticas del sistema." /><div className="page-sub">Analisis cuantitativo: metricas, experiments, decisions</div></div>
    <div style={{display:"flex", gap:4, flexWrap:"wrap", marginBottom:16}}>
      {views.map(v => (
        <button key={v} className={"tab " + (view === v ? "active" : "")} onClick={() => setView(v)}>{v.charAt(0).toUpperCase() + v.slice(1)}</button>
      ))}
      <ExportBtn data={(() => {
        // Build comprehensive export with ALL research lab data
        const byMode = data?.metrics?.by_mode || {};
        const modesPresent = Object.keys(byMode).filter(k => k !== "unknown");
        const cfgVersions = cfgData?.by_config_version ? Object.keys(cfgData.by_config_version).filter(k => k !== "unknown") : [];
        return {
          overview: {
            global: data?.metrics?.global || {},
            risk: data?.metrics?.risk || {},
            execution: data?.metrics?.execution || {},
            insights: data?.analysis?.insights || [],
            warnings: data?.analysis?.warnings || [],
            recommendations: data?.analysis?.recommendations || [],
          },
          metrics: data?.metrics || {},
          analysis: data?.analysis || {},
          score: {
            coverage: (() => {
              const trades = data?.metrics?.global?.trades || 0;
              const withScore = Object.entries(data?.metrics?.by_score || {}).reduce((s, [k, v]) => k !== "0-40" ? s + (v?.trades || 0) : s, 0);
              return { total_trades: trades, trades_with_score: withScore, coverage_pct: trades > 0 ? Math.round(withScore / trades * 100) : 0 };
            })(),
            by_score_bucket: data?.metrics?.by_score || {},
            by_mode: byMode,
            counterfactual_preview: cfData || { status: "not_loaded" },
          },
          mode: {
            by_mode: byMode,
            modes_present: modesPresent,
          },
          config: cfgData || { status: "no_data_yet", message: "No hay suficientes trades con config_snapshot todavia" },
          rejections: rejData || { status: "no_data_yet", message: "No hay senales bloqueadas todavia" },
          counterfactual: cfData || { status: "no_data_yet" },
          experiments: { note: "Run via POST /api/quant/experiment" },
          decisions: (data?.decisions || []),
          meta: {
            generated_at: new Date().toISOString(),
            source: "research_lab",
            modes_present: modesPresent,
            config_versions_present: cfgVersions,
            has_unknown_config_rows: cfgVersions.includes("unknown") || Object.keys(cfgData?.by_config_version || {}).includes("unknown"),
            total_trades: data?.metrics?.global?.trades || 0,
            total_signals: rejData?.totals ? Object.values(rejData.totals).reduce((s, t) => s + (t.cnt || 0), 0) : 0,
          },
        };
      })()} filename={"research_lab_full_" + new Date().toISOString().split("T")[0] + ".json"} label="Export JSON Completo" />
      <button className="tab" onClick={load}>Refresh</button>
    </div>

    {view === "overview" && (<>
      <div className="grid" style={{gridTemplateColumns:"repeat(5, 1fr)"}}>
        <MC label="Trades" value={m.trades || 0} sub={(m.wins || 0) + "W / " + (m.losses || 0) + "L"} />
        <MC label="Win Rate" value={(m.winrate ? (m.winrate * 100).toFixed(1) : "0") + "%"} color={m.winrate >= 0.5 ? "green" : m.winrate >= 0.4 ? "yellow" : "red"} />
        <MC label="PnL Neto" value={"$" + (m.net_pnl || 0)} color={Number(m.net_pnl) >= 0 ? "green" : "red"} />
        <MC label="Expectancy" value={"$" + (m.expectancy || 0)} color={Number(m.expectancy) >= 0 ? "green" : "red"} />
        <MC label="Profit Factor" value={m.profit_factor || 0} color={Number(m.profit_factor) >= 1 ? "green" : "red"} />
      </div>
      <div className="grid" style={{gridTemplateColumns:"repeat(4, 1fr)", marginTop:12}}>
        <MC label="Avg Win" value={"$" + (m.avg_win || 0)} color="green" />
        <MC label="Avg Loss" value={"$" + (m.avg_loss || 0)} color="red" />
        <MC label="Max Drawdown" value={"$" + (risk.max_drawdown || 0)} color="red" />
        <MC label="Sharpe" value={risk.sharpe || 0} color={Number(risk.sharpe) > 0 ? "green" : "red"} />
      </div>

      {/* Decisions */}
      {decisions.length > 0 && (<>
        <h3 className="section-title" style={{marginTop:16}}>Decisions ({decisions.length})</h3>
        <div className="card scroll">
          {decisions.map((d, i) => (
            <div key={i} style={{padding:"8px 0", borderBottom:"1px solid #1a1a2e"}}>
              <div style={{display:"flex", gap:8, alignItems:"center", marginBottom:4}}>
                <span className={"tag " + (d.type === "recommendation" ? "tag-blue" : d.type === "warning" ? "tag-yellow" : "tag-green")}>{d.type}</span>
                <span style={{fontWeight:600, fontSize:12}}>{d.title}</span>
                <span className={"pill " + (d.confidence === "high" ? "tag-green" : d.confidence === "medium" ? "tag-yellow" : "tag-blue")} style={{marginLeft:"auto", fontSize:9}}>{d.confidence}</span>
              </div>
              <div style={{fontSize:10, color:"#888", marginLeft:8}}>
                <div>Evidence: {d.evidence}</div>
                <div>Action: <span style={{color:"#3b82f6"}}>{d.action}</span></div>
                <div>Impact: {d.expected_impact}</div>
              </div>
            </div>
          ))}
        </div>
      </>)}

      {/* Insights/Warnings */}

        <h3 className="section-title" style={{marginTop:16}}>Insights</h3>

          <thead><tr><th>Coin</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>WR</th><th style={{textAlign:"right"}}>Avg PnL</th><th style={{textAlign:"right"}}>Total PnL</th><th style={{textAlign:"right"}}>PF</th></tr></thead>
          <tbody>
            {Object.entries(data.metrics?.by_coin || {}).map(([coin, d]) => (
              <tr key={coin}><td className="purple">{coin}</td><td style={{textAlign:"right"}}>{d.trades}</td>
              <td style={{textAlign:"right", color: d.winrate >= 0.5 ? "#22c55e" : "#ef4444"}}>{(d.winrate*100).toFixed(0)}%</td>
              <td style={{textAlign:"right", color: d.avg_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.avg_pnl}</td>
              <td style={{textAlign:"right", color: d.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.net_pnl}</td>
              <td style={{textAlign:"right"}}>{d.profit_factor}</td></tr>
            ))}
          </tbody>
        </table>
