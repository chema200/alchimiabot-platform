              })()}

              {/* Section: Recent exits for this variant — filtered from main exits state */}
              {(() => {
                const myExits = (exits || []).filter(x => x.variant === v.name).slice(0, 8);
                if (myExits.length === 0) return null;
                return (
                  <>
                    <div style={{fontSize:10, fontWeight:600, color:"#22d3ee", margin:"14px 0 6px", textTransform:"uppercase", letterSpacing:0.6}}>
                      Últimos cierres simulados ({myExits.length})
                    </div>
                    <table style={{width:"100%", fontSize:10, fontFamily:"monospace"}}>
                      <thead><tr style={{color:"#666"}}>
                        <th style={{textAlign:"left", padding:"3px 4px"}}>coin</th>
                        <th style={{textAlign:"left"}}>vs prod</th>
                        <th style={{textAlign:"right"}}>delta gross</th>
                        <th style={{textAlign:"right"}}>hold</th>
                      </tr></thead>
                      <tbody>
                        {myExits.map((x, i) => (
                          <tr key={i} style={{borderTop:"1px solid #181828"}}>
                            <td style={{padding:"3px 4px", color:"#e0e0e8"}}>{x.coin}</td>
                            <td style={{color:"#888"}}>{x.kind || "—"}</td>
                            <td style={{textAlign:"right", color: (x.deltaGrossPnl ?? 0) >= 0 ? "#22c55e" : "#ef4444"}}>
                              {x.deltaGrossPnl != null ? (x.deltaGrossPnl >= 0 ? "+" : "") + Number(x.deltaGrossPnl).toFixed(3) : "—"}
                            </td>
                            <td style={{textAlign:"right", color:"#888"}}>{x.simHoldSec ? Math.round(x.simHoldSec/60)+"m" : "—"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </>
                );
              })()}
            </div>

            {/* Action buttons row */}
            <div style={{display:"flex", gap:8, flexWrap:"wrap", padding:"12px 16px",
                         borderTop:"1px solid #1f1f30", background:"#0a0a13", justifyContent:"flex-end"}}>
              <button onClick={() => { promoteToBot(v.name); }}
                style={{padding:"7px 14px", fontSize:11, background:"#1a1a2e", border:"1px solid #a78bfa", borderRadius:5, color:"#a78bfa", cursor:"pointer", fontWeight:600}}>
                → Promover al bot
              </button>
              <button onClick={() => editVariant(v)}
                style={{padding:"7px 14px", fontSize:11, background:"#1a1a2e", border:"1px solid #3b82f6", borderRadius:5, color:"#3b82f6", cursor:"pointer"}}>
                ✎ {t("shadow.edit")}

              <button onClick={() => { setDetailsModal(null); openDeleteModal(v.name); }}

                🗑 {t("shadow.remove")}
              </button>
            </div>
          </div>
        </div>
      );
    })()}

    {/* ── Library modal (2026-04-27) ─────────────────────────────── */}
    {showLibrary && (
      <div onClick={() => setShowLibrary(false)}
        style={{position:"fixed", inset:0, background:"rgba(3,4,10,0.78)", zIndex:1000,
                display:"flex", alignItems:"center", justifyContent:"center",

    {/* ── B1 Confluence Variants (V65) ─────────────────────────────────
        Removed 2026-04-28 from the global Shadow Mode tab — the variants
        now live in the unified active variants table (with the B1 badge)
        scoped per mode. The legacy ConfluenceVariantsSection component is
        kept defined below so its create/edit form can be re-introduced as
        a modal triggered from the unified table in the next iter (S2b
        cleanup). Render disabled to remove the duplicated table. */}
    {/* <ConfluenceVariantsSection /> */}
  </>);

// ── Confluence Variants Section (V65) ────────────────────────────────
// Standalone CRUD + stats panel for B1 confluence shadow variants. Lives
// inside the Shadow tab so the user has all "what-if" experimentation in
// one place. The bot's actual B1 toggle is in /trading/config — completely
// independent.
function ConfluenceVariantsSection() {
  const [variants, setVariants] = React.useState([]);
  const [stats, setStats] = React.useState({});
  const [hours, setHours] = React.useState(24);
  const [showForm, setShowForm] = React.useState(false);
  const [editing, setEditing] = React.useState(null);
  const [detail, setDetail] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);

  const refresh = React.useCallback(async () => {
    setBusy(true); setErr(null);
    try {
      const [vR, sR] = await Promise.all([
        fetch(API + "/api/shadow/confluence/variants", {credentials:"include"}),
        fetch(API + "/api/shadow/confluence/variants/stats?hours=" + hours, {credentials:"include"}),
      ]);
      if (!vR.ok || !sR.ok) throw new Error("HTTP " + vR.status + "/" + sR.status);
      const v = await vR.json();
      const s = await sR.json();
      setVariants(Array.isArray(v) ? v : []);
      const byId = {};
      (Array.isArray(s) ? s : []).forEach(row => { byId[row.variantId] = row; });
      setStats(byId);
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  }, [hours]);

  React.useEffect(() => { refresh(); const t = setInterval(refresh, 30000); return () => clearInterval(t); }, [refresh]);

  const onDelete = async (v) => {
    if (!confirm(`Eliminar variant "${v.name}"? Las evaluaciones asociadas tambien se borraran.`)) return;
    try {
      const r = await fetch(API + "/api/shadow/confluence/variants/" + v.id, { method: "DELETE", credentials: "include" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      await refresh();
    } catch (e) { alert("Error: " + (e.message || e)); }
  };

  const fmtNet = (n) => {
    if (n == null) return "—";
    const num = Number(n);
    const color = num > 0 ? "#22c55e" : num < 0 ? "#ef4444" : "#aaa";
    const sign = num > 0 ? "+" : "";
    return <span style={{color, fontWeight: 600}}>{sign}${num.toFixed(2)}</span>;
  };

  return (
    <div className="panel" style={{marginTop: 20}}>
      <h3 className="section-title">
        🎯 B1 Confluence Variants
        <span style={{fontSize: 11, color: "#888", marginLeft: 8, fontWeight: 400}}>
          (V65 · evaluación paralela "what-if" del filtro confluence)
        </span>
      </h3>
      <p style={{fontSize: 11, color: "#888", marginBottom: 12}}>
        Crea variants con parámetros custom. Cada variant evalúa cada señal real en paralelo y registra qué <b>habría</b> bloqueado.
        Sin afectar producción. Cuando una variant te convenza, vete a <code>Trading → Config → B1 Confluence Filter</code> y actívalo manualmente.
      </p>

      {err && <div style={{color: "#ef4444", fontSize: 11, marginBottom: 8}}>⚠️ {err}</div>}

      <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 8}}>
        <div>
          <label style={{fontSize: 10, color: "#888", marginRight: 6}}>Stats ventana:</label>
          <select value={hours} onChange={e => setHours(Number(e.target.value))} style={{fontSize: 11, padding: "2px 6px"}}>
            <option value={6}>6h</option>
            <option value={24}>24h</option>
            <option value={72}>72h</option>
            <option value={168}>7d</option>
          </select>
          <span style={{fontSize: 10, color: "#666", marginLeft: 8}}>Auto-refresh 30s</span>
        </div>
        <button onClick={() => { setEditing(null); setShowForm(true); }}
                style={{background: "#7c3aed", color: "white", border: 0, padding: "6px 12px", borderRadius: 6, fontWeight: 600, fontSize: 11}}>
          + Nueva Variant
        </button>
      </div>

      {variants.length === 0 ? (
        <div style={{color: "#666", fontSize: 11, padding: 20, textAlign: "center", border: "1px dashed #333", borderRadius: 6}}>
          No tienes variants. Crea una para empezar a ver el "what-if".
        </div>
      ) : (
        <div style={{overflowX: "auto"}}>
          <table style={{width: "100%", fontSize: 11, borderCollapse: "collapse"}}>
            <thead>
              <tr style={{borderBottom: "1px solid #333", color: "#888"}}>
                <th style={{textAlign: "left", padding: "6px 4px"}}>Nombre</th>
                <th style={{textAlign: "center", padding: "6px 4px"}}>ON/OFF</th>
                <th style={{textAlign: "center", padding: "6px 4px"}}>Max fails</th>
                <th style={{textAlign: "center", padding: "6px 4px"}}>Checks</th>
                <th style={{textAlign: "right", padding: "6px 4px"}}>Evals</th>
                <th style={{textAlign: "right", padding: "6px 4px"}}>Habría bloq.</th>
                <th style={{textAlign: "right", padding: "6px 4px"}}>Net hipotético</th>
                <th style={{textAlign: "center", padding: "6px 4px"}}>Acciones</th>
              </tr>
            </thead>
            <tbody>
              {variants.map(v => {
                const s = stats[v.id] || {};
                const checksOn = [];
                if (v.confluenceCheckTrend1h) checksOn.push("trend1h");
                if (v.confluenceCheckBtcMacro) checksOn.push("btc");
                if (v.confluenceCheckPricePosition) checksOn.push("pp");
                if (v.confluenceCheckRsiExtreme) checksOn.push("rsi");
                return (
                  <tr key={v.id} style={{borderBottom: "1px solid #222", cursor: "pointer"}} onClick={() => setDetail(v)}>
                    <td style={{padding: "6px 4px", color: "#e0e0e8", fontWeight: 600}}>{v.name}</td>
                    <td style={{padding: "6px 4px", textAlign: "center"}}>
                      <span style={{color: v.enabled ? "#22c55e" : "#666", fontSize: 10}}>{v.enabled ? "ON" : "OFF"}</span>
                    </td>
                    <td style={{padding: "6px 4px", textAlign: "center", color: "#aaa"}}>{v.confluenceMaxFailedChecks}</td>
                    <td style={{padding: "6px 4px", textAlign: "center", color: "#888", fontSize: 10}}>{checksOn.join(", ") || "—"}</td>
                    <td style={{padding: "6px 4px", textAlign: "right", color: "#aaa"}}>{s.totalEvaluations ?? 0}</td>
                    <td style={{padding: "6px 4px", textAlign: "right", color: "#f59e0b"}}>{s.wouldBlockCount ?? 0}</td>
                    <td style={{padding: "6px 4px", textAlign: "right"}}>{fmtNet(s.netHypothetical)}</td>
                    <td style={{padding: "6px 4px", textAlign: "center"}} onClick={e => e.stopPropagation()}>
                      <button onClick={() => { setEditing(v); setShowForm(true); }}
                              style={{background: "#374151", color: "#e0e0e8", border: 0, padding: "3px 8px", borderRadius: 4, fontSize: 10, marginRight: 4, cursor: "pointer"}}>Editar</button>
                      <button onClick={() => onDelete(v)}
                              style={{background: "#7f1d1d", color: "#fca5a5", border: 0, padding: "3px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer"}}>Quitar</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Form modal */}
      {showForm && <ConfluenceVariantForm initial={editing} onClose={() => setShowForm(false)} onSaved={() => { setShowForm(false); refresh(); }} />}
      {/* Detail modal */}
      {detail && <ConfluenceVariantDetail variant={detail} stats={stats[detail.id]} hours={hours} onClose={() => setDetail(null)} />}
    </div>
  );
}

// Form for create / edit confluence variant.
function ConfluenceVariantForm({ initial, onClose, onSaved }) {
  const isEdit = !!initial;
  const [form, setForm] = React.useState(initial || {
    name: "",
    enabled: true,
    confluenceMaxFailedChecks: 2,
    confluenceCheckTrend1h: true,
    confluenceCheckBtcMacro: true,
    confluenceCheckPricePosition: true,
    confluenceCheckRsiExtreme: true,
    confluenceBtcMacroMaxAgainstPct: 0.50,
    confluenceMaxPricePositionLong: 0.85,
    confluenceMinPricePositionShort: 0.15,
    confluenceRsiMaxLong: 75.0,
    confluenceRsiMinShort: 25.0,
  });
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);

  const submit = async () => {
    if (!form.name || !form.name.trim()) { setErr("Nombre obligatorio"); return; }
    setBusy(true); setErr(null);
    try {
      const url = isEdit
        ? API + "/api/shadow/confluence/variants/" + initial.id
        : API + "/api/shadow/confluence/variants";
      const r = await fetch(url, {
        method: isEdit ? "PUT" : "POST",
        credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(form),
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.error || ("HTTP " + r.status));
      }
      onSaved();
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  };

  const setF = (k, v) => setForm(p => ({...p, [k]: v}));

  return (
    <div onClick={onClose} style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:50, display:"flex", alignItems:"center", justifyContent:"center", padding:16}}>
      <div onClick={e => e.stopPropagation()} style={{background:"#1a1a26", border:"1px solid #333", borderRadius:8, padding:20, maxWidth:500, width:"100%", maxHeight:"90vh", overflowY:"auto"}}>
        <h3 style={{marginTop:0, color:"#e0e0e8"}}>{isEdit ? "Editar" : "Nueva"} Confluence Variant</h3>
        {err && <div style={{color:"#ef4444", fontSize:11, marginBottom:8}}>⚠️ {err}</div>}

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, fontSize:11}}>
          <div style={{gridColumn:"1 / span 2"}}>
            <label style={{color:"#888", display:"block", marginBottom:2}}>Nombre</label>
            <input value={form.name} onChange={e => setF("name", e.target.value)} disabled={isEdit}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>Activa</label>
            <button onClick={() => setF("enabled", !form.enabled)}
                    style={{padding:"6px 12px", background:form.enabled?"#16a34a":"#374151", color:"white", border:0, borderRadius:4, fontWeight:600}}>
              {form.enabled ? "ON" : "OFF"}
            </button>
          </div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>Max fails (bloquea si ≥)</label>
            <input type="number" min="1" value={form.confluenceMaxFailedChecks} onChange={e => setF("confluenceMaxFailedChecks", Number(e.target.value))}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>

          <div style={{gridColumn:"1 / span 2", borderTop:"1px solid #333", paddingTop:10, marginTop:6, color:"#888", fontSize:10}}>CHECKS HABILITADOS</div>
          {[
            ["confluenceCheckTrend1h", "trend1h contradice side"],
            ["confluenceCheckBtcMacro", "BTC macro 30m contra"],
            ["confluenceCheckPricePosition", "price position extrema"],
            ["confluenceCheckRsiExtreme", "RSI extremo"],
          ].map(([k, lbl]) => (
            <div key={k}>
              <label style={{color:"#aaa", display:"flex", alignItems:"center", gap:6, cursor:"pointer"}}>
                <input type="checkbox" checked={!!form[k]} onChange={e => setF(k, e.target.checked)}/>
                {lbl}
              </label>
            </div>
          ))}

          <div style={{gridColumn:"1 / span 2", borderTop:"1px solid #333", paddingTop:10, marginTop:6, color:"#888", fontSize:10}}>UMBRALES</div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>BTC max against % (30m)</label>
            <input type="number" step="0.05" min="0" value={form.confluenceBtcMacroMaxAgainstPct}
                   onChange={e => setF("confluenceBtcMacroMaxAgainstPct", Number(e.target.value))}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>Price pos max LONG</label>
            <input type="number" step="0.05" min="0" max="1" value={form.confluenceMaxPricePositionLong}
                   onChange={e => setF("confluenceMaxPricePositionLong", Number(e.target.value))}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>Price pos min SHORT</label>
            <input type="number" step="0.05" min="0" max="1" value={form.confluenceMinPricePositionShort}
                   onChange={e => setF("confluenceMinPricePositionShort", Number(e.target.value))}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>RSI max LONG</label>
            <input type="number" step="1" min="0" max="100" value={form.confluenceRsiMaxLong}
                   onChange={e => setF("confluenceRsiMaxLong", Number(e.target.value))}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>
          <div>
            <label style={{color:"#888", display:"block", marginBottom:2}}>RSI min SHORT</label>
            <input type="number" step="1" min="0" max="100" value={form.confluenceRsiMinShort}
                   onChange={e => setF("confluenceRsiMinShort", Number(e.target.value))}
                   style={{width:"100%", padding:6, background:"#0f0f17", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}}/>
          </div>
        </div>

        <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:16}}>
          <button onClick={onClose} disabled={busy}
                  style={{padding:"6px 14px", background:"#374151", color:"#e0e0e8", border:0, borderRadius:4}}>Cancelar</button>
          <button onClick={submit} disabled={busy}
                  style={{padding:"6px 14px", background:"#7c3aed", color:"white", border:0, borderRadius:4, fontWeight:600}}>
            {busy ? "..." : (isEdit ? "Guardar" : "Crear")}
          </button>
        </div>
      </div>
    </div>
  );
}

// Read-only detail modal: config + stats summary.
function ConfluenceVariantDetail({ variant, stats, hours, onClose }) {
  const v = variant;
  const s = stats || {};
  const fmtNet = (n) => {
    if (n == null) return "—";
    const num = Number(n);
    const color = num > 0 ? "#22c55e" : num < 0 ? "#ef4444" : "#aaa";
    return <span style={{color, fontWeight:600}}>{(num > 0 ? "+" : "") + "$" + num.toFixed(2)}</span>;
  };
  return (
    <div onClick={onClose} style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:50, display:"flex", alignItems:"center", justifyContent:"center", padding:16}}>
      <div onClick={e => e.stopPropagation()} style={{background:"#1a1a26", border:"1px solid #333", borderRadius:8, padding:20, maxWidth:500, width:"100%", maxHeight:"90vh", overflowY:"auto"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
          <h3 style={{margin:0, color:"#e0e0e8"}}>{v.name}</h3>
          <button onClick={onClose} style={{background:"transparent", border:0, color:"#888", fontSize:18, cursor:"pointer"}}>×</button>
        </div>

        <div style={{color:"#7c3aed", fontSize:10, fontWeight:700, marginBottom:6}}>STATS ({hours}h)</div>
        <table style={{width:"100%", fontSize:11, marginBottom:14}}>
          <tbody>
            <tr><td style={{color:"#888", padding:"3px 0"}}>Total evaluaciones</td><td style={{color:"#e0e0e8", textAlign:"right"}}>{s.totalEvaluations ?? 0}</td></tr>

function HelpImg({ src, caption, description }) {
  const [failed, setFailed] = useState(false);
  const filename = src ? src.split("/").pop() : "sin nombre";
  if (!src || failed) {
    return (
      <div className="help-img-wrap">
        <div className="help-img-placeholder">
          <div className="icon">📷</div>
          <div>Captura pendiente</div>
          <div className="pname">{filename}</div>
          {description && <div style={{marginTop:10, fontSize:11, color:"rgba(255,255,255,0.5)", maxWidth:380}}>{description}</div>}
        </div>
        {caption && <div className="caption">{caption}</div>}
      </div>
    );
  }
  return (
    <div className="help-img-wrap">
      <img src={src} alt={caption || ""} onError={() => setFailed(true)} loading="lazy" />
      {caption && <div className="caption">{caption}</div>}
    </div>
  );
}

  if (!entries || entries.length === 0) return null;

function getToken() { return localStorage.getItem("platform_token"); }
function setTokenLS(t) { localStorage.setItem("platform_token", t); }
function clearToken() { localStorage.removeItem("platform_token"); }

// Override useFetch to include auth
function useAuthFetch(url, interval = 5000) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(() => {
    const token = getToken();
    fetch(url, { headers: token ? { "Authorization": "Bearer " + token } : {} })
      .then(r => { if (r.status === 401) { clearToken(); window.location.reload(); } return r.json(); })
      .then(setData).catch(e => setError(e.message));
  }, [url]);
  useEffect(() => { fetch_(); const t = setInterval(fetch_, interval); return () => clearInterval(t); }, [fetch_, interval]);
  return { data, error, refetch: fetch_ };
}

  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setLoading(true);
    try {
      const r = await fetch("/api/platform/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass }),
      });
      if (!r.ok) { setErr(t("login.error_invalid")); return; }
      const data = await r.json();
      setTokenLS(data.token);
      onLogin(data.username);
    } catch { setErr(t("login.error_network")); } finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      {/* Third concentric reactor ring — CSS handles the other two + pulse */}
      <div className="login-core" aria-hidden="true"></div>

      {/* Language toggle available before login too */}
      <div style={{position:"absolute", top:16, right:16, zIndex:2}}>
        <LangToggle />
      </div>

      <form className="login-box" onSubmit={submit}>
        <div className="brand">
          <div className="brand-logo">AP</div>
          <div style={{textAlign:"center"}}>
            <h1>{t("login.brand_title")}</h1>
            <div className="sub">{t("login.brand_sub")}</div>
          </div>
        </div>
        <input type="text" placeholder={t("login.user_placeholder")} value={user} onChange={e => setUser(e.target.value)} autoFocus />
        <input type="password" placeholder={t("login.pass_placeholder")} value={pass} onChange={e => setPass(e.target.value)} />
        <button type="submit" disabled={loading || !user || !pass}>{loading ? t("login.submit_loading") : t("login.submit")}</button>
        {err && <div className="err">{err}</div>}
      </form>
    </div>
  );
}

// ── Main App ──
function App() {
  const { t, lang } = useI18n();
  const [authed, setAuthed] = useState(!!getToken());
  const [username, setUsername] = useState("");
  const [tab, setTab] = useState("conclusions");
  const [mobileOpen, setMobileOpen] = useState(false);

  const selectTab = (id) => { setTab(id); setMobileOpen(false); };

  // Check token on mount + periodic session check every 60s
  useEffect(() => {
    const checkSession = () => {
      const token = getToken();
      if (!token) { setAuthed(false); return; }
      fetch("/api/platform/me", { headers: { "Authorization": "Bearer " + token } })
        .then(r => {
          if (r.ok) return r.json();
          // Only clear token on 401 (expired), not on 502/503 (server not ready)
          if (r.status === 401) { clearToken(); setAuthed(false); }
          return null;
        })
        .then(d => { if (d) { setAuthed(true); if (d.username) setUsername(d.username); } })
        .catch(() => {}); // Network error — don't clear token
    };
    checkSession();
    const iv = setInterval(checkSession, 60000);
    return () => clearInterval(iv);
  }, []);

  if (!authed) return <LoginPage onLogin={(u) => { setAuthed(true); setUsername(u); }} />;

  const logout = () => { clearToken(); setAuthed(false); };

  const nav = [
    { id: "conclusions", label: t("nav.conclusions"), icon: "◆", gold: true },
    { group: t("nav.group_operations"), color: "#3b82f6", items: [
      { id: "botlive", label: t("nav.botlive"), icon: "▶" },
      { id: "trades", label: t("nav.trades"), icon: "📈" },
      { id: "shadow", label: t("nav.shadow"), icon: "◐" },
      { id: "regimes", label: t("nav.regimes"), icon: "🌡" },
      { id: "cambios", label: t("nav.cambios"), icon: "✎" },
      { id: "daily", label: t("nav.daily"), icon: "📋" },
      { id: "system", label: t("nav.system"), icon: "⚙" },
    ]},
    { group: t("nav.group_research"), color: "#a855f7", items: [
      { id: "lab", label: t("nav.lab"), icon: "🔬" },
      { id: "validation", label: t("nav.validation"), icon: "✓" },
      { id: "research", label: t("nav.research"), icon: "📊" },
      { id: "features", label: t("nav.features"), icon: "◎" },
    ]},
    { group: t("nav.group_governance"), color: "#22c55e", items: [
      { id: "audit", label: t("nav.audit"), icon: "🛡" },
      { id: "contract", label: t("nav.contract"), icon: "📄" },
    ]},
    { id: "help", label: t("nav.help"), icon: "?" },
  ];

  return (
    <div className="app">
      {/* Sidebar */}
      {/* Mobile overlay */}
      <div className={"mobile-overlay " + (mobileOpen ? "open" : "")} onClick={() => setMobileOpen(false)} />
      <nav className={"sidebar " + (mobileOpen ? "mobile-open" : "")}>
        <div className="sidebar-header">
          <div className="logo">AP</div>
          <div>
            <h1>{t("sidebar.brand_title")}</h1>
            <div className="sub">{t("sidebar.brand_sub")}</div>
          </div>
        </div>

        {nav.map((item, i) => {
          // Top-level item (Conclusiones, Help)
          if (item.id) {
            return (
              <div key={i} className={"sidebar-item " + (tab === item.id ? (item.gold ? "active-gold" : "active") : "")}
                   onClick={() => selectTab(item.id)}>
                <span style={{width:16, textAlign:"center", fontSize:11}}>{item.icon}</span>
                <span>{item.label}</span>
              </div>
            );
          }
          // Group
          return (
            <div key={i} className="sidebar-group">
              <div className="sidebar-group-label" style={{color: item.color}}>{item.group}</div>
              {item.items.map(sub => (
                <div key={sub.id} className={"sidebar-item " + (tab === sub.id ? "active" : "")}
                     onClick={() => selectTab(sub.id)}>
                  <span style={{width:16, textAlign:"center", fontSize:11, opacity:0.6}}>{sub.icon}</span>
                  <span>{sub.label}</span>
                </div>
              ))}
            </div>
          );
        })}
      </nav>

      {/* Main content */}
      <div className="main-content">
        <div className="topbar" style={{justifyContent:"space-between", alignItems:"center"}}>
          <div style={{display:"flex", alignItems:"center", gap:10}}>
            <button className="mobile-menu-btn" onClick={() => setMobileOpen(!mobileOpen)}>☰</button>
            <span className="status-pill" title={t("topbar.online_title")}><span className="dot"></span>{t("topbar.online")}</span>
            <span style={{color:"var(--text-soft)"}}>{new Date().toLocaleDateString(lang === "en" ? "en-US" : "es-ES", {weekday:"short", day:"numeric", month:"short"})}</span>
          </div>
          <div className="topbar-user" style={{marginLeft:"auto", display:"flex", alignItems:"center", gap:10}}>
            <div style={{display:"flex", alignItems:"center", gap:8}}>
              <div className="avatar">{(username || t("topbar.default_user"))[0].toUpperCase()}</div>
              <span style={{color:"var(--text-dim)"}}>{username || t("topbar.default_user")}</span>
            </div>
            <LangToggle />
            <button className="logout-btn" onClick={logout}>{t("topbar.logout")}</button>
          </div>
        </div>
        <div className="content-area">
        {tab === "conclusions" && <ConclusionsTab />}
        {tab === "botlive" && <BotLiveTab />}
        {tab === "trades" && <TradesTab />}
        {tab === "shadow" && <ShadowModeTab />}
        {tab === "cambios" && <CambiosTab />}
        {tab === "daily" && <DailyReportTab />}
        {tab === "system" && <SystemTab />}
        {tab === "regimes" && <RegimesTab />}
        {tab === "lab" && <LabTab />}
        {tab === "validation" && <ValidationTab />}
        {tab === "research" && <ResearchTab />}
        {tab === "features" && <FeaturesTab />}
        {tab === "audit" && <AuditTab />}
        {tab === "contract" && <ContractTab />}
        {tab === "help" && <HelpTab />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <I18nProvider><App /></I18nProvider>
);
</script>
</body>
</html>
