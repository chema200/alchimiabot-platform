/**
 * Reusable in-app modal. Matches the dark theme of the rest of the
 * dashboard — no native window.alert/confirm. Click backdrop or
 * the × button to cancel; `onConfirm` fires only when the user
 * hits the primary action.
 */
function Modal({ open, title, children, onCancel, onConfirm, confirmLabel, confirmStyle, cancelLabel, busy }) {
  const { t } = useI18n();
  if (!open) return null;
  const pConfirmLabel = confirmLabel || t("shadow.confirm");
  const pCancelLabel  = cancelLabel  || t("shadow.cancel");
  const confirmBg = confirmStyle === "danger" ? "#b91c1c" : confirmStyle === "primary" ? "#3b82f6" : "#3b82f6";
  return (
    <div onClick={onCancel}
      style={{position:"fixed", inset:0, background:"rgba(3,4,10,0.78)", zIndex:1000,
              display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(3px)"}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:"#0d0d17", border:"1px solid #2a2a40", borderRadius:10, minWidth:420, maxWidth:620,
                maxHeight:"85vh", overflowY:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between",
                     padding:"12px 16px", borderBottom:"1px solid #1f1f30"}}>
          <div style={{fontSize:13, fontWeight:600, color:"#e0e0e8"}}>{title}</div>
          <button onClick={onCancel} disabled={busy} aria-label="cerrar"
            style={{background:"transparent", border:"none", color:"#888", cursor:"pointer", fontSize:18, lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"14px 16px", fontSize:12, color:"#ccc", lineHeight:1.5}}>{children}</div>
        <div style={{display:"flex", justifyContent:"flex-end", gap:8,
                     padding:"10px 16px", borderTop:"1px solid #1f1f30"}}>
          <button onClick={onCancel} disabled={busy}
            style={{padding:"6px 14px", fontSize:11, background:"#1a1a2e", border:"1px solid #333",
                    borderRadius:5, color:"#ccc", cursor: busy ? "not-allowed" : "pointer"}}>
            {pCancelLabel}
          </button>
          {onConfirm && (
            <button onClick={onConfirm} disabled={busy}
              style={{padding:"6px 16px", fontSize:11, background: busy ? "#333" : confirmBg,
                      border:"none", borderRadius:5, color:"white", fontWeight:600,
                      cursor: busy ? "not-allowed" : "pointer"}}>
              {busy ? "..." : pConfirmLabel}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function ShadowModeTab() {
  const { t } = useI18n();
  // V74/V75 (2026-04-28) — Shadow Mode is now scoped per trading mode.
  // The backend stores variants tagged with mode (SCALP/NORMAL/SWING) and
  // every evaluation row carries its own mode. The mode selector at the top
  // of the tab filters everything below: variant lists, summary, exits, A/B
  // comparisons, evaluation log. Default NORMAL because that's where the
  // user has been running variants historically.
  const [shadowMode, setShadowMode] = useState(() => localStorage.getItem("shadow_mode") || "NORMAL");
  useEffect(() => { localStorage.setItem("shadow_mode", shadowMode); }, [shadowMode]);
  // Sub-section the user is looking at. "experiments" = create + active
  // variants; "results" = decision-grade aggregates; "logs" = forensic
  // line-by-line evaluation/exit log.
  const [shadowSection, setShadowSection] = useState(() => localStorage.getItem("shadow_section") || "experiments");
  useEffect(() => { localStorage.setItem("shadow_section", shadowSection); }, [shadowSection]);
  // V76 (2026-04-28) — filter / sort state for the active variants table.
  // Lets the user narrow to a single experiment family or rank by verdict
  // strength to surface the candidates worth promoting first.
  const [variantTypeFilter, setVariantTypeFilter] = useState("ALL");
  const [variantSortBy, setVariantSortBy]         = useState("verdict"); // verdict | name | type | impact
  const [variantSortDir, setVariantSortDir]       = useState("desc");    // asc | desc

  const [variants, setVariants] = useState([]);
  const [evaluations, setEvaluations] = useState([]);
  const [summary, setSummary] = useState({variants: [], totalEvaluations: 0, hours: 24});
  const [exits, setExits] = useState([]);
  const [exitsSummary, setExitsSummary] = useState({variants: [], totalExits: 0, hours: 168});
  const [exitsHours, setExitsHours] = useState(168);
  // Impact analysis — the new panel that joins shadow evaluations with real
  // trade outcomes so the user sees what each variant would have saved/cost.
  const [impact, setImpact] = useState({variants: [], windowDays: 7});
  const [impactDays, setImpactDays] = useState(7);
  // Phase C — A/B by strategy. Each row groups shadow exits by
  // (strategy_id_real, strategy_id_shadow) so the user sees which
  // strategies would close better than the one that actually fired.
  const [byStrategy, setByStrategy] = useState([]);
  const [hours, setHours] = useState(24);
  const [filterVariant, setFilterVariant] = useState("");
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);

  const [form, setForm] = useState(EMPTY_FORM());
  const [submitMsg, setSubmitMsg] = useState("");
  // null = creating a new variant; string = editing an existing variant
  // (holds the ORIGINAL name so the PUT proxy can find the row even if
  // the user types a different name into form.name to trigger a rename).
  const [editingName, setEditingName] = useState(null);

  // Delete confirmation modal state. Fetches associated counts lazily
  // when opened so the user sees exactly what will be wiped.
  const [deleteModal, setDeleteModal] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);

  // Mobile-friendly modals (2026-04-26): the manual create form + templates
  // picker live in a modal triggered from "+ Nueva variante" so the page is
  // not a 4-screen wall. Row click on the variants table opens a details
  // modal where Edit / Delete / → Bot live; the row itself is just a chip.
  const [showFormModal, setShowFormModal] = useState(false);
  const [detailsModal, setDetailsModal] = useState(null);

  // Strategy library (2026-04-27): browse curated presets and install any
  // as a shadow variant in one click. Same backend as the bot's library
  // modal — single source of truth in StrategyLibraryService.java.
  const [showLibrary, setShowLibrary] = useState(false);
  const [libraryPresets, setLibraryPresets] = useState([]);
  const [libraryMode, setLibraryMode] = useState("ALL");
  const [libraryCat, setLibraryCat] = useState("ALL");
  const libraryOpen = useCallback(async () => {
    setShowLibrary(true);
    try {
      const r = await fetch(API + "/api/strategies/library", {credentials:"include"});
      const j = await r.json();
      setLibraryPresets(Array.isArray(j) ? j : []);
    } catch (e) {
      setFlash({kind:"error", msg: "❌ No se pudo cargar la biblioteca: " + (e.message || e)});
    }
  }, []);
  const libraryInstallShadow = useCallback(async (presetId) => {
    try {
      const r = await fetch(API + "/api/strategies/library/install-as-shadow", {
        method: "POST", credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({presetId}),
      });
      const j = await r.json();
      if (!r.ok || j.error) throw new Error(j.error || "install failed");
      setFlash({kind:"success", msg:`✅ Shadow variant "${j.shadowVariant}" creada (no afecta producción)`});
      setTimeout(() => { try { refresh(); } catch {} }, 50);
    } catch (e) {
      setFlash({kind:"error", msg: "❌ " + (e.message || e)});
    }
  }, []);

  // Lightweight info toast, shown after destructive actions with a summary
  // of what happened. Auto-dismisses after 4s.
  const [flash, setFlash] = useState(null);
  useEffect(() => {
    if (!flash) return;
    const t = setTimeout(() => setFlash(null), 4000);
    return () => clearTimeout(t);
  }, [flash]);

  // Auto-wizard state — V74 (2026-04-28): mode is now implicit from the
  // active mode tab (no more dropdown asking "what mode is this for?"
  // because the user is already inside SCALP/NORMAL/SWING). Step 2 still
  // shows preview + finalize but with the mode pre-selected.
  const [wizard, setWizard] = useState(null); // null | {step, template, mode, preview, busy, error, selectedNames}
  const wizardOpen = (template) => setWizard({step: 2, template, mode: shadowMode, preview: null, busy: false, error: null, selectedNames: null});
  const wizardClose = () => setWizard(null);
  const wizardLoadPreview = useCallback(async (template, mode) => {
    setWizard(w => ({...w, busy: true, error: null, preview: null}));
    try {
      const r = await fetch(API + "/api/shadow/variants/auto/preview?template=" + template + "&mode=" + mode, {credentials:"include"});
      const j = await r.json();
      if (!r.ok || j.success === false) throw new Error(j.error || "preview failed");
      setWizard(w => ({...w, busy: false, preview: j}));
    } catch (e) {
      setWizard(w => ({...w, busy: false, error: e.message || String(e)}));
    }
  }, []);
  const wizardFinalize = useCallback(async () => {
    if (!wizard) return;
    setWizard(w => ({...w, busy: true, error: null}));
    try {
      // V74 (2026-04-28) — pass `selectedNames` if the user unchecked some
      // variants in the preview. null/empty means "create them all" (legacy
      // behaviour). If the backend ignores the field, we still create them
      // all and live with the (small) inconvenience until next iteration.
      const selected = wizard.selectedNames === null
        ? null
        : Array.from(wizard.selectedNames);
      const r = await fetch(API + "/api/shadow/variants/auto", {
        method: "POST", credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({template: wizard.template, mode: wizard.mode, selectedNames: selected}),
      });
      const j = await r.json();
      if (!r.ok || j.success === false) throw new Error(j.error || "finalize failed");
      setFlash({kind:"success", msg:`✅ ${j.variants.length} variantes creadas (${j.template} / ${j.mode})`});
      setWizard(null);
      // Reload variants list so the user sees them immediately.
      // refresh is captured below — we call it in the same tick.
      setTimeout(() => { try { refresh(); } catch {} }, 50);
    } catch (e) {
      setWizard(w => ({...w, busy: false, error: e.message || String(e)}));
    }
  }, [wizard]);

  // Promote a winning variant to a real bot strategy. Prompts for a name.
  const promoteToBot = useCallback(async (variantName) => {
    const proposed = window.prompt(
      "Nombre para la nueva estrategia (puedes dejarlo igual o cambiarlo):",
      "promoted-" + variantName);
    if (proposed === null) return;
    const newName = proposed.trim();
    if (!newName) return;
    try {
      const r = await fetch(API + "/api/shadow/variants/" + encodeURIComponent(variantName) + "/promote", {
        method: "POST", credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({newName, mode: ""}),
      });
      const j = await r.json();
      if (!r.ok || j.success === false) throw new Error(j.error || "promote failed");
      setFlash({kind:"success", msg:`✅ Estrategia "${j.name}" creada en modo ${j.mode}`});
    } catch (e) {
      setFlash({kind:"error", msg:"❌ " + (e.message || String(e))});
    }
  }, []);

  const refresh = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const qs = filterVariant ? ("?variant=" + encodeURIComponent(filterVariant)) : "";
      // V74 (2026-04-28) — pass mode to the endpoints that natively support
      // it (variants list, summary). For the rest we filter client-side
      // using the `mode` field every shadow row carries — endpoints that
      // don't yet accept ?mode= keep returning everything and we narrow it
      // down here so the UI is always per-mode regardless of backend stage.
      const modeQs = "&mode=" + encodeURIComponent(shadowMode);
      // V76 (2026-04-28) — also fetch B1 Confluence variants in the same
      // refresh so they can live in the unified main table instead of in a
      // separate section. Filtered by mode just like entry-side ones.
      const [vResp, eResp, sResp, xResp, xsResp, iResp, bsResp, cvResp] = await Promise.all([
        fetch(API + "/api/shadow/variants?mode=" + encodeURIComponent(shadowMode), {credentials:"include"}),
        fetch(API + "/api/shadow/evaluations" + qs, {credentials:"include"}),
        fetch(API + "/api/shadow/summary?hours=" + hours + modeQs, {credentials:"include"}),
        fetch(API + "/api/shadow/exits" + qs, {credentials:"include"}),
        fetch(API + "/api/shadow/exits/summary?hours=" + exitsHours, {credentials:"include"}),
        fetch(API + "/api/shadow/variants/impact?days=" + impactDays, {credentials:"include"}),
        fetch(API + "/api/shadow/exits/by-strategy?hours=" + exitsHours, {credentials:"include"}),
        fetch(API + "/api/shadow/confluence/variants?mode=" + encodeURIComponent(shadowMode), {credentials:"include"}),
      ]);
      if (vResp.status === 403 || eResp.status === 403 || sResp.status === 403
          || xResp.status === 403 || xsResp.status === 403 || iResp.status === 403) {
        throw new Error(t("shadow.err_admin"));
      }
      // Defensive parsing: endpoint can be missing (404) while the bot /
      // platform is mid-deploy. Fall back to safe defaults so the tab still
      // renders the old sections rather than crashing the whole app.
      const jsonOrDefault = async (resp, fallback) => {
        if (!resp.ok) return fallback;
        try { return await resp.json(); } catch { return fallback; }
      };
      const vData  = await jsonOrDefault(vResp, []);
      const eData  = await jsonOrDefault(eResp, []);
      const sData  = await jsonOrDefault(sResp, {variants: [], totalEvaluations: 0, hours});
      const xData  = await jsonOrDefault(xResp, []);
      const xsData = await jsonOrDefault(xsResp, {variants: [], totalExits: 0, hours: exitsHours});
      const iData  = await jsonOrDefault(iResp, {variants: [], windowDays: impactDays});
      const bsData = await jsonOrDefault(bsResp, []);

      // Client-side filter helper. The bot's API serialises blockModes as a
      // camelCase array (e.g. ["SCALP","SWING"] meaning "DON'T fire on these
      // modes"). The platform's own confluence variants serve `mode` as a
      // direct string. Both shapes need to be honoured here so SCALP tab
      // doesn't show NORMAL-scoped variants and vice-versa.
      const matchesMode = (row) => {
        if (row == null) return true;
        // Direct positive mode field (confluence variants, evaluation rows).
        if (row.mode && typeof row.mode === "string") return row.mode === shadowMode;
        // Negative blockModes list (entry-side shadow_variants).
        if (Array.isArray(row.blockModes)) {
          return !row.blockModes.includes(shadowMode);
        }
        // Legacy: blockModes serialised as a comma-separated string.
        if (typeof row.blockModes === "string") {
          if (row.blockModes === "") return true;
          return !row.blockModes.split(",").map(s => s.trim()).includes(shadowMode);
        }
        // Older snake_case fallback (shouldn't appear after V74 but harmless).
        if (typeof row.block_modes === "string" && row.block_modes !== "") {
          return !row.block_modes.split(",").map(s => s.trim()).includes(shadowMode);
        }
        return true;
      };

      const vAll = Array.isArray(vData) ? vData : [];
      // V76 — append confluence variants tagged with _kind so the table can
      // render them as B1 rows in the unified list. They already arrive
      // mode-filtered server-side so we just merge.
      const cvData = await jsonOrDefault(cvResp, []);
      const cvAll = (Array.isArray(cvData) ? cvData : []).map(c => ({...c, _kind: "confluence", name: c.name}));
      setVariants([...vAll.filter(matchesMode), ...cvAll]);
      setEvaluations((Array.isArray(eData) ? eData : []).filter(matchesMode));
      setSummary(sData && typeof sData === "object" && Array.isArray(sData.variants) ? sData : {variants: [], totalEvaluations: 0, hours});
      setExits((Array.isArray(xData) ? xData : []).filter(matchesMode));
      const xsVariants = (xsData && Array.isArray(xsData.variants)) ? xsData.variants.filter(matchesMode) : [];
      setExitsSummary({...(xsData || {}), variants: xsVariants});
      const iVariants = (iData && Array.isArray(iData.variants)) ? iData.variants.filter(matchesMode) : [];
      setImpact({...(iData || {}), variants: iVariants, windowDays: impactDays});
      setByStrategy((Array.isArray(bsData) ? bsData : []).filter(matchesMode));
    } catch (e) { setErr(e.message || String(e)); }
    setLoading(false);
  }, [hours, filterVariant, exitsHours, impactDays, shadowMode]);

  useEffect(() => { refresh(); const t = setInterval(refresh, 15000); return () => clearInterval(t); }, [refresh]);

  const toggleMulti = (field, value) => {
    setForm(prev => {
      const arr = prev[field];
      const next = arr.includes(value) ? arr.filter(x => x !== value) : [...arr, value];
      return { ...prev, [field]: next };
    });
  };

  const hasAnyFilter = () => {
    return form.lateRisks.length > 0 || form.labels.length > 0 || form.sides.length > 0
        || form.modes.length > 0 || form.coins.trim().length > 0
        || Number(form.minScore) > 0 || Number(form.collateral) > 0
        || form.blockExhausted
        || form.roiTable.trim().length > 0
        || form.slPct.toString().trim().length > 0
        || form.tpPct.toString().trim().length > 0
        || form.maxHold.toString().trim().length > 0;
  };

  const submitVariant = async () => {
    setSubmitMsg("");
    const newName = form.name.trim();
    if (!newName) { setSubmitMsg(t("shadow.missing_name")); return; }
    if (!hasAnyFilter())   { setSubmitMsg(t("shadow.need_filter")); return; }
    try {
      const coinList = form.coins.split(",").map(s => s.trim().toUpperCase()).filter(Boolean);
      const base = {
        blockLateEntryRisks: form.lateRisks,
        blockQualityLabels:  form.labels,
        blockSides:          form.sides,
        blockModes:          form.modes,
        blockCoins:          coinList,
        minScoreOverride:    Number(form.minScore) || 0,
        collateralOverrideUsd: Number(form.collateral) || 0,
        blockImpulseExhausted: !!form.blockExhausted,
        // Exit overrides — send only if set, else null → inherit prod
        roiTableOverride:        form.roiTable.trim() || null,
        slPctOverride:           form.slPct.toString().trim() === ""    ? null : Number(form.slPct),
        tpPctOverride:           form.tpPct.toString().trim() === ""    ? null : Number(form.tpPct),
        maxHoldMinutesOverride:  form.maxHold.toString().trim() === ""  ? null : Math.trunc(Number(form.maxHold))
      };
      let url, method, body;
      if (editingName) {
        // PUT to the original name; send newName only if the user actually renamed.
        url = API + "/api/shadow/variants/" + encodeURIComponent(editingName);
        method = "PUT";
        body = { ...base, newName: newName };
      } else {
        url = API + "/api/shadow/variants";
        method = "POST";
        body = { ...base, name: newName };
      }
      const r = await fetch(url, {
        method, credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
      });
      const data = await r.json();
      if (data.success) {
        setSubmitMsg(editingName ? t("shadow.updated") : t("shadow.saved"));
        setForm(EMPTY_FORM());
        setEditingName(null);
        refresh();
      } else {
        setSubmitMsg("✗ " + (data.error || "error"));
      }
    } catch (e) { setSubmitMsg("✗ " + e.message); }
  };

  const editVariant = (v) => {
    // Hydrate the form from the selected variant so the user sees all
    // current values and only changes what they want. Works for any of
    // the 12 fields including rename.
    setForm({
      name:           v.name || "",
      lateRisks:      Array.from(v.blockLateEntryRisks || []),
      labels:         Array.from(v.blockQualityLabels  || []),
      sides:          Array.from(v.blockSides          || []),
      modes:          Array.from(v.blockModes          || []),
      coins:          Array.from(v.blockCoins          || []).join(", "),
      minScore:       String(v.minScoreOverride       ?? 0),
      collateral:     String(v.collateralOverrideUsd  ?? 0),
      blockExhausted: !!v.blockImpulseExhausted,
      roiTable:       v.roiTableOverride || "",
      slPct:          v.slPctOverride != null ? String(v.slPctOverride) : "",
      tpPct:          v.tpPctOverride != null ? String(v.tpPctOverride) : "",
      maxHold:        v.maxHoldMinutesOverride != null ? String(v.maxHoldMinutesOverride) : "",
    });
    setEditingName(v.name);
    setSubmitMsg("");
    setDetailsModal(null);
    setShowFormModal(true);
  };

  const cancelEdit = () => {
    setForm(EMPTY_FORM());
    setEditingName(null);
    setSubmitMsg("");
    setShowFormModal(false);
  };

  /**
   * Opens the delete modal and, in parallel, fetches the exact counts of
   * hl_shadow_evaluations + hl_shadow_exits rows that would be cascade-
   * deleted so the user sees what they are about to wipe.
   */
  const openDeleteModal = async (name) => {
    setDeleteModal({ name, evaluations: null, exits: null, loading: true });
    try {
      const r = await fetch(API + "/api/shadow/variants/" + encodeURIComponent(name) + "/associated",
                            {credentials:"include"});
      if (r.ok) {
        const d = await r.json();
        setDeleteModal(m => m && m.name === name ? { ...m, evaluations: d.evaluations ?? 0, exits: d.exits ?? 0, loading: false } : m);
      } else {
        setDeleteModal(m => m && m.name === name ? { ...m, loading: false } : m);
      }
    } catch {
      setDeleteModal(m => m && m.name === name ? { ...m, loading: false } : m);
    }
  };

  const confirmDelete = async () => {
    if (!deleteModal) return;
    setDeleteBusy(true);
    try {
      const r = await fetch(API + "/api/shadow/variants/" + encodeURIComponent(deleteModal.name),
                            { method: "DELETE", credentials: "include" });
      const d = await r.json();
      if (d.success) {
        setFlash({
          kind: "success",
          msg: t("shadow.delete_success", {name: deleteModal.name, ev: d.deletedEvaluations ?? 0, ex: d.deletedExits ?? 0})
        });
      } else {
        setFlash({ kind: "error", msg: t("shadow.delete_failed", {err: d.error || t("shadow.variant_not_exists")}) });
      }
      setDeleteModal(null);
      refresh();
    } catch (e) {
      setFlash({ kind: "error", msg: t("shadow.delete_network_err", {err: e.message || e}) });
    }
    setDeleteBusy(false);
  };

  const Chip = ({ active, onClick, children, title }) => (
    <button type="button" onClick={onClick} title={title || ""}
      style={{
        padding:"3px 10px", fontSize:10, borderRadius:12, cursor:"pointer",
        border: "1px solid " + (active ? "#3b82f6" : "#333"),
        background: active ? "#1e3a8a" : "#0a0a13",
        color: active ? "#e0e0e8" : "#888",
        fontWeight: active ? 600 : 400,
        marginRight:6, marginBottom:6
      }}>{children}</button>
  );

  // V74/V75 (2026-04-28) — premium per-mode tabs + sub-section navigation.
  // Modes are colour-coded so the user can read at a glance which mode they
  // are configuring. Tooltips explain in trader language (no programming
  // jargon) what each mode is for.
  const MODE_META = {
    SCALP:  { color: "#22c55e", bg: "rgba(34,197,94,0.10)",  label: "SCALP",  emoji: "⚡", help: "Operaciones rápidas (5-15 min). Beneficios pequeños y constantes. SL apretado, TP rápido." },
    NORMAL: { color: "#a78bfa", bg: "rgba(167,139,250,0.10)", label: "NORMAL", emoji: "🎯", help: "Operativa estándar (15-45 min). Equilibrio entre paciencia y velocidad. La mayoría de variantes históricas viven aquí." },
    SWING:  { color: "#f59e0b", bg: "rgba(245,158,11,0.10)",  label: "SWING",  emoji: "🌊", help: "Operativa larga (30-120+ min). Solo entradas premium con muchas estrellas alineadas. SL amplio, TP grande." },
  };
  const SECTION_META = {
    experiments: { label: "Experimentos",        emoji: "🧪", help: "Aquí creas y editas tus variantes (los 'qué pasaría si...'). Cada variante simula una idea contra los trades reales sin tocar producción." },
    results:     { label: "Resultados",          emoji: "📊", help: "Lo que el bot 'habría ganado o perdido' con cada variante. Aquí decides cuál merece pasar a producción y cuál descartar." },
    logs:        { label: "Logs detalle",        emoji: "🔍", help: "Línea por línea: cada candidato evaluado y cada salida comparada. Útil para investigar casos concretos cuando algo te llama la atención." },
  };
  const cur = MODE_META[shadowMode] || MODE_META.NORMAL;
  // Variant type → friendly badge metadata. Maps name prefix to template
  // family so the user sees "STRAT" / "SL" / "TP" etc. as a colored chip
  // before the variant name in the active variants table. Lets them spot
  // "all my SL sweep variants are negative" at a glance.
  const VARIANT_TYPE_META = {
    STRAT:    { label: "STRAT",    color: "#a78bfa", bg: "rgba(167,139,250,0.15)", help: "Variante del A/B de estrategias — imita una estrategia concreta del modo." },
    SL:       { label: "SL",       color: "#ef4444", bg: "rgba(239,68,68,0.13)",   help: "Variante del barrido de Stop Loss." },
    TP:       { label: "TP",       color: "#22c55e", bg: "rgba(34,197,94,0.13)",   help: "Variante del barrido de Take Profit." },
    ROI:      { label: "ROI",      color: "#f59e0b", bg: "rgba(245,158,11,0.13)",  help: "Variante de Paciencia (perfil ROI)." },
    QUALITY:  { label: "QUAL",     color: "#22d3ee", bg: "rgba(34,211,238,0.13)",  help: "Variante de Filtros de calidad." },
    COIN:     { label: "COIN",     color: "#ec4899", bg: "rgba(236,72,153,0.13)",  help: "Variante del A/B por liquidez de coin." },
    SIZE:     { label: "SIZE",     color: "#3b82f6", bg: "rgba(59,130,246,0.13)",  help: "Variante del A/B de tamaño de posición." },
    TIMING:   { label: "TIMING",   color: "#8b5cf6", bg: "rgba(139,92,246,0.13)",  help: "Variante del Momento de entrada (score min)." },
    SIDE:     { label: "SIDE",     color: "#10b981", bg: "rgba(16,185,129,0.13)",  help: "Variante de Solo LONG vs Solo SHORT." },
    LIB:      { label: "LIB",      color: "#06b6d4", bg: "rgba(6,182,212,0.13)",   help: "Instalada desde la Biblioteca de strategies." },
    TRAIL:    { label: "TRAIL",    color: "#fbbf24", bg: "rgba(251,191,36,0.13)",  help: "Variante del barrido de trailing stop." },
    COOLDOWN: { label: "COOLDN",   color: "#a3a3a3", bg: "rgba(163,163,163,0.13)", help: "Variante del A/B de cooldown entre trades." },
    B1:       { label: "B1",       color: "#f43f5e", bg: "rgba(244,63,94,0.13)",   help: "Filtro pre-entry B1 Confluence — bloquea entradas antes de que se abran si fallan checks de calidad (trend, BTC macro, RSI, posición de precio)." },
    MANUAL:   { label: "MANUAL",   color: "#94a3b8", bg: "rgba(148,163,184,0.13)", help: "Variante manual creada por el usuario." },
  };
  const variantTypeOf = (variant) => {
    // V76 — accepts either a name string (legacy) or a variant object (so
    // confluence rows tagged with _kind="confluence" can be detected).
    if (variant && typeof variant === "object") {
      if (variant._kind === "confluence") return "B1";
      return variantTypeOf(variant.name);
    }
    const name = variant;
    if (!name) return "MANUAL";
    if (name.startsWith("auto-strat-"))    return "STRAT";
    if (name.startsWith("auto-sl-"))       return "SL";
    if (name.startsWith("auto-tp-"))       return "TP";
    if (name.startsWith("auto-roi-"))      return "ROI";
    if (name.startsWith("auto-quality-"))  return "QUALITY";
    if (name.startsWith("auto-coin-"))     return "COIN";
    if (name.startsWith("auto-size-"))     return "SIZE";
    if (name.startsWith("auto-timing-"))   return "TIMING";
    if (name.startsWith("auto-side-"))     return "SIDE";
    if (name.startsWith("auto-trail-"))    return "TRAIL";
    if (name.startsWith("auto-cooldown-")) return "COOLDOWN";
    if (name.startsWith("lib-"))           return "LIB";
    return "MANUAL";
  };
  // ELI5 metadata for the auto-templates — surfaced in the wizard modal so
  // the user reads in trader Spanish what each template actually tests and
  // what to expect from it. NO programming jargon.
  const WIZARD_META = {
    STRATEGY_AB:    { icon:"🧬", label:"A/B de estrategias",
                      eli5: "Crea una variante por cada estrategia que tienes activa en este modo. Cada una imita exactamente lo que haría esa estrategia si fuera la única que disparara.",
                      expect: "Te dice cuál de tus estrategias habría dado más ganancia en los mismos trades. La 'campeona' es candidata a quedarse sola en producción." },
    SL_SWEEP:       { icon:"🛡️", label:"Barrido de Stop Loss",
                      eli5: "3 variantes con stop loss distinto: estricto, normal, holgado. Mismo trade, distinta tolerancia a la pérdida.",
                      expect: "Si la holgada gana mucho más → tu SL actual está cortando ganadoras. Si la estricta gana → estás aguantando pérdidas que deberías cortar antes." },
    TP_SWEEP:       { icon:"🎯", label:"Barrido de Take Profit",
                      eli5: "3 variantes con take profit distinto: rápido, medio, amplio. Mismo trade, distinto objetivo de cierre.",
                      expect: "Si la amplia gana → estás cerrando demasiado pronto y dejando dinero. Si la rápida gana → tu TP actual es muy ambicioso y los precios se dan la vuelta antes." },
    PATIENCE:       { icon:"⏱️", label:"Paciencia (ROI)",
                      eli5: "3 perfiles de paciencia: cierra rápido al primer beneficio, equilibrado, o aguanta más tiempo en posición.",
                      expect: "Mide si vale la pena esperar más tiempo. En mercado lateral la rápida suele ganar; en tendencia clara la paciente." },
    QUALITY_FILTER: { icon:"🔎", label:"Filtros de calidad",
                      eli5: "3 variantes que rechazan entradas según cuán arriesgadas son: solo HIGH risk, MED+HIGH, o WEAK también.",
                      expect: "Te dice si ser más selectivo aumenta el net (menos trades pero mejores) o si pierdes oportunidades buenas con falsos positivos." },
    COIN_AB:        { icon:"💰", label:"A/B por liquidez",
                      eli5: "3 variantes que solo operan en coins de liquidez ALTA, MEDIA o BAJA. Útil para saber dónde tu edge es real.",
                      expect: "Si la HIGH gana → mejor quedarte con BTC/ETH/SOL/HYPE. Si la LOW gana → tu edge está en memecoins." },
    SIZE_AB:        { icon:"📦", label:"A/B de tamaño",
                      eli5: "3 variantes con tamaño de posición distinto: pequeño, medio, grande. Útil para saber si tu edge escala.",
                      expect: "Si gana el grande sin más slippage → puedes subir colateral. Si solo el pequeño gana → tu estrategia es sensible al tamaño." },
    ENTRY_TIMING:   { icon:"⚡", label:"Momento de entrada",
                      eli5: "3 variantes que entran antes (señal débil), normal o esperando confirmación (señal fuerte).",
                      expect: "Mide si vale esperar más confirmación. Esperar reduce trades pero mejora win rate; entrar antes da más oportunidades pero más ruido." },
    TRAIL_SWEEP:    { icon:"🧲", label:"Trailing stop",
                      eli5: "3 variantes con trailing stop distinto: estricto, normal, holgado. Cuándo dejar correr al ganador.",
                      expect: "Si el holgado gana → tu trailing actual cierra ganadoras demasiado pronto. Si el estricto gana → das de más al peak y luego retroceden." },
    SIDE_AB:        { icon:"⇅", label:"Solo LONG vs solo SHORT",
                      eli5: "2 variantes: una solo abre LONG, otra solo SHORT. Mide en qué dirección tienes ventaja real.",
                      expect: "Si una pierde mucho más que la otra → desactiva ese lado en producción. Tu edge no es bidireccional siempre." },
    COOLDOWN_AB:    { icon:"⏳", label:"Cooldown entre trades",
                      eli5: "3 variantes con tiempo de espera distinto entre trades de la misma coin: 5, 10 o 30 minutos.",
                      expect: "Cooldown corto = más trades pero más ruido (revenge trading). Cooldown largo = menos trades pero cada uno más selectivo." },
  };

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, flexWrap:"wrap"}}>
      <div>
        {t("shadow.title")}
        <div className="page-sub">{t("shadow.subtitle")}</div>
      </div>
      <LivePulse intervalSec={15} />
    </div>

    {/* ─────────── UNIFIED MODE + SUB-SECTION CONTAINER (V74) ───────────
         Mode pills + sub-tabs share a single tinted container so the user
         reads them as the SAME group: "I'm in {mode} → looking at {section}".
         The mode color flows through the entire container border, the sub-
         tab active border, the helper banner accent. */}
    <div style={{
      marginBottom: 16,
      border: "1px solid " + cur.color + "44",
      borderRadius: 12,
      overflow: "hidden",
      background: "linear-gradient(180deg, " + cur.bg + " 0%, transparent 100%)"
    }}>

      {/* Top row: mode pills + active mode help text */}
      <div style={{
        display: "flex", alignItems: "center", gap: 10,
        padding: "12px 16px",
        borderBottom: "1px solid " + cur.color + "22",
        flexWrap: "wrap"
      }}>
        <div style={{fontSize: 10, color: "#888", fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", marginRight: 4}}>
          Modo
        </div>
        {["SCALP", "NORMAL", "SWING"].map(m => {
          const meta = MODE_META[m];
          const active = m === shadowMode;
          return (
            <button key={m}
              onClick={() => setShadowMode(m)}
              title={meta.help}
              style={{
                padding: "7px 14px",
                borderRadius: 999,
                border: "1px solid " + (active ? meta.color : "#1a1a2e"),
                background: active ? meta.bg : "transparent",
                color: active ? meta.color : "#777",
                fontWeight: active ? 700 : 500,
                fontSize: 12,
                letterSpacing: 0.3,
                cursor: "pointer",
                display: "flex", alignItems: "center", gap: 6,
                transition: "all 0.15s ease"
              }}>
              <span>{meta.emoji}</span> {meta.label}
            </button>
          );
        })}
        <div style={{flex: 1, minWidth: 12}} />
        <div style={{fontSize: 11, color: cur.color, fontWeight: 500, fontStyle: "italic", maxWidth: 480, opacity: 0.85}}>
          {cur.help}
        </div>
      </div>

      {/* Bottom row: sub-section tabs sitting flush below the pills.
          Active tab carries a thicker bottom border in the mode color so the
          eye reads "this section is part of THIS mode". */}
      <div style={{
        display: "flex", gap: 0,
        background: "rgba(0,0,0,0.18)",
        flexWrap: "wrap"
      }}>
        {Object.entries(SECTION_META).map(([key, meta]) => {
          const active = key === shadowSection;
          return (
            <button key={key}
              onClick={() => setShadowSection(key)}
              title={meta.help}
              style={{
                padding: "11px 22px",
                border: "none",
                borderBottom: "3px solid " + (active ? cur.color : "transparent"),
                background: active ? "rgba(255,255,255,0.025)" : "transparent",
                color: active ? "#e0e0e8" : "#666",
                fontWeight: active ? 700 : 500,
                fontSize: 12,
                letterSpacing: 0.3,
                cursor: "pointer",
                display: "flex", alignItems: "center", gap: 8,
                transition: "all 0.15s ease"
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.color = "#aaa"; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.color = "#666"; }}>
              <span style={{fontSize: 14}}>{meta.emoji}</span> {meta.label}
              <span style={{fontSize: 10, color: "#555", fontWeight: 400, marginLeft: 2, cursor: "help"}}>?</span>
            </button>
          );
        })}
      </div>

      {/* Helper banner — INSIDE the same container so it reads as part of
          the mode/section context, not as a floating note. */}
      <div style={{
        padding: "10px 16px",
        background: "rgba(0,0,0,0.25)",
        borderTop: "1px solid " + cur.color + "22",
        fontSize: 11, color: "#aaa", lineHeight: 1.55
      }}>
        <span style={{color: cur.color, fontWeight: 700}}>{SECTION_META[shadowSection].emoji} {SECTION_META[shadowSection].label}:</span>
        {" "}{SECTION_META[shadowSection].help}
      </div>
    </div>

    {err && <div style={{padding:12, background:"#2a1010", border:"1px solid #ef4444", borderRadius:6, color:"#ef4444", marginBottom:12, fontSize:12}}>{err}</div>}

    {/* Impact-window selector — only shown in EXPERIMENTOS where the active
        variants table consumes the impact analysis (the chip per row reads
        from `impact` state). Hiding it from RESULTADOS / LOGS keeps each
        sub-tab focused on its own dataset. */}
    {shadowSection === "experiments" && (
    <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap"}}>
      <span style={{fontSize:11, color:"#888"}}>{t("shadow.impact_title")} ({t("shadow.impact_meta", {n: impact.variants?.length || 0})}):</span>
      <select value={impactDays} onChange={e => setImpactDays(Number(e.target.value))}
        style={{padding:"3px 8px", fontSize:11, background:"var(--bg-panel)", border:"1px solid var(--border-subtle)", color:"var(--text-dim)", borderRadius:4}}>
        <option value={1}>{t("shadow.impact.days_1")}</option>
        <option value={3}>{t("shadow.impact.days_3")}</option>
        <option value={7}>{t("shadow.impact.days_7")}</option>
        <option value={14}>{t("shadow.impact.days_14")}</option>
        <option value={30}>{t("shadow.impact.days_30")}</option>
      </select>
      <span style={{fontSize:10, color:"#666"}}>· Pulsa una variante en la tabla para ver su análisis completo</span>
    </div>
    )}

    {/* ── REMOVED 2026-04-27: ANÁLISIS DE IMPACTO panel.
        User feedback: too dominant at top, cuts off on mobile. Replaced by
        Impacto column in the Variantes Activas table + a new IMPACTO
        section inside the variant detail modal (click row to open). ── */}
    <div style={{display:"none"}}><div className="panel" style={{marginBottom:18}}>
      <div className="panel-title">
        {t("shadow.impact_title")}
        <span className="meta">
          <select value={impactDays} onChange={e => setImpactDays(Number(e.target.value))}
            style={{marginRight:10, padding:"3px 8px", fontSize:10, background:"var(--bg-panel)", border:"1px solid var(--border-subtle)", color:"var(--text-dim)", borderRadius:4}}>
            <option value={1}>{t("shadow.impact.days_1")}</option>
            <option value={3}>{t("shadow.impact.days_3")}</option>
            <option value={7}>{t("shadow.impact.days_7")}</option>
            <option value={14}>{t("shadow.impact.days_14")}</option>
            <option value={30}>{t("shadow.impact.days_30")}</option>
          </select>
          {t("shadow.impact_meta", {n: impact.variants?.length || 0})}
        </span>
      </div>

      {/* Cómo leer esto — tooltip permanente arriba del todo */}
      <div className="diag info" style={{marginBottom:16}}>
        <div className="diag-label">{t("shadow.how_to_read")}</div>
        <div className="diag-text" style={{lineHeight:1.55}}
             dangerouslySetInnerHTML={{__html: t("shadow.how_to_read_body")}} />
      </div>

      {(!impact.variants || impact.variants.length === 0) ? (
        <div style={{color:"var(--text-muted)", fontSize:12, padding:8}}>
          {t("shadow.impact_empty")}
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          {/* Sort: strong candidates first, then positive, neutral, negative, insufficient, observer */}
          {[...impact.variants].sort((a, b) => {
            const rank = (v) => ({
              CANDIDATE_STRONG: 0, POSITIVE: 1, NEUTRAL: 2, NEGATIVE: 3,
              INSUFFICIENT_DATA: 4, OBSERVER: 5
            }[v.verdict] ?? 99);
            return rank(a) - rank(b);
          }).map(v => {
            const verdictCls = {
              CANDIDATE_STRONG: "ok",
              POSITIVE: "ok",
              NEUTRAL: "info",
              NEGATIVE: "bad",
              INSUFFICIENT_DATA: "warn",
              OBSERVER: "info",
            }[v.verdict] || "info";
            const verdictLabel = {
              CANDIDATE_STRONG: t("shadow.verdict.candidate_strong"),
              POSITIVE: t("shadow.verdict.positive"),
              NEUTRAL: t("shadow.verdict.neutral"),
              NEGATIVE: t("shadow.verdict.negative"),
              INSUFFICIENT_DATA: t("shadow.verdict.insufficient"),
              OBSERVER: t("shadow.verdict.observer"),
            }[v.verdict] || v.verdict;

            const isExit = v.kind === "EXIT";
            return (
              <div key={v.name}
                onClick={() => {
                  // Find the corresponding variant config from `variants` list and open
                  // the detail modal. Bug 2026-04-27 user request: cards showed
                  // "ganamos" but had no way to drill down into config/decisions/exits.
                  const variantCfg = variants.find(x => x.name === v.name);
                  if (variantCfg) setDetailsModal(variantCfg);
                  else setDetailsModal({name: v.name, _impactOnly: true, _impact: v});
                }}
                style={{
                  background: "var(--bg-panel)",
                  border: "1px solid var(--border-subtle)",
                  borderLeft: "3px solid " + (verdictCls === "ok" ? "var(--pos)" : verdictCls === "bad" ? "var(--neg)" : verdictCls === "warn" ? "var(--warn)" : "var(--info)"),
                  borderRadius: 8,
                  padding: "14px 18px",
                  cursor: "pointer",
                  transition: "border-color 0.15s, transform 0.15s",
                }}
                onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.borderColor = "#3a3a55"; }}
                onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.borderColor = "var(--border-subtle)"; }}>
                {/* Header row: name + kind tag + verdict chip */}
                <div style={{display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", marginBottom:10}}>
                  <div style={{fontSize:14, fontWeight:600, color:"var(--text)", fontFamily:"var(--font-mono)"}}>{v.name}</div>
                  <span style={{
                    fontSize:9, fontWeight:600, letterSpacing:0.8, textTransform:"uppercase",
                    padding:"2px 8px", borderRadius:3,
                    background: v.kind === "EXIT" ? "rgba(167,139,250,0.14)" : v.kind === "SIZING" ? "rgba(251,191,36,0.14)" : "rgba(56,189,248,0.14)",
                    color: v.kind === "EXIT" ? "var(--accent-violet)" : v.kind === "SIZING" ? "var(--warn-hi)" : "var(--accent-hi)",
                  }}>{v.kind === "EXIT" ? t("shadow.kind.exit") : v.kind === "SIZING" ? t("shadow.kind.sizing") : t("shadow.kind.filter")}</span>
                  <span style={{marginLeft:"auto", padding:"3px 10px", borderRadius:4, fontSize:10, fontWeight:700, letterSpacing:0.6, textTransform:"uppercase",
                    background: verdictCls === "ok" ? "rgba(16,185,129,0.14)" : verdictCls === "bad" ? "rgba(244,63,94,0.14)" : verdictCls === "warn" ? "rgba(245,158,11,0.14)" : "rgba(56,189,248,0.12)",
                    color: verdictCls === "ok" ? "var(--pos-hi)" : verdictCls === "bad" ? "var(--neg-hi)" : verdictCls === "warn" ? "var(--warn-hi)" : "var(--accent-hi)",
                  }}>{verdictLabel}</span>
                </div>

                {/* Description */}
                <div style={{fontSize:11.5, color:"var(--text-muted)", marginBottom:12, lineHeight:1.5}}>{v.description}</div>

                {/* Metrics grid */}
                {isExit ? (
                  <div className="kpi-strip" style={{marginBottom:12, background:"var(--bg-base)", borderRadius:6, padding:"8px 0"}}>
                    <div>
                      <div className="k">{t("shadow.kpi.comparable")}</div>
                      <div className="v">{v.simTotal ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.both_evaluated")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.won_vs_prod")}</div>
                      <div className="v pos">{v.simWinsVsProd ?? 0}</div>
                      <div className="sub">{v.simTotal ? Math.round(100*(v.simWinsVsProd||0)/v.simTotal) : 0}{t("shadow.kpi.win_rate")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.lost_vs_prod")}</div>
                      <div className="v neg">{v.simLossesVsProd ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.delta_neg")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.sum_delta")}</div>
                      <div className={"v " + ((v.sumDeltaUsd||0) > 0 ? "pos" : (v.sumDeltaUsd||0) < 0 ? "neg" : "")}>
                        {(v.sumDeltaUsd||0) >= 0 ? "+" : ""}${(v.sumDeltaUsd||0).toFixed(2)}
                      </div>
                      <div className="sub">{t("shadow.kpi.total_delta_sub")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.best_worst")}</div>
                      <div className="v" style={{fontSize:13}}>
                        <span style={{color:"var(--pos-hi)"}}>+${(v.bestDeltaUsd||0).toFixed(2)}</span>
                        <span style={{color:"var(--text-soft)"}}> · </span>
                        <span style={{color:"var(--neg-hi)"}}>${(v.worstDeltaUsd||0).toFixed(2)}</span>
                      </div>
                      <div className="sub">{t("shadow.kpi.pending_realfirst", {p: v.simPending||0, r: v.simRealFirst||0})}</div>
                    </div>
                  </div>
                ) : (
                  <div className="kpi-strip" style={{marginBottom:12, background:"var(--bg-base)", borderRadius:6, padding:"8px 0"}}>
                    <div>
                      <div className="k">{t("shadow.kpi.evaluated")}</div>
                      <div className="v">{v.evalTotal ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.total_candidates")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.would_fire")}</div>
                      <div className="v">{v.evalFired ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.flow_pct", {p: v.evalTotal ? Math.round(100*(v.evalFired||0)/v.evalTotal) : 0})}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.would_block")}</div>
                      <div className="v warn">{v.evalBlocked ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.matched", {n: v.matched ?? 0})}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.losses_saved")}</div>
                      <div className="v pos">{v.lossesSaved ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.losses_saved_sub")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.wins_missed")}</div>
                      <div className="v neg">{v.winsMissed ?? 0}</div>
                      <div className="sub">{t("shadow.kpi.wins_missed_sub")}</div>
                    </div>
                    <div>
                      <div className="k">{t("shadow.kpi.sum_saved")}</div>
                      <div className={"v " + ((v.sumSavedUsd||0) > 0 ? "pos" : (v.sumSavedUsd||0) < 0 ? "neg" : "")}>
                        {(v.sumSavedUsd||0) >= 0 ? "+" : ""}${(v.sumSavedUsd||0).toFixed(2)}
                      </div>
                      <div className="sub">{t("shadow.kpi.sum_saved_sub")}</div>
                    </div>
                  </div>
                )}

                {/* Per-mode breakdown — so SCALP/NORMAL/SWING verdicts do not get washed out in the aggregate */}
                {v.byMode && (() => {
                  const MODES = ["SCALP", "NORMAL", "SWING"];
                  const rows = MODES
                    .map(m => ({mode: m, data: v.byMode[m] || {}}))
                    .filter(r => (isExit ? (r.data.simTotal || 0) > 0 : (r.data.matched || 0) > 0));
                  if (rows.length === 0) return null;
                  const chipCls = (vrd) => ({
                    CANDIDATE_STRONG: {bg:"rgba(16,185,129,0.14)", fg:"var(--pos-hi)"},
                    POSITIVE: {bg:"rgba(16,185,129,0.10)", fg:"var(--pos)"},
                    NEUTRAL: {bg:"rgba(56,189,248,0.10)", fg:"var(--accent-hi)"},
                    NEGATIVE: {bg:"rgba(244,63,94,0.14)", fg:"var(--neg-hi)"},
                    INSUFFICIENT_DATA: {bg:"rgba(245,158,11,0.12)", fg:"var(--warn-hi)"},
                    OBSERVER: {bg:"rgba(148,163,184,0.10)", fg:"var(--text-muted)"},
                  }[vrd] || {bg:"rgba(148,163,184,0.10)", fg:"var(--text-muted)"});
                  return (
                    <div style={{marginBottom:12, background:"var(--bg-base)", borderRadius:6, padding:"10px 12px"}}>
                      <div style={{fontSize:10, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:0.8, marginBottom:8, fontWeight:600}}>
                        {t("shadow.kpi.by_mode")}
                      </div>
                      <table style={{width:"100%", fontSize:11, borderCollapse:"collapse"}}>
                        <thead>
                          <tr style={{color:"var(--text-soft)", fontSize:10}}>
                            <th style={{textAlign:"left", padding:"3px 6px", fontWeight:500}}>{t("shadow.kpi.mode")}</th>
                            <th style={{textAlign:"right", padding:"3px 6px", fontWeight:500}}>{isExit ? t("shadow.kpi.comparable") : t("shadow.kpi.matched_col")}</th>
                            <th style={{textAlign:"right", padding:"3px 6px", fontWeight:500}}>{isExit ? t("shadow.kpi.won_col") : t("shadow.kpi.saved_col")}</th>
                            <th style={{textAlign:"right", padding:"3px 6px", fontWeight:500}}>{isExit ? t("shadow.kpi.lost_col") : t("shadow.kpi.missed_col")}</th>
                            <th style={{textAlign:"right", padding:"3px 6px", fontWeight:500}}>{isExit ? t("shadow.kpi.sum_delta_col") : t("shadow.kpi.sum_saved_col")}</th>

                "INSUFFICIENT_DATA":  { color:"#f59e0b", bg:"rgba(245,158,11,0.04)", label:"⏳ Sin datos",  help:"Aún no hay trades suficientes para juzgarla. Déjala correr unos días más." },
                "OBSERVER":           { color:"#888",    bg:"transparent",           label:"👁 Observador", help:"La variante no bloquea ni cambia decisiones, solo registra. Útil para medir, no para promover." },
                "NEUTRAL":            { color:"#888",    bg:"transparent",           label:"≈ Neutral",     help:"Resultado parecido a producción. No aporta ni quita." },
              };
              const vm = verdictMeta[verdict] || { color:"#666", bg:"transparent", label:"—", help:"Aún sin verdict." };
              const deltaPnl = imp?.simNetUsd != null && imp?.realNetUsd != null
                ? Number(imp.simNetUsd) - Number(imp.realNetUsd)
                : null;
              const isPromotable = verdict === "CANDIDATE_STRONG" || verdict === "POSITIVE";
              return (
                <tr key={v.name} onClick={() => setDetailsModal(v)}
                  style={{borderBottom:"1px solid #181828", cursor:"pointer", background: vm.bg}}
                  onMouseEnter={e => e.currentTarget.style.background = "#0e0e18"}
                  onMouseLeave={e => e.currentTarget.style.background = vm.bg}>
                  <td style={{padding:"6px 4px"}}>
                    {(() => {
                      const tm = VARIANT_TYPE_META[variantTypeOf(v)] || VARIANT_TYPE_META.MANUAL;
                      return (
                        <span title={tm.help} style={{
                          display:"inline-block", padding:"2px 7px",
                          fontSize:9, fontWeight:700, letterSpacing:0.5,
                          color: tm.color, background: tm.bg,
                          border: "1px solid " + tm.color + "44",
                          borderRadius:4, whiteSpace:"nowrap"
                        }}>{tm.label}</span>
                      );
                    })()}
                  </td>
                  <td style={{padding:"6px 4px", fontWeight:600, color:"#e0e0e8"}}>{v.name}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockLateEntryRisks) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockQualityLabels) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockSides) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#aaa", fontSize:11}}>{(() => {
                    // V74 (2026-04-28) — friendly mode label. blockModes is
                    // negative ("don't fire on these"), so we flip it to the
                    // positive form "Solo X" / "Todos" so the user reads
                    // exactly the modes the variant covers without having to
                    // do mental arithmetic.
                    const blocked = Array.isArray(v.blockModes)
                      ? v.blockModes
                      : (typeof v.blockModes === "string" && v.blockModes ? v.blockModes.split(",").map(s => s.trim()) : []);
                    const all = ["SCALP","NORMAL","SWING"];
                    const allowed = all.filter(m => !blocked.includes(m));
                    if (allowed.length === all.length) return <span style={{color:"#888"}}>Todos</span>;
                    if (allowed.length === 1) {
                      const m = allowed[0];
                      const c = m === "SCALP" ? "#22c55e" : m === "SWING" ? "#f59e0b" : "#a78bfa";
                      return <span style={{color:c, fontWeight:600}}>Solo {m}</span>;
                    }
                    return <span style={{color:"#aaa"}}>{allowed.join(" + ")}</span>;
                  })()}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockCoins) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#aaa"}}>{v.minScoreOverride > 0 ? v.minScoreOverride : <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#aaa"}}>{v.collateralOverrideUsd > 0 ? ("$" + v.collateralOverrideUsd) : <span style={{color:"#555"}}>prod</span>}</td>
                  <td style={{color: v.blockImpulseExhausted ? "#f59e0b" : "#555"}}>{v.blockImpulseExhausted ? "ON" : "off"}</td>
                  <td style={{color:"#22d3ee", fontSize:10}}>{(() => {
                    if (v._kind === "confluence") {
                      // For B1 confluence variants the meaningful "config" is
                      // the set of pre-entry checks and their thresholds —
                      // shown here in compact form so the row is informative
                      // without forcing the user to open the modal.
                      const chips = [];
                      if (v.confluenceMaxFailedChecks != null) chips.push("max_fail=" + v.confluenceMaxFailedChecks);
                      if (Number(v.confluenceRsiMaxLong) > 0) chips.push("RSI_L≤" + v.confluenceRsiMaxLong);
                      if (Number(v.confluenceRsiMinShort) > 0) chips.push("RSI_S≥" + v.confluenceRsiMinShort);
                      if (Number(v.confluenceMaxPricePositionLong) > 0) chips.push("PP_L≤" + v.confluenceMaxPricePositionLong);
                      if (Number(v.confluenceMinPricePositionShort) > 0) chips.push("PP_S≥" + v.confluenceMinPricePositionShort);
                      return <span style={{color:"#f43f5e"}} title="Configuración del filtro B1 Confluence — bloquea entradas que fallan más de N de estos checks.">{chips.join(" · ")}</span>;
                    }
                    return exitChips.length > 0 ? exitChips.join(" · ") : <span style={{color:"#555"}}>—</span>;
                  })()}</td>
                  <td style={{textAlign:"right", whiteSpace:"nowrap"}} title={vm.help}>
                    <div style={{color: vm.color, fontSize: 10, fontWeight: 700, letterSpacing: 0.3, cursor:"help"}}>{vm.label}</div>
                    {deltaPnl != null && (
                      <div style={{color: deltaPnl >= 0 ? "#22c55e" : "#ef4444", fontSize: 10, fontFamily:"monospace"}}

                        {(deltaPnl >= 0 ? "+" : "") + "$" + deltaPnl.toFixed(2)}
                      </div>
                    )}
                  </td>
                  <td style={{textAlign:"right", whiteSpace:"nowrap", paddingRight: 6}}>
                    {isPromotable ? (
                      <button
                        onClick={(e) => { e.stopPropagation(); promoteToBot(v.name); }}

                        style={{
                          padding: "4px 10px", borderRadius: 6,
                          background: "rgba(34,197,94,0.15)", border: "1px solid #22c55e55",
                          color: "#22c55e", fontWeight: 600, fontSize: 10, cursor: "pointer",
                          whiteSpace: "nowrap"
                        }}>
                        → Promover
                      </button>
                    ) : (
                      <span style={{color:"#666", fontSize:14}}>›</span>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>

    {/* ── New variant form — wrapped in a modal (2026-04-26 mobile UX) ── */}

      {/* Nombre */}

              <th style={{padding:"4px 6px"}}>Hora</th>

    {/* ── Shadow Exits — resumen por variante (RESULTADOS) ── */}
    {shadowSection === "results" && (<>
    <h3 className="section-title">{t("shadow.exits_title")}
      <select value={exitsHours} onChange={e => setExitsHours(Number(e.target.value))} style={{marginLeft:10, padding:"2px 6px", fontSize:10, background:"#0a0a13", border:"1px solid #333", color:"#ccc", borderRadius:3}}>
        <option value={24}>24h</option>
        <option value={72}>72h</option>

        <option value={336}>14d</option>

                <React.Fragment key={s.variant}>
                  <tr style={{borderBottom:"1px dotted #181828"}}>
                    <td style={{padding:"6px 4px", fontWeight:600, color:"#e0e0e8"}}>{s.variant}</td>
                    <td style={{color:"#aaa"}}>{s.total}</td>
                    <td style={{color:"#888"}}>{s.pending}</td>
                    <td style={{color:"#22d3ee"}}>{s.variantFirst}</td>
                    <td style={{color:"#f59e0b"}}>{s.realFirst}</td>
                    <td style={{color:"#ccc"}}>{s.bothEvaluated}</td>
                    <td style={{color: s.winRate > 50 ? "#22c55e" : s.winRate > 0 ? "#f59e0b" : "#888", fontWeight:600}}>

                    <td style={{color: s.sumDeltaPnlUsd > 0 ? "#22c55e" : s.sumDeltaPnlUsd < 0 ? "#ef4444" : "#888", fontWeight:600}}>
                      ${s.sumDeltaPnlUsd}
                    </td>
                  </tr>
                  {MODES.map(m => {
                    const ms = byMode[m] || {};
                    if (!ms.total) return null;
                    return (
                      <tr key={s.variant + ":" + m} style={{borderBottom:"1px solid #181828", background:"#0b0b13"}}>
                        <td style={{padding:"3px 4px 3px 18px", color:"#6b7280", fontSize:10, fontFamily:"var(--font-mono)"}}>↳ {m}</td>
                        <td style={{color:"#6b7280", fontSize:10}}>{ms.total}</td>
                        <td style={{color:"#4b5563", fontSize:10}}>{ms.pending}</td>
                        <td style={{color:"#22d3ee", fontSize:10, opacity:0.7}}>{ms.variantFirst}</td>
                        <td style={{color:"#f59e0b", fontSize:10, opacity:0.7}}>{ms.realFirst}</td>
                        <td style={{color:"#6b7280", fontSize:10}}>{ms.bothEvaluated}</td>
                        <td style={{color: ms.winRate > 50 ? "#22c55e" : ms.winRate > 0 ? "#f59e0b" : "#6b7280", fontSize:10, opacity:0.8}}>
                          {ms.comparable > 0 ? ms.winRate + "%" : "—"}
                          {ms.comparable > 0 && <span style={{color:"#374151", marginLeft:3, fontSize:9}}>({ms.variantWins}/{ms.comparable})</span>}
                        </td>
                        <td style={{color: ms.sumDeltaPnlUsd > 0 ? "#22c55e" : ms.sumDeltaPnlUsd < 0 ? "#ef4444" : "#6b7280", fontSize:10, opacity:0.85}}>
                          ${ms.sumDeltaPnlUsd}

                      </tr>

                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      )}

    {/* ── A/B Strategy Test (Phase C, 2026-04-26) ─────────────────────
         Compares shadow exits grouped by (real_strategy, shadow_strategy).
         Same row when sameStrategy=true means the variant tracks the same
         strategy with different exit params (legacy use). Different rows
         show the head-to-head: "if Relax had been active for trades that
         Abierto fired, would it have closed better?". */}
    {byStrategy && byStrategy.length > 0 && (<>
      <h3 className="section-title">📊 A/B Strategy Test
        <Tip text="Toma cada trade real y simula qué habría pasado si la salida hubiese sido evaluada por la estrategia de la variante en su lugar. Σ ΔPnL positivo = la variante habría cerrado mejor que la estrategia real en ese mismo conjunto de entradas. Mira la columna 'n' para ver cuántos trades alimentan cada comparación — pocos samples = ruido." />
      </h3>
      <div className="card" style={{marginBottom:12, padding:8}}>
        <div style={{fontSize:10, color:"#888", marginBottom:6}}>
          Roll-up of shadow exits over the last {exitsHours}h, grouped by the
          strategy that fired the real trade vs the strategy the variant tested.
          Positive Σ ΔPnL = the shadow strategy would have closed better than
          the real one on these same entries. {byStrategy.length} group(s).
        </div>
        <table style={{width:"100%", fontSize:11}}>
          <thead><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
            <th style={{padding:"6px 4px"}}>Real strategy</th>
            <th>Shadow strategy</th>
            <th>Total</th>
            <th>Both eval</th>
            <th>Variant wins</th>
            <th>Win rate</th>
            <th>Σ ΔPnL ($)</th>
          </tr></thead>
          <tbody>
            {byStrategy.map((row, i) => {
              const sameKey = row.sameStrategy;
              const delta = Number(row.sumDeltaPnlUsd || 0);
              const wr = Number(row.winRate || 0);
              return (
                <tr key={i} style={{borderBottom:"1px dotted #181828"}}>
                  <td style={{padding:"6px 4px", fontWeight:600, color:"#e0e0e8"}}>{row.strategyNameReal}</td>
                  <td style={{color: sameKey ? "#888" : "#a78bfa", fontWeight: sameKey ? 400 : 700}}>
                    {row.strategyNameShadow}
                    {!sameKey && <span style={{fontSize:9, marginLeft:4, color:"#666"}}>(override)</span>}
                  </td>
                  <td style={{color:"#aaa"}}>{row.total}</td>
                  <td style={{color:"#ccc"}}>{row.bothEvaluated}</td>
                  <td style={{color:"#22c55e"}}>{row.variantWins}/<span style={{color:"#ef4444"}}>{row.variantLosses}</span></td>
                  <td style={{color: wr >= 50 ? "#22c55e" : "#888"}}>{wr.toFixed(1)}%</td>
                  <td style={{color: delta >= 0 ? "#22c55e" : "#ef4444", fontWeight:700, fontFamily:"monospace"}}>
                    {delta >= 0 ? "+" : ""}{delta.toFixed(4)}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>)}
    </>)}{/* end RESULTADOS (Shadow Exits Summary + A/B) block */}

    {/* ── Shadow Exits — filas recientes (LOGS) ── */}
    {shadowSection === "logs" && (<>
    <h3 className="section-title">{t("shadow.recent_exits_title")}
      <Tip text={t("shadow.recent_exits_tip")} />
    </h3>
    <div className="card" style={{padding:8}}>
      {(!exits || exits.length === 0) ? (
        <div style={{color:"#666", fontSize:11, padding:8}}>{loading ? t("common.loading") : t("shadow.recent_exits_empty")}</div>
      ) : (
        <div style={{maxHeight:500, overflowY:"auto"}}>
          <table style={{width:"100%", fontSize:10}}>
            <thead style={{position:"sticky", top:0, background:"#0d0d17"}}><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
              <th style={{padding:"4px 6px"}}>Entrada</th>
              <th>Variante</th>
              <th>Coin</th>
              <th>Side</th>
              <th>Status</th>
              <th>Sim reason</th>
              <th>Sim hold</th>
              <th>Sim PnL</th>
              <th>Real reason</th>
              <th>Real hold</th>
              <th>Real PnL</th>
              <th>ΔPnL ($)</th>
            </tr></thead>
            <tbody>
              {exits.map(r => {
                const statusColor = r.status === "VARIANT_FIRST" ? "#22d3ee"
                  : r.status === "REAL_FIRST" ? "#f59e0b"
                  : r.status === "BOTH_EVALUATED" ? "#22c55e"
                  : "#666";
                const deltaColor = r.deltaPnlUsd == null ? "#555"
                  : Number(r.deltaPnlUsd) > 0 ? "#22c55e"
                  : Number(r.deltaPnlUsd) < 0 ? "#ef4444" : "#888";
                const fmtHold = (s) => s == null ? "—"

                return (
                  <tr key={r.id} style={{borderBottom:"1px solid #181828"}}>
                    <td style={{padding:"3px 6px", color:"#888", fontFamily:"monospace"}}>{r.entryTime ? r.entryTime.substring(5, 16).replace("T", " ") : ""}</td>
                    <td style={{color:"#e0e0e8"}}>{r.variantName}</td>
                    <td style={{color:"#ccc", fontWeight:600}}>{r.coin}</td>
                    <td style={{color: r.side === "LONG" ? "#22c55e" : "#ef4444"}}>{r.side}</td>
                    <td style={{color: statusColor, fontWeight:600, fontSize:9}}>{r.status}</td>
                    <td style={{color:"#22d3ee", fontSize:9}}>{r.simExitReason || "—"}</td>
                    <td style={{color:"#aaa"}}>{fmtHold(r.simHoldSeconds)}</td>
                    <td style={{color: r.simPnlUsd == null ? "#555" : Number(r.simPnlUsd) >= 0 ? "#22c55e" : "#ef4444"}}>

                    </td>
                    <td style={{color:"#f59e0b", fontSize:9}}>{r.realExitReason || "—"}</td>
                    <td style={{color:"#aaa"}}>{fmtHold(r.realHoldSeconds)}</td>
                    <td style={{color: r.realPnlUsd == null ? "#555" : Number(r.realPnlUsd) >= 0 ? "#22c55e" : "#ef4444"}}>
                      {r.realPnlUsd != null ? "$" + Number(r.realPnlUsd).toFixed(2) : "—"}
                    </td>
                    <td style={{color: deltaColor, fontWeight:600}}>
                      {r.deltaPnlUsd != null ? (Number(r.deltaPnlUsd) > 0 ? "+" : "") + "$" + Number(r.deltaPnlUsd).toFixed(2) : "—"}
                    </td>
                  </tr>
                );

            </tbody>
          </table>
        </div>
      )}
    </div>
    </>)}{/* end Recent exits LOGS block */}

    {/* ── Variant details modal — opens when a row is clicked ───────── */}
    {detailsModal && (() => {
      const v = detailsModal;
      const setStr = (s) => (s && s.length > 0 ? (Array.isArray(s) ? s : Array.from(s)).join(", ") : "—");

        <div style={{display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #181828", fontSize:11}}>
          <span style={{color:"#888"}}>{label}</span>
          <span style={{color: color || "#e0e0e8", fontFamily:"monospace", textAlign:"right", maxWidth:"60%", wordBreak:"break-all"}}>{value}</span>
        </div>
      );
      return (
        <div onClick={() => setDetailsModal(null)}
          style={{position:"fixed", inset:0, background:"rgba(3,4,10,0.78)", zIndex:1000,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  backdropFilter:"blur(3px)", padding:"4vh 4vw"}}>
          <div onClick={e => e.stopPropagation()}
            style={{background:"#0d0d17", border:"1px solid #2a2a40", borderRadius:10,

            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between",
                         padding:"12px 16px", borderBottom:"1px solid #1f1f30",
                         position:"sticky", top:0, background:"#0d0d17", zIndex:1}}>
              <div style={{fontSize:13, fontWeight:600, color:"#e0e0e8"}}>{v.name}</div>
              <button onClick={() => setDetailsModal(null)}
                style={{background:"transparent", border:"none", color:"#888", fontSize:22, cursor:"pointer", lineHeight:1}}>×</button>
            </div>

            <div style={{padding:"10px 16px"}}>
              {/* IMPACTO — moved here from the top panel (2026-04-27 user req).
                  Shows verdict + delta vs prod for this variant. Pulled from
                  parent's `impact` state. Only renders when we have data. */}
              {(() => {
                const imp = (impact.variants || []).find(x => x.name === v.name);
                if (!imp) return null;
                const verdictColor = imp.verdict === "CANDIDATE_STRONG" || imp.verdict === "POSITIVE" ? "#22c55e"
                  : imp.verdict === "NEGATIVE" ? "#ef4444"
                  : imp.verdict === "INSUFFICIENT_DATA" ? "#f59e0b"
                  : "#888";
                const verdictLabel = {
                  CANDIDATE_STRONG: t("shadow.verdict.candidate_strong"),
                  POSITIVE: t("shadow.verdict.positive"),
                  NEUTRAL: t("shadow.verdict.neutral"),
                  NEGATIVE: t("shadow.verdict.negative"),
                  INSUFFICIENT_DATA: t("shadow.verdict.insufficient"),
                  OBSERVER: t("shadow.verdict.observer"),
                }[imp.verdict] || imp.verdict;
                const deltaPnl = imp.simNetUsd != null && imp.realNetUsd != null
                  ? Number(imp.simNetUsd) - Number(imp.realNetUsd)
                  : null;
                return (
                  <>
                    <div style={{fontSize:10, fontWeight:600, color:"#22c55e", marginBottom:6, textTransform:"uppercase", letterSpacing:0.6}}>
                      Impacto ({impactDays}d)
                    </div>
                    <div style={{background:"#0a0a13", border:"1px solid #1f1f30", borderRadius:6, padding:10, marginBottom:14}}>
                      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8, flexWrap:"wrap"}}>
                        <span style={{padding:"3px 10px", borderRadius:4, fontSize:10, fontWeight:700, letterSpacing:0.6, textTransform:"uppercase",
                          background: "rgba(255,255,255,0.05)", color: verdictColor, border: "1px solid " + verdictColor + "44"}}>
                          {verdictLabel}
                        </span>
                        {imp.kind && (
                          <span style={{fontSize:9, fontWeight:600, letterSpacing:0.6, padding:"2px 8px", borderRadius:3,
                            background: imp.kind === "EXIT" ? "rgba(167,139,250,0.14)" : imp.kind === "SIZING" ? "rgba(251,191,36,0.14)" : "rgba(56,189,248,0.14)",
                            color: imp.kind === "EXIT" ? "#a78bfa" : imp.kind === "SIZING" ? "#f59e0b" : "#22d3ee"}}>{imp.kind}</span>
                        )}
                      </div>
                      {imp.description && <div style={{fontSize:11, color:"#aaa", marginBottom:8, lineHeight:1.5}}>{imp.description}</div>}
                      <table style={{width:"100%", fontSize:10, fontFamily:"monospace"}}>
                        <tbody>

                            <tr><td style={{color:"#888", padding:"2px 4px"}}>Comparables</td><td style={{textAlign:"right", color:"#e0e0e8"}}>{imp.simTotal}</td></tr>

                          )}
                          {imp.simNetUsd != null && (
                            <tr><td style={{color:"#888", padding:"2px 4px"}}>Net simulado</td><td style={{textAlign:"right", color: Number(imp.simNetUsd) >= 0 ? "#22c55e" : "#ef4444"}}>{(Number(imp.simNetUsd) >= 0 ? "+" : "") + "$" + Number(imp.simNetUsd).toFixed(2)}</td></tr>
                          )}
                          {imp.realNetUsd != null && (
                            <tr><td style={{color:"#888", padding:"2px 4px"}}>Net real (mismas señales)</td><td style={{textAlign:"right", color: Number(imp.realNetUsd) >= 0 ? "#22c55e" : "#ef4444"}}>{(Number(imp.realNetUsd) >= 0 ? "+" : "") + "$" + Number(imp.realNetUsd).toFixed(2)}</td></tr>
                          )}
                          {deltaPnl != null && (

                              <td style={{textAlign:"right", color: deltaPnl >= 0 ? "#22c55e" : "#ef4444", fontWeight:700}}>{(deltaPnl >= 0 ? "+" : "") + "$" + deltaPnl.toFixed(2)}</td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </>
                );
              })()}

              {/* Section: Config (always shown) */}
              <div style={{fontSize:10, fontWeight:600, color:"#a78bfa", marginBottom:6, textTransform:"uppercase", letterSpacing:0.6}}>
                Config
              </div>
              {v._impactOnly ? (
                <div style={{fontSize:11, color:"#888", padding:8, background:"#0a0a13", borderRadius:4}}>

                  <Row label="block exhausted (AGOTADA)" value={v.blockImpulseExhausted ? "ON" : "off"} color={v.blockImpulseExhausted ? "#f59e0b" : "#666"} />
                  <Row label="ROI table override" value={v.roiTableOverride || "—"} color="#22d3ee" />
                  <Row label="SL % override" value={v.slPctOverride != null ? (v.slPctOverride + "%") : "—"} color="#22d3ee" />
                  <Row label="TP % override" value={v.tpPctOverride != null ? (v.tpPctOverride + "%") : "—"} color="#22d3ee" />
                  <Row label="Max hold (min)" value={v.maxHoldMinutesOverride != null ? v.maxHoldMinutesOverride : "—"} color="#22d3ee" />
                  {v.strategyOverrideId != null && <Row label="Strategy override id" value={v.strategyOverrideId} color="#a78bfa" />}
                </>
              )}

              {/* Section: Recent decisions for this variant — filtered from main evaluations state */}
              {(() => {
                const myDecisions = (evaluations || []).filter(e => e.variant === v.name).slice(0, 8);
                if (myDecisions.length === 0) return null;
                return (
                  <>
                    <div style={{fontSize:10, fontWeight:600, color:"#a78bfa", margin:"14px 0 6px", textTransform:"uppercase", letterSpacing:0.6}}>
                      Últimas decisiones ({myDecisions.length})
                    </div>
                    <table style={{width:"100%", fontSize:10, fontFamily:"monospace"}}>
                      <thead><tr style={{color:"#666"}}>
                        <th style={{textAlign:"left", padding:"3px 4px"}}>cuándo</th>
                        <th style={{textAlign:"left"}}>coin</th>
                        <th style={{textAlign:"left"}}>side</th>
                        <th style={{textAlign:"left"}}>decisión</th>
                      </tr></thead>
                      <tbody>
                        {myDecisions.map((e, i) => (
                          <tr key={i} style={{borderTop:"1px solid #181828"}}>
                            <td style={{padding:"3px 4px", color:"#888"}}>{e.evaluatedAt ? new Date(e.evaluatedAt).toLocaleTimeString("es") : "—"}</td>

                            <td style={{color: e.wouldBlock ? "#ef4444" : "#22c55e"}}>{e.wouldBlock ? "blocked" : "would_fire"}</td>

                    </table>
                  </>
