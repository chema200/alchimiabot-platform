<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchimia Platform</title>
  <!-- React + Babel bundled locally so /platform-v2 works without external
       CDN connectivity. Incognito sessions lacking the unpkg.com cache
       would otherwise hang forever on script fetch. -->
  <script src="/static/vendor/react.production.min.js"></script>
  <script src="/static/vendor/react-dom.production.min.js"></script>
  <script src="/static/vendor/babel.min.js"></script>

  <!-- Inter (UI) + JetBrains Mono (numeric / code) — premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════════════════════════════════
   ALCHIMIA PLATFORM — "AI Trading Command Center"
   Premium dark fintech design system. Tokens + layers + motion.
   Rewritten 2026-04-23 keeping every legacy class name so no JSX breaks.
   ═══════════════════════════════════════════════════════════════════════ */

:root {
  /* Surfaces — deep graphite, very subtle blue tint. Bloomberg / Palantir vibe. */
  --bg-base:        #0a0d12;
  --bg-page:        #0c1016;
  --bg-surface:     #11151d;
  --bg-elevated:    #181d28;
  --bg-sidebar:     #080a0f;
  --bg-panel:       #0e1219;
  --bg-panel-hi:    #151a24;
  --bg-glass:       rgba(17, 21, 29, 0.82);
  --bg-glass-hi:    rgba(24, 29, 40, 0.92);

  /* Borders */
  --border-subtle:  rgba(148, 163, 184, 0.07);
  --border-default: rgba(148, 163, 184, 0.13);
  --border-hi:      rgba(148, 163, 184, 0.22);

  /* Text — near white with high contrast for data */
  --text:           #f1f5f9;
  --text-dim:       rgba(241, 245, 249, 0.74);
  --text-muted:     rgba(241, 245, 249, 0.48);
  --text-soft:      rgba(241, 245, 249, 0.26);

  /* Accents — professional quant palette */
  --accent:         #38bdf8;        /* cyan-blue primary */
  --accent-hi:      #7dd3fc;
  --accent-soft:    rgba(56, 189, 248, 0.14);
  --accent-cyan:    #22d3ee;
  --accent-violet:  #a78bfa;
  --accent-emerald: #10b981;

  /* Semantic — data colors, desaturated pro versions */
  --pos:            #10b981;
  --pos-hi:         #34d399;
  --neg:            #f43f5e;
  --neg-hi:         #fb7185;
  --warn:           #f59e0b;
  --warn-hi:        #fbbf24;
  --success:        #10b981;
  --warning:        #f59e0b;
  --danger:         #f43f5e;
  --gold:           #fbbf24;
  --info:           #38bdf8;

  /* Radii */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-pill: 999px;

  /* Elevation — multi-layer for premium depth */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.35), 0 0 0 1px var(--border-subtle) inset;
  --shadow-2: 0 6px 20px rgba(0,0,0,0.45), 0 0 0 1px var(--border-subtle) inset;
  --shadow-3: 0 16px 48px rgba(0,0,0,0.55), 0 0 0 1px var(--border-default) inset;
  --glow-blue:   0 0 24px rgba(59,130,246,0.22);
  --glow-cyan:   0 0 24px rgba(34,211,238,0.22);
  --glow-violet: 0 0 24px rgba(139,92,246,0.22);

  /* Motion */
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

  /* Fonts */
  --font-sans: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Base / page ─────────────────────────────────────────────────── */

html { color-scheme: dark; }
body {
  background: var(--bg-page);
  color: var(--text);
  font-family: var(--font-sans);
  font-feature-settings: "cv11", "ss01", "ss03";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  max-width: 100vw;
}

/* Navy ambient — very soft blue spill from the top, subtle warmth */
body {
  background:
    radial-gradient(ellipse 1200px 600px at 50% -20%, rgba(107,139,233,0.08), transparent 60%),
    var(--bg-base);
}

/* ── App shell ──────────────────────────────────────────────────── */

.app { display: flex; min-height: 100vh; position: relative; z-index: 1; width: 100%; max-width: 100vw; overflow-x: hidden; }

/* ── Sidebar ────────────────────────────────────────────────────── */

.sidebar {
  width: 220px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-subtle);
  position: fixed; top: 0; left: 0; bottom: 0;
  overflow-y: auto; z-index: 40;
}
.sidebar-header {
  padding: 20px 18px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; gap: 11px;
  position: relative;
}
.sidebar-header .logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-violet) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 12px; flex-shrink: 0;
  letter-spacing: -0.3px;
  box-shadow: 0 4px 12px rgba(107,139,233,0.25);
}
.sidebar-header h1 {
  font-size: 14px; font-weight: 600; letter-spacing: -0.1px; color: var(--text);
}
.sidebar-header .sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.6px; font-weight: 500; margin-top: 2px; font-family: var(--font-sans); }
.sidebar-group { padding: 18px 0 4px; }
.sidebar-group-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
  padding: 14px 22px 8px; color: var(--text-soft);
}
.sidebar-item {
  display: flex; align-items: center; gap: 11px; padding: 9px 22px;
  font-size: 13px; color: var(--text-dim); cursor: pointer;
  transition: color 0.15s var(--ease), background 0.15s var(--ease);
  margin: 1px 8px; border-radius: 6px;
  position: relative;
  font-weight: 500;
}
.sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.sidebar-item.active {
  color: var(--text);
  background: var(--accent-soft);
  font-weight: 600;
}
.sidebar-item.active::after {
  content: ''; position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.sidebar-item.active-gold {
  color: var(--gold);
  background: rgba(255,202,40,0.10);
  font-weight: 600;
}
.sidebar-item.active-gold::after {
  content: ''; position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold);
}

/* ── Main area / topbar ─────────────────────────────────────────── */

.main-content { margin-left: 232px; flex: 1; min-width: 0; max-width: calc(100vw - 232px); overflow-x: hidden; }
.topbar {
  height: 56px;
  background: var(--bg-page);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 28px;
  position: sticky; top: 0; z-index: 30;
}
.topbar-user { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-dim); }
.topbar-user .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-violet) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 600; font-size: 12px;
  font-family: var(--font-sans);
  box-shadow: 0 2px 6px rgba(107,139,233,0.25);
}
.topbar-user .logout-btn {
  font-size: 12px; color: var(--text-dim); cursor: pointer;
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  transition: all 0.15s var(--ease);
  font-family: var(--font-sans); font-weight: 500;
}
.topbar-user .logout-btn:hover {
  color: var(--danger); border-color: rgba(239,68,68,0.4);
  background: rgba(239,68,68,0.06);
}

.content-area { padding: 28px 32px; animation: fadeIn 0.35s var(--ease-out); min-width: 0; max-width: 100%; overflow-x: hidden; }

/* ── Cards — admin dashboard style (Light Blue-ish)
   Navy surface + thin border + small shadow. Not glass, not flat.
   Clear separation between cards with visible-but-soft frames. ── */

.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  padding: 20px 22px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
  transition: box-shadow 0.15s var(--ease), border-color 0.15s var(--ease), transform 0.15s var(--ease);
  position: relative;
  max-width: 100%;
}
.card:hover {
  border-color: var(--border-default);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.28);
}

/* KILL all inline colored borders → show a small color dot top-right
   instead. Rectangle chrome goes away entirely. */
.card[style*="borderColor"] {
  border-color: var(--border-subtle) !important;
  background: var(--bg-surface) !important;
  border-radius: 12px !important;
  padding: 20px 22px !important;
}
.card[style*="borderColor"]::before {
  content: ''; position: absolute; top: 14px; right: 14px;
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 10px currentColor;
}

.card .label {
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.4px; margin-bottom: 10px; font-weight: 500;
  text-transform: uppercase;
  font-family: var(--font-sans);
}
.card .value {
  font-size: 26px; font-weight: 600; font-family: var(--font-sans);
  letter-spacing: -0.4px; line-height: 1.1;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.card .sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-family: var(--font-sans); }

/* ── Grid ───────────────────────────────────────────────────────── */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px; margin-bottom: 24px;
}

/* ── Color utilities + KPI glow ─────────────────────────────────── */

.green { color: var(--success); }
.red { color: var(--danger); }
.yellow { color: #eab308; }
.purple { color: var(--accent-violet); }
.blue { color: var(--accent); }
.ok { color: var(--success); }
.warning { color: #eab308; }
.alert { color: #f97316; }
.critical { color: var(--danger); }
.value.green  { text-shadow: 0 0 22px rgba(34,197,94,0.28); }
.value.red    { text-shadow: 0 0 22px rgba(239,68,68,0.28); }
.value.yellow { text-shadow: 0 0 22px rgba(234,179,8,0.22); }
.value.purple { text-shadow: 0 0 22px rgba(168,85,247,0.22); }
.value.blue   { text-shadow: 0 0 22px rgba(59,130,246,0.22); }

/* ── Tables — dashboard flat, thin dividers, subtle hover ── */

table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: auto; }
th {
  text-align: left; padding: 10px 14px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-subtle);
  font-weight: 500; font-size: 11px;
  letter-spacing: 0.1px; text-transform: none;
  font-family: var(--font-sans);
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-family: var(--font-sans); font-size: 12.5px; vertical-align: middle;
  word-break: normal; overflow-wrap: normal; white-space: normal;
  color: var(--text);
}
/* Numeric columns keep monospace + tabular for alignment */
td:where([align="right"], .num), td.num, th.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
tbody tr { transition: background 0.15s var(--ease); }
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody tr:last-child td { border-bottom: none; }

/* ── Tags / pills — flat, colored text only, no colored backgrounds ── */

.tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 3px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.6px;
  font-family: var(--font-mono); text-transform: uppercase;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
}
/* Colored DOT prefix instead of colored background — cleaner terminal look */
.tag::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  display: inline-block; flex-shrink: 0;
}
.tag-green  { color: var(--success); }
.tag-red    { color: var(--danger); }
.tag-purple { color: var(--accent-violet); }
.tag-blue   { color: var(--accent-cyan); }
.tag-yellow { color: var(--gold); }
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 3px; font-size: 10.5px; font-weight: 600;
  font-family: var(--font-mono);
}

/* ── Titles ────────────────────────────────────────────────────── */

.section-title {
  font-size: 11px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1.2px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.page-title {
  font-size: 24px; font-weight: 600; margin-bottom: 6px; padding-bottom: 0;
  border-bottom: none;
  letter-spacing: -0.4px;
  color: var(--text);
}
.page-title .page-sub {
  font-size: 13.5px; color: var(--text-muted); font-weight: 400;
  margin-top: 2px; letter-spacing: 0; line-height: 1.5;
  display: block;
}
/* Breathe under the title */
.page-title + * { margin-top: 24px; }

/* ── Utils ─────────────────────────────────────────────────────── */

.scroll { max-height: 400px; overflow-y: auto; }
.loading { text-align: center; padding: 50px; color: var(--text-dim); font-size: 14px; }
.loading::after {
  content: ""; display: block; width: 26px; height: 26px; margin: 18px auto 0;
  border: 2px solid rgba(139,92,246,0.2); border-top-color: var(--accent-violet);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: var(--r-pill); overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; border-radius: var(--r-pill); transition: width 0.5s var(--ease); }

/* ── Tabs / buttons (inside content) ───────────────────────────── */

/* Tabs: soft pills (Vercel/Stripe), 1px hairline on hover, filled on active */
.tab {
  padding: 7px 14px; font-size: 12.5px; font-weight: 500;
  cursor: pointer; border: 1px solid transparent;
  background: transparent; color: var(--text-muted);
  transition: all 0.15s var(--ease); display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-sans); border-radius: 8px; margin-right: 4px;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab.active {
  color: var(--text); background: rgba(255,255,255,0.06);
  border-color: var(--border-subtle);
}
.tab.active-gold {
  color: var(--gold); background: rgba(250,204,21,0.08);
  border-color: rgba(250,204,21,0.18);
}

/* ── LOGIN — "reactor core" animated background ─────────────────── */

.login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; position: relative; overflow: hidden;
  background:
    radial-gradient(ellipse 700px 500px at 50% 50%, rgba(107,139,233,0.14), transparent 60%),
    radial-gradient(ellipse 500px 300px at 20% 80%, rgba(149,117,205,0.10), transparent 60%),
    var(--bg-base);
}
.login-page::before,
.login-page::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
}
.login-page::before {
  width: min(820px, 140vw); height: min(820px, 140vw);
  border: 1px solid rgba(107,139,233,0.20);
  background: radial-gradient(circle at 50% 50%, transparent 38%, rgba(107,139,233,0.06) 62%, transparent 78%);
  animation: reactor-spin 60s linear infinite;
  box-shadow: 0 0 140px rgba(107,139,233,0.12) inset;
}
.login-page::after {
  width: min(540px, 95vw); height: min(540px, 95vw);
  border: 1px dashed rgba(149,117,205,0.25);
  animation: reactor-spin 40s linear infinite reverse;
}
.login-core {
  position: absolute; top: 50%; left: 50%;
  width: min(260px, 50vw); height: min(260px, 50vw);
  transform: translate(-50%, -50%);
  border-radius: 50%; pointer-events: none;
  border: 1px solid rgba(149,117,205,0.30);
  background: radial-gradient(circle at 50% 50%, rgba(149,117,205,0.16), transparent 62%);
  animation: reactor-pulse 6s ease-in-out infinite, reactor-spin 100s linear infinite;
}
@keyframes reactor-spin { from { transform: translate(-50%, -50%) rotate(0); } to { transform: translate(-50%, -50%) rotate(360deg); } }
@keyframes reactor-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

.login-box {
  width: 400px; padding: 42px 42px 40px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  box-shadow:
    0 24px 60px rgba(0,0,0,0.4),
    0 0 0 1px rgba(107,139,233,0.08);
  position: relative; z-index: 5;
}
.login-box .brand {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  margin-bottom: 28px;
}
.login-box .brand-logo {
  width: 52px; height: 52px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-violet) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 18px; letter-spacing: -0.4px;
  box-shadow: 0 8px 24px rgba(107,139,233,0.35);
  position: relative;
}
.login-box h1 {
  font-size: 22px; font-weight: 600; text-align: center; letter-spacing: -0.4px;
  color: var(--text);
}
.login-box .sub {
  font-size: 12px; color: var(--text-muted); text-align: center;
  letter-spacing: 0.3px; font-weight: 400;
  font-family: var(--font-sans);
}
.login-box input {
  width: 100%; padding: 13px 16px; border-radius: 8px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  color: var(--text); font-size: 14px; margin-bottom: 14px; outline: none;
  transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
  font-family: var(--font-sans);
}
.login-box input::placeholder { color: var(--text-soft); }
.login-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.login-box button {
  width: 100%; padding: 13px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-violet) 100%);
  color: white; font-weight: 600; font-size: 14px; border: none; cursor: pointer;
  transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
  box-shadow: 0 4px 14px rgba(107,139,233,0.30);
  letter-spacing: 0.1px;
  margin-top: 6px;
}
.login-box button:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(107,139,233,0.42); }
.login-box button:active { transform: translateY(0); }
.login-box button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.login-box .err {
  margin-top: 14px; padding: 10px 12px; border-radius: 6px;
  background: rgba(239,83,80,0.08); border: 1px solid rgba(239,83,80,0.26);
  color: #fca5a5; font-size: 12px; text-align: center;
}

/* ── Scrollbar ─────────────────────────────────────────────────── */

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: var(--r-pill); }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

/* ── Animations ───────────────────────────────────────────────── */

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
  50%      { opacity: 0.6; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ═══════════════════════════════════════════════════════════════════════
   QUANT INTELLIGENCE COMPONENTS
   New visual language: panels, rails, hero metrics, balance bars,
   timeline, diagnostic callouts. Designed for data storytelling.
   ═══════════════════════════════════════════════════════════════════════ */

/* ── Panel: the new primary container (replaces generic .card). ─────────
   Thinner border, subtle gradient on top edge, roomy padding. */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  padding: 22px 24px;
  position: relative;
  margin-bottom: 16px;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 18px; right: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-default) 50%, transparent);
}
.panel-title {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.4px; font-weight: 600;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.panel-title::before {
  content: ''; width: 3px; height: 12px; background: var(--accent);
  border-radius: 1px; display: inline-block;
}
.panel-title .meta { margin-left: auto; color: var(--text-soft); font-weight: 400; letter-spacing: 0.3px; font-size: 10px; }

/* ── Status rail: compact horizontal chip bar for system status.
   Lives at the top of Conclusions instead of 3 giant KPI cards. ── */
.status-rail {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1px; background: var(--border-subtle);
  border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border-subtle);
  margin-bottom: 16px;
}
.status-rail .stat {
  background: var(--bg-panel);
  padding: 14px 18px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative; transition: background 0.15s var(--ease);
}
.status-rail .stat:hover { background: var(--bg-panel-hi); }
.status-rail .stat .k {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.status-rail .stat .k::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-soft);
  box-shadow: 0 0 8px currentColor;
}
.status-rail .stat.ok   .k::before { background: var(--pos); color: var(--pos); }
.status-rail .stat.warn .k::before { background: var(--warn); color: var(--warn); }
.status-rail .stat.bad  .k::before { background: var(--neg); color: var(--neg); }
.status-rail .stat.info .k::before { background: var(--info); color: var(--info); }
.status-rail .stat .v {
  font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
  font-family: var(--font-sans); color: var(--text);
}
.status-rail .stat.ok   .v { color: var(--pos-hi); }
.status-rail .stat.warn .v { color: var(--warn-hi); }
.status-rail .stat.bad  .v { color: var(--neg-hi); }
.status-rail .stat .sub { font-size: 11px; color: var(--text-muted); line-height: 1.3; }

/* ── KPI Hero: the dominant metric of a panel.
   Big tabular number + delta chip + trend. Used for NET PnL etc. ── */
.kpi-hero {
  display: flex; flex-direction: column; gap: 6px;
}
.kpi-hero .k { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }
.kpi-hero .v {
  font-size: 42px; font-weight: 600; font-family: var(--font-mono);
  letter-spacing: -1px; line-height: 1; font-variant-numeric: tabular-nums;
  color: var(--text); display: inline-flex; align-items: baseline; gap: 10px;
}
.kpi-hero .v .unit { font-size: 16px; color: var(--text-muted); font-weight: 500; letter-spacing: 0; }
.kpi-hero .v.pos { color: var(--pos-hi); }
.kpi-hero .v.neg { color: var(--neg-hi); }
.kpi-hero .sub { font-size: 12px; color: var(--text-muted); }

/* ── KPI Strip: horizontal row of small numeric KPIs. ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0;
}
.kpi-strip > * {
  padding: 12px 18px;
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; gap: 4px;
}
.kpi-strip > *:last-child { border-right: none; }
.kpi-strip .k { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.1px; font-weight: 600; }
.kpi-strip .v {
  font-size: 20px; font-weight: 600; font-family: var(--font-mono);
  letter-spacing: -0.3px; line-height: 1; font-variant-numeric: tabular-nums;
  color: var(--text);
}
.kpi-strip .v.pos { color: var(--pos-hi); }
.kpi-strip .v.neg { color: var(--neg-hi); }
.kpi-strip .v.warn { color: var(--warn-hi); }
.kpi-strip .sub { font-size: 10.5px; color: var(--text-soft); }

/* ── Balance bar: visual two-sided comparison (avg win vs avg loss). ── */
.balance-bar {
  margin-top: 4px;
}
.balance-bar .bb-labels {
  display: flex; justify-content: space-between; font-size: 10.5px;
  color: var(--text-muted); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.9px; font-weight: 600;
}
.balance-bar .bb-track {
  position: relative; height: 28px; background: var(--bg-surface);
  border-radius: 4px; overflow: hidden; display: flex;
  border: 1px solid var(--border-subtle);
}
.balance-bar .bb-win, .balance-bar .bb-loss {
  height: 100%; display: flex; align-items: center; padding: 0 10px;
  font-size: 12px; font-weight: 600; font-family: var(--font-mono);
}
.balance-bar .bb-win {
  background: linear-gradient(90deg, rgba(16,185,129,0.10), rgba(16,185,129,0.22));
  color: var(--pos-hi); justify-content: flex-start;
  border-right: 1px solid var(--border-hi);
}
.balance-bar .bb-loss {
  background: linear-gradient(270deg, rgba(244,63,94,0.10), rgba(244,63,94,0.22));
  color: var(--neg-hi); justify-content: flex-end;
  margin-left: auto;
}
.balance-bar .bb-summary {
  font-size: 11px; color: var(--text-muted); margin-top: 8px;
  font-family: var(--font-sans); line-height: 1.5;
}

/* ── Diagnostic badge: the classification line (CONFIRMED / CONFLICTING...) ── */
.diag {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--info);
  border-radius: 8px;
  margin-bottom: 16px;
}
.diag.ok       { border-left-color: var(--pos); }
.diag.warn     { border-left-color: var(--warn); }
.diag.bad      { border-left-color: var(--neg); }
.diag.info     { border-left-color: var(--info); }
.diag .diag-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
  font-weight: 700; padding: 4px 10px; border-radius: 3px;
  font-family: var(--font-mono); flex-shrink: 0;
}
.diag.ok   .diag-label { background: rgba(16,185,129,0.14); color: var(--pos-hi); }
.diag.warn .diag-label { background: rgba(245,158,11,0.14); color: var(--warn-hi); }
.diag.bad  .diag-label { background: rgba(244,63,94,0.14);  color: var(--neg-hi); }
.diag.info .diag-label { background: rgba(56,189,248,0.14); color: var(--accent-hi); }
.diag .diag-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

/* ── Driver list: "what's working / what's failing" as a clean list ── */
.driver-list { list-style: none; padding: 0; margin: 0; }
.driver-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-top: 1px solid var(--border-subtle);
  font-size: 12.5px; color: var(--text-dim); line-height: 1.5;
}
.driver-list li:first-child { border-top: none; }
.driver-list li::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-soft); margin-top: 6px; flex-shrink: 0;
}
.driver-list.pos  li::before { background: var(--pos); box-shadow: 0 0 6px var(--pos); }
.driver-list.neg  li::before { background: var(--neg); box-shadow: 0 0 6px var(--neg); }
.driver-list.info li::before { background: var(--info); box-shadow: 0 0 6px var(--info); }
.driver-list.warn li::before { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
.driver-list .meta { color: var(--text-soft); font-size: 11px; margin-left: auto; padding-left: 12px; flex-shrink: 0; font-family: var(--font-mono); }

/* ── Marker timeline: vertical impact markers ── */
.timeline { position: relative; padding-left: 22px; }
.timeline::before {
  content: ''; position: absolute; top: 6px; bottom: 6px; left: 5px;
  width: 1px; background: var(--border-default);
}
.timeline .t-row {
  position: relative; padding: 10px 0 12px;
  display: grid; grid-template-columns: 140px 1fr auto;
  gap: 16px; align-items: start;
  border-bottom: 1px solid var(--border-subtle);
}
.timeline .t-row:last-child { border-bottom: none; }
.timeline .t-row::before {
  content: ''; position: absolute; left: -20px; top: 16px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--bg-panel); border: 2px solid var(--text-soft);
}
.timeline .t-row.up::before   { border-color: var(--pos); box-shadow: 0 0 10px rgba(16,185,129,0.4); }
.timeline .t-row.down::before { border-color: var(--neg); box-shadow: 0 0 10px rgba(244,63,94,0.4); }
.timeline .t-row.flat::before { border-color: var(--warn); }
.timeline .t-when { font-size: 10.5px; color: var(--text-soft); font-family: var(--font-mono); letter-spacing: 0.3px; }
.timeline .t-label { font-size: 12.5px; color: var(--text); font-weight: 500; }
.timeline .t-sub { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.6px; }
.timeline .t-delta { font-size: 12.5px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 600; text-align: right; }
.timeline .t-delta.pos { color: var(--pos-hi); }
.timeline .t-delta.neg { color: var(--neg-hi); }
.timeline .t-delta.flat { color: var(--text-muted); }

/* ── Action callout: next best action / CTA ── */
.action {
  display: flex; gap: 16px; align-items: flex-start;
  padding: 20px 22px;
  background: linear-gradient(135deg, var(--accent-soft), transparent 70%);
  border: 1px solid var(--border-default);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  margin-bottom: 18px;
}
.action.critical { border-left-color: var(--neg); background: linear-gradient(135deg, rgba(244,63,94,0.10), transparent 70%); }
.action.high     { border-left-color: var(--warn); background: linear-gradient(135deg, rgba(245,158,11,0.10), transparent 70%); }
.action.info     { border-left-color: var(--accent); }
.action .action-mark {
  width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg-panel); border: 1px solid var(--border-default);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
  color: var(--accent-hi); font-family: var(--font-mono);
}
.action.critical .action-mark { color: var(--neg-hi); border-color: rgba(244,63,94,0.35); }
.action.high     .action-mark { color: var(--warn-hi); border-color: rgba(245,158,11,0.35); }
.action .action-body { flex: 1; }
.action .action-meta {
  display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;
}
.action .action-meta .sev {
  padding: 2px 8px; border-radius: 3px; font-weight: 700;
  background: rgba(148,163,184,0.12); color: var(--text-dim);
}
.action.critical .action-meta .sev { background: rgba(244,63,94,0.14); color: var(--neg-hi); }
.action.high     .action-meta .sev { background: rgba(245,158,11,0.14); color: var(--warn-hi); }
.action.info     .action-meta .sev { background: rgba(56,189,248,0.14); color: var(--accent-hi); }
.action .action-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 4px; }
.action .action-sub { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* ── Split panel (2 columns) ── */
.split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .split-2 { grid-template-columns: 1fr; } }

/* ═══════════════════════════════════════════════════════════════════════
   PASS 2 — Component polish + responsive refinement + utilities
   ═══════════════════════════════════════════════════════════════════════ */

/* ── Button system (drop-in utilities, old buttons keep their inline styles) ── */

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 8px 16px; border-radius: var(--r-md); font-size: 12px; font-weight: 600;
  font-family: var(--font-sans); letter-spacing: 0.1px; border: 1px solid transparent;
  cursor: pointer; transition: all 0.2s var(--ease); white-space: nowrap;
}
.btn:disabled { cursor: not-allowed; opacity: 0.5; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-violet) 100%);
  color: white;
  box-shadow: 0 4px 14px rgba(59,130,246,0.25), 0 0 0 1px rgba(255,255,255,0.08) inset;
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(59,130,246,0.35), 0 0 0 1px rgba(255,255,255,0.12) inset; }
.btn-ghost {
  background: rgba(255,255,255,0.03); border-color: var(--border-default); color: var(--text-dim);
}
.btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.06); color: var(--text); border-color: var(--border-hi); }
.btn-danger {
  background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.30); color: #fca5a5;
}
.btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.55); color: #fee2e2; }
.btn-sm { padding: 5px 11px; font-size: 11px; border-radius: var(--r-sm); }

/* ── Form inputs (drop-in utilities) ── */

.input, .select {
  width: 100%; padding: 9px 12px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.03); border: 1px solid var(--border-default);
  color: var(--text); font-size: 12.5px; font-family: var(--font-sans);
  outline: none; transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s var(--ease);
}
.input:focus, .select:focus {
  border-color: rgba(59,130,246,0.5);
  background: rgba(59,130,246,0.04);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
.input::placeholder { color: var(--text-soft); }

/* Universal input/select polish — applies to any existing form without
   needing class changes in the JSX. */
input:not(.login-box input):not([type="checkbox"]):not([type="radio"]):not([type="range"]),
textarea, select {
  font-family: var(--font-sans);
  color: var(--text);
}
input:focus, textarea:focus, select:focus { outline: none; }

/* ── Tables — subtle zebra stripes ── */

tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }
tbody tr:nth-child(even):hover { background: rgba(59,130,246,0.06); }
/* Numeric / monospaced cells get right-align aesthetic */
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

/* ── KPI card — optional richer styling via .kpi class ── */

.card.kpi { padding: 22px 20px 20px; }
.card.kpi .label { font-size: 10.5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.card.kpi .label .trend {
  font-family: var(--font-sans); font-weight: 600; font-size: 10px;
  padding: 2px 8px; border-radius: var(--r-pill);
}
.card.kpi .value { font-size: 30px; letter-spacing: -0.8px; line-height: 1; }
.card.kpi .sub { margin-top: 10px; font-size: 11px; color: var(--text-muted); }

/* ── Modal refinement (works alongside the inline Modal component) ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(3,4,10,0.78); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  animation: fadeIn 0.2s var(--ease-out);
}

/* ── Code blocks / mono blocks ── */
code, pre {
  font-family: var(--font-mono);
  font-size: 11.5px;
  background: rgba(255,255,255,0.04); color: #fbbf24;
  padding: 1px 6px; border-radius: 4px;
}
pre {
  padding: 14px 16px; line-height: 1.55;
  background: rgba(10,12,20,0.65); color: #d4d4d8;
  border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
  overflow-x: auto; white-space: pre;
}
pre code { background: transparent; color: inherit; padding: 0; }

/* ── Sidebar — emoji icons get a tiny opacity boost on hover + alignment ── */
.sidebar-item {
  font-variant-numeric: tabular-nums;
}
.sidebar-item > span:first-child {
  width: 22px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; opacity: 0.75; transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
}
.sidebar-item:hover > span:first-child { opacity: 1; transform: scale(1.08); }
.sidebar-item.active > span:first-child,
.sidebar-item.active-gold > span:first-child { opacity: 1; }

/* ── Responsive refinement ────────────────────────────────────── */

/* Desktop wide (1440+) — breathing room */
@media (min-width: 1440px) {
  .content-area { padding: 36px 44px; max-width: 1680px; margin: 0 auto; }
  .grid { gap: 18px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
}

/* Tablet (768–1024) — refine from previous block */
@media (min-width: 768px) and (max-width: 1024px) {
  .content-area { padding: 22px 24px; }
  .card { padding: 18px; }
  .card .value { font-size: 22px; }
  .page-title { font-size: 19px; }
}

/* Phone (<640) — bigger tap targets, lighter padding, better scroll feel */
@media (max-width: 640px) {
  /* Cards sit right against the edge on tiny screens for immersion */
  .content-area { padding: 14px 12px 24px; }
  .card { padding: 16px 14px; border-radius: var(--r-md); }
  .card .value { font-size: 22px; }
  .topbar { padding: 0 14px; height: 54px; gap: 10px; }
  .topbar-user { gap: 8px; font-size: 11px; }
  .topbar-user .logout-btn { padding: 6px 10px; }
  .status-pill { padding: 4px 10px 4px 8px; font-size: 10px; }
  .status-pill .dot { width: 6px; height: 6px; }
  /* Larger tap target for buttons */
  .btn, .tab { min-height: 36px; padding: 8px 14px; }
  /* Modal: full-width on tiny screens */
  .modal-backdrop > div:not(.login-core) { min-width: 92vw !important; max-width: 96vw !important; }
  /* Drawer: larger handle, smoother slide */
  .sidebar.mobile-open {
    animation: slideIn 0.25s var(--ease-out);
  }
  @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
}

/* Tiny phones (<400) — already had padding 10px, tune a bit more */
@media (max-width: 400px) {
  .content-area { padding: 12px 10px 22px; }
  .card { padding: 14px 12px; }
  .card .label { font-size: 9.5px; letter-spacing: 0.6px; }
  .card .value { font-size: 20px; }
  .page-title { font-size: 17px; margin-bottom: 14px; padding-bottom: 12px; }
  .login-box {
    width: 94%; padding: 28px 22px 32px;
    border-radius: var(--r-lg);
  }
  .login-box .brand { margin-bottom: 20px; gap: 10px; }
  .login-box .brand-logo { width: 46px; height: 46px; font-size: 17px; }
  .login-box h1 { font-size: 20px; }
  .login-box input, .login-box button { padding: 11px 14px; font-size: 13px; }
  /* Reactor rings smaller on tiny phones so they don't clip */
  .login-page::before { width: 540px; height: 540px; }
  .login-page::after { width: 340px; height: 340px; }
  .login-core { width: 180px; height: 180px; }
}

/* Mobile drawer overlay — smoother fade */
.mobile-overlay {
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  background: rgba(3,4,10,0.72);
}

/* Reduce motion — respect OS preference */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  .login-page::before, .login-page::after, .login-core { animation: none !important; }
}

/* Responsive — global guards */
/* Prevent any wide child from forcing the whole page to scroll horizontally.
   Wide content (tables, code) must scroll INSIDE its container, not break page. */
html, body { overflow-x: hidden; max-width: 100vw; }
.app { width: 100%; max-width: 100vw; overflow-x: hidden; }
.main-content { min-width: 0; max-width: 100%; overflow-x: hidden; }
.content-area { min-width: 0; max-width: 100%; overflow-x: hidden; box-sizing: border-box; }
* { box-sizing: border-box; }

/* Mobile menu button */
.mobile-menu-btn { display: none; background: none; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: rgba(255,255,255,0.6); padding: 6px 10px; cursor: pointer; font-size: 18px; }
.mobile-menu-btn:hover { border-color: rgba(255,255,255,0.2); color: white; }

/* Tables: desktop wraps fine, mobile needs horizontal scroll instead of
   wrapping letters vertically. The previous rule stacked 1-char-per-line
   on narrow screens (terrible UX). */
.card { max-width: 100%; }
table { width: 100%; table-layout: auto; }
th, td { word-break: normal; overflow-wrap: normal; white-space: normal; vertical-align: top; }

/* Override ANY inline grid to auto-fit on small screens.
   Many tabs use inline gridTemplateColumns:"1fr 1fr 1fr" which doesn't collapse.
   This forces them to wrap below 900px. */
@media (max-width: 900px) {
  [style*="grid-template-columns"],
  [style*="gridTemplateColumns"] {
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) !important;
  }
}
@media (max-width: 600px) {
  [style*="grid-template-columns"],
  [style*="gridTemplateColumns"] {
    grid-template-columns: 1fr !important;
  }
}

/* Same for any flex-row that should stack on mobile */
@media (max-width: 600px) {
  .page-title[style*="flex"] { flex-wrap: wrap; gap: 8px; }
}

/* Fluid typography for cards (looks good 320px–1920px) */
.card .value { font-size: clamp(18px, 2.2vw, 26px); }
.page-title { font-size: clamp(18px, 2.4vw, 24px); }

/* Topbar "system online" status pill */
.status-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 10px; border-radius: var(--r-pill);
  font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
  background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.22);
  color: #86efac;
}
.status-pill .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--success);

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useContext, createContext } = React;

// ── i18n (runtime) ─────────────────────────────────────────────────────────
// Strings live in /static/i18n/{es,en}.json and are fetched on mount. The
// user's choice is persisted in localStorage under "platform_lang".
const I18nContext = createContext({ lang: "es", setLang: () => {}, t: (k) => k, ready: false });

function I18nProvider({ children }) {
  const [lang, setLangState] = useState(() => localStorage.getItem("platform_lang") || "es");
  const [dict, setDict] = useState({ es: {}, en: {} });
  const [ready, setReady] = useState(false);

  useEffect(() => {
    Promise.all([
      fetch("/static/i18n/es.json").then(r => r.ok ? r.json() : {}).catch(() => ({})),
      fetch("/static/i18n/en.json").then(r => r.ok ? r.json() : {}).catch(() => ({})),
    ]).then(([es, en]) => {
      setDict({ es, en });
      setReady(true);
    });
  }, []);

  const setLang = useCallback((l) => {
    localStorage.setItem("platform_lang", l);
    setLangState(l);
  }, []);

  const t = useCallback((key, params) => {
    let s = dict[lang]?.[key] ?? dict.es?.[key] ?? key;
    if (params && typeof s === "string") {
      Object.keys(params).forEach(k => {
        s = s.split("{" + k + "}").join(String(params[k]));
      });
    }
    return s;
  }, [lang, dict]);

  return <I18nContext.Provider value={{ lang, setLang, t, ready }}>{children}</I18nContext.Provider>;
}

const useI18n = () => useContext(I18nContext);

// Small animated "LIVE" pill. Used in tabs that poll real-time data
// so the user knows the screen is refreshing even when numbers don't change.
function LivePulse({ intervalSec }) {
  const { t } = useI18n();
  const label = intervalSec ? t("common.live_every", {n: intervalSec}) : null;
  return (
    <span className="live-pulse" title={label || t("common.live")}>
      <span className="dot"></span>
      <span>{t("common.live")}</span>
      {label && <span className="sub">· {label}</span>}
    </span>
  );
}

function LangToggle() {
  const { lang, setLang, t } = useI18n();
  const next = lang === "es" ? "en" : "es";
  const title = lang === "es" ? t("topbar.lang_toggle_to_en") : t("topbar.lang_toggle_to_es");
  return (
    <button
      type="button"
      onClick={() => setLang(next)}
      title={title}
      aria-label={title}
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
        background: "transparent",
        border: "1px solid var(--border, #2a2f3a)",
        color: "var(--text-soft, #cbd5e1)",
        padding: "4px 10px",
        borderRadius: 6,
        cursor: "pointer",
        fontSize: 12,
        lineHeight: 1,
        fontWeight: 600,
        letterSpacing: 0.3,
      }}
    >
      {lang === "es"
        ? <span style={{fontSize:14, lineHeight:1}}>🇪🇸</span>
        : <span>EN</span>}
    </button>
  );
}

const API = "";  // same origin

// Export JSON helper
function exportJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename || "export.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ExportBtn({ data, filename, label }) {
  if (!data) return null;
  return (
    <button onClick={() => exportJSON(data, filename)} style={{
      padding:"5px 12px", borderRadius:6, fontSize:10, fontWeight:600,
      background:"transparent", border:"1px solid #1a1a2e", color:"#666",
      cursor:"pointer", transition:"all 0.2s",
    }} onMouseOver={e => { e.target.style.borderColor="#3b82f6"; e.target.style.color="#3b82f6"; }}
       onMouseOut={e => { e.target.style.borderColor="#1a1a2e"; e.target.style.color="#666"; }}>
      {label || "Export JSON"}
    </button>
  );
}

function Tip({ text }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{position:"relative", display:"inline-block", marginLeft:6, cursor:"help"}}
          onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
      <span style={{width:16, height:16, borderRadius:"50%", background:"#1a1a2e", border:"1px solid #2a2a4e",
                    display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#666"}}>?</span>
      {show && (
        <div style={{position:"absolute", bottom:"calc(100% + 8px)", left:"50%", transform:"translateX(-50%)",
                     background:"#1a1a2e", border:"1px solid #2a2a4e", borderRadius:8, padding:"8px 12px",
                     fontSize:11, color:"#aaa", zIndex:100, maxWidth:300,
                     boxShadow:"0 4px 20px rgba(0,0,0,0.5)", lineHeight:1.4,
                     whiteSpace:"normal", minWidth:200}}>
          {text}
        </div>
      )}
    </span>
  );
}

// Patch fetch globally to add auth token
const _origFetch = window.fetch;
// URLs that, when returning 401, mean the user's SESSION itself is dead and
// we should force a re-login. Previously the interceptor treated any 401
// from /api/* (excluding /platform/) as a dead session, which kicked users
// out whenever a proxied bot endpoint returned 401 for unrelated reasons
// (bot restarting, JWT rejected by a stale bot deployment, rate-limit).
// Now we only honor 401s from the platform's own auth endpoints.
const _AUTH_URLS = ["/api/platform/me", "/api/platform/refresh"];
const _isAuthUrl = (u) => typeof u === "string" && _AUTH_URLS.some(a => u === a || u.startsWith(a + "?"));

window.fetch = function(url, opts = {}) {
  const token = localStorage.getItem("platform_token");
  if (token && typeof url === "string" && url.startsWith("/api/") && !url.includes("/platform/login")) {
    opts.headers = { ...(opts.headers || {}), "Authorization": "Bearer " + token };
  }
  return _origFetch(url, opts).then(r => {
    if (r.status === 401 && _isAuthUrl(url)) {
      localStorage.removeItem("platform_token");
      window.location.reload();
    }
    return r;
  });
};

function useFetch(url, interval = 5000) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(() => {
    fetch(API + url).then(r => r.json()).then(setData).catch(e => setError(e.message));
  }, [url]);
  useEffect(() => { fetch_(); const t = setInterval(fetch_, interval); return () => clearInterval(t); }, [fetch_, interval]);
  return { data, error, refetch: fetch_ };
}

function MC({ label, value, sub, color, tip }) {
  return (
    <div className="card">
      <div className="label">{label}{tip && <Tip text={tip} />}</div>
      <div className={"value " + (color || "")}>{value}</div>
      {sub && <div className="sub">{sub}</div>}
    </div>
  );
}

// ── Conclusions Tab — Quant Intelligence Center ──
function ConclusionsTab() {
  const { t, lang } = useI18n();
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [recentMarkers, setRecentMarkers] = useState([]);

  const load = () => {
    setLoading(true);
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 15000);
    fetch(API + "/api/quant/executive-summary", {signal: ctrl.signal}).then(r => r.json()).then(d => { clearTimeout(timeout); setData(d); setLoading(false); }).catch(() => { clearTimeout(timeout); setLoading(false); });
    fetch(API + "/api/markers/recent-impacts?limit=5")
      .then(r => r.json())
      .then(d => setRecentMarkers(Array.isArray(d) ? d : []))
      .catch(() => setRecentMarkers([]));
  };
  useEffect(() => { load(); }, []);

  if (loading) return <div className="loading">{t("common.loading")}</div>;
  if (!data) return <div style={{textAlign:"center",padding:40}}><p style={{color:"var(--text-muted)",marginBottom:12}}>{t("conclusions.error_load")}</p><button className="tab" onClick={load}>{t("common.retry")}</button></div>;

  const ss = data.system_status || {};
  const live = data.live_evidence || {};
  const replay = data.replay_evidence || {};
  const sp = data.score_parity || {};
  const jc = data.joint_conclusions || {};
  const nba = data.next_best_action || {};
  const works = data.what_works || [];
  const fails = data.what_fails || [];
  const changes = data.what_to_change || [];
  const dnt = data.do_not_touch || [];
  const recs = data.top_recommendations || [];
  const dqi = data.data_quality_issues || [];

  // Map semantic labels → visual variant (ok / warn / bad / info)
  const edgeVariant = ss.edge_status === "POSITIVE" ? "ok" : ss.edge_status === "NEGATIVE" ? "bad" : ss.edge_status === "NEUTRAL" ? "warn" : "info";
  const confVariant = ss.confidence === "HIGH" ? "ok" : ss.confidence === "MEDIUM" ? "warn" : "bad";
  const dqVariant   = ss.data_quality === "GOOD" ? "ok" : ss.data_quality === "DEGRADED" ? "warn" : ss.data_quality === "POOR" ? "bad" : "info";
  const jcVariant   = jc.classification === "CONFIRMED" ? "ok" : jc.classification === "CONFLICTING" || jc.classification === "BLOCKED_BY_DATA_QUALITY" ? "bad" : jc.classification === "WEAK_EVIDENCE" ? "warn" : "info";
  const nbaVariant  = nba.priority === "CRITICAL" ? "critical" : nba.priority === "HIGH" ? "high" : "info";

  // Balance bar proportions — avg_win vs avg_loss visualized as % of total bar.
  const aw = Math.abs(Number(live.avg_win) || 0);
  const al = Math.abs(Number(live.avg_loss) || 0);
  const bbSum = aw + al || 1;
  const bbWinPct = (aw / bbSum) * 100;
  const bbLossPct = 100 - bbWinPct;

  const fmtPnl = (v) => v == null ? "—" : (v >= 0 ? "+" : "") + "$" + Number(v).toFixed(2);
  const signCls = (v) => v > 0 ? "pos" : v < 0 ? "neg" : "";

  return (<>
    {/* ── Page header ─────────────────────────────────────────── */}
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12}}>
      <div>
        {t("conclusions.title")}
        <div className="page-sub">{t("conclusions.subtitle")}</div>
      </div>
      <div style={{display:"flex", gap:8, flexShrink:0}}>
        <ExportBtn data={data} filename={"conclusions_" + new Date().toISOString().split("T")[0] + ".json"} />
        <button className="tab" onClick={load}>{t("common.refresh")}</button>
      </div>
    </div>

    {/* ── STATUS RAIL: the 3 "state" KPIs as compact strip, no giant cards ─── */}
    <div className="status-rail">
      <div className={"stat " + edgeVariant}>
        <div className="k">{t("conclusions.edge")} <Tip text={t("conclusions.edge_tip")} /></div>
        <div className="v">{ss.edge_status || "—"}</div>
        <div className="sub">{t("conclusions.trades_analyzed", {n: live.trades || 0})}</div>
      </div>
      <div className={"stat " + confVariant}>
        <div className="k">{t("conclusions.confidence")} <Tip text={t("conclusions.confidence_tip")} /></div>
        <div className="v">{ss.confidence || "—"}</div>
        <div className="sub">{t("conclusions.coverage_line", {pct: ((sp.post_diagnostics_coverage||{}).trade_coverage_pct ?? sp.coverage_pct) ?? 0, global: sp.coverage_pct || 0})}</div>
      </div>
      <div className={"stat " + dqVariant}>
        <div className="k">{t("conclusions.data_quality")} <Tip text={t("conclusions.data_quality_tip")} /></div>
        <div className="v">{ss.data_quality || "—"}</div>
        <div className="sub">{t("conclusions.data_quality_real", {status: sp.real_status || sp.status || "—"})}</div>
      </div>
    </div>

    {/* ── DIAGNOSTIC: classification + reasoning ─────────────────── */}
    {jc.classification && (
      <div className={"diag " + jcVariant}>
        <div className="diag-label">{jc.classification}</div>
        <div className="diag-text">{jc.reasoning}</div>
      </div>
    )}

    {/* ── EXECUTIVE OVERVIEW: Net PnL hero + KPI strip + balance bar ── */}
    <div className="panel">
      <div className="panel-title">{t("conclusions.performance_live")} <span className="meta">{t("conclusions.trades_sessions_meta", {n: live.trades || 0})}</span></div>
      {live.status === "NO_DATA" ? (
        <div style={{color:"var(--text-muted)", fontSize:12, padding:"8px 0"}}>{t("conclusions.no_live_data")}</div>
      ) : (
        <div style={{display:"grid", gridTemplateColumns:"minmax(220px, 280px) 1fr", gap:32, alignItems:"start"}}>
          {/* Hero — Net PnL */}
          <div className="kpi-hero">
            <div className="k">{t("conclusions.net_pnl")}</div>
            <div className={"v " + signCls(Number(live.net_pnl))}>{fmtPnl(live.net_pnl)}</div>
            <div className="sub">{t("conclusions.profit_factor")} <b style={{color: live.profit_factor >= 1 ? "var(--pos-hi)" : "var(--neg-hi)"}}>{live.profit_factor}</b> · {t("conclusions.max_dd")} <b style={{color:"var(--neg-hi)"}}>${live.max_drawdown || 0}</b></div>
          </div>
          {/* Strip — secondary metrics */}
          <div className="kpi-strip">
            <div>
              <div className="k">{t("conclusions.win_rate")}</div>
              <div className={"v " + (Number(live.winrate) >= 50 ? "pos" : "neg")}>{live.winrate ?? "—"}<span style={{fontSize:14, color:"var(--text-muted)"}}>%</span></div>
              <div className="sub">{t("conclusions.wl_short", {wins: live.wins ?? 0, losses: live.losses ?? 0})}</div>
            </div>
            <div>
              <div className="k">{t("conclusions.expectancy")}</div>
              <div className={"v " + signCls(Number(live.expectancy))}>{live.expectancy == null ? "—" : (Number(live.expectancy) >= 0 ? "+" : "") + "$" + Number(live.expectancy).toFixed(2)}</div>
              <div className="sub">{t("conclusions.per_trade")}</div>
            </div>
            <div>
              <div className="k">{t("conclusions.avg_win")}</div>
              <div className="v pos">${live.avg_win ?? "—"}</div>
              <div className="sub">{t("conclusions.winners_count", {n: live.wins ?? 0})}</div>
            </div>
            <div>
              <div className="k">{t("conclusions.avg_loss")}</div>
              <div className="v neg">${live.avg_loss ?? "—"}</div>
              <div className="sub">{t("conclusions.losers_count", {n: live.losses ?? 0})}</div>
            </div>
            <div>
              <div className="k">{t("conclusions.fee_killed")}</div>
              <div className={"v " + ((live.fee_killed || 0) > 0 ? "warn" : "")}>{live.fee_killed ?? 0}</div>
              <div className="sub">{t("conclusions.fee_killed_sub")}</div>
            </div>
          </div>
        </div>
      )}

      {/* Balance bar — avg win vs avg loss */}
      {(aw > 0 || al > 0) && (
        <div className="balance-bar" style={{marginTop:22}}>
          <div className="bb-labels">
            <span>{t("conclusions.avg_win")}</span>
            <span>{t("conclusions.avg_loss")}</span>
          </div>
          <div className="bb-track">
            <div className="bb-win" style={{width: bbWinPct.toFixed(1) + "%"}}>${aw.toFixed(2)}</div>
            <div className="bb-loss" style={{width: bbLossPct.toFixed(1) + "%"}}>${al.toFixed(2)}</div>
          </div>
          <div className="bb-summary">
            {al > aw
              ? <span dangerouslySetInnerHTML={{__html: t("conclusions.balance.loser_heavier", {ratio: (al/aw).toFixed(1), wr: (al/(aw+al)*100).toFixed(0)})}} />
              : aw > al
                ? <span dangerouslySetInnerHTML={{__html: t("conclusions.balance.winner_heavier", {ratio: (aw/al).toFixed(1), wr: (al/(aw+al)*100).toFixed(0)})}} />
                : <span>{t("conclusions.balance.equal")}</span>}
          </div>
        </div>
      )}
    </div>

    {/* ── DRIVERS: what's working vs what's failing ─────────────── */}
    {(works.length > 0 || fails.length > 0) && (
      <div className="split-2">
        <div className="panel">
          <div className="panel-title">{t("conclusions.whats_working")} <span className="meta">{t("conclusions.findings_count", {n: works.length})}</span></div>
          {works.length === 0 ? (
            <div style={{fontSize:12, color:"var(--text-soft)"}}>{t("conclusions.no_winners")}</div>
          ) : (
            <ul className="driver-list pos">
              {works.map((w, i) => <li key={i}>{w}</li>)}
            </ul>
          )}
        </div>
        <div className="panel">
          <div className="panel-title">{t("conclusions.whats_failing")} <span className="meta">{t("conclusions.findings_count", {n: fails.length})}</span></div>
          {fails.length === 0 ? (
            <div style={{fontSize:12, color:"var(--text-soft)"}}>{t("conclusions.no_fails")}</div>
          ) : (
            <ul className="driver-list neg">
              {fails.map((f, i) => <li key={i}>{f}</li>)}
            </ul>
          )}
        </div>
      </div>
    )}

    {/* ── CHANGES & DO NOT TOUCH ─────────────────────────────── */}
    {(changes.length > 0 || dnt.length > 0) && (
      <div className="split-2">
        <div className="panel">
          <div className="panel-title">{t("conclusions.to_evaluate")} <span className="meta">{t("conclusions.changes_proposed", {n: changes.length})}</span></div>
          {changes.length === 0 ? (
            <div style={{fontSize:12, color:"var(--text-soft)"}}>{t("conclusions.no_changes")}</div>
          ) : (
            <ul className="driver-list info">
              {changes.map((c, i) => (
                <li key={i} style={{flexWrap:"wrap"}}>
                  <div style={{flex:"1 1 100%"}}>
                    <div style={{color:"var(--text)", fontWeight:500}}>{c.title}</div>
                    <div style={{color:"var(--text-muted)", fontSize:11, marginTop:3}}>{c.action}</div>
                  </div>
                  <span className="meta" style={{marginLeft:16}}>{String(c.priority || "").toUpperCase()}</span>
                </li>
              ))}
            </ul>
          )}
        </div>
        <div className="panel">
          <div className="panel-title">{t("conclusions.do_not_touch")} <span className="meta">{t("conclusions.stable_count", {n: dnt.length})}</span></div>
          {dnt.length === 0 ? (
            <div style={{fontSize:12, color:"var(--text-soft)"}}>{t("conclusions.need_more_data")}</div>
          ) : (
            <ul className="driver-list">
              {dnt.map((d, i) => <li key={i}>{d}</li>)}
            </ul>
          )}
        </div>
      </div>
    )}

    {/* ── NEXT BEST ACTION ──────────────────────────────── */}
    {nba.action && (
      <div className={"action " + nbaVariant}>
        <div className="action-mark">→</div>
        <div className="action-body">
          <div className="action-meta">
            <span className="sev">{nba.priority || "INFO"}</span>
            {nba.category && <span>{nba.category}</span>}
            <span>{t("conclusions.next_action")}</span>
          </div>
          <div className="action-title">{nba.action}</div>
          {nba.reasoning && <div className="action-sub">{nba.reasoning}</div>}
        </div>
      </div>
    )}

    {/* ── MARKERS TIMELINE ─────────────────────────────── */}
    {recentMarkers.length > 0 && (
      <div className="panel">
        <div className="panel-title">
          {t("conclusions.recent_markers")} <span className="meta">{t("conclusions.before_after_meta")}</span>
          <Tip text={t("conclusions.recent_markers_tip")} />
        </div>
        <div className="timeline">
          {recentMarkers.map(m => {
            const imp = m.impact_data || {};
            const dExp = imp.delta_expectancy;
            const when = m.timestamp ? new Date(m.timestamp).toLocaleString(lang === "en" ? "en-US" : "es-ES", {day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"}) : "—";
            const row = m.impact_status === "IMPROVED" ? "up" : m.impact_status === "WORSENED" ? "down" : "flat";
            const fmt = (v, suffix) => v == null ? "—" : (v > 0 ? "+" : "") + v + (suffix || "");
            const dCls = (v) => v > 0 ? "pos" : v < 0 ? "neg" : "flat";
            return (
              <div key={m.id} className={"t-row " + row}>
                <div>
                  <div className="t-when">{when}</div>
                  <div className="t-sub">{m.category}</div>
                </div>
                <div>
                  <div className="t-label" title={m.label}>{m.label}</div>
                  <div className="t-sub">{m.impact_status || "PENDING"}</div>
                </div>
                <div>
                  <div className={"t-delta " + dCls(dExp)}>{fmt(dExp)} <span style={{color:"var(--text-soft)", fontWeight:400, fontSize:10}}>exp</span></div>
                  <div className={"t-delta " + dCls(imp.delta_wr)} style={{fontSize:10.5}}>{fmt(imp.delta_wr, "%")} <span style={{color:"var(--text-soft)", fontWeight:400, fontSize:10}}>wr</span></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    )}

    {/* ── RECOMMENDATIONS QUEUE ─────────────────────────── */}
    {recs.length > 0 && (
      <div className="panel">
        <div className="panel-title">{t("conclusions.actions_queue")} <span className="meta">{t("conclusions.pending_count", {n: recs.length})}</span></div>
        <ul className="driver-list">
          {recs.map((r, i) => {
            const confCls = r.confidence === "high" ? "pos" : r.confidence === "medium" ? "warn" : "info";
            return (
              <li key={i} className={confCls} style={{flexWrap:"wrap"}}>
                <div style={{flex:"1 1 100%"}}>
                  <div style={{color:"var(--text)", fontWeight:500}}>{r.title}</div>
                  <div style={{color:"var(--text-muted)", fontSize:11.5, marginTop:4, lineHeight:1.5}}>{r.action}</div>
                  {r.evidence && <div style={{color:"var(--text-soft)", fontSize:10.5, marginTop:4, fontFamily:"var(--font-mono)"}}>{r.evidence}</div>}
                </div>
                <span className="meta">{String(r.type || "").toUpperCase()} · {String(r.confidence || "").toUpperCase()}</span>
              </li>
            );
          })}
        </ul>
      </div>
    )}

    {/* ── REPLAY EVIDENCE (if available) ─────────────── */}
    {replay.status === "DATA_AVAILABLE" && (
      <div className="panel">
        <div className="panel-title">{t("conclusions.replay_history")} <span className="meta">{t("conclusions.replay_meta", {files: replay.files, days: replay.days, coins: replay.coins})}</span></div>
        <div style={{fontSize:12, color:"var(--text-dim)", lineHeight:1.6}}>{replay.note}</div>
      </div>
    )}

    {/* ── SCORE PARITY (advanced) ─────────────────────── */}
    {(sp.status || sp.trade_scores) && (() => {
      const spVariant = sp.status === "OK" ? "ok" : sp.status === "DEGRADED" ? "warn" : sp.status === "NO_DATA" ? "info" : "bad";
      const pd = sp.post_diagnostics_coverage || {};
      const ls = sp.legacy_stats || {};
      return (
        <div className="panel">
          <div className="panel-title">
            {t("conclusions.score_parity")}
            <span className="meta">{t("conclusions.score_parity_meta", {pct: sp.coverage_pct || 0, legacy: ls.legacy_trades ?? "?", actual: pd.trade_count ?? "?"})}</span>
          </div>
          <div className={"diag " + spVariant} style={{marginBottom:16}}>
            <div className="diag-label">{sp.status}</div>
            <div className="diag-text">{sp.details}</div>
          </div>
          {sp.trade_scores && sp.trade_scores.total > 0 && (
            <div className="kpi-strip">
              <div>
                <div className="k">{t("conclusions.score_signal")}</div>
                <div className={"v " + (sp.trade_scores.signal_score_pct >= 80 ? "pos" : "warn")}>{sp.trade_scores.signal_score_pct}<span style={{fontSize:12, color:"var(--text-muted)"}}>%</span></div>
              </div>
              <div>
                <div className="k">{t("conclusions.score_trend")}</div>
                <div className={"v " + (sp.trade_scores.trend_score_pct >= 80 ? "pos" : "warn")}>{sp.trade_scores.trend_score_pct}<span style={{fontSize:12, color:"var(--text-muted)"}}>%</span></div>
              </div>
              <div>
                <div className="k">{t("conclusions.score_micro")}</div>
                <div className={"v " + (sp.trade_scores.micro_score_pct >= 80 ? "pos" : "warn")}>{sp.trade_scores.micro_score_pct}<span style={{fontSize:12, color:"var(--text-muted)"}}>%</span></div>
              </div>
              <div>
                <div className="k">{t("conclusions.score_all_present")}</div>
                <div className={"v " + (sp.trade_scores.all_present_pct >= 80 ? "pos" : "neg")}>{sp.trade_scores.all_present_pct}<span style={{fontSize:12, color:"var(--text-muted)"}}>%</span></div>
              </div>
              <div>
                <div className="k">{t("conclusions.score_all_zero")}</div>
                <div className={"v " + (sp.trade_scores.all_zero_pct <= 5 ? "pos" : "neg")}>{sp.trade_scores.all_zero_pct}<span style={{fontSize:12, color:"var(--text-muted)"}}>%</span></div>
              </div>
            </div>
          )}
          {sp.anomalies && sp.anomalies.length > 0 && (
            <ul className="driver-list warn" style={{marginTop:16}}>
              {sp.anomalies.map((a, i) => (
                <li key={i}>
                  <span style={{color: a.severity === "critical" ? "var(--neg-hi)" : "var(--warn-hi)", fontFamily:"var(--font-mono)", fontSize:10, textTransform:"uppercase", marginRight:8}}>{a.severity}</span>
                  <span>{a.code}: {a.message}</span>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    })()}

    {/* ── DATA QUALITY ISSUES ─────────────────────── */}
    {dqi.length > 0 && (
      <div className="panel">
        <div className="panel-title">{t("conclusions.data_quality_issues")} <span className="meta">{t("conclusions.issues_detected", {n: dqi.length})}</span></div>
        <ul className="driver-list warn">
          {dqi.map((issue, i) => <li key={i}>{issue}</li>)}
        </ul>
      </div>
    )}
  </>);
}

// ── System Tab ──
function SystemTab() {
  const { t } = useI18n();
  const { data: status } = useFetch("/api/status", 3000);
  const { data: disk } = useFetch("/api/system/disk", 10000);

  if (!status || !disk) return <div className="loading">{t("common.loading")}</div>;

  const d = disk.disk || {};
  const g = disk.growth || {};
  const dirs = disk.directories || {};
  const sev = d.severity || "ok";

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, flexWrap:"wrap"}}>
      <div>
        {t("system.title")}
        <div className="page-sub">{t("system.subtitle")}</div>
      </div>
      <LivePulse intervalSec={3} />
    </div>

    {/* 2026-04-27: explanatory banner — users were confused why "only 20 coins"
        when the bot trades 60+. The platform ingests a SUBSET for tick-by-tick
        quant analysis (orderbook, microstructure, features). Bot trading
        universe is independent. */}
    <div style={{background:"rgba(56,189,248,0.06)", border:"1px solid rgba(56,189,248,0.20)", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:11.5, color:"#cbd5e1", lineHeight:1.55}}>
      <span style={{color:"#38bdf8", fontWeight:700, marginRight:6}}>ℹ️ Importante:</span>
      Estas son las coins que el <b>platform</b> ingesta tick-by-tick para análisis quant
      (orderbook, microstructura, features). <b>NO</b> son las que el bot trade —
      el bot opera ~60 coins independientemente. El subset reducido aquí evita saturar
      la BD con eventos de mercado innecesarios.
    </div>

    <div className="grid">
      <MC label={t("system.card.status")} value={status.status?.toUpperCase()} color="green" />
      <MC label={t("system.card.coins")} value={status.features?.coins_tracked || 0} sub="ingestadas (no las que opera el bot)" color="purple" />
      <MC label={t("system.card.events")} value={(status.features?.events_ingested || 0).toLocaleString()} sub={t("system.card.events_sub")} />
      <MC label={t("system.card.features")} value={status.features?.total_features || 0} sub={t("system.card.features_sub")} color="blue" />
    </div>

    <h3 className="section-title">{t("system.disk_title")} <Tip text={t("system.disk_tip")} /></h3>
    <div className="grid">
      <MC label={t("system.disk.total")} value={d.total_gb + " GB"} />
      <MC label={t("system.disk.used")} value={d.used_gb + " GB"} sub={d.usage_pct + "%"} color={sev} />
      <MC label={t("system.disk.free")} value={d.free_gb + " GB"} />
      <MC label={t("system.card.status")} value={sev.toUpperCase()} color={sev} />
    </div>
    <div className="card" style={{marginBottom: 16}}>
      <div className="progress-bar">
        <div className="progress-fill" style={{
          width: d.usage_pct + "%",
          background: sev === "ok" ? "#22c55e" : sev === "warning" ? "#eab308" : "#ef4444"
        }} />
      </div>
      <div style={{display: "flex", justifyContent: "space-between", marginTop: 8}}>
        <span className="sub">{t("system.disk.growth_24h", {n: g.growth_24h_gb})}</span>
        <span className="sub">{t("system.disk.est_remaining", {n: g.estimated_days_remaining})}</span>
      </div>
    </div>

    <h3 className="section-title">{t("system.by_dir_title")} <Tip text={t("system.by_dir_tip")} /></h3>
    <div className="card">
      <table>
        <thead><tr><th>{t("system.col.directory")}</th><th style={{textAlign:"right"}}>{t("system.col.size")}</th><th style={{textAlign:"right"}}>{t("system.col.files")}</th></tr></thead>
        <tbody>
          {Object.entries(dirs).map(([name, info]) => (
            <tr key={name}>
              <td>{name}</td>
              <td style={{textAlign:"right"}}>{info.size_gb} GB</td>
              <td style={{textAlign:"right"}}>{info.file_count >= 0 ? info.file_count : "-"}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>

    {/* ── Ingestion / captura: merged from the old Captura tab ── */}
    <h3 className="section-title" style={{marginTop: 16}}>{t("system.ingestion_title")}
      <Tip text={t("system.ingestion_tip")} />
    </h3>
    <div className="grid">
      <MC label={t("system.events_ingested")} value={(status.features?.events_ingested || 0).toLocaleString()} color="blue" />
      <MC label={t("system.raw_files")} value={dirs.raw?.file_count || 0} sub={t("system.raw_files_sub")} />
      <MC label={t("system.raw_size")} value={(dirs.raw?.size_gb || 0) + " GB"} />
      <MC label={t("system.feature_computes")} value={(status.features?.computes || 0).toLocaleString()} />
      <MC label={t("system.cache_hits")} value={(status.features?.cache_hits || 0).toLocaleString()} />
    </div>
  </>);
}

// ── Features Tab ──
function FeaturesTab() {
  const { t } = useI18n();
  const { data: features } = useFetch("/api/features", 5000);
  const [selected, setSelected] = useState(null);

  if (!features) return <div className="loading">{t("common.loading")}</div>;
  const coins = Object.keys(features);

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, flexWrap:"wrap"}}>
      <div>
        {t("features.title")}
        <div className="page-sub">{t("features.subtitle")}</div>
      </div>
      <LivePulse intervalSec={5} />
    </div>
    {/* 2026-04-27: same clarification as in System tab — features here are
        only computed for the platform-ingested coin subset, NOT the bot
        trading universe. */}
    <div style={{background:"rgba(56,189,248,0.06)", border:"1px solid rgba(56,189,248,0.20)", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:11.5, color:"#cbd5e1", lineHeight:1.55}}>
      <span style={{color:"#38bdf8", fontWeight:700, marginRight:6}}>ℹ️</span>
      Features (RSI, EMA, ATR, etc.) calculadas en tiempo real para las {coins.length} coins
      que el platform ingesta tick-by-tick. Si quieres añadir más coins al análisis quant,
      configúralo en <code style={{background:"#0a0a13", padding:"2px 6px", borderRadius:3}}>config/settings.py → INGEST_COINS</code>.
      <b> El bot puede tradear coins que NO aparecen aquí</b> — usa sus propios indicadores via API.
    </div>
    {coins.length === 0 ? (
      <div className="card" style={{padding:20, textAlign:"center", color:"#888", fontSize:12}}>{t("common.no_features_yet")}</div>
    ) : (<>
    <div style={{display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 16}}>
      {coins.map(c => (
        <button key={c} className={"tab " + (selected === c ? "active" : "")} onClick={() => setSelected(c)}>{c}</button>

        {Object.entries(features[selected]).filter(([k]) => !["coin","timestamp_ms","version"].includes(k)).length === 0 ? (

          <tbody>
            {Object.entries(features[selected]).filter(([k]) => !["coin","timestamp_ms","version"].includes(k)).map(([k, v]) => (
              <tr key={k}>
                <td>{k}</td>
                <td style={{textAlign:"right", color: Number(v) > 0 ? "#22c55e" : Number(v) < 0 ? "#ef4444" : "#888"}}>{typeof v === "number" ? v.toFixed(6) : String(v)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        )}
      </div>
    ) : <div className="loading">{t("features.select_coin")}</div>}
    </>)}
  </>);
}
