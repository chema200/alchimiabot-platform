/**
 * Reusable in-app modal. Matches the dark theme of the rest of the
 * dashboard — no native window.alert/confirm. Click backdrop or
 * the × button to cancel; `onConfirm` fires only when the user
 * hits the primary action.
 */
function Modal({ open, title, children, onCancel, onConfirm, confirmLabel, confirmStyle, cancelLabel, busy }) {
  if (!open) return null;
  const pConfirmLabel = confirmLabel || "Confirmar";
  const pCancelLabel  = cancelLabel  || "Cancelar";
  const confirmBg = confirmStyle === "danger" ? "#b91c1c" : confirmStyle === "primary" ? "#3b82f6" : "#3b82f6";
  return (
    <div onClick={onCancel}
      style={{position:"fixed", inset:0, background:"rgba(3,4,10,0.78)", zIndex:1000,
              display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(3px)"}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:"#0d0d17", border:"1px solid #2a2a40", borderRadius:10, minWidth:420, maxWidth:620,
                maxHeight:"85vh", overflowY:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between",
                     padding:"12px 16px", borderBottom:"1px solid #1f1f30"}}>
          <div style={{fontSize:13, fontWeight:600, color:"#e0e0e8"}}>{title}</div>
          <button onClick={onCancel} disabled={busy} aria-label="cerrar"
            style={{background:"transparent", border:"none", color:"#888", cursor:"pointer", fontSize:18, lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"14px 16px", fontSize:12, color:"#ccc", lineHeight:1.5}}>{children}</div>
        <div style={{display:"flex", justifyContent:"flex-end", gap:8,
                     padding:"10px 16px", borderTop:"1px solid #1f1f30"}}>
          <button onClick={onCancel} disabled={busy}
            style={{padding:"6px 14px", fontSize:11, background:"#1a1a2e", border:"1px solid #333",
                    borderRadius:5, color:"#ccc", cursor: busy ? "not-allowed" : "pointer"}}>
            {pCancelLabel}
          </button>
          {onConfirm && (
            <button onClick={onConfirm} disabled={busy}
              style={{padding:"6px 16px", fontSize:11, background: busy ? "#333" : confirmBg,
                      border:"none", borderRadius:5, color:"white", fontWeight:600,
                      cursor: busy ? "not-allowed" : "pointer"}}>
              {busy ? "..." : pConfirmLabel}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function ShadowModeTab() {
  const [variants, setVariants] = useState([]);
  const [evaluations, setEvaluations] = useState([]);
  const [summary, setSummary] = useState({variants: [], totalEvaluations: 0, hours: 24});
  const [exits, setExits] = useState([]);
  const [exitsSummary, setExitsSummary] = useState({variants: [], totalExits: 0, hours: 168});
  const [exitsHours, setExitsHours] = useState(168);
  const [hours, setHours] = useState(24);
  const [filterVariant, setFilterVariant] = useState("");
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);

  const [form, setForm] = useState(EMPTY_FORM());
  const [submitMsg, setSubmitMsg] = useState("");
  // null = creating a new variant; string = editing an existing variant
  // (holds the ORIGINAL name so the PUT proxy can find the row even if
  // the user types a different name into form.name to trigger a rename).
  const [editingName, setEditingName] = useState(null);

  // Delete confirmation modal state. Fetches associated counts lazily
  // when opened so the user sees exactly what will be wiped.
  const [deleteModal, setDeleteModal] = useState(null);
  const [deleteBusy, setDeleteBusy] = useState(false);

  // Lightweight info toast, shown after destructive actions with a summary
  // of what happened. Auto-dismisses after 4s.
  const [flash, setFlash] = useState(null);
  useEffect(() => {
    if (!flash) return;
    const t = setTimeout(() => setFlash(null), 4000);
    return () => clearTimeout(t);
  }, [flash]);

  const refresh = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const qs = filterVariant ? ("?variant=" + encodeURIComponent(filterVariant)) : "";
      const [vResp, eResp, sResp, xResp, xsResp] = await Promise.all([
        fetch(API + "/api/shadow/variants", {credentials:"include"}),
        fetch(API + "/api/shadow/evaluations" + qs, {credentials:"include"}),
        fetch(API + "/api/shadow/summary?hours=" + hours, {credentials:"include"}),
        fetch(API + "/api/shadow/exits" + qs, {credentials:"include"}),
        fetch(API + "/api/shadow/exits/summary?hours=" + exitsHours, {credentials:"include"}),
      ]);
      if (vResp.status === 403 || eResp.status === 403 || sResp.status === 403
          || xResp.status === 403 || xsResp.status === 403) {
        throw new Error("Acceso denegado — requiere rol ADMIN");
      }
      // Defensive parsing: endpoint can be missing (404) while the bot /
      // platform is mid-deploy. Fall back to safe defaults so the tab still
      // renders the old sections rather than crashing the whole app.
      const jsonOrDefault = async (resp, fallback) => {
        if (!resp.ok) return fallback;
        try { return await resp.json(); } catch { return fallback; }
      };
      const vData  = await jsonOrDefault(vResp, []);
      const eData  = await jsonOrDefault(eResp, []);
      const sData  = await jsonOrDefault(sResp, {variants: [], totalEvaluations: 0, hours});
      const xData  = await jsonOrDefault(xResp, []);
      const xsData = await jsonOrDefault(xsResp, {variants: [], totalExits: 0, hours: exitsHours});
      setVariants(Array.isArray(vData) ? vData : []);
      setEvaluations(Array.isArray(eData) ? eData : []);
      setSummary(sData && typeof sData === "object" && Array.isArray(sData.variants) ? sData : {variants: [], totalEvaluations: 0, hours});
      setExits(Array.isArray(xData) ? xData : []);
      setExitsSummary(xsData && typeof xsData === "object" && Array.isArray(xsData.variants) ? xsData : {variants: [], totalExits: 0, hours: exitsHours});
    } catch (e) { setErr(e.message || String(e)); }
    setLoading(false);
  }, [hours, filterVariant, exitsHours]);

  useEffect(() => { refresh(); const t = setInterval(refresh, 15000); return () => clearInterval(t); }, [refresh]);

  const toggleMulti = (field, value) => {
    setForm(prev => {
      const arr = prev[field];
      const next = arr.includes(value) ? arr.filter(x => x !== value) : [...arr, value];
      return { ...prev, [field]: next };
    });
  };

  const hasAnyFilter = () => {
    return form.lateRisks.length > 0 || form.labels.length > 0 || form.sides.length > 0
        || form.modes.length > 0 || form.coins.trim().length > 0
        || Number(form.minScore) > 0 || Number(form.collateral) > 0
        || form.blockExhausted
        || form.roiTable.trim().length > 0
        || form.slPct.toString().trim().length > 0
        || form.tpPct.toString().trim().length > 0
        || form.maxHold.toString().trim().length > 0;
  };

  const submitVariant = async () => {
    setSubmitMsg("");
    const newName = form.name.trim();
    if (!newName) { setSubmitMsg("✗ Falta nombre"); return; }
    if (!hasAnyFilter())   { setSubmitMsg("✗ Activa al menos un filtro o un override"); return; }
    try {
      const coinList = form.coins.split(",").map(s => s.trim().toUpperCase()).filter(Boolean);
      const base = {
        blockLateEntryRisks: form.lateRisks,
        blockQualityLabels:  form.labels,
        blockSides:          form.sides,
        blockModes:          form.modes,
        blockCoins:          coinList,
        minScoreOverride:    Number(form.minScore) || 0,
        collateralOverrideUsd: Number(form.collateral) || 0,
        blockImpulseExhausted: !!form.blockExhausted,
        // Exit overrides — send only if set, else null → inherit prod
        roiTableOverride:        form.roiTable.trim() || null,
        slPctOverride:           form.slPct.toString().trim() === ""    ? null : Number(form.slPct),
        tpPctOverride:           form.tpPct.toString().trim() === ""    ? null : Number(form.tpPct),
        maxHoldMinutesOverride:  form.maxHold.toString().trim() === ""  ? null : Math.trunc(Number(form.maxHold))
      };
      let url, method, body;
      if (editingName) {
        // PUT to the original name; send newName only if the user actually renamed.
        url = API + "/api/shadow/variants/" + encodeURIComponent(editingName);
        method = "PUT";
        body = { ...base, newName: newName };
      } else {
        url = API + "/api/shadow/variants";
        method = "POST";
        body = { ...base, name: newName };
      }
      const r = await fetch(url, {
        method, credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
      });
      const data = await r.json();
      if (data.success) {
        setSubmitMsg(editingName ? "✓ Variante actualizada" : "✓ Variante guardada");
        setForm(EMPTY_FORM());
        setEditingName(null);
        refresh();
      } else {
        setSubmitMsg("✗ " + (data.error || "error"));
      }
    } catch (e) { setSubmitMsg("✗ " + e.message); }
  };

  const editVariant = (v) => {
    // Hydrate the form from the selected variant so the user sees all
    // current values and only changes what they want. Works for any of
    // the 12 fields including rename.
    setForm({
      name:           v.name || "",
      lateRisks:      Array.from(v.blockLateEntryRisks || []),
      labels:         Array.from(v.blockQualityLabels  || []),
      sides:          Array.from(v.blockSides          || []),
      modes:          Array.from(v.blockModes          || []),
      coins:          Array.from(v.blockCoins          || []).join(", "),
      minScore:       String(v.minScoreOverride       ?? 0),
      collateral:     String(v.collateralOverrideUsd  ?? 0),
      blockExhausted: !!v.blockImpulseExhausted,
      roiTable:       v.roiTableOverride || "",
      slPct:          v.slPctOverride != null ? String(v.slPctOverride) : "",
      tpPct:          v.tpPctOverride != null ? String(v.tpPctOverride) : "",
      maxHold:        v.maxHoldMinutesOverride != null ? String(v.maxHoldMinutesOverride) : "",
    });
    setEditingName(v.name);
    setSubmitMsg("");
    // Scroll the form into view so the user sees their fields populated.
    setTimeout(() => {
      const el = document.getElementById("shadow-variant-form");
      if (el) el.scrollIntoView({behavior:"smooth", block:"start"});
    }, 50);
  };

  const cancelEdit = () => {
    setForm(EMPTY_FORM());
    setEditingName(null);
    setSubmitMsg("");
  };

  /**
   * Opens the delete modal and, in parallel, fetches the exact counts of
   * hl_shadow_evaluations + hl_shadow_exits rows that would be cascade-
   * deleted so the user sees what they are about to wipe.
   */
  const openDeleteModal = async (name) => {
    setDeleteModal({ name, evaluations: null, exits: null, loading: true });
    try {
      const r = await fetch(API + "/api/shadow/variants/" + encodeURIComponent(name) + "/associated",
                            {credentials:"include"});
      if (r.ok) {
        const d = await r.json();
        setDeleteModal(m => m && m.name === name ? { ...m, evaluations: d.evaluations ?? 0, exits: d.exits ?? 0, loading: false } : m);
      } else {
        setDeleteModal(m => m && m.name === name ? { ...m, loading: false } : m);
      }
    } catch {
      setDeleteModal(m => m && m.name === name ? { ...m, loading: false } : m);
    }
  };

  const confirmDelete = async () => {
    if (!deleteModal) return;
    setDeleteBusy(true);
    try {
      const r = await fetch(API + "/api/shadow/variants/" + encodeURIComponent(deleteModal.name),
                            { method: "DELETE", credentials: "include" });
      const d = await r.json();
      if (d.success) {
        setFlash({
          kind: "success",
          msg: `Variante "${deleteModal.name}" borrada. Limpiadas ${d.deletedEvaluations ?? 0} evaluaciones y ${d.deletedExits ?? 0} salidas.`
        });
      } else {
        setFlash({ kind: "error", msg: "No se pudo borrar: " + (d.error || "variante no existe") });
      }
      setDeleteModal(null);
      refresh();
    } catch (e) {
      setFlash({ kind: "error", msg: "Error de red al borrar: " + (e.message || e) });
    }
    setDeleteBusy(false);
  };

  const Chip = ({ active, onClick, children, title }) => (
    <button type="button" onClick={onClick} title={title || ""}
      style={{
        padding:"3px 10px", fontSize:10, borderRadius:12, cursor:"pointer",
        border: "1px solid " + (active ? "#3b82f6" : "#333"),
        background: active ? "#1e3a8a" : "#0a0a13",
        color: active ? "#e0e0e8" : "#888",
        fontWeight: active ? 600 : 400,
        marginRight:6, marginBottom:6
      }}>{children}</button>
  );

  return (<>
    <div className="page-title">Shadow Mode
      <div className="page-sub">Variantes de config evaluadas en paralelo al motor real. Cero ordenes, solo observacion y log.</div>
    </div>

    {err && <div style={{padding:12, background:"#2a1010", border:"1px solid #ef4444", borderRadius:6, color:"#ef4444", marginBottom:12, fontSize:12}}>{err}</div>}

    {/* ── Active variants ── */}
    <h3 className="section-title">Variantes activas ({variants.length}) <Tip text="Cada variante evalua en paralelo cada candidato de entrada y guarda su decision en hl_shadow_evaluations. Cero impacto sobre prod." /></h3>
    <div className="card" style={{marginBottom:12}}>
      {variants.length === 0 ? (
        <div style={{color:"#666", fontSize:11, padding:8}}>Sin variantes. Usa un template abajo o rellena el formulario.</div>
      ) : (
        <table style={{width:"100%", fontSize:11}}>
          <thead><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
            <th style={{padding:"6px 4px"}}>Nombre</th>
            <th>Late risks</th>
            <th>Labels</th>
            <th>Sides</th>
            <th>Modes</th>
            <th>Coins</th>
            <th>Min score</th>
            <th>Colat override</th>
            <th>Exhausted</th>
            <th>Exit overrides</th>
            <th></th>
          </tr></thead>
          <tbody>
            {variants.map(v => {
              const setStr = (s) => (s && s.length > 0 ? (Array.isArray(s) ? s : Array.from(s)).join(", ") : null);
              const exitChips = [];
              if (v.roiTableOverride)         exitChips.push("ROI=" + v.roiTableOverride);
              if (v.slPctOverride != null)    exitChips.push("SL=" + v.slPctOverride + "%");
              if (v.tpPctOverride != null)    exitChips.push("TP=" + v.tpPctOverride + "%");
              if (v.maxHoldMinutesOverride)   exitChips.push("max=" + v.maxHoldMinutesOverride + "m");
              return (
                <tr key={v.name} style={{borderBottom:"1px solid #181828"}}>
                  <td style={{padding:"6px 4px", fontWeight:600, color:"#e0e0e8"}}>{v.name}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockLateEntryRisks) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockQualityLabels) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockSides) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockModes) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#f59e0b"}}>{setStr(v.blockCoins) || <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#aaa"}}>{v.minScoreOverride > 0 ? v.minScoreOverride : <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{color:"#aaa"}}>{v.collateralOverrideUsd > 0 ? ("$" + v.collateralOverrideUsd) : <span style={{color:"#555"}}>prod</span>}</td>
                  <td style={{color: v.blockImpulseExhausted ? "#f59e0b" : "#555"}}>{v.blockImpulseExhausted ? "ON" : "off"}</td>
                  <td style={{color:"#22d3ee", fontSize:10}}>{exitChips.length > 0 ? exitChips.join(" · ") : <span style={{color:"#555"}}>—</span>}</td>
                  <td style={{textAlign:"right", whiteSpace:"nowrap"}}>
                    <button onClick={() => editVariant(v)}
                      style={{padding:"3px 10px", fontSize:10, background:"#1a1a2e", border:"1px solid #444", borderRadius:4, color:"#3b82f6", cursor:"pointer", marginRight:6}}>
                      Editar
                    </button>
                    <button onClick={() => openDeleteModal(v.name)}
                      style={{padding:"3px 10px", fontSize:10, background:"#1a1a2e", border:"1px solid #444", borderRadius:4, color:"#ef4444", cursor:"pointer"}}>
                      Quitar
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>

    {/* ── Templates ── */}
    <h3 className="section-title">Templates rapidos <Tip text="Click en un template para pre-rellenar el formulario. Despues puedes ajustar los valores antes de guardar." /></h3>
    <div className="card" style={{marginBottom:12, padding:12}}>
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))", gap:8}}>
        {SHADOW_TEMPLATES.map(t => (
          <button key={t.id} type="button"
            onClick={() => { setForm(t.apply(EMPTY_FORM())); setSubmitMsg(""); }}
            title={t.desc}
            style={{padding:"8px 10px", textAlign:"left", background:"#0a0a13", border:"1px solid #333", borderRadius:6, color:"#ccc", cursor:"pointer", fontSize:11}}>
            <div style={{fontWeight:600, color:"#e0e0e8", marginBottom:2}}>{t.icon} {t.label}</div>
            <div style={{fontSize:10, color:"#666", lineHeight:1.3}}>{t.desc}</div>
          </button>
        ))}
      </div>
    </div>

    {/* ── New variant form ── */}
    <h3 className="section-title" id="shadow-variant-form">
      {editingName ? <>Editando variante <span style={{color:"#3b82f6"}}>"{editingName}"</span></> : "Nueva variante"}
      <Tip text="Al menos UN filtro o un override debe estar activo para guardar. Cambiar el nombre al editar una variante renombra la variante y toda su historial asociada (evaluaciones + salidas simuladas)." />
    </h3>
    <div className="card" style={{marginBottom:12, padding:12, borderColor: editingName ? "#3b82f6" : undefined}}>

      {/* Nombre */}
      <label style={{fontSize:10, color:"#888", display:"block", marginBottom:10}}>Nombre (unico)
        <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})}
          placeholder="e.g. late-high-block"
          style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0a0a13", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
      </label>

      {/* Late entry risk */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10, color:"#888", marginBottom:4}}>
          Bloquear <code style={{color:"#ccc"}}>late_entry_risk</code>
          <Tip text="LOW nunca tiene sentido bloquearlo. HIGH es el patron mas claramente perdedor del audit." />
        </div>
        {LATE_RISK_OPTIONS.map(o =>
          <Chip key={o} active={form.lateRisks.includes(o)} onClick={() => toggleMulti("lateRisks", o)}>{o}</Chip>)}
      </div>

      {/* Quality labels */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10, color:"#888", marginBottom:4}}>
          Bloquear <code style={{color:"#ccc"}}>entry_quality_label</code>
          <Tip text="El audit mostro que A_PLUS correlaciona con perdidas (scoring invertido) — buena candidata para testear." />
        </div>
        {QUALITY_OPTIONS.map(o =>
          <Chip key={o} active={form.labels.includes(o)} onClick={() => toggleMulti("labels", o)}>{o}</Chip>)}
      </div>

      {/* Side */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10, color:"#888", marginBottom:4}}>Bloquear side</div>
        {SIDE_OPTIONS.map(o =>
          <Chip key={o} active={form.sides.includes(o)} onClick={() => toggleMulti("sides", o)}>{o}</Chip>)}
      </div>

      {/* Mode */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10, color:"#888", marginBottom:4}}>Bloquear mode</div>
        {MODE_OPTIONS.map(o =>
          <Chip key={o} active={form.modes.includes(o)} onClick={() => toggleMulti("modes", o)}>{o}</Chip>)}
      </div>

      {/* Coins */}
      <label style={{fontSize:10, color:"#888", display:"block", marginBottom:10}}>
        Bloquear coins (coma-separado, vacio = ninguna)
        <input type="text" value={form.coins} onChange={e => setForm({...form, coins: e.target.value})}
          placeholder="e.g. BTC, ETH, WIF"
          style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0a0a13", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
      </label>

      {/* AGOTADA / impulse exhausted toggle */}
      <div style={{marginBottom:10}}>
        <label style={{fontSize:11, color:"#ccc", cursor:"pointer"}}>
          <input type="checkbox" checked={form.blockExhausted} onChange={e => setForm({...form, blockExhausted: e.target.checked})} style={{marginRight:6}} />
          Bloquear si <code style={{color:"#ccc"}}>impulse_exhausted</code> (AGOTADA)
          <Tip text="Bloquea cuando el movimiento de 30min en la direccion de la senal supero 0.20% pero el de 5min esta flojo (<0.05%) o el de 1min reversing (<0). Es el bucket que el audit 2026-04-22 marco como mas toxico." />
        </label>
      </div>

      {/* Numeric overrides */}
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12}}>
        <label style={{fontSize:10, color:"#888"}}>
          Min score override <Tip text="Umbral absoluto totalScore. 0 = sin override (usa el de prod)." />
          <input type="number" value={form.minScore} onChange={e => setForm({...form, minScore: e.target.value})} min="0" step="1"
            style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0a0a13", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
        </label>
        <label style={{fontSize:10, color:"#888"}}>
          Colateral override ($) <Tip text="USD de colateral para el sim. 0 = usa el de prod." />
          <input type="number" value={form.collateral} onChange={e => setForm({...form, collateral: e.target.value})} min="0" step="1"
            style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0a0a13", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
        </label>
      </div>

      {/* ── Exit overrides ───────────────────────────────────── */}
      <div style={{marginBottom:12, padding:10, background:"#0a0a13", border:"1px solid #2a2a40", borderRadius:6}}>
        <div style={{fontSize:11, fontWeight:600, color:"#9aa4d0", marginBottom:8}}>
          Overrides de salida <Tip text="Dejalos vacios para heredar el preset de prod. Solo los que rellenes se aplican. Requieren el simulador de salidas (Fase 2/3) para producir datos comparativos." />
        </div>

        <label style={{fontSize:10, color:"#888", display:"block", marginBottom:8}}>
          ROI table override <Tip text="Formato 'min:pct,min:pct' — p.ej. '0:0.4,5:0.25,15:0.12,30:0.05' significa ROI=0.4% para 0-5min, 0.25% para 5-15min, etc. Vacio = usa el ROI del preset." />
          <input type="text" value={form.roiTable} onChange={e => setForm({...form, roiTable: e.target.value})}
            placeholder="e.g. 0:0.4,5:0.25,15:0.12,30:0.05"
            style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0f0f1a", border:"1px solid #333", color:"#e0e0e8", borderRadius:4, fontFamily:"monospace"}} />
        </label>

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10}}>
          <label style={{fontSize:10, color:"#888"}}>
            SL % override <Tip text="Stop-loss alternativo. Vacio = preset." />
            <input type="number" value={form.slPct} onChange={e => setForm({...form, slPct: e.target.value})} step="0.01" placeholder="vacio = preset"
              style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0f0f1a", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
          </label>
          <label style={{fontSize:10, color:"#888"}}>
            TP % override <Tip text="Take-profit alternativo. Vacio = preset." />
            <input type="number" value={form.tpPct} onChange={e => setForm({...form, tpPct: e.target.value})} step="0.01" placeholder="vacio = preset"
              style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0f0f1a", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
          </label>
          <label style={{fontSize:10, color:"#888"}}>
            Max hold (min) <Tip text="Timeout maximo alternativo en minutos. Vacio = preset." />
            <input type="number" value={form.maxHold} onChange={e => setForm({...form, maxHold: e.target.value})} step="1" min="1" placeholder="vacio = preset"
              style={{width:"100%", marginTop:3, padding:6, fontSize:12, background:"#0f0f1a", border:"1px solid #333", color:"#e0e0e8", borderRadius:4}} />
          </label>
        </div>
      </div>

      {/* Submit */}
      <div style={{display:"flex", alignItems:"center", gap:12}}>
        <button onClick={submitVariant} disabled={!form.name.trim() || !hasAnyFilter()}
          style={{padding:"7px 18px", fontSize:12, background: (form.name.trim() && hasAnyFilter()) ? "#3b82f6" : "#222", border:"none", borderRadius:4, color:"white", cursor: (form.name.trim() && hasAnyFilter()) ? "pointer" : "not-allowed", fontWeight:600}}>
          {editingName ? "Guardar cambios" : "Guardar variante"}
        </button>
        {editingName ? (
          <button type="button" onClick={cancelEdit}
            style={{padding:"7px 14px", fontSize:11, background:"#1a1a2e", border:"1px solid #333", borderRadius:4, color:"#888", cursor:"pointer"}}>
            Cancelar edición
          </button>
        ) : (
          <button type="button" onClick={() => { setForm(EMPTY_FORM()); setSubmitMsg(""); }}
            style={{padding:"7px 14px", fontSize:11, background:"#1a1a2e", border:"1px solid #333", borderRadius:4, color:"#888", cursor:"pointer"}}>
            Limpiar
          </button>
        )}
        {submitMsg && <span style={{fontSize:11, color: submitMsg.startsWith("✓") ? "#22c55e" : "#ef4444"}}>{submitMsg}</span>}
      </div>
    </div>

    {/* ── Summary ── */}
    <h3 className="section-title">Resumen agregado
      <select value={hours} onChange={e => setHours(Number(e.target.value))} style={{marginLeft:10, padding:"2px 6px", fontSize:10, background:"#0a0a13", border:"1px solid #333", color:"#ccc", borderRadius:3}}>
        <option value={1}>1h</option>
        <option value={6}>6h</option>
        <option value={24}>24h</option>
        <option value={72}>72h</option>
        <option value={168}>7d</option>
      </select>
      <Tip text="Agregado por variante sobre las ultimas N horas. fireRate = % de candidatos que la variante habria disparado. Compara con el prod: si variante tiene fireRate bajo, es mas estricta; si es alto, es mas laxa." />
    </h3>
    <div className="card" style={{marginBottom:12, padding:8}}>
      <div style={{fontSize:10, color:"#666", marginBottom:6}}>Total evaluaciones en {summary.hours}h: <span style={{color:"#e0e0e8", fontWeight:600}}>{summary.totalEvaluations || 0}</span></div>
      {(!summary.variants || summary.variants.length === 0) ? (
        <div style={{color:"#666", fontSize:11, padding:8}}>Sin evaluaciones aun. Las variantes solo se ejecutan cuando el prod pasa los gates y esta a punto de entrar.</div>
      ) : (
        <table style={{width:"100%", fontSize:11}}>
          <thead><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
            <th style={{padding:"6px 4px"}}>Variante</th>
            <th>Total</th>
            <th>Would-fire</th>
            <th>Blocked</th>
            <th>Fire rate</th>
            <th>Avg sim collat ($)</th>
            <th>Razones de bloqueo</th>
          </tr></thead>
          <tbody>
            {summary.variants.map(s => (
              <tr key={s.variant} style={{borderBottom:"1px solid #181828"}}>
                <td style={{padding:"6px 4px", fontWeight:600, color:"#e0e0e8"}}>{s.variant}</td>
                <td style={{color:"#aaa"}}>{s.total}</td>
                <td style={{color:"#22c55e"}}>{s.wouldFire}</td>
                <td style={{color:"#ef4444"}}>{s.blocked}</td>
                <td style={{color: s.fireRate < 50 ? "#f59e0b" : "#22c55e"}}>{s.fireRate}%</td>
                <td style={{color:"#aaa"}}>${s.avgSimCollateralUsd}</td>
                <td style={{fontSize:10, color:"#888"}}>{s.blockReasons && Object.entries(s.blockReasons).map(([k,v]) => k+":"+v).join(", ")}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>

    {/* ── Recent evaluations ── */}
    <h3 className="section-title">Ultimas decisiones
      <select value={filterVariant} onChange={e => setFilterVariant(e.target.value)} style={{marginLeft:10, padding:"2px 6px", fontSize:10, background:"#0a0a13", border:"1px solid #333", color:"#ccc", borderRadius:3}}>
        <option value="">Todas las variantes</option>
        {variants.map(v => <option key={v.name} value={v.name}>{v.name}</option>)}
      </select>
      <Tip text="Cada fila = una decision de una variante sobre un candidato de prod. prodFired siempre true (solo evaluamos cuando prod entra). Compara would-fire de la variante vs prod para detectar divergencia." />
    </h3>
    <div className="card" style={{padding:8}}>
      {(!evaluations || evaluations.length === 0) ? (
        <div style={{color:"#666", fontSize:11, padding:8}}>{loading ? "Cargando..." : "Sin decisiones. Espera a que el bot dispare una entrada con alguna variante activa."}</div>
      ) : (
        <div style={{maxHeight:500, overflowY:"auto"}}>
          <table style={{width:"100%", fontSize:10}}>
            <thead style={{position:"sticky", top:0, background:"#0d0d17"}}><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
              <th style={{padding:"4px 6px"}}>Hora</th>
              <th>Variante</th>
              <th>Coin</th>
              <th>Side</th>
              <th>Modo</th>
              <th>Would fire</th>
              <th>Block reason</th>
              <th>Sig</th>
              <th>Trend</th>
              <th>Collat sim</th>
            </tr></thead>
            <tbody>
              {evaluations.map(r => (
                <tr key={r.id} style={{borderBottom:"1px solid #181828"}}>
                  <td style={{padding:"3px 6px", color:"#888", fontFamily:"monospace"}}>{r.evaluatedAt ? r.evaluatedAt.substring(11, 19) : ""}</td>
                  <td style={{color:"#e0e0e8"}}>{r.variantName}</td>
                  <td style={{color:"#ccc", fontWeight:600}}>{r.coin}</td>
                  <td style={{color: r.side === "LONG" ? "#22c55e" : "#ef4444"}}>{r.side}</td>
                  <td style={{color:"#888"}}>{r.mode}</td>
                  <td style={{color: r.wouldFire ? "#22c55e" : "#ef4444", fontWeight:600}}>{r.wouldFire ? "✓" : "✗"}</td>
                  <td style={{color:"#f59e0b", fontSize:9}}>{r.blockReason || "—"}</td>
                  <td style={{color:"#aaa"}}>{r.signalScore != null ? Number(r.signalScore).toFixed(1) : ""}</td>
                  <td style={{color:"#aaa"}}>{r.trendScore != null ? Number(r.trendScore).toFixed(1) : ""}</td>
                  <td style={{color:"#aaa"}}>${r.simCollateralUsd}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>

    {/* ── Shadow Exits — resumen por variante ── */}
    <h3 className="section-title">Comparativa de salidas
      <select value={exitsHours} onChange={e => setExitsHours(Number(e.target.value))} style={{marginLeft:10, padding:"2px 6px", fontSize:10, background:"#0a0a13", border:"1px solid #333", color:"#ccc", borderRadius:3}}>
        <option value={24}>24h</option>
        <option value={72}>72h</option>
        <option value={168}>7d</option>
        <option value={336}>14d</option>
        <option value={720}>30d</option>
      </select>
      <Tip text="Cada variante con overrides de salida (ROI/SL/TP/maxHold) genera una fila 'hipotetica' por cada entrada real. Cuando ambos lados (variante y real) estan evaluados se calcula delta. winRate = %% de trades donde la variante hubiera cerrado mejor que prod." />
    </h3>
    <div className="card" style={{marginBottom:12, padding:8}}>
      <div style={{fontSize:10, color:"#666", marginBottom:6}}>Total simulaciones en {exitsSummary.hours}h: <span style={{color:"#e0e0e8", fontWeight:600}}>{exitsSummary.totalExits || 0}</span></div>
      {(!exitsSummary.variants || exitsSummary.variants.length === 0) ? (
        <div style={{color:"#666", fontSize:11, padding:8}}>Sin simulaciones aun. Crea una variante con overrides de salida (ROI paciente, TP alternativo, etc.) y espera la proxima entrada del bot.</div>
      ) : (
        <table style={{width:"100%", fontSize:11}}>
          <thead><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
            <th style={{padding:"6px 4px"}}>Variante</th>
            <th>Total</th>
            <th>Pending</th>
            <th>Variant first</th>
            <th>Real first</th>
            <th>Both eval</th>
            <th>Win rate</th>
            <th>Σ ΔPnL ($)</th>
          </tr></thead>
          <tbody>
            {exitsSummary.variants.map(s => (
              <tr key={s.variant} style={{borderBottom:"1px solid #181828"}}>
                <td style={{padding:"6px 4px", fontWeight:600, color:"#e0e0e8"}}>{s.variant}</td>
                <td style={{color:"#aaa"}}>{s.total}</td>
                <td style={{color:"#888"}}>{s.pending}</td>
                <td style={{color:"#22d3ee"}}>{s.variantFirst}</td>
                <td style={{color:"#f59e0b"}}>{s.realFirst}</td>
                <td style={{color:"#ccc"}}>{s.bothEvaluated}</td>
                <td style={{color: s.winRate > 50 ? "#22c55e" : s.winRate > 0 ? "#f59e0b" : "#888", fontWeight:600}}>
                  {s.comparable > 0 ? s.winRate + "%" : "—"}
                  {s.comparable > 0 && <span style={{color:"#555", marginLeft:4, fontSize:9}}>({s.variantWins}/{s.comparable})</span>}
                </td>
                <td style={{color: s.sumDeltaPnlUsd > 0 ? "#22c55e" : s.sumDeltaPnlUsd < 0 ? "#ef4444" : "#888", fontWeight:600}}>
                  ${s.sumDeltaPnlUsd}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>

    {/* ── Shadow Exits — filas recientes ── */}
    <h3 className="section-title">Salidas hipoteticas recientes
      <Tip text="PENDING = variante aun no ha cerrado. VARIANT_FIRST = variante cerro antes que prod (sim lleno). REAL_FIRST = prod cerro antes (Fase 3 rellenara sim con precio post-cierre). BOTH_EVALUATED = hay delta comparable." />
    </h3>
    <div className="card" style={{padding:8}}>
      {(!exits || exits.length === 0) ? (
        <div style={{color:"#666", fontSize:11, padding:8}}>{loading ? "Cargando..." : "Sin filas. Las variantes con overrides de salida se materializan al entrar el bot en una posicion."}</div>
      ) : (
        <div style={{maxHeight:500, overflowY:"auto"}}>
          <table style={{width:"100%", fontSize:10}}>
            <thead style={{position:"sticky", top:0, background:"#0d0d17"}}><tr style={{textAlign:"left", color:"#888", borderBottom:"1px solid #222"}}>
              <th style={{padding:"4px 6px"}}>Entrada</th>
              <th>Variante</th>
              <th>Coin</th>
              <th>Side</th>
              <th>Status</th>
              <th>Sim reason</th>
              <th>Sim hold</th>
              <th>Sim PnL</th>
              <th>Real reason</th>
              <th>Real hold</th>
              <th>Real PnL</th>
              <th>ΔPnL ($)</th>
            </tr></thead>
            <tbody>
              {exits.map(r => {
                const statusColor = r.status === "VARIANT_FIRST" ? "#22d3ee"
                  : r.status === "REAL_FIRST" ? "#f59e0b"
                  : r.status === "BOTH_EVALUATED" ? "#22c55e"
                  : "#666";
                const deltaColor = r.deltaPnlUsd == null ? "#555"
                  : Number(r.deltaPnlUsd) > 0 ? "#22c55e"
                  : Number(r.deltaPnlUsd) < 0 ? "#ef4444" : "#888";
                const fmtHold = (s) => s == null ? "—"
                  : (s >= 3600 ? (s/3600).toFixed(1) + "h"
                     : s >= 60 ? Math.round(s/60) + "m" : s + "s");
                return (
                  <tr key={r.id} style={{borderBottom:"1px solid #181828"}}>
                    <td style={{padding:"3px 6px", color:"#888", fontFamily:"monospace"}}>{r.entryTime ? r.entryTime.substring(5, 16).replace("T", " ") : ""}</td>
                    <td style={{color:"#e0e0e8"}}>{r.variantName}</td>
                    <td style={{color:"#ccc", fontWeight:600}}>{r.coin}</td>
                    <td style={{color: r.side === "LONG" ? "#22c55e" : "#ef4444"}}>{r.side}</td>
                    <td style={{color: statusColor, fontWeight:600, fontSize:9}}>{r.status}</td>
                    <td style={{color:"#22d3ee", fontSize:9}}>{r.simExitReason || "—"}</td>
                    <td style={{color:"#aaa"}}>{fmtHold(r.simHoldSeconds)}</td>
                    <td style={{color: r.simPnlUsd == null ? "#555" : Number(r.simPnlUsd) >= 0 ? "#22c55e" : "#ef4444"}}>
                      {r.simPnlUsd != null ? "$" + Number(r.simPnlUsd).toFixed(2) : "—"}
                    </td>
                    <td style={{color:"#f59e0b", fontSize:9}}>{r.realExitReason || "—"}</td>
                    <td style={{color:"#aaa"}}>{fmtHold(r.realHoldSeconds)}</td>
                    <td style={{color: r.realPnlUsd == null ? "#555" : Number(r.realPnlUsd) >= 0 ? "#22c55e" : "#ef4444"}}>
                      {r.realPnlUsd != null ? "$" + Number(r.realPnlUsd).toFixed(2) : "—"}
                    </td>
                    <td style={{color: deltaColor, fontWeight:600}}>
                      {r.deltaPnlUsd != null ? (Number(r.deltaPnlUsd) > 0 ? "+" : "") + "$" + Number(r.deltaPnlUsd).toFixed(2) : "—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>

    {/* ── In-app flash toast (replaces native alert) ────────────────── */}
    {flash && (
      <div style={{
        position:"fixed", bottom:20, right:20, zIndex:999, minWidth:320, maxWidth:480,
        padding:"12px 16px", borderRadius:8,
        background: flash.kind === "success" ? "#052e16" : "#2a1010",
        border: "1px solid " + (flash.kind === "success" ? "#22c55e" : "#ef4444"),
        color: flash.kind === "success" ? "#86efac" : "#fca5a5",
        fontSize:12, boxShadow:"0 10px 30px rgba(0,0,0,0.4)"
      }}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:10}}>
          <div>{flash.msg}</div>
          <button onClick={() => setFlash(null)}
            style={{background:"transparent", border:"none", color:"inherit", cursor:"pointer", opacity:0.7}}>×</button>
        </div>
      </div>
    )}

    {/* ── Delete confirmation modal ────────────────────────────────── */}
    <Modal
      open={!!deleteModal}
      title="Borrar variante"
      busy={deleteBusy}
      confirmStyle="danger"
      confirmLabel="Borrar todo"
      onCancel={() => deleteBusy ? null : setDeleteModal(null)}
      onConfirm={confirmDelete}>
      {deleteModal && (
        <>
          <p style={{marginBottom:10}}>
            Vas a borrar la variante <b style={{color:"#e0e0e8"}}>"{deleteModal.name}"</b> y
            todos sus datos asociados:
          </p>
          {deleteModal.loading ? (
            <p style={{color:"#666", fontStyle:"italic"}}>Contando filas a limpiar…</p>
          ) : (
            <ul style={{paddingLeft:20, marginBottom:10, color:"#ccc"}}>
              <li><b style={{color:"#f59e0b"}}>{deleteModal.evaluations ?? "?"}</b> evaluaciones de entrada (<code>hl_shadow_evaluations</code>)</li>
              <li><b style={{color:"#f59e0b"}}>{deleteModal.exits ?? "?"}</b> salidas simuladas (<code>hl_shadow_exits</code>)</li>
            </ul>
          )}
          <p style={{color:"#f59e0b", fontSize:11}}>
            ⚠ Esta acción no se puede deshacer. Si solo quieres cambiar nombre o valores, usa <b>Editar</b>
            — el historial se conserva.
          </p>
        </>
      )}
    </Modal>
  </>);
}

function HelpImg({ src, caption, description }) {
  const [failed, setFailed] = useState(false);
  const filename = src ? src.split("/").pop() : "sin nombre";
  if (!src || failed) {
    return (
      <div className="help-img-wrap">
        <div className="help-img-placeholder">
          <div className="icon">📷</div>
          <div>Captura pendiente</div>
          <div className="pname">{filename}</div>
          {description && <div style={{marginTop:10, fontSize:11, color:"rgba(255,255,255,0.5)", maxWidth:380}}>{description}</div>}
        </div>
        {caption && <div className="caption">{caption}</div>}
      </div>
    );
  }
  return (
    <div className="help-img-wrap">
      <img src={src} alt={caption || ""} onError={() => setFailed(true)} loading="lazy" />
      {caption && <div className="caption">{caption}</div>}
    </div>
  );
}

function HelpCaptures({ entries }) {
  if (!entries || entries.length === 0) return null;
  return (
    <div className="help-section">
      <h3>📷 Capturas de ejemplo</h3>
      {entries.map((e, i) => (
        <HelpImg key={i} src={e.src} caption={e.caption} description={e.description} />
      ))}
    </div>
  );
}

function HelpCallout({ tone, title, children }) {
  return (
    <div className={"help-callout " + (tone || "")}>

// ── Auth helpers ──
function getToken() { return localStorage.getItem("platform_token"); }
function setTokenLS(t) { localStorage.setItem("platform_token", t); }
function clearToken() { localStorage.removeItem("platform_token"); }

// Override useFetch to include auth
function useAuthFetch(url, interval = 5000) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const fetch_ = useCallback(() => {
    const token = getToken();
    fetch(url, { headers: token ? { "Authorization": "Bearer " + token } : {} })
      .then(r => { if (r.status === 401) { clearToken(); window.location.reload(); } return r.json(); })
      .then(setData).catch(e => setError(e.message));
  }, [url]);
  useEffect(() => { fetch_(); const t = setInterval(fetch_, interval); return () => clearInterval(t); }, [fetch_, interval]);
  return { data, error, refetch: fetch_ };
}

// ── Login Page ──
function LoginPage({ onLogin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setLoading(true);
    try {
      const r = await fetch("/api/platform/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass }),
      });
      if (!r.ok) { setErr("Usuario o contrasena incorrectos"); return; }
      const data = await r.json();
      setTokenLS(data.token);
      onLogin(data.username);
    } catch { setErr("Error de conexion"); } finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      {/* Third concentric reactor ring — CSS handles the other two + pulse */}
      <div className="login-core" aria-hidden="true"></div>

      <form className="login-box" onSubmit={submit}>
        <div className="brand">
          <div className="brand-logo">AP</div>
          <div style={{textAlign:"center"}}>
            <h1>Alchimia Platform</h1>
            <div className="sub">AI Trading Command Center</div>
          </div>
        </div>
        <input type="text" placeholder="Usuario" value={user} onChange={e => setUser(e.target.value)} autoFocus />
        <input type="password" placeholder="Contraseña" value={pass} onChange={e => setPass(e.target.value)} />
        <button type="submit" disabled={loading || !user || !pass}>{loading ? "Entrando…" : "Entrar"}</button>
        {err && <div className="err">{err}</div>}
      </form>
    </div>
  );
}

// ── Main App ──
function App() {

  const selectTab = (id) => { setTab(id); setMobileOpen(false); };

  // Check token on mount + periodic session check every 60s
  useEffect(() => {
    const checkSession = () => {
      const token = getToken();
      if (!token) { setAuthed(false); return; }
      fetch("/api/platform/me", { headers: { "Authorization": "Bearer " + token } })
        .then(r => {
          if (r.ok) return r.json();
          // Only clear token on 401 (expired), not on 502/503 (server not ready)
          if (r.status === 401) { clearToken(); setAuthed(false); }
          return null;
        })
        .then(d => { if (d) { setAuthed(true); setUsername(d.username); } })
        .catch(() => {}); // Network error — don't clear token
    };
    checkSession();
    const iv = setInterval(checkSession, 60000);
    return () => clearInterval(iv);
  }, []);

  if (!authed) return <LoginPage onLogin={(u) => { setAuthed(true); setUsername(u); }} />;

  const logout = () => { clearToken(); setAuthed(false); };
