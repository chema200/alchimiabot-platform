// ── Daily Report Tab ──
function DailyReportTab() {
  const [reports, setReports] = useState({});  // date -> report
  const [selected, setSelected] = useState(null);  // selected date
  const [loading, setLoading] = useState(false);
  const [days, setDays] = useState([]);  // list of available dates
  const [page, setPage] = useState(0);  // pagination
  const PAGE_SIZE = 15;
  const AUTO_LOAD_DAYS = 7;  // auto-load last 7 days

  // Generate list of last 90 days, auto-load last 7
  useEffect(() => {
    const d = [];
    for (let i = 0; i < 90; i++) {
      const date = new Date(Date.now() - i * 86400000);
      d.push(date.toISOString().split("T")[0]);
    }
    setDays(d);
    // Auto-load last 7 days
    for (let i = 0; i < AUTO_LOAD_DAYS && i < d.length; i++) {
      loadDayQuiet(d[i]);
    }
    setSelected(d[0]);
  }, []);

  const loadDayQuiet = (dateStr) => {
    fetch(API + "/api/daily-report/" + dateStr).then(r => r.json()).then(d => {
      setReports(prev => ({...prev, [dateStr]: d}));
    }).catch(() => {});
  };

  const loadDay = (dateStr) => {
    if (reports[dateStr]) { setSelected(dateStr); return; }
    setLoading(true);
    setSelected(dateStr);
    fetch(API + "/api/daily-report/" + dateStr).then(r => r.json()).then(d => {
      setReports(prev => ({...prev, [dateStr]: d}));
      setLoading(false);
    }).catch(() => setLoading(false));
  };

  const report = selected ? reports[selected] : null;

  const check = (ok) => ok ? "✓" : "✗";
  const checkColor = (ok) => ok ? "#22c55e" : "#ef4444";
  const scoreColor = (s) => s >= 7 ? "#22c55e" : s >= 4 ? "#eab308" : "#ef4444";

  return (<>
    <div className="page-title">Informe Diario <Tip text="Informe diario automatico. Haz click en un dia para ver el detalle completo. Se genera al cargar." /><div className="page-sub">Resumen automatico por dia con comparativa historica</div></div>
    {/* Days table */}
    <div className="card" style={{marginBottom:16}}>
      <table>
        <thead><tr>
          <th>Date</th><th>Day</th><th style={{textAlign:"right"}}>Score</th>
          <th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>Net PnL</th>
          <th style={{textAlign:"right"}}>WR</th><th style={{textAlign:"right"}}>PF</th>
          <th style={{textAlign:"right"}}>Issues</th><th></th>
        </tr></thead>
        <tbody>
          {days.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE).map(d => {
            const r = reports[d];
            const isSelected = selected === d;
            const g = r?.general || {};
            const p = r?.pnl || {};
            const s = r?.scores || {};
            const issueCount = r ? Object.values(r).reduce((sum, sec) => sum + (sec?.issues?.length || 0), 0) : 0;
            return (
              <tr key={d} onClick={() => loadDay(d)} style={{cursor:"pointer", background: isSelected ? "#1a1a3e" : "transparent"}}>
                <td style={{fontWeight: isSelected ? 700 : 400, color: isSelected ? "#3b82f6" : "#e0e0e8"}}>{d}</td>
                <td style={{color:"#666"}}>{r ? r.day_of_week?.substring(0,3) : "..."}</td>
                <td style={{textAlign:"right", color: r ? scoreColor(s.overall || 0) : "#444", fontWeight:600}}>{r ? (s.overall || 0) + "/10" : "-"}</td>
                <td style={{textAlign:"right"}}>{r ? g.trades || 0 : "-"}</td>
                <td style={{textAlign:"right", color: r ? (Number(g.net_pnl) >= 0 ? "#22c55e" : "#ef4444") : "#444"}}>{r ? "$" + (g.net_pnl || 0) : "-"}</td>
                <td style={{textAlign:"right", color: r ? (p.win_rate >= 50 ? "#22c55e" : p.win_rate >= 40 ? "#eab308" : "#ef4444") : "#444"}}>{r ? (p.win_rate || 0) + "%" : "-"}</td>
                <td style={{textAlign:"right"}}>{r ? (p.profit_factor || 0) : "-"}</td>
                <td style={{textAlign:"right", color: issueCount > 0 ? "#eab308" : "#22c55e"}}>{r ? issueCount : "-"}</td>
                <td style={{textAlign:"right"}}>{!r && <span onClick={(e) => { e.stopPropagation(); loadDay(d); }} style={{color:"#666", fontSize:10, cursor:"pointer"}}>cargar</span>}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {/* Pagination */}
      {days.length > PAGE_SIZE && (
        <div style={{display:"flex", justifyContent:"center", alignItems:"center", gap:12, marginTop:12}}>
          <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0}
            style={{padding:"4px 12px", fontSize:11, borderRadius:6, border:"1px solid #333", background:"#1a1a2e", color: page===0?"#444":"#aaa", cursor: page===0?"not-allowed":"pointer"}}>
            ← Anterior
          </button>
          <span style={{fontSize:11, color:"#666"}}>{page + 1} / {Math.ceil(days.length / PAGE_SIZE)}</span>
          <button onClick={() => setPage(Math.min(Math.ceil(days.length / PAGE_SIZE) - 1, page + 1))} disabled={page >= Math.ceil(days.length / PAGE_SIZE) - 1}
            style={{padding:"4px 12px", fontSize:11, borderRadius:6, border:"1px solid #333", background:"#1a1a2e", color: page>=Math.ceil(days.length/PAGE_SIZE)-1?"#444":"#aaa", cursor: page>=Math.ceil(days.length/PAGE_SIZE)-1?"not-allowed":"pointer"}}>
            Siguiente →
          </button>
        </div>
      )}
    </div>

    {loading && <div className="loading">Generating report for {selected}...</div>}

    {report && !loading && (() => {
      const g = report.general || {};
      const sys = report.system || {};
      const integ = report.integration || {};
      const pnl = report.pnl || {};
      const sig = report.signals || {};
      const feat = report.features || {};
      const stor = report.storage || {};
      const trad = report.trading || {};
      const scores = report.scores || {};
      const allIssues = [];
      for (const [section, data] of Object.entries(report)) {
        if (data && typeof data === "object" && data.issues) {
          for (const issue of data.issues) allIssues.push({section, issue});
        }
      }
      return (<>

    {/* Scores */}
    <div className="grid" style={{gridTemplateColumns:"repeat(4, 1fr)"}}>
      <MC label="Overall" value={scores.overall + "/10"} color={scores.overall >= 7 ? "green" : scores.overall >= 4 ? "yellow" : "red"} />
      <MC label="Calidad de Datos" value={scores.data_quality + "/10"} color={scores.data_quality >= 7 ? "green" : "yellow"} />
      <MC label="Trading" value={scores.trading + "/10"} color={scores.trading >= 6 ? "green" : scores.trading >= 4 ? "yellow" : "red"} />
      <MC label="System" value={scores.system + "/10"} color={scores.system >= 8 ? "green" : "yellow"} />
    </div>

    {/* 1. General */}
    <h3 className="section-title" style={{marginTop:16}}>General</h3>
    <div className="grid">
      <MC label="Mode" value={g.mode || "?"} color="purple" />
      <MC label="Trades" value={g.trades || 0} />
      <MC label="PnL Bruto" value={"$" + (g.total_pnl || 0)} color={Number(g.total_pnl) >= 0 ? "green" : "red"} />
      <MC label="Fees" value={"$" + (g.total_fees || 0)} color="yellow" />
      <MC label="PnL Neto" value={"$" + (g.net_pnl || 0)} color={Number(g.net_pnl) >= 0 ? "green" : "red"} />
    </div>

    {/* 2. System */}
    <h3 className="section-title" style={{marginTop:16}}>System</h3>
    <div className="card">
      <div style={{display:"flex", gap:24, flexWrap:"wrap", fontSize:12}}>
        <span style={{color: checkColor(sys.bot_running)}}>{check(sys.bot_running)} Bot running</span>
        <span style={{color: checkColor(sys.platform_running)}}>{check(sys.platform_running)} Platform running</span>
        <span style={{color: checkColor(sys.ws_stable)}}>{check(sys.ws_stable)} WS stable</span>
        <span style={{color: checkColor(sys.cpu_pct < 80)}}>{check(sys.cpu_pct < 80)} CPU {sys.cpu_pct}%</span>
        <span style={{color: checkColor(sys.ram_pct < 85)}}>{check(sys.ram_pct < 85)} RAM {sys.ram_pct}%</span>
      </div>
    </div>

    {/* 3. Integration */}
    <h3 className="section-title" style={{marginTop:16}}>Integration</h3>
    <div className="grid">
      <MC label="Bot Trades" value={integ.bot_trades || 0} />
      <MC label="Platform Trades" value={integ.platform_trades || 0} />
      <MC label="Diff" value={integ.diff_trades || 0} color={integ.diff_trades === 0 ? "green" : "red"} />
      <MC label="Signals" value={integ.signals_received || 0} />
      <MC label="Duplicates" value={integ.duplicates || 0} color={integ.duplicates === 0 ? "green" : "red"} />
    </div>

    {/* 4. PnL */}
    <h3 className="section-title" style={{marginTop:16}}>PnL & Consistency</h3>
    <div className="grid">
      <MC label="Wins" value={pnl.wins || 0} color="green" />
      <MC label="Losses" value={pnl.losses || 0} color="red" />
      <MC label="Win Rate" value={(pnl.win_rate || 0) + "%"} color={pnl.win_rate >= 50 ? "green" : pnl.win_rate >= 40 ? "yellow" : "red"} />
      <MC label="Profit Factor" value={pnl.profit_factor || 0} color={pnl.profit_factor >= 1 ? "green" : "red"} />
      <MC label="Avg W / L" value={"$" + (pnl.avg_win || 0) + " / $" + (pnl.avg_loss || 0)} />
      <MC label="Fee Killed" value={pnl.fee_killed || 0} color={pnl.fee_killed === 0 ? "green" : "red"} />
    </div>

    {/* 5. Signals */}
    <h3 className="section-title" style={{marginTop:16}}>Signals</h3>
    <div className="grid">
      <MC label="ENTER" value={sig.enter || 0} color="green" />
      <MC label="SKIP" value={sig.skip || 0} color="yellow" />
      <MC label="BLOCKED" value={sig.blocked || 0} color="red" />
    </div>

    {/* 6-7. Features & Storage */}
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:16}}>
      <div>
        <h3 className="section-title">Features</h3>
        <div className="card">
          <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:4}}>
            <span>Snapshots today: {feat.snapshots_today || 0}</span>
            <span>Coins tracked: {feat.coins_with_features || 0}</span>
          </div>
        </div>
      </div>
      <div>
        <h3 className="section-title">Storage</h3>
        <div className="card">
          <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:4}}>
            <span>Disk: {stor.disk_pct}% ({stor.disk_used_gb} GB used / {stor.disk_free_gb} GB free)</span>
            <span>Parquet files today: {stor.parquet_files_today}</span>
          </div>
        </div>
      </div>
    </div>

    {/* 8. Trading Analysis */}
    <h3 className="section-title" style={{marginTop:16}}>Trading Analysis</h3>
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
      <div className="card">
        <div className="label" style={{marginBottom:8}}>Best Coins</div>
        {(trad.best_coins || []).map((c, i) => (
          <div key={i} style={{fontSize:11, display:"flex", justifyContent:"space-between"}}>
            <span className="purple">{c.coin}</span>
            <span style={{color:"#22c55e"}}>${c.pnl} ({c.wr}% WR, {c.trades}t)</span>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="label" style={{marginBottom:8}}>Worst Coins</div>
        {(trad.worst_coins || []).map((c, i) => (
          <div key={i} style={{fontSize:11, display:"flex", justifyContent:"space-between"}}>
            <span className="purple">{c.coin}</span>
            <span style={{color:"#ef4444"}}>${c.pnl} ({c.wr}% WR, {c.trades}t)</span>
          </div>
        ))}
      </div>
    </div>

    {/* 9. Problems */}
    {allIssues.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>Problems Detected</h3>
      <div className="card">
        {allIssues.map((p, i) => (
          <div key={i} style={{padding:"3px 0", fontSize:11, color:"#eab308"}}>
            <span style={{color:"#666"}}>[{p.section}]</span> {p.issue}
          </div>
        ))}
      </div>
    </>)}

    {allIssues.length === 0 && (
      <div className="card" style={{marginTop:16, textAlign:"center", color:"#22c55e", padding:20}}>
        No problems detected today
      </div>
    )}

    {/* Exit reasons */}
    {trad.by_exit_reason && trad.by_exit_reason.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>Exit Reasons</h3>
      <div className="card">
        <table><thead><tr><th>Reason</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>PnL</th></tr></thead>
        <tbody>
          {trad.by_exit_reason.map((r, i) => (
            <tr key={i}><td><span className={"tag " + (r.exit_reason === "SL" ? "tag-red" : "tag-green")}>{r.exit_reason}</span></td>
            <td style={{textAlign:"right"}}>{r.trades}</td>
            <td style={{textAlign:"right", color: Number(r.pnl) >= 0 ? "#22c55e" : "#ef4444"}}>${r.pnl}</td></tr>
          ))}
        </tbody></table>
      </div>
    </>)}
      </>);
    })()}
  </>);
}

// ── Research Lab Tab ──
function LabTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("overview");
  const [cfData, setCfData] = useState(null);
  const [rejData, setRejData] = useState(null);
  const [cfgData, setCfgData] = useState(null);
  const [diagData, setDiagData] = useState(null);
  const [eqData, setEqData] = useState(null);

  const load = () => {
    setLoading(true);
    fetch(API + "/api/quant/full").then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
    fetch(API + "/api/quant/counterfactual").then(r => r.json()).then(d => setCfData(d)).catch(() => {});
    fetch(API + "/api/quant/rejections").then(r => r.json()).then(d => setRejData(d)).catch(() => {});
    fetch(API + "/api/quant/config-analysis").then(r => r.json()).then(d => setCfgData(d)).catch(() => {});
    fetch(API + "/api/quant/diagnostic").then(r => r.json()).then(d => setDiagData(d)).catch(() => {});
    fetch(API + "/api/quant/entry-quality").then(r => r.json()).then(d => setEqData(d)).catch(() => {});
  };
  useEffect(() => { load(); }, []);

  if (loading) return <div className="loading">Generating quant report...</div>;
  if (!data) return <div className="loading"><button onClick={load} className="tab active">Load Research Lab</button></div>;

  const m = data.metrics?.global || {};
  const risk = data.metrics?.risk || {};
  const exec = data.metrics?.execution || {};
  const decisions = data.decisions || [];
  const analysis = data.analysis || {};
  const insights = analysis.insights || [];
  const warnings = analysis.warnings || [];
  const recommendations = analysis.recommendations || [];

  const views = ["overview", "metrics", "analysis", "score", "mode", "config", "rejections", "counterfactual", "diagnostic", "quality", "decisions"];

  return (<>
    <div className="page-title">Research Lab <Tip text="Vision general del rendimiento con KPIs principales y decisiones automaticas del sistema." /><div className="page-sub">Analisis cuantitativo: metricas, experiments, decisions</div></div>
    <div style={{display:"flex", gap:4, flexWrap:"wrap", marginBottom:16}}>
      {views.map(v => (
        <button key={v} className={"tab " + (view === v ? "active" : "")} onClick={() => setView(v)}>{v.charAt(0).toUpperCase() + v.slice(1)}</button>
      ))}
      <ExportBtn data={(() => {
        // Build comprehensive export with ALL research lab data
        const byMode = data?.metrics?.by_mode || {};
        const modesPresent = Object.keys(byMode).filter(k => k !== "unknown");
        const cfgVersions = cfgData?.by_config_version ? Object.keys(cfgData.by_config_version).filter(k => k !== "unknown") : [];
        return {
          overview: {
            global: data?.metrics?.global || {},
            risk: data?.metrics?.risk || {},
            execution: data?.metrics?.execution || {},
            insights: data?.analysis?.insights || [],
            warnings: data?.analysis?.warnings || [],
            recommendations: data?.analysis?.recommendations || [],
          },
          metrics: data?.metrics || {},
          analysis: data?.analysis || {},
          score: {
            coverage: (() => {
              const trades = data?.metrics?.global?.trades || 0;
              const withScore = Object.entries(data?.metrics?.by_score || {}).reduce((s, [k, v]) => k !== "0-40" ? s + (v?.trades || 0) : s, 0);
              return { total_trades: trades, trades_with_score: withScore, coverage_pct: trades > 0 ? Math.round(withScore / trades * 100) : 0 };
            })(),
            by_score_bucket: data?.metrics?.by_score || {},
            by_mode: byMode,
            counterfactual_preview: cfData || { status: "not_loaded" },
          },
          mode: {
            by_mode: byMode,
            modes_present: modesPresent,
          },
          config: cfgData || { status: "no_data_yet", message: "No hay suficientes trades con config_snapshot todavia" },
          rejections: rejData || { status: "no_data_yet", message: "No hay senales bloqueadas todavia" },
          counterfactual: cfData || { status: "no_data_yet" },
          experiments: { note: "Run via POST /api/quant/experiment" },
          decisions: (data?.decisions || []),
          meta: {
            generated_at: new Date().toISOString(),
            source: "research_lab",
            modes_present: modesPresent,
            config_versions_present: cfgVersions,
            has_unknown_config_rows: cfgVersions.includes("unknown") || Object.keys(cfgData?.by_config_version || {}).includes("unknown"),
            total_trades: data?.metrics?.global?.trades || 0,
            total_signals: rejData?.totals ? Object.values(rejData.totals).reduce((s, t) => s + (t.cnt || 0), 0) : 0,
          },
        };
      })()} filename={"research_lab_full_" + new Date().toISOString().split("T")[0] + ".json"} label="Export JSON Completo" />
      <button className="tab" onClick={load}>Refresh</button>
    </div>

    {view === "overview" && (<>
      <div className="grid" style={{gridTemplateColumns:"repeat(5, 1fr)"}}>
        <MC label="Trades" value={m.trades || 0} sub={(m.wins || 0) + "W / " + (m.losses || 0) + "L"} />
        <MC label="Win Rate" value={(m.winrate ? (m.winrate * 100).toFixed(1) : "0") + "%"} color={m.winrate >= 0.5 ? "green" : m.winrate >= 0.4 ? "yellow" : "red"} />
        <MC label="PnL Neto" value={"$" + (m.net_pnl || 0)} color={Number(m.net_pnl) >= 0 ? "green" : "red"} />
        <MC label="Expectancy" value={"$" + (m.expectancy || 0)} color={Number(m.expectancy) >= 0 ? "green" : "red"} />
        <MC label="Profit Factor" value={m.profit_factor || 0} color={Number(m.profit_factor) >= 1 ? "green" : "red"} />
      </div>
      <div className="grid" style={{gridTemplateColumns:"repeat(4, 1fr)", marginTop:12}}>
        <MC label="Avg Win" value={"$" + (m.avg_win || 0)} color="green" />
        <MC label="Avg Loss" value={"$" + (m.avg_loss || 0)} color="red" />
        <MC label="Max Drawdown" value={"$" + (risk.max_drawdown || 0)} color="red" />
        <MC label="Sharpe" value={risk.sharpe || 0} color={Number(risk.sharpe) > 0 ? "green" : "red"} />
      </div>

      {/* Decisions */}
      {decisions.length > 0 && (<>
        <h3 className="section-title" style={{marginTop:16}}>Decisions ({decisions.length})</h3>
        <div className="card scroll">
          {decisions.map((d, i) => (
            <div key={i} style={{padding:"8px 0", borderBottom:"1px solid #1a1a2e"}}>
              <div style={{display:"flex", gap:8, alignItems:"center", marginBottom:4}}>
                <span className={"tag " + (d.type === "recommendation" ? "tag-blue" : d.type === "warning" ? "tag-yellow" : "tag-green")}>{d.type}</span>
                <span style={{fontWeight:600, fontSize:12}}>{d.title}</span>
                <span className={"pill " + (d.confidence === "high" ? "tag-green" : d.confidence === "medium" ? "tag-yellow" : "tag-blue")} style={{marginLeft:"auto", fontSize:9}}>{d.confidence}</span>
              </div>
              <div style={{fontSize:10, color:"#888", marginLeft:8}}>
                <div>Evidence: {d.evidence}</div>
                <div>Action: <span style={{color:"#3b82f6"}}>{d.action}</span></div>
                <div>Impact: {d.expected_impact}</div>
              </div>
            </div>
          ))}
        </div>
      </>)}

      {/* Insights/Warnings */}
      {(insights.length > 0 || warnings.length > 0 || recommendations.length > 0) && (<>
        <h3 className="section-title" style={{marginTop:16}}>Insights</h3>
        <div className="card">
          {insights.map((t, i) => <div key={"i"+i} style={{padding:"2px 0", fontSize:11, color:"#22c55e"}}>{t}</div>)}
          {warnings.map((t, i) => <div key={"w"+i} style={{padding:"2px 0", fontSize:11, color:"#eab308"}}>{t}</div>)}
          {recommendations.map((t, i) => <div key={"r"+i} style={{padding:"2px 0", fontSize:11, color:"#3b82f6"}}>{t}</div>)}
        </div>
      </>)}

          <tbody>
            {Object.entries(data.metrics?.by_coin || {}).map(([coin, d]) => (
              <tr key={coin}><td className="purple">{coin}</td><td style={{textAlign:"right"}}>{d.trades}</td>
              <td style={{textAlign:"right", color: d.winrate >= 0.5 ? "#22c55e" : "#ef4444"}}>{(d.winrate*100).toFixed(0)}%</td>
              <td style={{textAlign:"right", color: d.avg_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.avg_pnl}</td>
              <td style={{textAlign:"right", color: d.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.net_pnl}</td>
              <td style={{textAlign:"right"}}>{d.profit_factor}</td></tr>
            ))}
          </tbody>
        </table>
      </div>
      {/* By side, score, exit */}
      {["by_side", "by_score", "by_exit", "by_mode"].map(key => {
        const section = data.metrics?.[key];
        if (!section) return null;
        return (<div key={key}>
          <h3 className="section-title" style={{marginTop:12}}>{key.replace("by_", "By ").replace("_", " ")}</h3>
          <div className="card">
            <table><thead><tr><th>Group</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>WR</th><th style={{textAlign:"right"}}>PnL</th><th style={{textAlign:"right"}}>PF</th></tr></thead>
            <tbody>
              {Object.entries(section).map(([g, d]) => (
                <tr key={g}><td>{g}</td><td style={{textAlign:"right"}}>{d.trades}</td>
                <td style={{textAlign:"right", color: d.winrate >= 0.5 ? "#22c55e" : "#ef4444"}}>{(d.winrate*100).toFixed(0)}%</td>
                <td style={{textAlign:"right", color: d.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.net_pnl}</td>
                <td style={{textAlign:"right"}}>{d.profit_factor}</td></tr>
              ))}
            </tbody></table>
          </div>
        </div>);
      })}
    </>)}

    {view === "analysis" && (<>
      {/* Score effectiveness */}
      <h3 className="section-title">Score Effectiveness</h3>
      <div className="card">
        <table><thead><tr><th>Bucket</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>WR</th><th style={{textAlign:"right"}}>Avg PnL</th><th style={{textAlign:"right"}}>Total PnL</th></tr></thead>
        <tbody>
          {Object.entries(analysis.score_effectiveness || {}).map(([b, d]) => (
            <tr key={b}><td>{b}</td><td style={{textAlign:"right"}}>{d.trades}</td>
            <td style={{textAlign:"right", color: d.wr >= 50 ? "#22c55e" : "#ef4444"}}>{d.wr}%</td>
            <td style={{textAlign:"right", color: d.avg_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.avg_pnl}</td>
            <td style={{textAlign:"right", color: d.total_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{d.total_pnl}</td></tr>
          ))}

                const th = d.threshold || 0;

                const blockPct = d.total_signals > 0 ? ((d.would_block / d.total_signals) * 100).toFixed(1) : "0";
                return (
                  <tr key={key} style={{background: rowColor}}>
                    <td style={{color: th <= 55 ? "#eab308" : th >= 65 ? "#3b82f6" : "#e0e0e8", fontWeight:600}}>{th}</td>
                    <td style={{textAlign:"right"}}>{d.would_enter}</td>
                    <td style={{textAlign:"right"}}>{d.would_block}</td>
                    <td style={{textAlign:"right", color:"#22c55e"}}>{d.enter_pct || 0}%</td>
                    <td style={{textAlign:"right", color:"#ef4444"}}>{blockPct}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:8, fontSize:10, color:"#555"}}>
          <span style={{color:"#eab308"}}>Amarillo</span> = umbrales permisivos | <span style={{color:"#3b82f6"}}>Azul</span> = umbrales restrictivos
        </div>
      </>);
    })()}

    {view === "diagnostic" && (() => {
      const rateColor = (r) => r >= 80 ? "#22c55e" : r >= 50 ? "#eab308" : "#ef4444";

      if (!diagData) return (
        <div className="card" style={{textAlign:"center", padding:40}}>
          <div style={{fontSize:32, marginBottom:12, opacity:0.3}}>🔬</div>
          <div style={{fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:8}}>Diagnostico de Filtros</div>
          <div style={{fontSize:12, color:"rgba(255,255,255,0.3)", maxWidth:400, margin:"0 auto", lineHeight:1.6}}>
            Evalua todos los filtros del bot para cada senal, independientemente de donde falle. Permite ver el cuello de botella real del sistema.
          </div>
          <div style={{marginTop:16, fontSize:11, color:"rgba(255,255,255,0.2)"}}>Inicia trading para generar datos de diagnostico.</div>
        </div>
      );

      if (diagData.status === "no_data") return (
        <div className="card" style={{textAlign:"center", padding:40}}>
          <div style={{fontSize:32, marginBottom:12, opacity:0.3}}>📡</div>
          <div style={{fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:8}}>Recopilando datos...</div>
          <div style={{fontSize:12, color:"rgba(255,255,255,0.3)"}}>Aun no hay senales con diagnostic_trace. Los datos apareceran automaticamente cuando el bot genere senales.</div>
        </div>
      );

      const pr = diagData.pass_rates || {};
      return (<>
        <h3 className="section-title">Tasa de Filtros <Tip text="Evaluacion completa de todos los filtros para cada senal. Muestra el cuello de botella real." /> ({diagData.total_signals} senales)</h3>
        <div className="card scroll">
          <table>
            <thead><tr>
              <th style={{textAlign:"left"}}>Filtro</th>
              <th style={{textAlign:"right"}}>Pasan</th>
              <th style={{textAlign:"right"}}>Total</th>
              <th style={{textAlign:"right"}}>Tasa</th>
            </tr></thead>
            <tbody>
              {Object.entries(pr).map(([k, v]) => (
                <tr key={k}>
                  <td style={{fontWeight:600}}>{k.replace(/_/g, " ")}</td>
                  <td style={{textAlign:"right"}}>{v.passed}</td>
                  <td style={{textAlign:"right", color:"rgba(255,255,255,0.3)"}}>{v.total}</td>
                  <td style={{textAlign:"right", color: rateColor(v.rate), fontWeight:700}}>{v.rate}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="grid" style={{marginTop:14}}>
          <MC label="Casi Perfectas" value={diagData.near_perfect_blocked_by_score || 0} color="yellow" tip="Senales que pasan TODOS los filtros excepto score. Indica si el score es demasiado restrictivo." />
          <MC label="Score OK pero Filtradas" value={diagData.score_ok_but_filtered || 0} color="red" tip="Senales que pasan score pero caen en filtros posteriores (trend, BTC, RSI, micro)." />
        </div>
        <h3 className="section-title" style={{marginTop:14}}>Ranking de Cuellos de Botella <Tip text="Filtros ordenados del mas restrictivo al menos. El primero es el que bloquea mas senales." /></h3>
        <div className="card scroll">
          {(diagData.bottleneck_ranking || []).map((b, i) => (
            <div key={i} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 10px", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
              <span style={{fontWeight:600, fontSize:12}}>#{i+1} {b.filter.replace(/_/g, " ")}</span>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <div style={{width:120, height:6, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden"}}>
                  <div style={{width: b.pass_rate + "%", height:"100%", background: rateColor(b.pass_rate), borderRadius:3, transition:"width 0.5s"}}></div>
                </div>
                <span style={{fontSize:11, color: rateColor(b.pass_rate), fontWeight:700, minWidth:40, textAlign:"right"}}>{b.pass_rate}%</span>
              </div>
            </div>
          ))}
        </div>
      </>);
    })()}

    {view === "quality" && (() => {
      if (!eqData || (!eqData.by_quality_label && !eqData.by_late_risk)) return (
        <div className="card" style={{textAlign:"center", padding:40}}>
          <div style={{fontSize:32, marginBottom:12, opacity:0.3}}>&#x1F50D;</div>
          <div style={{fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:8}}>Calidad de Entradas</div>
          <div style={{fontSize:12, color:"rgba(255,255,255,0.3)", maxWidth:400, margin:"0 auto", lineHeight:1.6}}>
            Recopilando datos de calidad... Inicia trading para generar diagnosticos de entrada.
          </div>
        </div>
      );

      const ql = eqData.by_quality_label || {};
      const lr = eqData.by_late_risk || {};
      const wp = eqData.winning_profile || {};
      const lp = eqData.losing_profile || {};
      const lf = eqData.losing_factors || [];
      const wf = eqData.winning_factors || [];

      const qualityOrder = ["A_PLUS", "A", "B", "C", "WEAK", "unknown"];
      const riskOrder = ["LOW", "MEDIUM", "HIGH", "unknown"];
      const wrColor = (wr) => wr >= 0.6 ? "#22c55e" : wr >= 0.45 ? "#eab308" : "#ef4444";
      const pnlColor = (v) => v > 0 ? "#22c55e" : v < 0 ? "#ef4444" : "rgba(255,255,255,0.5)";

      return (<>
        <h3 className="section-title">Calidad de Entradas por Grado</h3>
        <div className="grid">
          {qualityOrder.filter(k => ql[k]).map(k => {
            const v = ql[k];
            return <div key={k} className="card" style={{padding:14}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                <span style={{fontWeight:700, fontSize:14, color: k === "A_PLUS" ? "#22c55e" : k === "A" ? "#3b82f6" : k === "B" ? "#eab308" : k === "C" ? "#f97316" : "#ef4444"}}>{k.replace("_", "+")}</span>
                <span style={{fontSize:11, color:"rgba(255,255,255,0.3)"}}>{v.trades} trades</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>WR</span>
                <span style={{fontWeight:700, color: wrColor(v.winrate)}}>{(v.winrate * 100).toFixed(1)}%</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>PnL Total</span>
                <span style={{fontWeight:700, color: pnlColor(v.total_pnl)}}>${v.total_pnl.toFixed(4)}</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, marginTop:4}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>Expectancy</span>
                <span style={{fontWeight:600, color: pnlColor(v.expectancy)}}>${v.expectancy.toFixed(4)}</span>
              </div>
            </div>;
          })}
        </div>

        <h3 className="section-title" style={{marginTop:14}}>Riesgo de Entrada Tardia</h3>
        <div className="grid">
          {riskOrder.filter(k => lr[k]).map(k => {
            const v = lr[k];
            return <div key={k} className="card" style={{padding:14}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                <span style={{fontWeight:700, fontSize:14, color: k === "LOW" ? "#22c55e" : k === "MEDIUM" ? "#eab308" : k === "HIGH" ? "#ef4444" : "rgba(255,255,255,0.5)"}}>{k}</span>
                <span style={{fontSize:11, color:"rgba(255,255,255,0.3)"}}>{v.trades} trades</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>WR</span>
                <span style={{fontWeight:700, color: wrColor(v.winrate)}}>{(v.winrate * 100).toFixed(1)}%</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:12}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>PnL Total</span>
                <span style={{fontWeight:700, color: pnlColor(v.total_pnl)}}>${v.total_pnl.toFixed(4)}</span>
              </div>
            </div>;
          })}
        </div>

        <h3 className="section-title" style={{marginTop:14}}>Perfil: Ganadores vs Perdedores</h3>
        <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div className="card" style={{padding:14}}>
            <div style={{fontWeight:700, fontSize:13, color:"#22c55e", marginBottom:10}}>Ganadores ({wp.count || 0})</div>
            <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:6}}>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Score</span><span>{wp.avg_score || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Spread %</span><span>{wp.avg_spread_pct || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Move vs Fee</span><span>{wp.avg_move_vs_fee || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Confirmacion</span><span>{wp.avg_confirmation || 0}</span></div>
              {wp.quality_distribution && <div style={{marginTop:6}}>
                <div style={{fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:4}}>Distribucion calidad</div>
                {Object.entries(wp.quality_distribution).map(([k,v]) => <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:11}}><span>{k}</span><span>{v}</span></div>)}
              </div>}
            </div>
          </div>
          <div className="card" style={{padding:14}}>
            <div style={{fontWeight:700, fontSize:13, color:"#ef4444", marginBottom:10}}>Perdedores ({lp.count || 0})</div>
            <div style={{fontSize:12, display:"flex", flexDirection:"column", gap:6}}>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Score</span><span>{lp.avg_score || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Avg Spread %</span><span>{lp.avg_spread_pct || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Move vs Fee</span><span>{lp.avg_move_vs_fee || 0}</span></div>
              <div style={{display:"flex", justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.5)"}}>Confirmacion</span><span>{lp.avg_confirmation || 0}</span></div>
              {lp.quality_distribution && <div style={{marginTop:6}}>
                <div style={{fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:4}}>Distribucion calidad</div>
                {Object.entries(lp.quality_distribution).map(([k,v]) => <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:11}}><span>{k}</span><span>{v}</span></div>)}
              </div>}
            </div>
          </div>
        </div>

        {(lf.length > 0 || wf.length > 0) && <>
          <h3 className="section-title" style={{marginTop:14}}>Factores Principales</h3>
          <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
            {lf.length > 0 && <div className="card" style={{padding:14}}>
              <div style={{fontWeight:700, fontSize:13, color:"#ef4444", marginBottom:10}}>Top Factores Perdedores</div>
              {lf.map((f, i) => <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span>{f.factor}</span>
                <span style={{color:"#ef4444", fontWeight:600}}>{f.count} ({f.pct}%)</span>
              </div>)}
            </div>}
            {wf.length > 0 && <div className="card" style={{padding:14}}>
              <div style={{fontWeight:700, fontSize:13, color:"#22c55e", marginBottom:10}}>Top Factores Ganadores</div>
              {wf.map((f, i) => <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0", borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span>{f.factor}</span>
                <span style={{color:"#22c55e", fontWeight:600}}>{f.count} ({f.pct}%)</span>
              </div>)}
            </div>}
          </div>
        </>}
      </>);
    })()}

    {view === "decisions" && (<>
      <h3 className="section-title">Automated Decisions ({decisions.length})</h3>
      {decisions.length === 0 ? <div className="loading">No decisions yet — need more trades</div> :
      <div className="card scroll">
        {decisions.map((d, i) => (
          <div key={i} style={{padding:"10px 0", borderBottom:"1px solid #1a1a2e"}}>
            <div style={{display:"flex", gap:8, alignItems:"center"}}>
              <span className={"tag " + (d.type === "recommendation" ? "tag-blue" : d.type === "warning" ? "tag-yellow" : "tag-green")}>{d.type}</span>
              <span style={{fontWeight:700, fontSize:13}}>{d.title}</span>
              <span className={"pill " + (d.confidence === "high" ? "tag-green" : "tag-yellow")} style={{marginLeft:"auto"}}>{d.confidence}</span>
            </div>
            <div style={{marginTop:6, padding:"8px 12px", background:"#0a0a12", borderRadius:8, fontSize:11}}>
              <div style={{color:"#888"}}><b>Evidence:</b> {d.evidence}</div>
              <div style={{color:"#3b82f6", marginTop:4}}><b>Action:</b> {d.action}</div>
              <div style={{color:"#22c55e", marginTop:4}}><b>Expected impact:</b> {d.expected_impact}</div>
            </div>
          </div>
        ))}
      </div>}
    </>)}
  </>);
}

// ── Validation Tab ──
function ValidationTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("live_trades");

  const run = () => {
    setLoading(true);
    fetch(API + "/api/quant/validation?mode=" + mode).then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  };

  const verdictColor = (v) => v === "ADOPT" ? "tag-green" : v === "TEST_LIVE" ? "tag-yellow" : v === "REJECT" ? "tag-red" : v === "BLOCKED_BY_DATA_QUALITY" ? "tag-red" : "tag-blue";
  const confColor = (c) => c === "HIGH" ? "#22c55e" : c === "MEDIUM" ? "#eab308" : "#ef4444";
  const flagColor = (f) => f === "NO_EFFECT" || f === "BEST_IS_BASELINE" ? "#f97316" : f === "DATA_QUALITY" ? "#ef4444" : "#eab308";

  if (!data) return (<div style={{textAlign:"center", padding:40}}>
    <div style={{display:"flex", justifyContent:"center", gap:8, marginBottom:12}}>
      <button className={"tab " + (mode === "live_trades" ? "active" : "")} onClick={() => setMode("live_trades")}>Live Trades</button>
      <button className={"tab " + (mode === "replay_historical" ? "active" : "")} onClick={() => setMode("replay_historical")}>Historical Replay</button>
    </div>
    <button onClick={run} className="tab active">{loading ? "Running experiments..." : "Run Full Validation"}</button>
    <p style={{fontSize:10, color:"#555", marginTop:8}}>{mode === "live_trades" ? "Runs 12 experiments across 3 batches against real trade data" : "Replay mode: requires 7+ days of captured raw data"}</p>
  </div>);

  const b = data.baseline_summary || {};

  return (<>
    <div className="page-title">Validacion <Tip text="Pruebas formales de cambios antes de aplicarlos al bot. Compara variantes contra el baseline actual." /><div className="page-sub">Pruebas formales de cambios antes de aplicar al bot</div></div>
    {/* Baseline */}
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
      <h3 className="section-title" style={{margin:0}}>Baseline ({data.total_trades_baseline} trades)</h3>
      <div style={{display:"flex", gap:8}}>
        <button onClick={run} className="tab">{loading ? "Running..." : "Re-run"}</button>
        <ExportBtn data={data} filename={"validation_" + new Date().toISOString().split("T")[0] + ".json"} />
      </div>
    </div>
    <div className="grid" style={{gridTemplateColumns:"repeat(6, 1fr)"}}>
      <MC label="Expectancy" value={"$" + (b.expectancy || 0)} color={Number(b.expectancy) >= 0 ? "green" : "red"} />
      <MC label="Win Rate" value={((b.winrate || 0) * 100).toFixed(0) + "%"} color={b.winrate >= 0.5 ? "green" : "red"} />
      <MC label="PF" value={b.profit_factor || 0} color={Number(b.profit_factor) >= 1 ? "green" : "red"} />
      <MC label="Net PnL" value={"$" + (b.net_pnl || 0)} color={Number(b.net_pnl) >= 0 ? "green" : "red"} />
      <MC label="Max DD" value={"$" + (b.max_drawdown || 0)} color="red" />
      <MC label="Fee Killed" value={b.fee_killed_count || 0} color={b.fee_killed_count === 0 ? "green" : "red"} />
    </div>

    {/* Validation Integrity */}
    {data.validation_integrity && data.validation_integrity.status !== "OK" && (
      <div className="card" style={{marginTop:12, borderColor:"#f97316", padding:"10px 14px"}}>
        <div style={{fontSize:12, fontWeight:700, color:"#f97316", marginBottom:4}}>Validation Integrity: {data.validation_integrity.status}</div>
        {(data.validation_integrity.issues || []).map((issue, i) => (
          <div key={i} style={{fontSize:10, color:"#aaa", padding:"2px 0"}}>{issue}</div>
        ))}
      </div>
    )}

    {/* Batches */}
    {(data.batches || []).map((batch, bi) => (
      <div key={bi} className="card" style={{marginTop:16}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
          <div>
            <span style={{fontWeight:700, fontSize:14, color:"#e0e0e8"}}>{batch.batch_name.replace(/_/g, " ").toUpperCase()}</span>
            <span className={"tag " + verdictColor(batch.verdict?.decision)} style={{marginLeft:8}}>{batch.verdict?.decision}</span>
            {batch.verdict?.confidence && (
              <span style={{marginLeft:6, fontSize:10, fontWeight:600, color: confColor(batch.verdict.confidence)}}>[{batch.verdict.confidence}]</span>
            )}
          </div>
          <span style={{fontSize:10, color:"#666"}}>Best: <span className="purple">{batch.best_experiment || "none"}</span></span>
        </div>
        <p style={{fontSize:10, color:"#888", marginBottom:8}}>{batch.hypothesis}</p>

        {/* Status flags */}
        {batch.batch_status_flags?.length > 0 && (
          <div style={{marginBottom:6, display:"flex", gap:4, flexWrap:"wrap"}}>
            {batch.batch_status_flags.map((f, i) => <span key={i} style={{padding:"2px 8px", borderRadius:10, fontSize:9, fontWeight:600, background:"rgba(249,115,22,0.15)", color: flagColor(f)}}>{f}</span>)}
          </div>
        )}

        {/* Data quality blockers */}
        {batch.data_quality_blockers?.length > 0 && (
          <div style={{padding:"6px 10px", background:"rgba(239,68,68,0.1)", borderRadius:6, fontSize:10, marginBottom:8, color:"#ef4444"}}>
            {batch.data_quality_blockers.map((b, i) => <div key={i}>{b}</div>)}
          </div>
        )}

        {/* Verdict */}
        <div style={{padding:"6px 10px", background:"#0a0a12", borderRadius:6, fontSize:11, marginBottom:8}}>
          <span style={{color:"#aaa"}}>{batch.verdict?.reasoning}</span>
          {batch.verdict?.risk_flags?.length > 0 && (
            <span style={{marginLeft:8}}>{batch.verdict.risk_flags.map((f, i) => <span key={i} className="tag tag-yellow" style={{marginLeft:4}}>{f}</span>)}</span>
          )}
        </div>

        {/* Experiments table */}
        <table>
          <thead><tr>
            <th>Experiment</th><th style={{textAlign:"right"}}>Trades</th><th style={{textAlign:"right"}}>WR</th>
            <th style={{textAlign:"right"}}>Expectancy</th><th style={{textAlign:"right"}}>PF</th>
            <th style={{textAlign:"right"}}>Net PnL</th><th style={{textAlign:"right"}}>DD</th>
            <th style={{textAlign:"right"}}>Exp %</th><th style={{textAlign:"right"}}>PF %</th>
          </tr></thead>
          <tbody>
            {batch.experiments?.map((exp, i) => {
              const km = exp.key_metrics || {};
              const vs = exp.vs_baseline || {};
              const isBest = exp.name === batch.best_experiment;
              return (
                <tr key={i} style={{background: isBest ? "#1a1a3e" : "transparent"}}>
                  <td style={{fontWeight: isBest ? 700 : 400}}>{isBest && ">> "}{exp.name}</td>
                  <td style={{textAlign:"right"}}>{exp.trades_accepted}</td>
                  <td style={{textAlign:"right"}}>{((km.winrate || 0) * 100).toFixed(0)}%</td>
                  <td style={{textAlign:"right", color: km.expectancy >= 0 ? "#22c55e" : "#ef4444"}}>{km.expectancy}</td>
                  <td style={{textAlign:"right"}}>{km.profit_factor}</td>
                  <td style={{textAlign:"right", color: km.net_pnl >= 0 ? "#22c55e" : "#ef4444"}}>{km.net_pnl}</td>
                  <td style={{textAlign:"right"}}>{km.max_drawdown}</td>
                  <td style={{textAlign:"right", color: vs.expectancy_change_pct > 0 ? "#22c55e" : "#ef4444"}}>{vs.expectancy_change_pct > 0 ? "+" : ""}{vs.expectancy_change_pct}%</td>
                  <td style={{textAlign:"right", color: vs.pf_change_pct > 0 ? "#22c55e" : "#ef4444"}}>{vs.pf_change_pct > 0 ? "+" : ""}{vs.pf_change_pct}%</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    ))}

    {/* Combination */}
    {data.combination_suggestion && (
      <div className="card" style={{marginTop:16, borderColor:"#3b82f6"}}>

// ── Audit Tab ──
function AuditTab() {
  const { data: status } = useFetch("/api/audit/status", 10000);
  const { data: findings } = useFetch("/api/audit/findings", 10000);
  const [fullReport, setFullReport] = useState(null);
  const [loading, setLoading] = useState(false);

  const runAll = () => {
    setLoading(true);
    fetch(API + "/api/audit/run").then(r => r.json()).then(d => { setFullReport(d); setLoading(false); }).catch(() => setLoading(false));
  };

  const scoreColor = (s) => s >= 80 ? "green" : s >= 60 ? "yellow" : "red";
  const sevColor = (s) => s === "critical" ? "tag-red" : s === "error" ? "tag-red" : s === "warning" ? "tag-yellow" : "tag-blue";

  return (<>
    <div className="page-title">Auditoria <Tip text="Sistema de auditorias automaticas que verifica la integridad de datos cada 5-60 minutos." /><div className="page-sub">Calidad de datos, integridad, checks automaticos</div></div>

    <div className="grid">
      <MC label="Health Score" value={status?.global_score ?? "..."} color={scoreColor(status?.global_score || 0)} sub="0-100" />

    {/* Per-Check Status */}
    {status?.checks && (<>
      <h3 className="section-title" style={{marginTop:16}}>Checks <Tip text="Cada check se ejecuta en intervalos distintos: integracion (5m), calidad (15m), storage (1h), consistencia (6h)." /></h3>
      <div className="card">
        <table>
          <thead><tr><th>Check</th><th>Status</th><th style={{textAlign:"right"}}>Score</th><th style={{textAlign:"right"}}>Findings</th><th style={{textAlign:"right"}}>Runs</th><th>Interval</th><th>Last Run</th></tr></thead>
          <tbody>

              <tr key={name}>
                <td className="purple">{name}</td>

                <td style={{textAlign:"right", color: scoreColor(c.score) === "green" ? "#22c55e" : scoreColor(c.score) === "yellow" ? "#eab308" : "#ef4444"}}>{c.score}</td>
                <td style={{textAlign:"right"}}>{c.findings}</td>
                <td style={{textAlign:"right"}}>{c.run_count}</td>
                <td style={{color:"#666"}}>{c.interval_sec < 60 ? c.interval_sec + "s" : Math.round(c.interval_sec / 60) + "m"}</td>

            ))}

        </table>
      </div>
    </>)}

    {/* Current Findings */}
    {findings && findings.length > 0 && (<>
      <h3 className="section-title" style={{marginTop:16}}>Current Findings</h3>
      <div className="card scroll">
        <table>
          <thead><tr><th>Severity</th><th>Check</th><th>Code</th><th>Message</th></tr></thead>
          <tbody>
            {findings.map((f, i) => (
              <tr key={i}>
                <td><span className={"tag " + sevColor(f.severity)}>{f.severity}</span></td>
                <td className="purple">{f.check}</td>
                <td style={{fontFamily:"monospace", fontSize:10}}>{f.code}</td>
                <td style={{color:"#bbb"}}>{f.message}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}

    {/* Full Report (after Run All) */}
    {fullReport && (<>
      <h3 className="section-title" style={{marginTop:16}}>Full Report</h3>
      {Object.entries(fullReport.checks || {}).map(([name, c]) => (
        <div key={name} className="card" style={{marginBottom:8}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
            <span className="purple" style={{fontWeight:600}}>{name}</span>
            <span className={"tag " + (c.status === "OK" ? "tag-green" : c.status === "WARNING" ? "tag-yellow" : "tag-red")}>{c.status} ({c.score})</span>
          </div>
          {c.metrics && (
            <div style={{display:"flex", gap:12, flexWrap:"wrap", marginBottom:8}}>
              {Object.entries(c.metrics).map(([k, v]) => (
                <span key={k} style={{fontSize:10, color:"#666"}}>{k}: <span style={{color:"#aaa"}}>{typeof v === "number" ? v.toLocaleString() : String(v)}</span></span>
              ))}
            </div>
          )}
          {c.findings && c.findings.length > 0 && c.findings.map((f, i) => (
            <div key={i} style={{padding:"2px 0", fontSize:11, color: f.severity === "error" || f.severity === "critical" ? "#ef4444" : f.severity === "warning" ? "#eab308" : "#888"}}>
              [{f.severity}] {f.code}: {f.message}

          ))}
        </div>
      ))}
    </>)}
  </>);
}

// ── Cambios Tab ──
// Lista de change markers (manuales y automaticos) con su impacto antes/despues calculado.
// Permite ver el efecto real de cada cambio que has hecho en el bot.
function CambiosTab() {
  const [items, setItems] = useState(null);
  const [loading, setLoading] = useState(true);
  const [days, setDays] = useState(30);
  const [filterCat, setFilterCat] = useState("ALL");
  const [recalcId, setRecalcId] = useState(null);

  const load = () => {
    setLoading(true);
    fetch(API + "/api/markers?limit=200&days=" + days)
      .then(r => r.json())
      .then(d => { setItems(Array.isArray(d) ? d : []); setLoading(false); })
      .catch(() => { setItems([]); setLoading(false); });
  };
  useEffect(() => { load(); }, [days]);

  const recalc = async (id) => {
    setRecalcId(id);
    try {
      await fetch(API + "/api/markers/" + id + "/recalculate", { method: "POST" });
      load();
    } finally { setRecalcId(null); }
  };

  if (loading) return <div className="loading">Cargando markers...</div>;

  const categories = ["ALL", ...Array.from(new Set((items || []).map(m => m.category))).sort()];
  const filtered = (items || []).filter(m => filterCat === "ALL" || m.category === filterCat);

  const statusColor = (s) => {
    if (s === "IMPROVED") return "#22c55e";
    if (s === "WORSENED") return "#ef4444";
    if (s === "NEUTRAL") return "#eab308";
    if (s === "INSUFFICIENT_DATA") return "#888";
    return "#555";
  };
  const catColor = (c) => {
    const m = { MANUAL: "#3b82f6", MODE_CHANGE: "#a855f7", PRESET_EDIT: "#f59e0b",
                PROPOSAL_ACCEPTED: "#22c55e", PROTECTION: "#ef4444", TEST: "#666" };
    return m[c] || "#888";
  };
  const fmtDelta = (v, suffix) => {
    if (v == null) return "-";
    const sign = v > 0 ? "+" : "";
    return sign + v + (suffix || "");
  };
  const fmtTime = (ts) => {
    if (!ts) return "-";
    try { return new Date(ts).toLocaleString("es-ES", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" }); }
    catch { return ts; }
  };

  return (<>
    <div className="page-title" style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
      <div>
        <span>Cambios</span>
        <div className="page-sub">Eventos que pueden cambiar el comportamiento del bot, con su impacto antes/despues calculado automaticamente</div>
      </div>
      <div style={{display:"flex", gap:8, alignItems:"center"}}>
        <select value={days} onChange={e => setDays(Number(e.target.value))}
                style={{background:"#1a1a1a", color:"#aaa", border:"1px solid #333", borderRadius:6, padding:"6px 10px", fontSize:11}}>
          <option value={7}>Ultimos 7 dias</option>
          <option value={30}>Ultimos 30 dias</option>
          <option value={90}>Ultimos 90 dias</option>
        </select>
        <button className="tab" onClick={load}>Actualizar</button>
      </div>
    </div>

    {/* Category filter */}
    <div style={{display:"flex", gap:6, marginBottom:12, flexWrap:"wrap"}}>
      {categories.map(c => (
        <button key={c}
                className={"tab " + (filterCat === c ? "active" : "")}
                onClick={() => setFilterCat(c)}>
          {c} {c !== "ALL" && <span style={{opacity:0.6, marginLeft:4}}>({(items || []).filter(m => m.category === c).length})</span>}
        </button>
      ))}
    </div>

    {filtered.length === 0 ? (
      <div className="card" style={{textAlign:"center", padding:30, color:"#666"}}>
        No hay markers en este periodo. Crea uno con el boton "Marcar cambio" del bot, o haz un cambio de modo / acepta una proposal.
      </div>
    ) : (

            <th>Categoria</th>
            <th>Etiqueta</th>
            <th>Contexto</th>
            <th style={{textAlign:"center"}}>Estado</th>
            <th style={{textAlign:"right"}}>WR antes/despues</th>
            <th style={{textAlign:"right"}}>Expectancy antes/despues</th>
            <th style={{textAlign:"right"}}>Δ exp</th>
            <th style={{textAlign:"right"}}>SL% antes/despues</th>
            <th></th>
          </tr></thead>
          <tbody>
            {filtered.map(m => {
              const imp = m.impact_data || {};
              const before = imp.before || {};
              const after = imp.after || {};
              const ctx = [m.coin, m.side, m.mode].filter(Boolean).join(" / ") || "-";
              return (
                <tr key={m.id}>
                  <td style={{fontSize:10, color:"#666", whiteSpace:"nowrap"}}>{fmtTime(m.timestamp)}</td>
                  <td><span className="tag" style={{background: catColor(m.category) + "20", color: catColor(m.category), border: "1px solid " + catColor(m.category) + "40"}}>{m.category}</span></td>
                  <td style={{maxWidth:300, overflow:"hidden", textOverflow:"ellipsis"}} title={m.description || ""}>
                    <div>{m.label}</div>
                    {m.description && <div style={{fontSize:9, color:"#555", marginTop:2}}>{m.description.length > 80 ? m.description.slice(0, 80) + "..." : m.description}</div>}
                  </td>
                  <td style={{fontSize:10, color:"#888"}}>{ctx}</td>
                  <td style={{textAlign:"center"}}>
                    <span className="tag" style={{background: statusColor(m.impact_status) + "20", color: statusColor(m.impact_status), border: "1px solid " + statusColor(m.impact_status) + "40"}}>
                      {m.impact_status || "PENDING"}
                    </span>
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.wr != null ? before.wr + "% / " + after.wr + "%" : "-"}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.expectancy != null ? before.expectancy + " / " + after.expectancy : "-"}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10, fontWeight:600,
                              color: imp.delta_expectancy > 0 ? "#22c55e" : imp.delta_expectancy < 0 ? "#ef4444" : "#888"}}>
                    {fmtDelta(imp.delta_expectancy)}
                  </td>
                  <td style={{textAlign:"right", fontFamily:"monospace", fontSize:10}}>
                    {before.sl_rate != null ? before.sl_rate + "% / " + after.sl_rate + "%" : "-"}
                  </td>
                  <td>
                    <button onClick={() => recalc(m.id)}
                            disabled={recalcId === m.id}
                            style={{background:"#1a1a2e", border:"1px solid #2a3f5f", color:"#3b82f6", padding:"3px 8px", borderRadius:4, fontSize:9, cursor:"pointer"}}>
                      {recalcId === m.id ? "..." : "Recalcular"}
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    )}

    <div style={{marginTop:12, fontSize:10, color:"#555", padding:12, background:"#0a0a0a", borderRadius:6}}>
      <b>Como funciona:</b> cada marker compara las metricas (WR, expectancy, SL rate, profit factor) de los 20 trades antes vs los 20 trades despues del evento.
      Si no hay 10 trades minimos en alguna ventana, hace fallback a las 6 horas antes/despues.
      Si el marker tiene contexto (coin/side/mode) solo cuenta esos trades.
      El estado se calcula con un score ponderado: <b style={{color:"#22c55e"}}>IMPROVED</b> si mejora &gt; 10%, <b style={{color:"#ef4444"}}>WORSENED</b> si empeora &gt; 10%, sino <b style={{color:"#eab308"}}>NEUTRAL</b>.
    </div>
  </>);
}
