version: "3.9"

# Alchimiabot Platform v2 — quant research/analytics stack
# Ports: platform 8190, postgres 5443

services:
  postgres:
    image: postgres:16-alpine
    container_name: alchimiabot-platform-postgres
    environment:
      POSTGRES_DB: alchimiabot_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform123
    ports:
      - "5443:5432"
    volumes:
      - alchimiabot-platform-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alchimiabot-platform-net

volumes:
  alchimiabot-platform-pgdata:

networks:
  alchimiabot-platform-net:
    driver: bridge
